<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>3D Earth Atlas — CogniSwift</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0d0c1a;--surface:#16142a;--surface2:#1e1c32;--surface3:#26243e;
  --border:rgba(255,255,255,0.09);--border-h:rgba(255,255,255,0.2);
  --text:#ecedf2;--muted:#8a8aac;--muted2:#454562;
  --accent:#e8d5b0;--accent-rgb:232,213,176;
  --green:#4ade80;--blue:#60a5fa;--red:#f87171;--orange:#fb923c;--purple:#c084fc;
  --r:12px;--r-sm:8px;
  --panel:360px;
}
.light{
  --bg:#e8e4db;--surface:#f5f2ea;--surface2:#ede9e0;--surface3:#e4e0d6;
  --border:rgba(0,0,0,0.1);--border-h:rgba(0,0,0,0.22);
  --text:#1e1b14;--muted:#7a7060;--muted2:#c0b89e;
  --accent:#9a7c3f;--accent-rgb:154,124,63;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:'Geist',system-ui,sans-serif;font-size:14px;line-height:1.5;}
button{font-family:inherit;cursor:pointer;}
input{font-family:inherit;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:2px;}

/* ── Topbar ── */
.topbar{
  position:fixed;top:0;left:0;right:0;height:52px;z-index:300;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;background:rgba(13,12,26,0.88);
  backdrop-filter:blur(20px);border-bottom:1px solid var(--border);
}
.light .topbar{background:rgba(232,228,219,0.88);}
.topbar-left{display:flex;align-items:center;gap:10px;text-decoration:none;}
.topbar-back{background:none;border:1px solid var(--border);border-radius:var(--r-sm);
  padding:5px 11px;color:var(--muted);font-size:0.7rem;letter-spacing:0.04em;
  text-transform:uppercase;transition:all .18s;display:flex;align-items:center;gap:5px;}
.topbar-back:hover{border-color:var(--border-h);color:var(--text);}
.topbar-logo{font-family:'Instrument Serif',serif;font-size:1.15rem;color:var(--accent);
  letter-spacing:-0.02em;text-decoration:none;}
.topbar-sep{color:var(--muted2);margin:0 6px;font-size:0.75rem;}
.topbar-title{font-size:0.7rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;}
.topbar-r{display:flex;align-items:center;gap:8px;}
.tb-btn{background:none;border:1px solid var(--border);border-radius:var(--r-sm);
  padding:5px 12px;color:var(--muted);font-size:0.7rem;letter-spacing:0.04em;
  text-transform:uppercase;transition:all .18s;}
.tb-btn:hover{border-color:var(--border-h);color:var(--text);background:var(--surface2);}
.thm-btn{background:none;border:1px solid var(--border);border-radius:var(--r-sm);
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  font-size:0.85rem;color:var(--muted);transition:all .18s;}
.thm-btn:hover{border-color:var(--border-h);color:var(--text);}

/* ── Layout ── */
.layout{position:fixed;top:52px;bottom:0;left:0;right:0;display:flex;}
#globeCanvas{position:absolute;top:0;right:0;display:block;cursor:grab;image-rendering:crisp-edges;}
#globeCanvas.dragging{cursor:grabbing;}

/* ── Left Panel ── */
.panel{
  width:var(--panel);flex-shrink:0;position:relative;z-index:20;
  background:rgba(22,20,42,0.92);
  backdrop-filter:blur(24px);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.light .panel{background:rgba(245,242,234,0.94);}

/* ── Search ── */
.search-wrap{padding:14px 14px 10px;flex-shrink:0;}
.search-box{
  display:flex;align-items:center;gap:8px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:8px 12px;transition:border-color .18s;
}
.search-box:focus-within{border-color:rgba(var(--accent-rgb),0.5);}
.search-icon{color:var(--muted);font-size:0.85rem;flex-shrink:0;}
.search-input{flex:1;background:none;border:none;outline:none;color:var(--text);
  font-size:0.88rem;}
.search-input::placeholder{color:var(--muted2);}
.search-clear{background:none;border:none;color:var(--muted);font-size:0.75rem;
  padding:2px 4px;border-radius:3px;transition:color .15s;}
.search-clear:hover{color:var(--text);}

/* ── Search suggestions ── */
.suggestions{
  position:absolute;top:100%;left:14px;right:14px;z-index:100;
  background:var(--surface);border:1px solid var(--border-h);
  border-radius:var(--r-sm);box-shadow:0 8px 24px rgba(0,0,0,0.4);
  max-height:220px;overflow-y:auto;
}
.sugg-item{padding:8px 12px;font-size:0.82rem;cursor:pointer;
  display:flex;align-items:center;gap:8px;transition:background .12s;}
.sugg-item:hover{background:var(--surface2);}
.sugg-type{font-size:0.65rem;color:var(--muted);background:var(--surface2);
  border-radius:3px;padding:1px 5px;flex-shrink:0;text-transform:uppercase;letter-spacing:0.06em;}
.sugg-name{flex:1;}

/* ── Info panel scrollable ── */
.panel-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 14px 14px;}

/* ── Feature card ── */
.feat-card{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r);padding:14px;margin-bottom:10px;
}
.feat-name{font-family:'Instrument Serif',serif;font-size:1.15rem;font-style:italic;
  color:var(--accent);margin-bottom:4px;letter-spacing:-0.01em;}
.feat-type-badge{display:inline-flex;align-items:center;gap:4px;
  font-size:0.62rem;color:var(--muted);background:var(--surface);
  border-radius:4px;padding:2px 7px;text-transform:uppercase;letter-spacing:0.08em;
  border:1px solid var(--border);margin-bottom:8px;}
.feat-desc{font-size:0.78rem;color:var(--muted);line-height:1.65;margin-bottom:10px;}
.feat-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.stat-box{background:var(--surface);border-radius:var(--r-sm);padding:7px 9px;
  border:1px solid var(--border);}
.stat-label{font-size:0.6rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:2px;}
.stat-val{font-size:0.82rem;color:var(--text);font-weight:400;}

/* ── Related features ── */
.related-label{font-size:0.62rem;text-transform:uppercase;letter-spacing:0.1em;
  color:var(--muted);margin-bottom:6px;font-weight:500;}
.related-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.chip{
  background:var(--surface);border:1px solid var(--border);border-radius:50px;
  padding:4px 10px;font-size:0.72rem;color:var(--muted);cursor:pointer;
  transition:all .15s;display:flex;align-items:center;gap:5px;
}
.chip:hover{border-color:var(--border-h);color:var(--text);background:var(--surface2);}
.chip.active{background:rgba(var(--accent-rgb),0.15);color:var(--accent);
  border-color:rgba(var(--accent-rgb),0.35);}
.chip-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

/* ── Annotation toolbar ── */
.toolbar{
  padding:10px 14px;border-top:1px solid var(--border);flex-shrink:0;
}
.toolbar-label{font-size:0.62rem;text-transform:uppercase;letter-spacing:0.1em;
  color:var(--muted);margin-bottom:8px;}
.tool-row{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.tool-btn{
  background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);
  padding:5px 10px;font-size:0.72rem;color:var(--muted);
  transition:all .15s;display:flex;align-items:center;gap:4px;
}
.tool-btn:hover{border-color:var(--border-h);color:var(--text);}
.tool-btn.active{background:rgba(var(--accent-rgb),0.12);color:var(--accent);
  border-color:rgba(var(--accent-rgb),0.3);}
.color-row-t{display:flex;gap:4px;margin-top:6px;}
.color-dot{width:18px;height:18px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:transform .15s,border-color .15s;flex-shrink:0;}
.color-dot:hover{transform:scale(1.15);}
.color-dot.sel{border-color:var(--text);}

/* ── Export bar ── */
.export-bar{
  padding:10px 14px;border-top:1px solid var(--border);flex-shrink:0;
  display:flex;gap:6px;
}
.exp-btn{flex:1;padding:7px;border:none;border-radius:var(--r-sm);
  font-size:0.72rem;letter-spacing:0.04em;text-transform:uppercase;
  transition:all .18s;cursor:pointer;}
.exp-btn.pri{background:var(--accent);color:var(--bg);}
.exp-btn.pri:hover{opacity:0.85;}
.exp-btn.sec{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.exp-btn.sec:hover{border-color:var(--border-h);}

/* ── Empty state ── */
.empty-state{padding:24px 14px;text-align:center;color:var(--muted);font-size:0.82rem;line-height:1.8;}
.empty-icon{font-size:2rem;margin-bottom:8px;opacity:0.4;}
.empty-hint{font-size:0.72rem;color:var(--muted2);margin-top:8px;}
.hint-example{display:inline-block;background:var(--surface2);border-radius:4px;
  padding:2px 7px;margin:2px;font-size:0.68rem;cursor:pointer;
  border:1px solid var(--border);transition:border-color .15s;}
.hint-example:hover{border-color:var(--border-h);color:var(--text);}

/* ── Annotation canvas overlay ── */
#annotCanvas{position:absolute;top:0;right:0;pointer-events:none;z-index:5;}
#annotCanvas.drawing{pointer-events:all;cursor:crosshair;}

/* ── Tooltip on globe ── */
.globe-tip{
  position:absolute;pointer-events:none;z-index:50;
  background:var(--surface);border:1px solid var(--border-h);
  border-radius:var(--r-sm);padding:7px 11px;font-size:0.78rem;
  box-shadow:0 6px 20px rgba(0,0,0,0.4);
}

/* ── Zoom controls ── */
.zoom-btns{position:absolute;right:14px;bottom:80px;z-index:20;
  display:flex;flex-direction:column;gap:4px;}
.zoom-btn{width:34px;height:34px;background:rgba(22,20,42,0.88);
  border:1px solid var(--border);border-radius:var(--r-sm);
  color:var(--text);font-size:1rem;display:flex;align-items:center;
  justify-content:center;transition:all .15s;
  backdrop-filter:blur(12px);}
.light .zoom-btn{background:rgba(245,242,234,0.88);}
.zoom-btn:hover{border-color:var(--border-h);}

/* ── Loading screen ── */
.loading{
  position:fixed;inset:0;z-index:500;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
}
.loading-globe{font-size:3rem;animation:spin 3s linear infinite;}
@keyframes spin{from{transform:rotateY(0deg);}to{transform:rotateY(360deg);}}
.loading-text{font-family:'Instrument Serif',serif;font-size:1.1rem;color:var(--accent);font-style:italic;}
.loading-bar{width:200px;height:2px;background:var(--surface2);border-radius:1px;overflow:hidden;}
.loading-fill{height:100%;background:var(--accent);border-radius:1px;transition:width .3s;width:0%;}

.opacity-row{display:flex;align-items:center;gap:6px;margin:8px 0 2px;padding:6px 9px;
  background:var(--surface);border-radius:var(--r-sm);border:1px solid var(--border);}
.opacity-label{font-size:0.6rem;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted);white-space:nowrap;flex-shrink:0;}
.opacity-val{font-size:0.68rem;color:var(--accent);min-width:32px;text-align:right;flex-shrink:0;}
.opacity-slider{flex:1;height:3px;accent-color:var(--accent);cursor:pointer;min-width:40px;}
.chip-opacity{width:48px;height:3px;accent-color:var(--accent);cursor:pointer;margin-left:5px;flex-shrink:0;vertical-align:middle;}

/* ── Mobile ── */
@media(max-width:700px){
  .panel{width:100%;position:absolute;bottom:0;left:0;right:0;
    top:auto;height:48%;border-right:none;border-top:1px solid var(--border);}
  #globeCanvas{bottom:48%;}
  :root{--panel:100vw;}
  .topbar-title,.topbar-sep{display:none;}
}
</style>
</head>
<body>

<!-- Loading -->
<div class="loading" id="loading">
  <div class="loading-globe">🌍</div>
  <div class="loading-text">Preparing the Earth…</div>
  <div class="loading-bar"><div class="loading-fill" id="loadFill"></div></div>
</div>

<!-- Topbar -->
<div class="topbar">
  <div class="topbar-left">
    <button class="topbar-back" onclick="goBack()">← Back</button>
    <a href="/" class="topbar-logo">CogniSwift</a>
    <span class="topbar-sep">|</span>
    <span class="topbar-title">3D Earth Atlas</span>
  </div>
  <div class="topbar-r">
    <button class="thm-btn" id="thmBtn" onclick="toggleTheme()">☀</button>
  </div>
</div>

<div class="layout">
  <!-- Left Panel -->
  <div class="panel">
    <!-- Search -->
    <div class="search-wrap" style="position:relative;">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="searchInput" placeholder="Search any place, river, mountain, country…"
          autocomplete="off" oninput="onSearch(this.value)" onkeydown="onSearchKey(event)"/>
        <button class="search-clear" id="searchClear" onclick="clearSearch()" style="display:none">✕</button>
      </div>
      <div style="display:flex;gap:5px;margin-top:6px;align-items:center;">
        <input id="wikiInput" class="search-input"
          style="font-size:0.72rem;padding:5px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);outline:none;flex:1;"
          placeholder="Or paste a Wikipedia URL to locate any feature…"
          onkeydown="if(event.key==='Enter')wikiSearch()"/>
        <button onclick="wikiSearch()" style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:5px 10px;color:var(--muted);font-size:0.7rem;cursor:pointer;white-space:nowrap;flex-shrink:0;" title="Locate this Wikipedia article on the globe">🌐 Locate</button>
      </div>
      <div class="suggestions" id="suggestions" style="display:none"></div>
    </div>

    <!-- Panel content -->
    <div class="panel-scroll" id="panelContent">
      <div class="empty-state">
        <div class="empty-icon">🌐</div>
        <div>Search any geographical feature<br/>to explore it on the globe</div>
        <div class="empty-hint">Try searching for:</div>
        <div style="margin-top:6px">
          <span class="hint-example" onclick="doSearch('Gangetic Plains')">Gangetic Plains</span>
          <span class="hint-example" onclick="doSearch('Himalayas')">Himalayas</span>
          <span class="hint-example" onclick="doSearch('Amazon River')">Amazon River</span>
          <span class="hint-example" onclick="doSearch('Sahara Desert')">Sahara Desert</span>
          <span class="hint-example" onclick="doSearch('Western Ghats')">Western Ghats</span>
          <span class="hint-example" onclick="doSearch('Mariana Trench')">Mariana Trench</span>
        </div>
      </div>
    </div>

    <!-- Annotation Toolbar -->
    <div class="toolbar" id="toolbar" style="display:none">
      <div class="toolbar-label">Mark on globe</div>
      <div class="tool-row">
        <button class="tool-btn" id="toolLabel" onclick="setTool('label')" title="Add text label">🏷 Label</button>
        <button class="tool-btn" id="toolArrow" onclick="setTool('arrow')" title="Draw arrow">↗ Arrow</button>
        <button class="tool-btn" id="toolPaint" onclick="setTool('paint')" title="Draw custom highlight region (click points, double-click to close)">🎨 Highlight</button>
        <button class="tool-btn" id="toolErase" onclick="setTool('erase')" title="Erase annotation or custom highlight">✕ Erase</button>
      </div>
      <div class="color-row-t" id="annotColors"></div>
      <!-- Paint tool hint — shows only when paint tool is active -->
      <div id="paintHint" style="display:none;font-size:0.65rem;color:var(--muted);margin-top:5px;line-height:1.5;">
        Click to add points · Double-click to close · <span id="paintPtCount">0 pts</span>
      </div>
    </div>

    <!-- Export bar -->
    <div class="export-bar" id="exportBar" style="display:none">
      <button class="exp-btn sec" onclick="exportPDF()">⬇ Export PDF</button>
    </div>
  </div>

  <!-- Globe canvas -->
  <canvas id="globeCanvas"></canvas>
  <!-- Annotation overlay -->
  <canvas id="annotCanvas"></canvas>

  <!-- Zoom controls -->
  <div class="zoom-btns">
    <button class="zoom-btn" onclick="zoomGlobe(0.82)" title="Zoom in">+</button>
    <button class="zoom-btn" onclick="zoomGlobe(1.22)" title="Zoom out">−</button>
    <button class="zoom-btn" style="font-size:0.6rem" onclick="resetView()" title="Reset view">⊙</button>
    <button class="zoom-btn" id="autoRotBtn" onclick="toggleAutoRotate()"
      title="Auto-rotate: ON" style="font-size:0.85rem">↻</button>
  </div>

  <!-- Globe tooltip -->
  <div class="globe-tip" id="globeTip" style="display:none"></div>
</div>

<!-- Three.js r128 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
'use strict';

// ══════════════════════════════════════════════════════════════════════
// THEME
// ══════════════════════════════════════════════════════════════════════
var isDark = true;
try{var _p=new URLSearchParams(location.search);if(_p.get('theme')==='light'){isDark=false;document.body.classList.add('light');}}catch(e){}
document.getElementById('thmBtn').textContent = isDark ? '☀' : '🌙';

function toggleTheme(){
  isDark = !isDark;
  document.body.classList.toggle('light', !isDark);
  document.getElementById('thmBtn').textContent = isDark ? '☀' : '🌙';
  updateGlobeTheme();
}
function goBack(){
  var theme = isDark ? 'dark' : 'light';
  window.location.href = '/?theme=' + theme;
}

var scene, camera, renderer, globe, clouds, atmosphere;
var raycaster, mouse;
// Globe texture globals — repainted when highlights change
var texCanvas, texCtx, globeTexture, globeMat;
var realTexImage = null;        // cached real Earth image for repainting
var activeHighlights = {};      // featureKey -> {color, opacity}
var neCoastlines = null;        // NE 50m land polygons for coast-clipping
var neCountries = null;         // NE country polygons
var neRivers = null;            // NE river centerlines
var isDragging = false, lastMouse = {x:0, y:0};
var autoRotate = true;       // auto-rotation state — stops on search, user can toggle
var globeGroup;
var currentLat = 20, currentLng = 78;
var currentFOV = 45;         // current field-of-view; lower = zoomed in (no blur)
var BASE_FOV = 45;           // default FOV
var CAMERA_DIST = 3.2;       // camera stays fixed; zoom done via FOV only
var isAnimating = false;
var GLOBE_R = 1.0;
var overlayMeshes = []; // active highlight meshes
var annotations = [];   // {type, lat, lng, text, color, ...}
var activeChips = {};   // featureKey -> color
var annotColor = '#e8d5b0';

function initGlobe(){
  var canvas = document.getElementById('globeCanvas');
  var W = canvas.parentElement.offsetWidth - document.querySelector('.panel').offsetWidth;
  var H = canvas.parentElement.offsetHeight;

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(BASE_FOV, W / H, 0.01, 100);
  // Camera NEVER moves — only FOV changes for zoom (prevents texture blur)
  camera.position.set(0, 0, CAMERA_DIST);

  renderer = new THREE.WebGLRenderer({canvas:canvas, antialias:true, alpha:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(W, H);

  globeGroup = new THREE.Group();
  scene.add(globeGroup);

  // Earth sphere
  var geo = new THREE.SphereGeometry(GLOBE_R, 64, 64);

  // Create procedural texture — exposed as globals so highlights can repaint it
  texCanvas = document.createElement('canvas');
  texCanvas.width = 4096; texCanvas.height = 2048; // 4K for sharp highlights
  texCtx = texCanvas.getContext('2d');
  drawGlobeTexture(texCtx, 4096, 2048);
  globeTexture = new THREE.CanvasTexture(texCanvas);
  globeTexture.anisotropy = 4; // initial anisotropy (upgraded when real tex loads)
  globeTexture.minFilter = THREE.LinearMipMapLinearFilter;
  globeTexture.magFilter = THREE.LinearFilter;
  var texture = globeTexture;

  // Try loading a real Earth texture — fall back to procedural if blocked
  var textureLoader = new THREE.TextureLoader();
  var earthTexUrls = [
    // No-cloud Earth texture (Natural Earth II — clean land/ocean, no cloud overlay)
    'https://raw.githubusercontent.com/turban/webgl-earth/master/images/2_no_clouds_4k.jpg',
    // Fallback: three.js sample without clouds
    'https://raw.githubusercontent.com/mrdoob/three.js/r128/examples/textures/land_ocean_ice_2048.jpg'
  ];
  globeMat = new THREE.MeshPhongMaterial({
    map: texture,
    specular: new THREE.Color(0x112233),
    shininess: 12,
  });
  var mat = globeMat;

  // Attempt real texture load
  function tryLoadTexture(urls, idx){
    if(idx >= urls.length) return;
    textureLoader.load(urls[idx], function(t){
      var img = t.image;
      // Draw real texture onto our fixed-size 4096x2048 canvas
      texCtx.imageSmoothingEnabled = true;
      texCtx.imageSmoothingQuality = 'high';
      texCtx.clearRect(0, 0, texCanvas.width, texCanvas.height);
      texCtx.drawImage(img, 0, 0, texCanvas.width, texCanvas.height);
      realTexImage = img;
      // Three.js texture quality settings
      globeTexture.anisotropy = renderer.capabilities.getMaxAnisotropy();
      globeTexture.minFilter = THREE.LinearMipMapLinearFilter;
      globeTexture.magFilter = THREE.LinearFilter;
      globeTexture.generateMipmaps = true;
      globeTexture.needsUpdate = true;
      // Repaint highlights on new base
      if(Object.keys(activeHighlights).length) scheduleRepaint();
      // Dim coast lines since real texture has own detail
      globeGroup.children.forEach(function(c){
        if(c.isLine && c.material && c.material.opacity !== undefined){
          if(c.material.opacity > 0.5) c.material.opacity *= 0.7;
        }
      });
    }, undefined, function(){ tryLoadTexture(urls, idx+1); });
  }
  tryLoadTexture(earthTexUrls, 0);
  globe = new THREE.Mesh(geo, mat);
  globeGroup.add(globe);

  // Atmosphere glow
  var atmGeo = new THREE.SphereGeometry(GLOBE_R * 1.02, 32, 32);
  var atmMat = new THREE.MeshPhongMaterial({
    color: 0x4488ff,
    transparent: true,
    opacity: 0.04,
    side: THREE.FrontSide,
  });
  atmosphere = new THREE.Mesh(atmGeo, atmMat);
  globeGroup.add(atmosphere);

  // Outer atmosphere ring
  var haloGeo = new THREE.SphereGeometry(GLOBE_R * 1.06, 32, 32);
  var haloMat = new THREE.MeshPhongMaterial({
    color: 0x6699ff,
    transparent: true,
    opacity: 0.018,
    side: THREE.BackSide,
  });
  scene.add(new THREE.Mesh(haloGeo, haloMat));

  // Lighting
  var ambient = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambient);
  var sun = new THREE.DirectionalLight(0xffeedd, 1.1);
  sun.position.set(5, 3, 5);
  scene.add(sun);
  var fill = new THREE.DirectionalLight(0x334466, 0.25);
  fill.position.set(-3, -2, -3);
  scene.add(fill);

  // Stars
  addStars();
  // Country/coastline outlines on sphere surface
  addGlobeLines();

  raycaster = new THREE.Raycaster();
  mouse = new THREE.Vector2();

  // Set initial orientation — center on India
  setGlobeOrientation(currentLat, currentLng);

  // Start render loop
  animate();

  // Resize handler
  window.addEventListener('resize', onResize);

  // Globe interactions
  setupInteractions();

  updateGlobeTheme();
  // Initialize button state
  setTimeout(updateAutoRotateBtn, 50);
}

function drawGlobeTexture(ctx, W, H){
  // ── Bathymetric ocean base (depth-aware coloring) ──────────────────
  // Deep ocean floor: very dark blue-black
  ctx.fillStyle = '#07101f';
  ctx.fillRect(0, 0, W, H);

  // Mid-ocean basins (2000-5000m depth) — dominant ocean color
  var deepGrad = ctx.createLinearGradient(0, 0, 0, H);
  deepGrad.addColorStop(0,    '#081525'); // polar deep
  deepGrad.addColorStop(0.18, '#0a1e35'); // N Atlantic / N Pacific deep
  deepGrad.addColorStop(0.35, '#0c2240'); // tropical deep basins
  deepGrad.addColorStop(0.50, '#0d2448'); // equatorial
  deepGrad.addColorStop(0.65, '#0c2240');
  deepGrad.addColorStop(0.82, '#0a1e35');
  deepGrad.addColorStop(1.0,  '#081525');
  ctx.fillStyle = deepGrad;
  ctx.fillRect(0, 0, W, H);

  // ── Shallow continental shelf zones (0-200m) — lighter blue ─────────
  // Paint shelf zones as lighter overlapping ellipses around continents
  // This approximates bathymetric contours without actual depth data
  function paintShelf(regions, alpha){
    ctx.save();
    ctx.globalAlpha = alpha;
    regions.forEach(function(r){
      var px = (r[0]+180)/360*W, py = (90-r[1])/180*H;
      var rx = r[2]/360*W, ry = r[3]/180*H;
      var grad = ctx.createRadialGradient(px,py,0, px,py,Math.max(rx,ry));
      grad.addColorStop(0, '#1a4a7a');   // shallow coastal water
      grad.addColorStop(0.4, '#123560');
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.ellipse(px, py, rx, ry, 0, 0, Math.PI*2);
      ctx.fill();
    });
    ctx.restore();
  }

  // Continental shelf zones [lng_center, lat_center, lng_radius, lat_radius]
  paintShelf([
    // Indian subcontinent shelf
    [76, 14, 8, 6], [82, 8, 6, 4],
    // Bay of Bengal / Gulf of Bengal shallow
    [88, 20, 4, 4],
    // Arabian Sea coastal shelf
    [67, 22, 5, 4],
    // Southeast Asia shelves (Sunda shelf — very shallow)

function addStars(){
  var starGeo = new THREE.BufferGeometry();
  var positions = [];
  for(var i = 0; i < 3000; i++){
    var r = 80 + Math.random() * 20;
    var theta = Math.random() * Math.PI * 2;
    var phi = Math.acos(2 * Math.random() - 1);
    positions.push(
      r * Math.sin(phi) * Math.cos(theta),
      r * Math.sin(phi) * Math.sin(theta),
      r * Math.cos(phi)
    );
  }
  starGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  var starMat = new THREE.PointsMaterial({color:0xffffff, size:0.08, transparent:true, opacity:0.6});
  scene.add(new THREE.Points(starGeo, starMat));
}

function latLngToVec3(lat, lng, r){
  r = r || GLOBE_R;
  var phi = (90 - lat) * Math.PI / 180;
  var theta = (lng + 180) * Math.PI / 180;
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta),
     r * Math.cos(phi),
     r * Math.sin(phi) * Math.sin(theta)
  );
}

function setGlobeOrientation(lat, lng){
  // Derived: rotation.y = -(lng+90)*PI/180 brings (lat,lng) to face +Z camera
  // Proof: latLngToVec3 z-component = sin(phi)*sin((lng+180)*PI/180)
  // After rotY by ry: new_z = sin(phi)*sin(ry + (lng+180)*PI/180)
  // Maximized when ry = PI/2 - (lng+180)*PI/180 = -(lng+90)*PI/180
  globeGroup.rotation.y = -(lng + 90) * Math.PI / 180;
  globeGroup.rotation.x = lat * Math.PI / 180;
}

function updateGlobeTheme(){
  if(!globe) return;
  if(!isDark && atmosphere){
    atmosphere.material.color.set(0x3366aa);
    atmosphere.material.opacity = 0.025;
    globe.material.specular = new THREE.Color(0x334466);
    scene.background = new THREE.Color(0x8899bb);
  } else if(atmosphere){
    atmosphere.material.color.set(0x4488ff);
    atmosphere.material.opacity = 0.04;
    scene.background = null;
  }
}

var lastLoDFOV = 45; // track last FOV for LoD updates
function animate(){
  requestAnimationFrame(animate);
  if(!isDragging && !isAnimating && autoRotate){
    globeGroup.rotation.y += 0.0006; // gentle idle rotation
    currentLng = -(globeGroup.rotation.y * 180 / Math.PI) - 90;
  }
  if(isAnimating) animateStep();
  // LoD: when zoom level changes significantly, update texture detail
  if(Math.abs(currentFOV - lastLoDFOV) > 3){
    lastLoDFOV = currentFOV;
    updateLoDTexture();
  }
  renderer.render(scene, camera);
}

// Level-of-Detail texture update
// FOV > 30: full-globe 4K texture (default)
// FOV 12-30: paint a 2x-resolution close-up of the visible region
// FOV < 12:  paint a 4x-resolution region patch for max sharpness
function updateLoDTexture(){
  if(!texCanvas || !texCtx) return;
  if(currentFOV <= 30){
    // Zoomed in: repaint at higher effective resolution around current view
    repaintWithLoD();
  } else {
    // Zoomed out: standard repaint
    repaintTexture();
  }
}

function repaintWithLoD(){
  var W = texCanvas.width, H = texCanvas.height;
  // Full repaint first (base)
  texCtx.clearRect(0,0,W,H);
  if(realTexImage){
    texCtx.drawImage(realTexImage, 0, 0, W, H);
  } else {
    drawGlobeTexture(texCtx, W, H);
  }
  // Paint highlights
  Object.keys(activeHighlights).forEach(function(key){
    var hi = activeHighlights[key];
    paintFeatureOnTexture(key, hi.color, hi.opacity);
  });
  if(typeof customHighlights !== 'undefined'){
    customHighlights.forEach(function(ch){ paintCustomPolygon(ch.ring, ch.color, ch.opacity); });
  }

  // LoD enhancement: when zoomed in, draw a higher-detail patch
  // over the visible region using sharper strokes
  if(currentFOV < 25 && realTexImage){
    // Compute visible lat/lng bounds from current FOV + orientation
    var fovRad = currentFOV * Math.PI / 180;
    var angularRadius = fovRad * 0.6 * (180 / Math.PI); // degrees visible
    var clat = currentLat, clng = currentLng;
    // Compute texture region
    var x0 = lngLatToTex(clng - angularRadius, clat + angularRadius * 0.6, W, H);
    var x1 = lngLatToTex(clng + angularRadius, clat - angularRadius * 0.6, W, H);
    var rx = Math.max(0, Math.min(x0[0], x1[0]));
    var ry = Math.max(0, Math.min(x0[1], x1[1]));
    var rw = Math.min(W, Math.abs(x1[0]-x0[0]));
    var rh = Math.min(H, Math.abs(x1[1]-x0[1]));
    if(rw > 10 && rh > 10){
      // Draw source image patch at 2x effective resolution into region
      texCtx.save();
      texCtx.imageSmoothingEnabled = true;
      texCtx.imageSmoothingQuality = 'high';
      // Source rect in image coordinates (scale to image size)
      var iw = realTexImage.naturalWidth || realTexImage.width || W;
      var ih = realTexImage.naturalHeight || realTexImage.height || H;
      var sx = (rx/W)*iw, sy = (ry/H)*ih;
      var sw = (rw/W)*iw, sh = (rh/H)*ih;
      texCtx.drawImage(realTexImage, sx, sy, sw, sh, rx, ry, rw, rh);
      texCtx.restore();
    }
  }

  globeTexture.needsUpdate = true;
}

// ── Flyover animation — FOV-based, 3-phase ───────────────────────────
// zoom value from GEO_FEATURES → target FOV angle
// zoom 2.5 (far) → FOV ~70°    zoom 6.5 (close) → FOV ~14°
function zoomToFOV(z){ return Math.min(80, Math.max(10, 180 / (z * 2.5))); }

var flyFromLat=20, flyFromLng=78, flyFromFOV=BASE_FOV;
var flyToLat=20, flyToLng=78, flyToFOV=BASE_FOV;
var flyDlng=0; // shortest-path lng delta
var flyT=0, FLY_DUR=3200; // ms
var flyStartTime=0;

var flyCallback = null;
function flyTo_(lat, lng, zoom, callback){
  flyCallback = callback || null;
  autoRotate = false;
  updateAutoRotateBtn();

  // Capture where we are RIGHT NOW from globeGroup rotation
  // (auto-rotate may have drifted currentLng, read actual rotation)
  flyFromLng = -(globeGroup.rotation.y * 180 / Math.PI) - 90;
  flyFromLat = globeGroup.rotation.x * 180 / Math.PI;
  flyFromFOV = currentFOV;

  flyToLat = lat;
  flyToLng = lng;
  flyToFOV = zoomToFOV(zoom || 3.5);

  // Shortest path for longitude (avoid rotating 350° the wrong way)
  flyDlng = flyToLng - flyFromLng;
  if(flyDlng > 180)  flyDlng -= 360;
  if(flyDlng < -180) flyDlng += 360;

  flyT = 0;
  flyStartTime = performance.now();
  isAnimating = true;
}

function easeInOut(t){ return t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }

function animateStep(){
  var elapsed = performance.now() - flyStartTime;
  flyT = Math.min(1, elapsed / FLY_DUR);

  // 3 phases:
  // 0.00–0.30  zoom OUT to wide view (pull back from Earth)
  // 0.30–0.70  rotate to destination at wide view  
  // 0.70–1.00  zoom IN to target FOV (swoop down to feature)
  var WIDE_FOV = Math.max(flyFromFOV, flyToFOV, 60); // wide view FOV for mid-flight
  var animFOV;

  if(flyT <= 0.30){
    var p = easeInOut(flyT / 0.30);
    animFOV = flyFromFOV + (WIDE_FOV - flyFromFOV) * p;
  } else if(flyT <= 0.70){
    animFOV = WIDE_FOV;
  } else {
    var p = easeInOut((flyT - 0.70) / 0.30);
    animFOV = WIDE_FOV + (flyToFOV - WIDE_FOV) * p;
  }

  // Smooth rotation — use full t so globe reaches destination by t=1
  var rotT = easeInOut(flyT);
  var lat = flyFromLat + (flyToLat - flyFromLat) * rotT;
  var lng = flyFromLng + flyDlng * rotT;

  currentLat = lat;
  currentLng = lng;
  currentFOV = animFOV;

  // Apply to globe — match setGlobeOrientation: -(lng+90)*PI/180
  globeGroup.rotation.y = -(lng + 90) * Math.PI / 180;
  globeGroup.rotation.x =  lat * Math.PI / 180;

  // Apply FOV — camera position NEVER changes
  camera.fov = animFOV;
  camera.updateProjectionMatrix();

  if(flyT >= 1){
    isAnimating = false;
    autoRotate = false;
    updateAutoRotateBtn();
    if(flyCallback){ flyCallback(); flyCallback = null; }
  }
}

// ── Globe interactions ────────────────────────────────────────────────
function setupInteractions(){
  var canvas = document.getElementById('globeCanvas');

  canvas.addEventListener('mousedown', function(e){
    if(currentTool) return;
    isDragging = true;
    autoRotate = false;
    updateAutoRotateBtn();
    lastMouse = {x: e.clientX, y: e.clientY};
    canvas.classList.add('dragging');
  });

  canvas.addEventListener('mousemove', function(e){
    if(isDragging && !currentTool){
      var dx = e.clientX - lastMouse.x;
      var dy = e.clientY - lastMouse.y;
      globeGroup.rotation.y += dx * 0.005;
      globeGroup.rotation.x += dy * 0.005;
      currentLng = -globeGroup.rotation.y * 180 / Math.PI;
      currentLat = globeGroup.rotation.x * 180 / Math.PI;
      lastMouse = {x: e.clientX, y: e.clientY};
    }
  });

  canvas.addEventListener('mouseup', function(){
    isDragging = false;
    canvas.classList.remove('dragging');
  });
  canvas.addEventListener('mouseleave', function(){
    isDragging = false;
    canvas.classList.remove('dragging');
  });

  canvas.addEventListener('wheel', function(e){
    e.preventDefault();
    var factor = e.deltaY > 0 ? 1.1 : 0.91; // scroll down = zoom out (higher FOV)
    currentFOV = Math.min(90, Math.max(8, currentFOV * factor));
    camera.fov = currentFOV;
    camera.updateProjectionMatrix();
  }, {passive:false});

  // Touch
  var lastTouchDist = 0;
  canvas.addEventListener('touchstart', function(e){
    if(e.touches.length === 1){
      isDragging = true;
      lastMouse = {x: e.touches[0].clientX, y: e.touches[0].clientY};
    } else if(e.touches.length === 2){
      lastTouchDist = Math.hypot(e.touches[1].clientX-e.touches[0].clientX, e.touches[1].clientY-e.touches[0].clientY);
    }
  },{passive:true});
  canvas.addEventListener('touchmove', function(e){
    if(e.touches.length===1 && isDragging){
      var dx=e.touches[0].clientX-lastMouse.x, dy=e.touches[0].clientY-lastMouse.y;
      globeGroup.rotation.y+=dx*0.005; globeGroup.rotation.x+=dy*0.005;
      lastMouse={x:e.touches[0].clientX,y:e.touches[0].clientY};
    } else if(e.touches.length===2){
      var d=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);
      if(lastTouchDist>0){var fovF=lastTouchDist/d;currentFOV=Math.min(90,Math.max(8,currentFOV*fovF));camera.fov=currentFOV;camera.updateProjectionMatrix();}
      lastTouchDist=d;
    }
  },{passive:true});
  canvas.addEventListener('touchend',function(){isDragging=false;lastTouchDist=0;},{passive:true});
}

function zoomGlobe(factor){
  // factor < 1 = zoom in (reduce FOV = telephoto)
  // factor > 1 = zoom out (increase FOV = wide angle)
  currentFOV = Math.min(90, Math.max(8, currentFOV * factor));
  camera.fov = currentFOV;
  camera.updateProjectionMatrix();
}

function normName(s){
  return (s||'').toLowerCase()
    .replace(/\(.*?\)/g,'').replace(/[^a-z0-9 ]/g,' ')
    .replace(/\s+/g,' ').trim();
}

// buildIndex: stores arrays for rivers (collect ALL segments), single feat for others
function buildIndex(gj, index, nameFields, collectAll){
  if(!gj || !gj.features) return;
  gj.features.forEach(function(feat){
    var p = feat.properties || {};
    nameFields.forEach(function(f){
      if(!p[f]) return;
      var k = normName(p[f]);
      if(!k) return;
      if(collectAll){
        if(!index[k]) index[k]=[];
        index[k].push(feat);
      } else {
        if(!index[k]) index[k]=feat;
      }
    });
  });
}

// Merge arrays-of-features OR single feature arrays into one MultiLineString
function mergeRiverFeatures(feats){
  if(!feats) return null;
  // Normalise: if it's an array-of-arrays (multiple alias groups), flatten
  var flatFeats = [];
  feats.forEach(function(item){
    if(Array.isArray(item)) item.forEach(function(f){ flatFeats.push(f); });
    else flatFeats.push(item);
  });
  if(!flatFeats.length) return null;
  var allLines = [];
  flatFeats.forEach(function(feat){
    var geom = feat && feat.geometry;
    if(!geom) return;
    if(geom.type === 'LineString') allLines.push(geom.coordinates);
    else if(geom.type === 'MultiLineString') geom.coordinates.forEach(function(l){ allLines.push(l); });
  });
  if(!allLines.length) return null;
  return {type:'MultiLineString', coordinates:allLines};
}

// Collect river segments from an index for ALL given aliases (not just first hit)
function collectAllRiverSegs(index, aliases){
  var all = [];
  aliases.forEach(function(alias){
    var segs = index[alias];
    if(segs && segs.length) segs.forEach(function(s){ all.push(s); });
  });
  return all.length ? all : null;
}

function loadNaturalEarthData(){
  var base = '/data/';
  var pendingCount = 0;
  function fetchGJ(file, cb){
    pendingCount++;
    fetch(base + file)
      .then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); })
      .then(function(gj){
        cb(gj);
        pendingCount--;
        if(pendingCount === 0 && Object.keys(activeHighlights).length) repaintTexture();
      })
      .catch(function(e){
        console.warn('NE load failed (will use fallback): '+file);
        pendingCount--;
      });
  }

  // 1. Land mask (50m) — coast clipping
  fetchGJ('ne_50m_land.geojson', function(gj){
    neCoastlines = gj;
    _buildLandMaskCache(); // build cached land mask immediately
  });

  // 2. Countries 10m (more precise — island nations, small countries)
  fetchGJ('ne_10m_admin_0_countries.geojson', function(gj){
    neCountries = gj;
    buildIndex(gj, neCountry10Index,
      ['NAME','NAME_LONG','ADMIN','BRK_NAME','FORMAL_EN','NAME_EN','SOVEREIGNT'], false);
  });

  // 3. Countries 50m fallback
  fetchGJ('ne_50m_admin_0_countries.geojson', function(gj){
    buildIndex(gj, neCountryIndex,
      ['NAME','NAME_LONG','ADMIN','BRK_NAME','FORMAL_EN','NAME_EN'], false);
  });

  // 4. Rivers 10m — collect ALL segments per name for complete river path
  fetchGJ('ne_10m_rivers_lake_centerlines.geojson', function(gj){
    neRivers = gj;
    buildIndex(gj, neRiverIndex, ['name','Name','NAME','name_en'], true); // collectAll=true
  });

  // 5. Rivers 50m fallback (wider coverage)
  fetchGJ('ne_50m_rivers_lake_centerlines.geojson', function(gj){
    buildIndex(gj, neRiver50Index, ['name','Name','NAME'], true);
  });

  // 6. Marine polygons 10m (includes straits, more gulfs, bays)
  fetchGJ('ne_10m_geography_marine_polys.geojson', function(gj){
    buildIndex(gj, neMarine10Index, ['name','Name','NAME'], false);
  });

  // 7. Marine polygons 50m
  fetchGJ('ne_50m_geography_marine_polys.geojson', function(gj){
    buildIndex(gj, neMarineIndex, ['name','Name','NAME'], false);
  });

  // 8. Lakes 50m
  fetchGJ('ne_50m_lakes.geojson', function(gj){
    buildIndex(gj, neLakeIndex, ['name','Name','NAME'], false);
  });

  // 9. Lakes 10m (more precise, includes smaller lakes)
  fetchGJ('ne_10m_lakes.geojson', function(gj){
    buildIndex(gj, neLake10Index, ['name','Name','NAME'], false);
  });

  // 10. Physical regions 50m
  fetchGJ('ne_50m_geography_regions_polys.geojson', function(gj){
    buildIndex(gj, neRegionIndex, ['name','Name','NAME','name_en'], false);
  });

  // 11. Physical regions 10m (better Himalayas, Sahara, Amazon etc.)
  fetchGJ('ne_10m_geography_regions_polys.geojson', function(gj){
    buildIndex(gj, neRegion10Index, ['name','Name','NAME','name_en'], false);
  });

  // 12a. Survey of India (SoI) official boundary — HIGHEST PRIORITY for India
  // File: india-soi.geojson — GOI official position including POK, Aksai Chin
  fetchGJ('india-soi.geojson', function(gj){
    if(!gj || !gj.features) return;
    neIndiaSoI = gj;
    // Index all features in SoI file
    gj.features.forEach(function(feat){
      var p = feat.properties || {};
      var geom = feat.geometry;
      if(!geom) return;
      // Index by every string property
      Object.keys(p).forEach(function(pk){
        if(typeof p[pk]==='string' && p[pk].length >= 2){
          var k=normName(p[pk]);
          if(k && !neIndiaSoIIndex[k]) neIndiaSoIIndex[k]=feat;
        }
      });
      // The whole-country feature (largest polygon) becomes the India outline
      if(!neIndiaSoIIndex['india']) neIndiaSoIIndex['india']=feat;
    });
    console.log('SoI boundary loaded: '+Object.keys(neIndiaSoIIndex).length+' features');
    if(Object.keys(activeHighlights).length) scheduleRepaint();
  });

  // 12b. India composite boundary (fallback for SoI)
  fetchGJ('india_composite.geojson', function(gj){
    if(!gj || !gj.features) return;
    neIndiaOutline = gj;
  });

  // 13. India state details (22MB — state boundaries, rivers, national parks)
  // File: india_state.geojson from github.com/geohacker/india
  fetchGJ('india_state.geojson', function(gj){
    if(!gj || !gj.features) return;
    gj.features.forEach(function(feat){
      var p = feat.properties || {};
      var geom = feat.geometry;
      if(!geom) return;
      // Index state/region polygons — try ALL known property variants
      // geohacker/india uses: NAME_1, name; datameet uses: ST_NM, statename; etc.
      var nameFields = [
        'NAME_1','NAME_2','name','Name','NAME',
        'ST_NM','ST_CODE','statename','state_name',
        'STATE','STNAME','dtname','DISTRICT',
        'GEO_NAME','admin_name','region'
      ];
      nameFields.forEach(function(f){
        if(p[f] && typeof p[f]==='string'){
          var k=normName(p[f]);
          if(k.length >= 2 && !neIndiaStates[k]) neIndiaStates[k]=feat;
        }
      });
      // Also index by every non-null string property (catch-all for unknown schemas)
      Object.keys(p).forEach(function(pk){
        if(typeof p[pk]==='string' && p[pk].length >= 3){
          var k=normName(p[pk]);
          // Only index plausible place names (no numbers-only, URLs, etc.)
          if(k.length >= 3 && !/^[0-9]/.test(k) && !neIndiaStates[k]){
            neIndiaStates[k]=feat;
          }
        }
      });
      // Index rivers (LineString/MultiLineString features)
      if(geom.type==='LineString'||geom.type==='MultiLineString'){
        var rNameFields=['name','Name','NAME','RIVER','river_name','RIVERNAME'];
        rNameFields.forEach(function(f){
          if(p[f]){
            var k=normName(p[f]);
            if(!k) return;
            if(!neIndiaRivers[k]) neIndiaRivers[k]=[];
            neIndiaRivers[k].push(feat);
          }
        });
      }
    });
    if(Object.keys(activeHighlights).length) repaintTexture();
  });
}

// Look up a feature across all NE indices with alias support
// Returns {geom, src} or null
function lookupNE(searchKey, ftype){
  var q  = normName(searchKey);
  var q2 = q.replace(/ river$|rivers?$/,'').replace(/^river /,'')
             .replace(/ sea$| ocean$| gulf$| bay$| lake$/,'').trim();
  var q3 = q2.replace(/ india$| river$| lake$| mountains?$| range$|tso$| plateau$|lake$/,'').trim();

  // ── River lookup ─────────────────────────────────────────────────
  if(ftype === 'river' || ftype === 'lagoon/waterway'){
    var aliases = RIVER_ALIASES[q] || RIVER_ALIASES[q2] || RIVER_ALIASES[q3] || [q,q2,q3];
    var seen = {}; var uAliases = [];
    aliases.forEach(function(a){ if(a&&!seen[a]){seen[a]=1;uAliases.push(a);} });

    var allSegs = [];

    // 1. India rivers — exact aliases + safe partial match
    var indSegs = collectAllRiverSegs(neIndiaRivers, uAliases);
    if(indSegs) indSegs.forEach(function(s){ allSegs.push(s); });
    // Partial match in India rivers (safe — controlled dataset)
    var irkeys = Object.keys(neIndiaRivers);
    irkeys.forEach(function(irk){
      if(q3.length >= 5 && !seen['_ir_'+irk]){
        // Only match if the keys are substantially the same (not just substring)
        var matchScore = (irk === q3) ? 3
          : (irk.indexOf(q3) === 0 || q3.indexOf(irk) === 0) ? 2   // prefix match
          : (irk.indexOf(q3) >= 0 && q3.length >= irk.length*0.7) ? 1  // strong substring
          : 0;
        if(matchScore >= 2){
          seen['_ir_'+irk] = 1;
          var s = neIndiaRivers[irk];
          if(s) s.forEach(function(f){ allSegs.push(f); });
        }
      }
    });

    // 2. NE 10m rivers — EXACT aliases ONLY (no partial — prevents wrong country matches)
    var ne10Segs = collectAllRiverSegs(neRiverIndex, uAliases);
    if(ne10Segs) ne10Segs.forEach(function(s){ allSegs.push(s); });

    // 3. NE 50m fallback — EXACT aliases ONLY
    if(!allSegs.length){
      var ne50Segs = collectAllRiverSegs(neRiver50Index, uAliases);
      if(ne50Segs) ne50Segs.forEach(function(s){ allSegs.push(s); });
    }

    if(allSegs.length){
      var geom = mergeRiverFeatures(allSegs);
      if(!geom) return null;

      // Sanity check: at least SOME coordinate must be near expected location
      // Check bounding box of ALL coordinates, not just midpoint
      var f0 = GEO_FEATURES[normName(searchKey)];
      if(f0 && f0.lat && f0.lng){
        var allCoords = [];
        if(geom.type==='LineString') allCoords = geom.coordinates;
        else if(geom.type==='MultiLineString')
          geom.coordinates.forEach(function(l){ l.forEach(function(c){allCoords.push(c);}); });

        if(allCoords.length){
          // Find the coordinate CLOSEST to expected location
          var minDist = Infinity;
          allCoords.forEach(function(c){
            var dlat = Math.abs(c[1] - f0.lat);
            var dlng = Math.abs(c[0] - f0.lng);
            if(dlng > 180) dlng = 360 - dlng;
            var dist = dlat + dlng;
            if(dist < minDist) minDist = dist;
          });
          // Reject only if NO coordinate is within 45° of expected location
          if(minDist > 45){
            return null; // completely wrong geography
          }
        }
      }
      return {geom:geom, src:'river'};
    }
    return null;
  }

  // ── Lake lookup — 10m first ────────────────────────────────────────
  if(ftype === 'lake' || ftype === 'lake (endorheic)'){
    var lf = neLake10Index[q] || neLake10Index[q2] || neLake10Index[q3]
           || neLakeIndex[q]  || neLakeIndex[q2]  || neLakeIndex[q3];
    if(lf) return {geom:lf.geometry, src:'lake'};
  }

  // ── GOI OVERRIDE: Never use NE for India-disputed territories ─────
  // NE uses Pakistani/Chinese boundaries for these — use hand-coded GOI shapes
  // GOI_OVERRIDE: only use hand-coded shapes for genuinely disputed territories
  // where NE uses a boundary India disputes.
  // India itself uses the UN-recognized boundary (NE is fine for this).
  var GOI_OVERRIDE = {
    'aksai chin':1, 'pok':1,
    'pakistan occupied kashmir':1,
    'gilgit baltistan':1, 'gilgit':1
  };

  // ── SoI (Survey of India) — HIGHEST PRIORITY for India/disputed territories ──
  // Checked before ALL other sources for any Indian feature
  var INDIA_QUERIES = ['india','indian subcontinent','bharat'];
  var isIndiaQuery = INDIA_QUERIES.indexOf(q)>=0 || INDIA_QUERIES.indexOf(q2)>=0;
  if(neIndiaSoI && (isIndiaQuery || GOI_OVERRIDE[q] || GOI_OVERRIDE[q2])){
    // Use the SoI full boundary for India
    var soiF = neIndiaSoIIndex[q] || neIndiaSoIIndex[q2] || neIndiaSoIIndex[q3]
             || neIndiaSoIIndex['india'];
    if(soiF && soiF.geometry) return {geom:soiF.geometry, src:'country'};
  }
  // For any state/region WITHIN India, SoI takes priority over NE
  if(neIndiaSoI){
    var soiState = neIndiaSoIIndex[q] || neIndiaSoIIndex[q2] || neIndiaSoIIndex[q3];
    if(soiState && soiState.geometry){
      var g = soiState.geometry;
      // Verify it's actually a polygon (state/region), not a point
      if(g.type==='Polygon'||g.type==='MultiPolygon')
        return {geom:g, src:'region'};
    }
  }

  // ── Country lookup — 10m first ────────────────────────────────────
  if(ftype === 'country' || ftype === 'union territory' || ftype === 'region'){
    if(GOI_OVERRIDE[q] || GOI_OVERRIDE[q2] || GOI_OVERRIDE[q3])
      return null; // GOI override: fall through to hand-coded shape
    var cf = neCountry10Index[q] || neCountry10Index[q2] || neCountry10Index[q3]
          || neCountryIndex[q]   || neCountryIndex[q2]  || neCountryIndex[q3];
    if(cf) return {geom:cf.geometry, src:'country'};
  }

  // ── Physical region — 10m first ───────────────────────────────────
  // Check region aliases (e.g. "tibet plateau" → "tibetan plateau")
  var REGION_ALIASES = {
    'tibet plateau':   'tibetan plateau',
    'tibetan plateau': 'tibetan plateau',
    'himalayas':       'himalayas',
    'himalaya':        'himalayas',
    'sahara':          'sahara desert',
    'gobi':            'gobi desert',
    'amazon':          'amazon rainforest',
    'congo':           'congo rainforest',
  };
  var rq = REGION_ALIASES[q] ? normName(REGION_ALIASES[q]) : null;
  var rq2 = REGION_ALIASES[q2] ? normName(REGION_ALIASES[q2]) : null;

  var rf = neRegion10Index[q]   || (rq?neRegion10Index[rq]:null)
         || neRegion10Index[q2]  || (rq2?neRegion10Index[rq2]:null)
         || neRegion10Index[q3]
         || neRegionIndex[q]    || (rq?neRegionIndex[rq]:null)
         || neRegionIndex[q2]   || (rq2?neRegionIndex[rq2]:null)
         || neRegionIndex[q3];
  // GOI override: don't use NE for Indian disputed physical regions
  if(rf && !GOI_OVERRIDE[q] && !GOI_OVERRIDE[q2]){
    return {geom:rf.geometry, src:'region'};
  }

  // ── Marine — 10m first (includes straits) ─────────────────────────
  var mf = neMarine10Index[q] || neMarine10Index[q2] || neMarine10Index[q3]
         || neMarineIndex[q]  || neMarineIndex[q2]  || neMarineIndex[q3];
  if(mf) return {geom:mf.geometry, src:'marine'};

  // ── India states (from india_state.geojson) ───────────────────────
  if(!GOI_OVERRIDE[q] && !GOI_OVERRIDE[q2] && !GOI_OVERRIDE[q3]){
    var isf = neIndiaStates[q] || neIndiaStates[q2] || neIndiaStates[q3];
    // Also try partial key match in India states
    if(!isf){
      var ikeys = Object.keys(neIndiaStates);
      for(var ii=0;ii<ikeys.length&&!isf;ii++){
        var ik=ikeys[ii];
        if(ik===q||ik===q2||ik===q3) isf=neIndiaStates[ik];
      }
    }
    if(isf) return {geom:isf.geometry, src:'region'};
  }

  // ── Country fallback (any type) ───────────────────────────────────
  if(!GOI_OVERRIDE[q] && !GOI_OVERRIDE[q2] && !GOI_OVERRIDE[q3]){
    var cff = neCountry10Index[q] || neCountry10Index[q2] || neCountry10Index[q3]
            || neCountryIndex[q]  || neCountryIndex[q2]  || neCountryIndex[q3];
    if(cff) return {geom:cff.geometry, src:'country'};
  }

  return null;
}


// Draw all NE land polygons onto a canvas context (for masking)
function drawNELand(ctx, W, H){
  if(!neCoastlines) return;
  ctx.fillStyle = '#000';
  // One beginPath+fill per polygon — avoids the "single fill at end" bug
  neCoastlines.features.forEach(function(feat){
    var geom = feat.geometry;
    if(!geom) return;
    var polys = geom.type === 'Polygon' ? [geom.coordinates] : geom.coordinates;
    polys.forEach(function(poly){
      ctx.beginPath();
      poly.forEach(function(ring){
        if(!ring.length) return;
        ring.forEach(function(coord,i){
          var pt = lngLatToTex(coord[0],coord[1],W,H);
          i===0 ? ctx.moveTo(pt[0],pt[1]) : ctx.lineTo(pt[0],pt[1]);
        });
        ctx.closePath();
      });
      ctx.fill('evenodd');
    });
  });
}

// Repaint the entire texture from scratch then redraw all active highlights
// Build the land mask cache once (expensive — iterates all NE land coords)
function _buildLandMaskCache(){
  if(!neCoastlines || !texCanvas) return;
  var W = texCanvas.width, H = texCanvas.height;
  _landMaskCanvas = document.createElement('canvas');
  _landMaskCanvas.width = W; _landMaskCanvas.height = H;
  var mCtx = _landMaskCanvas.getContext('2d');
  mCtx.fillStyle = '#000';
  // ── CORRECT: one beginPath per feature polygon, fill per polygon ──
  // Using evenodd fill rule so island holes are correctly transparent
  neCoastlines.features.forEach(function(feat){
    var geom = feat.geometry;
    if(!geom) return;
    var polys = geom.type==='Polygon' ? [geom.coordinates] : geom.coordinates;
    polys.forEach(function(poly){
      mCtx.beginPath(); // ONE beginPath per polygon
      poly.forEach(function(ring){
        if(!ring.length) return;
        ring.forEach(function(coord,i){
          var pt = lngLatToTex(coord[0],coord[1],W,H);
          i===0 ? mCtx.moveTo(pt[0],pt[1]) : mCtx.lineTo(pt[0],pt[1]);
        });
        mCtx.closePath(); // close each ring
      });
      mCtx.fill('evenodd'); // fill per polygon with evenodd rule
    });
  });
  console.log('Land mask cache built: '+W+'x'+H);
}

// Get shared offscreen canvas — always sized to match current texCanvas
function _getOffscreen(){
  var W = texCanvas.width, H = texCanvas.height;
  if(!_offscreenCanvas || _offscreenCanvas.width !== W || _offscreenCanvas.height !== H){
    _offscreenCanvas = document.createElement('canvas');
    _offscreenCanvas.width  = W;
    _offscreenCanvas.height = H;
  }
  return _offscreenCanvas;
}

// Debounced repaint — coalesces rapid successive calls into one
function scheduleRepaint(){
  if(_repaintPending) return;
  _repaintPending = true;
  // requestAnimationFrame ensures we repaint at most once per frame
  requestAnimationFrame(function(){
    _repaintPending = false;
    repaintTexture();
  });
}

function repaintTexture(){
  var W = texCanvas.width, H = texCanvas.height;
  texCtx.clearRect(0, 0, W, H);
  if(realTexImage){
    texCtx.imageSmoothingEnabled = true;
    texCtx.imageSmoothingQuality = 'high';
    texCtx.drawImage(realTexImage, 0, 0, W, H);
  } else {
    drawGlobeTexture(texCtx, W, H);
  }
  Object.keys(activeHighlights).forEach(function(key){
    var hi = activeHighlights[key];
    paintFeatureOnTexture(key, hi.color, hi.opacity);
  });
  if(typeof customHighlights !== 'undefined'){
    customHighlights.forEach(function(ch){ paintCustomPolygon(ch.ring, ch.color, ch.opacity); });
  }
  globeTexture.needsUpdate = true;
}

// ── Core drawing helpers ──────────────────────────────────────────────

// Parse any CSS color string to {r,g,b}
var colorCache = {};
function parseColor(color){
  if(colorCache[color]) return colorCache[color];
  var t=document.createElement('canvas'); t.width=1; t.height=1;
  var tc=t.getContext('2d'); tc.fillStyle=color; tc.fillRect(0,0,1,1);
  var d=tc.getImageData(0,0,1,1).data;
  return (colorCache[color]={r:d[0],g:d[1],b:d[2]});
}

// Draw a GeoJSON geometry (Polygon/MultiPolygon/LineString/MultiLineString)
// onto a context in equirectangular projection
function drawGeoJSONGeom(ctx, geom, W, H, mode){
  // mode: 'fill' or 'stroke'
  if(!geom) return;
  var gtype = geom.type;
  if(gtype==='Polygon'||gtype==='MultiPolygon'){
    var polys = gtype==='Polygon' ? [geom.coordinates] : geom.coordinates;
    polys.forEach(function(poly){
      poly.forEach(function(ring, ri){
        ctx.beginPath();
        ring.forEach(function(coord,i){
          var pt=lngLatToTex(coord[0],coord[1],W,H);
          i===0 ? ctx.moveTo(pt[0],pt[1]) : ctx.lineTo(pt[0],pt[1]);
        });
        ctx.closePath();
        if(mode==='fill') ctx.fill('nonzero');
        else ctx.stroke();
      });
    });
  } else if(gtype==='LineString'||gtype==='MultiLineString'){
    var lines = gtype==='LineString' ? [geom.coordinates] : geom.coordinates;
    lines.forEach(function(line){
      ctx.beginPath();
      line.forEach(function(coord,i){
        var pt=lngLatToTex(coord[0],coord[1],W,H);
        i===0 ? ctx.moveTo(pt[0],pt[1]) : ctx.lineTo(pt[0],pt[1]);
      });
      ctx.stroke();
    });
  }
}

// Paint a land polygon (from any GeoJSON feature) onto offscreen canvas,
// clip to land mask, composite onto main texture
function paintLandPolygon(geomOrRing, col, opacity, W, H, isRingArray){
  // Reuse shared offscreen canvas — no allocation per call
  var offC = _getOffscreen();
  var off = offC.getContext('2d');
  off.clearRect(0, 0, W, H);
  off.fillStyle='rgba('+col.r+','+col.g+','+col.b+',1)';

  if(isRingArray){
    off.beginPath();
    geomOrRing.forEach(function(c,i){
      var p=lngLatToTex(c[0],c[1],W,H);
      i===0?off.moveTo(p[0],p[1]):off.lineTo(p[0],p[1]);
    });
    off.closePath(); off.fill();
  } else {
    drawGeoJSONGeom(off, geomOrRing, W, H, 'fill');
  }

  // Clip to land — always paint something; clipping is enhancement not requirement
  if(_landMaskCanvas && _landMaskCanvas.width===W && _landMaskCanvas.height===H){
    // Use pre-built cache (fast path)
    off.globalCompositeOperation='destination-in';
    off.drawImage(_landMaskCanvas, 0, 0);
  } else if(neCoastlines){
    // Build cache now (first time or size changed), then use it
    _buildLandMaskCache();
    if(_landMaskCanvas){
      off.globalCompositeOperation='destination-in';
      off.drawImage(_landMaskCanvas, 0, 0);
    }
    // else: paint unclipped — visible but may slightly extend to ocean
  }
  // No neCoastlines yet: paint unclipped (highlight visible immediately)

  texCtx.save();
  texCtx.globalAlpha=opacity*0.42;
  texCtx.globalCompositeOperation='source-over';
  texCtx.drawImage(offC,0,0);
  texCtx.restore();
}

// Paint a water polygon, clip to ocean (remove land)
function paintWaterPolygon(geomOrRing, col, opacity, W, H, isRingArray){
  var offC = _getOffscreen();
  var off = offC.getContext('2d');
  off.clearRect(0, 0, W, H);
  off.fillStyle='rgba('+col.r+','+col.g+','+col.b+',1)';

  if(isRingArray){
    off.beginPath();
    geomOrRing.forEach(function(c,i){
      var p=lngLatToTex(c[0],c[1],W,H);
      i===0?off.moveTo(p[0],p[1]):off.lineTo(p[0],p[1]);
    });
    off.closePath(); off.fill();
  } else {
    drawGeoJSONGeom(off, geomOrRing, W, H, 'fill');
  }

  // Remove land pixels using cached mask
  if(_landMaskCanvas && _landMaskCanvas.width===W && _landMaskCanvas.height===H){
    off.globalCompositeOperation='destination-out';
    off.drawImage(_landMaskCanvas, 0, 0);
  } else if(neCoastlines){
    off.globalCompositeOperation='destination-out';
    off.fillStyle='rgba(0,0,0,1)';
    drawNELand(off,W,H);
  }

  texCtx.save();
  texCtx.globalAlpha=opacity*0.42;
  texCtx.globalCompositeOperation='source-over';
  texCtx.drawImage(offC,0,0);
  texCtx.restore();
}

// Paint a river/line feature using NE centerline
function paintRiverLine(geom, col, W, H){
  if(!geom) return;
  texCtx.save();
  texCtx.strokeStyle='rgba('+col.r+','+col.g+','+col.b+',1)';
  texCtx.lineCap='round'; texCtx.lineJoin='round';
  // Core — crisp thin line
  texCtx.globalAlpha=0.98;
  texCtx.lineWidth=Math.max(2,W/1400);
  drawGeoJSONGeom(texCtx,geom,W,H,'stroke');
  // Subtle glow
  texCtx.globalAlpha=0.18;
  texCtx.lineWidth=Math.max(5,W/600);
  drawGeoJSONGeom(texCtx,geom,W,H,'stroke');
  texCtx.restore();
}

// Paint a dashed line (trench)
function paintDashedLine(coords, col, opacity, W, H){
  texCtx.save();
  texCtx.globalAlpha=Math.min(1,opacity*1.8);
  texCtx.strokeStyle='rgba('+col.r+','+col.g+','+col.b+',1)';
  texCtx.lineWidth=Math.max(4,W/350);
  texCtx.lineCap='round';
  var dashLen=Math.max(16,W/120);
  texCtx.setLineDash([dashLen,dashLen*0.6]);
  texCtx.beginPath();
  coords.forEach(function(c,i){
    var p=lngLatToTex(c[0],c[1],W,H);
    i===0?texCtx.moveTo(p[0],p[1]):texCtx.lineTo(p[0],p[1]);
  });
  texCtx.stroke();
  texCtx.setLineDash([]);
  texCtx.restore();
}

// Paint a point (mountain peak, volcano)
function paintPoint(lat, lng, col, opacity, W, H){
  var p=lngLatToTex(lng,lat,W,H);
  // sz: visible but not huge — ~7px on 4K canvas, well-proportioned on globe
  var sz=Math.max(6, W/600);
  texCtx.save();
  texCtx.globalAlpha=Math.min(1,opacity*2);
  // Subtle glow halo
  var grad=texCtx.createRadialGradient(p[0],p[1],0,p[0],p[1],sz*2.5);
  grad.addColorStop(0,'rgba('+col.r+','+col.g+','+col.b+',0.5)');
  grad.addColorStop(1,'rgba('+col.r+','+col.g+','+col.b+',0)');
  texCtx.fillStyle=grad;
  texCtx.beginPath(); texCtx.arc(p[0],p[1],sz*2.5,0,Math.PI*2); texCtx.fill();
  // Crisp triangle (mountain symbol) — proportionate to globe scale
  texCtx.globalAlpha=Math.min(1,opacity*2.2);
  texCtx.fillStyle='rgba('+col.r+','+col.g+','+col.b+',1)';
  texCtx.beginPath();
  texCtx.moveTo(p[0], p[1]-sz*1.4);          // apex
  texCtx.lineTo(p[0]-sz, p[1]+sz*0.6);       // bottom-left
  texCtx.lineTo(p[0]+sz, p[1]+sz*0.6);       // bottom-right
  texCtx.closePath(); texCtx.fill();
  texCtx.restore();
}

// ── Main paint dispatcher ──────────────────────────────────────────────
// Paint a single feature onto texCtx (already cleared to base)
function paintFeatureOnTexture(featureKey, color, opacity){
  var f = GEO_FEATURES[featureKey];
  if(!f) return;
  var W = texCanvas.width, H = texCanvas.height;
  var col = parseColor(color);

  // ── TYPE CLASSIFICATION ────────────────────────────────────────────
  var ftype = f.type || '';
  var isRiver  = ftype==='river' || ftype==='lagoon/waterway';
  var isWater  = ['sea','lake','ocean trench','trench','mangrove delta',
                  'lake (endorheic)'].indexOf(ftype)>=0;
  var isCountry= ['country','union territory'].indexOf(ftype)>=0;
  var isPeak   = ftype==='mountain'||ftype==='volcano';
  var isTrench = ftype==='ocean trench'||ftype==='trench'||ftype==='rift valley';

  // ── TRY GEOJSON LOOKUP FIRST ───────────────────────────────────────
  var found = lookupNE(f.name, ftype) || lookupNE(featureKey, ftype);

  if(found && found.geom){
    if(isRiver || found.src==='river'){
      paintRiverLine(found.geom, col, W, H);
      return;
    } else if(isWater || found.src==='marine' || found.src==='lake'){
      paintWaterPolygon(found.geom, col, opacity, W, H, false);
      return;
    } else {
      paintLandPolygon(found.geom, col, opacity, W, H, false);
      return;
    }
  }

  // ── FALLBACK: use hand-coded shape data ────────────────────────────
  if(!f.shape){
    paintPoint(f.lat, f.lng, col, opacity, W, H);
    return;
  }
  var shape = f.shape;

  // GeoJSON shape from Wikipedia/OSM lookup
  if(shape.type==='geojson' && shape.geom){
    var g = shape.geom;
    var gtype = g.type || '';
    if(gtype==='LineString'||gtype==='MultiLineString'){
      paintRiverLine(g, col, W, H);
    } else if(isWater){
      paintWaterPolygon(g, col, opacity, W, H, false);
    } else {
      paintLandPolygon(g, col, opacity, W, H, false);
    }
    return;
  }

  if(shape.type==='polygon'){
    if(isWater){
      paintWaterPolygon(shape.ring, col, opacity, W, H, true);
    } else {
      paintLandPolygon(shape.ring, col, opacity, W, H, true);
    }
  } else if(shape.type==='polyline'){
    // Fallback river using hand-coded coords
    texCtx.save();
    texCtx.strokeStyle='rgba('+col.r+','+col.g+','+col.b+',1)';
    texCtx.lineCap='round'; texCtx.lineJoin='round';
    texCtx.globalAlpha=0.98;
    texCtx.lineWidth=Math.max(2,W/1400);
    texCtx.beginPath();
    shape.coords.forEach(function(c,i){
      var p=lngLatToTex(c[0],c[1],W,H);
      i===0?texCtx.moveTo(p[0],p[1]):texCtx.lineTo(p[0],p[1]);
    });
    texCtx.stroke();
    texCtx.globalAlpha=0.18;
    texCtx.lineWidth=Math.max(5,W/600);
    texCtx.beginPath();
    shape.coords.forEach(function(c,i){
      var p=lngLatToTex(c[0],c[1],W,H);
      i===0?texCtx.moveTo(p[0],p[1]):texCtx.lineTo(p[0],p[1]);
    });
    texCtx.stroke();
    texCtx.restore();
  } else if(shape.type==='dashed'){
    paintDashedLine(shape.coords, col, opacity, W, H);
  } else if(shape.type==='point'){
    paintPoint(f.lat, f.lng, col, opacity, W, H);
  }
}

function drawFeatureHighlight(featureKey, color, opacity){
  var f = GEO_FEATURES[featureKey];
  if(!f) return;
  color = color || annotColor;
  opacity = opacity || 0.52;
  activeHighlights[featureKey] = {color:color, opacity:opacity};
  scheduleRepaint(); // debounced — coalesces rapid successive calls
}

function clearHighlights(){
  // Remove all 3D overlay meshes (kept for annotations etc.)
  overlayMeshes.forEach(function(m){
    globeGroup.remove(m); m.geometry.dispose(); m.material.dispose();
  });
  overlayMeshes = [];
  activeChips = {};
  // Clear texture highlights and repaint clean
  activeHighlights = {};
  repaintTexture();
}

// ── Annotations ───────────────────────────────────────────────────────
var annotC, annotCtx;
function setupAnnotCanvas(){
  annotC = document.getElementById('annotCanvas');
  var panel = document.querySelector('.panel');
  annotC.width = window.innerWidth - panel.offsetWidth;
  annotC.height = window.innerHeight - 52;
  annotCtx = annotC.getContext('2d');
}
function resizeAnnotCanvas(){
  if(!annotC) return;
  var panel = document.querySelector('.panel');
  annotC.width = window.innerWidth - panel.offsetWidth;
  annotC.height = window.innerHeight - 52;
  redrawAnnotations();
}

function redrawAnnotations(){
  if(!annotCtx) return;
  annotCtx.clearRect(0,0,annotC.width,annotC.height);
  annotations.forEach(function(a){
    if(a.type === 'label') drawAnnotLabel(a);
    else if(a.type === 'arrow') drawAnnotArrow(a);
  });
}

function worldToScreen(lat, lng){
  // Project lat/lng through Three.js camera
  var v = latLngToVec3(lat, lng, GLOBE_R * 1.003);
  var vCopy = v.clone();
  // Apply globeGroup rotation
  vCopy.applyEuler(globeGroup.rotation);
  vCopy.project(camera);
  var panel = document.querySelector('.panel');
  var W = window.innerWidth - panel.offsetWidth;
  var H = window.innerHeight - 52;
  return {
    x: (vCopy.x + 1) / 2 * W,
    y: -(vCopy.y - 1) / 2 * H,
    visible: vCopy.z < 1 // behind globe check
  };
}

function drawAnnotLabel(a){
  var sc = worldToScreen(a.lat, a.lng);
  if(!sc.visible) return;
  annotCtx.save();
  annotCtx.font = 'bold 13px Geist, system-ui, sans-serif';
  annotCtx.fillStyle = a.color || annotColor;
  annotCtx.strokeStyle = 'rgba(0,0,0,0.7)';
  annotCtx.lineWidth = 3;
  // Dot
  annotCtx.beginPath(); annotCtx.arc(sc.x, sc.y, 4, 0, Math.PI*2);
  annotCtx.fillStyle = a.color || annotColor; annotCtx.fill();
  annotCtx.strokeStyle = 'rgba(0,0,0,0.5)'; annotCtx.lineWidth = 1; annotCtx.stroke();
  // Text with outline
  annotCtx.strokeStyle = 'rgba(0,0,0,0.8)'; annotCtx.lineWidth = 3;
  annotCtx.strokeText(a.text, sc.x + 8, sc.y - 5);
  annotCtx.fillStyle = a.color || annotColor;
  annotCtx.fillText(a.text, sc.x + 8, sc.y - 5);
  annotCtx.restore();
}

function drawAnnotArrow(a){
  var s = worldToScreen(a.fromLat, a.fromLng);
  var e = worldToScreen(a.toLat, a.toLng);
  if(!s.visible && !e.visible) return;
  annotCtx.save();
  annotCtx.strokeStyle = a.color || annotColor;
  annotCtx.fillStyle = a.color || annotColor;
  annotCtx.lineWidth = 2;
  // Line
  annotCtx.beginPath(); annotCtx.moveTo(s.x, s.y); annotCtx.lineTo(e.x, e.y); annotCtx.stroke();
  // Arrowhead
  var angle = Math.atan2(e.y - s.y, e.x - s.x);
  annotCtx.beginPath();
  annotCtx.moveTo(e.x, e.y);
  annotCtx.lineTo(e.x - 12*Math.cos(angle-0.4), e.y - 12*Math.sin(angle-0.4));
  annotCtx.lineTo(e.x - 12*Math.cos(angle+0.4), e.y - 12*Math.sin(angle+0.4));
  annotCtx.closePath(); annotCtx.fill();
  // Label
  if(a.label){
    var mx = (s.x+e.x)/2, my = (s.y+e.y)/2;
    annotCtx.font = '12px Geist, system-ui, sans-serif';
    annotCtx.strokeStyle = 'rgba(0,0,0,0.8)'; annotCtx.lineWidth = 3;
    annotCtx.strokeText(a.label, mx+4, my-4);
    annotCtx.fillText(a.label, mx+4, my-4);
  }
  annotCtx.restore();
}

// Continuously redraw annotations as globe rotates
setInterval(redrawAnnotations, 80);

function clearAnnotations(){
  annotations = [];
  if(annotCtx) annotCtx.clearRect(0,0,annotC.width,annotC.height);
}

// ── Annotation tool interactions ──────────────────────────────────────
function setTool(tool){
  // Toggle off if same tool clicked again
  if(currentTool === tool){
    // If cancelling paint mid-draw, discard points
    if(tool === 'paint'){ paintPoints = []; updatePaintPreview(); }
    currentTool = null;
  } else {
    if(currentTool === 'paint'){ paintPoints = []; updatePaintPreview(); }
    currentTool = tool;
  }
  ['label','arrow','paint','erase'].forEach(function(t){
    var btn = document.getElementById('tool'+t.charAt(0).toUpperCase()+t.slice(1));
    if(btn) btn.classList.toggle('active', currentTool===t);
  });
  var hint = document.getElementById('paintHint');
  if(hint) hint.style.display = currentTool==='paint' ? 'block' : 'none';
  if(annotC) annotC.classList.toggle('drawing', !!currentTool);
  arrowStart = null;
}

// ── Screen→globe lat/lng ──────────────────────────────────────────────
function screenToLatLng(px, py){
  // Raycast against globe sphere
  var panel = document.querySelector('.panel');
  var W = window.innerWidth - panel.offsetWidth;
  var H = window.innerHeight - 52;
  var ndcX = (px / W) * 2 - 1;
  var ndcY = -(py / H) * 2 + 1;
  raycaster.setFromCamera({x:ndcX, y:ndcY}, camera);
  var hits = raycaster.intersectObject(globe);
  if(!hits.length) return null;
  var pt = hits[0].point;
  // Reverse globeGroup rotation
  var inv = globeGroup.quaternion.clone().invert();
  var local = pt.clone().applyQuaternion(inv);
  var lat = 90 - Math.acos(local.y / GLOBE_R) * 180 / Math.PI;
  var lng = Math.atan2(local.z, -local.x) * 180 / Math.PI - 180;
  if(lng < -180) lng += 360;
  return {lat:lat, lng:lng};
}

// Set up annotation canvas click handlers
function setupAnnotInteractions(){
  annotC.addEventListener('click', function(e){
    if(!currentTool) return;
    var rect = annotC.getBoundingClientRect();
    var px = e.clientX - rect.left, py = e.clientY - rect.top;
    var ll = screenToLatLng(px, py);
    if(!ll) return;

    if(currentTool === 'label'){
      var text = prompt('Enter label text:');
      if(!text) return;
      annotations.push({type:'label', lat:ll.lat, lng:ll.lng, text:text, color:annotColor});
    } else if(currentTool === 'arrow'){
      if(!arrowStart){
        arrowStart = ll;
        document.getElementById('globeTip').textContent = 'Now click the end point of the arrow';
        document.getElementById('globeTip').style.display = 'block';
        document.getElementById('globeTip').style.left = (px+10)+'px';
        document.getElementById('globeTip').style.top = (py+10)+'px';
      } else {
        var label = prompt('Arrow label (optional):') || '';
        annotations.push({type:'arrow', fromLat:arrowStart.lat, fromLng:arrowStart.lng,
          toLat:ll.lat, toLng:ll.lng, label:label, color:annotColor});
        arrowStart = null;
        document.getElementById('globeTip').style.display = 'none';
      }
    } else if(currentTool === 'paint'){
      paintPoints.push(ll);
      var cntEl = document.getElementById('paintPtCount');
      if(cntEl) cntEl.textContent = paintPoints.length + ' pts';
      updatePaintPreview();
    } else if(currentTool === 'erase'){
      // Remove nearest annotation
      var sc, minD = 25, minI = -1;
      annotations.forEach(function(a, i){
        sc = worldToScreen(a.lat, a.lng);
        var d = Math.hypot(sc.x-px, sc.y-py);
        if(d<minD){minD=d;minI=i;}
      });
      if(minI>=0){ annotations.splice(minI,1); return; }
      // Also try removing nearest custom highlight
      removeNearestCustomHighlight(px, py);
    }
  });

  // Double-click: close polygon and commit custom highlight
  annotC.addEventListener('dblclick', function(e){
    if(currentTool !== 'paint') return;
    e.preventDefault();
    if(paintPoints.length < 3){
      paintPoints = [];
      updatePaintPreview();
      var cntEl = document.getElementById('paintPtCount');
      if(cntEl) cntEl.textContent = '0 pts';
      return;
    }
    // Commit: store as custom highlight
    var id = 'custom_'+(++customHlCounter);
    var ring = paintPoints.map(function(p){ return [p.lng, p.lat]; });
    customHighlights.push({id:id, ring:ring, color:annotColor, opacity:0.45});
    // Paint onto texture
    paintCustomPolygon(ring, annotColor, 0.45);
    // Reset
    paintPoints = [];
    updatePaintPreview();
    var cntEl = document.getElementById('paintPtCount');
    if(cntEl) cntEl.textContent = '0 pts';
    // Deactivate paint tool
    setTool('paint'); // toggles off
  });
}

// Draw preview dots + connecting lines for paint-in-progress
function updatePaintPreview(){
  redrawAnnotations(); // clears then redraws
  if(!paintPoints.length) return;
  var pts = paintPoints;
  // Draw connecting lines
  if(pts.length > 1){
    annotCtx.save();
    annotCtx.strokeStyle = annotColor;
    annotCtx.lineWidth = 1.5;
    annotCtx.setLineDash([4,3]);
    annotCtx.globalAlpha = 0.7;
    annotCtx.beginPath();
    for(var i=0;i<pts.length;i++){
      var sc = worldToScreen(pts[i].lat, pts[i].lng);
      if(i===0) annotCtx.moveTo(sc.x, sc.y); else annotCtx.lineTo(sc.x, sc.y);
    }
    annotCtx.stroke();
    annotCtx.setLineDash([]);
    annotCtx.restore();
  }
  // Draw vertex dots
  pts.forEach(function(p, i){
    var sc = worldToScreen(p.lat, p.lng);
    annotCtx.save();
    annotCtx.fillStyle = i===0 ? '#f87171' : annotColor;
    annotCtx.globalAlpha = 0.9;
    annotCtx.beginPath();
    annotCtx.arc(sc.x, sc.y, i===0?6:4, 0, Math.PI*2);
    annotCtx.fill();
    annotCtx.restore();
  });
}

function paintCustomPolygon(ring, color, opacity){
  // ring = [[lng,lat],...] — same format as shape.ring
  var W = texCanvas.width, H = texCanvas.height;
  var tmp = document.createElement('canvas'); tmp.width=1; tmp.height=1;
  var tc = tmp.getContext('2d'); tc.fillStyle=color; tc.fillRect(0,0,1,1);
  var d=tc.getImageData(0,0,1,1).data; var r=d[0],g=d[1],b=d[2];

  var offC = document.createElement('canvas'); offC.width=W; offC.height=H;
  var off = offC.getContext('2d');
  off.fillStyle='rgba('+r+','+g+','+b+',1)';
  off.beginPath();
  var p0=lngLatToTex(ring[0][0],ring[0][1],W,H);
  off.moveTo(p0[0],p0[1]);
  for(var i=1;i<ring.length;i++){
    var p=lngLatToTex(ring[i][0],ring[i][1],W,H);
    off.lineTo(p[0],p[1]);
  }
  off.closePath(); off.fill();

  texCtx.save();
  texCtx.globalAlpha = opacity * 0.42;
  texCtx.drawImage(offC,0,0);
  texCtx.restore();
  globeTexture.needsUpdate = true;
}

function removeNearestCustomHighlight(px, py){
  // Find custom highlight whose centroid is nearest to click
  var minD = 60, minI = -1;
  customHighlights.forEach(function(ch, i){
    var lats=ch.ring.map(function(c){return c[1];});
    var lngs=ch.ring.map(function(c){return c[0];});
    var clat=lats.reduce(function(a,b){return a+b;})/lats.length;
    var clng=lngs.reduce(function(a,b){return a+b;})/lngs.length;
    var sc=worldToScreen(clat,clng);
    var d=Math.hypot(sc.x-px,sc.y-py);
    if(d<minD){minD=d;minI=i;}
  });
  if(minI>=0){
    customHighlights.splice(minI,1);
    // Repaint without that custom highlight
    repaintAllCustom();
  }
}

function repaintAllCustom(){
  // Repaint base + search highlights + all custom highlights
  repaintTexture(); // handles search highlights
  customHighlights.forEach(function(ch){
    paintCustomPolygon(ch.ring, ch.color, ch.opacity);
  });
}
