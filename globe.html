var searchTimeout;
function onSearch(val){
  document.getElementById('searchClear').style.display = val ? 'block' : 'none';
  clearTimeout(searchTimeout);
  if(!val.trim()){
    document.getElementById('suggestions').style.display = 'none'; return;
  }
  searchTimeout = setTimeout(function(){ showSuggestions(val); }, 120);
}

function showSuggestions(val){
  var q = val.toLowerCase().trim();
  var results = SEARCH_INDEX.filter(function(item){
    return item.searchStr.indexOf(q) >= 0;
  }).slice(0, 8);

  if(!results.length){ document.getElementById('suggestions').style.display='none'; return; }

  var html = results.map(function(r){
    return '<div class="sugg-item" onclick="doSearch(\''+esc(r.name)+'\')">'+
      '<span class="sugg-name">'+esc(r.name)+'</span>'+
      '<span class="sugg-type">'+esc(r.type)+'</span></div>';
  }).join('');
  var el = document.getElementById('suggestions');
  el.innerHTML = html; el.style.display = 'block';
}

function onSearchKey(e){
  if(e.key === 'Enter'){
    var val = document.getElementById('searchInput').value.trim();
    if(val) doSearch(val);
  } else if(e.key === 'Escape'){
    document.getElementById('suggestions').style.display = 'none';
  }
}

function clearSearch(){
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').style.display = 'none';
  document.getElementById('suggestions').style.display = 'none';
}

// Stack of active search cards (each has key, data, color)
var searchCards = [];
// Colors cycle for successive searches
var CARD_COLORS = ['#e8d5b0','#4ade80','#60a5fa','#f87171','#c084fc','#fb923c','#34d399','#f472b6','#a78bfa','#facc15'];
var cardColorIdx = 0;

function doSearch(name){
  document.getElementById('suggestions').style.display = 'none';
  document.getElementById('searchInput').value = name;
  document.getElementById('searchClear').style.display = 'block';

  // Find in database
  var key = name.toLowerCase().trim();
  var feature = GEO_FEATURES[key];
  if(!feature){
    var best = SEARCH_INDEX.find(function(r){ return r.name.toLowerCase() === key; }) ||
               SEARCH_INDEX.find(function(r){ return r.searchStr.indexOf(key) >= 0; });
    if(best){ feature = GEO_FEATURES[best.key]; key = best.key; }
  }
  if(!feature){
    // Show error as a temporary card
    var errDiv = document.createElement('div');
    errDiv.className = 'feat-card';
    errDiv.style.cssText = 'border-color:var(--red);opacity:0.7;';
    errDiv.innerHTML = '<div class="feat-name" style="color:var(--red)">Not found</div>'+
      '<div class="feat-desc">No results for "'+esc(name)+'". Try broader terms.</div>';
    document.getElementById('panelContent').appendChild(errDiv);
    setTimeout(function(){ errDiv.remove(); }, 3000);
    return;
  }

  // If feature already in stack — just fly to it
  var existing = searchCards.find(function(c){ return c.key === key; });
  if(existing){
    flyTo_(feature.lat, feature.lng, feature.zoom || 3.5);
    return;
  }

  // Assign a color for this search card
  var cardColor = CARD_COLORS[cardColorIdx % CARD_COLORS.length];
  cardColorIdx++;

  // Add to stack
  searchCards.push({key:key, data:feature, color:cardColor});
  currentFeature = {key:key, data:feature};

  // Show toolbar + export bar if first card
  document.getElementById('toolbar').style.display = 'block';
  document.getElementById('exportBar').style.display = 'flex';

  // If first search, clear the empty state
  var panelContent = document.getElementById('panelContent');
  var emptyState = panelContent.querySelector('.empty-state');
  if(emptyState) emptyState.remove();

  // Add card to panel (appended, not replaced)
  appendFeatureCard(key, feature, cardColor);

  // Fly to feature and highlight with assigned color
  annotColor = cardColor; // set color for highlight
  flyTo_(feature.lat, feature.lng, feature.zoom || 3.5, function(){
    drawFeatureHighlight(key, cardColor, 0.55);
    activeChips[key] = cardColor;
    // Refresh card to show opacity slider active
    updateCardOpacitySlider(key);
  });
}

function appendFeatureCard(key, f, color){
  var panelContent = document.getElementById('panelContent');
  var cardEl = document.createElement('div');
  cardEl.className = 'feat-card';
  cardEl.id = 'card_' + key.replace(/[^a-z0-9]/g,'_');
  cardEl.dataset.key = key;
  cardEl.style.cssText = 'border-left:3px solid '+color+';';

  // Build stats
  var statsHtml = '';
  if(f.stats && Object.keys(f.stats).length){
    statsHtml = '<div class="feat-stats">';
    Object.keys(f.stats).slice(0,4).forEach(function(k){
      statsHtml += '<div class="stat-box"><div class="stat-label">'+esc(k)+'</div>'+
        '<div class="stat-val">'+esc(f.stats[k])+'</div></div>';
    });
    statsHtml += '</div>';
  }

  // Opacity slider
  var hi = activeHighlights[key];
  var curOpacity = hi ? hi.opacity : 0.55;
  var safeKeyId = key.replace(/[^a-z0-9]/g,'_');
  var opSlider = '<div class="opacity-row">' +
    '<span class="opacity-label">Opacity</span>' +
    '<input type="range" class="opacity-slider" min="5" max="95" value="' + Math.round(curOpacity*100) +
    '" id="opslider_'+safeKeyId+'" />' +
    '<span class="opacity-val" id="opv_'+safeKeyId+'">' + Math.round(curOpacity*100) + '%</span>' +
    '</div>';

  // Related chips
  var relHtml = '';
  if(f.related && f.related.length){
    relHtml = '<div class="related-label">Related</div><div class="related-chips">';
    f.related.forEach(function(rk){
      var rf = GEO_FEATURES[rk];
      var rname = rf ? rf.name : rk.split(' ').map(function(w){return w.charAt(0).toUpperCase()+w.slice(1);}).join(' ');
      var isActive = !!activeChips[rk];
      var rkId = rk.replace(/[^a-z0-9]/g,'_');
      relHtml += '<div class="chip'+(isActive?' active':'')+'" id="chip_'+rkId+'">' +
        '<div class="chip-dot" style="background:'+(isActive?activeChips[rk]:color)+'"></div>' +
        esc(rname) + '</div>';
    });
    relHtml += '</div>';
  }

  cardEl.innerHTML =
    '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px">' +
      '<div>' +
        '<div class="feat-name" style="color:'+color+'">'+esc(f.name)+'</div>' +
        '<div class="feat-type-badge">'+typeIcon(f.type)+' '+esc(f.type)+'</div>' +
      '</div>' +
      '<button id="rm_'+safeKeyId+'" style="background:none;border:none;color:var(--muted);font-size:0.85rem;cursor:pointer;padding:2px 4px;flex-shrink:0;" title="Remove this highlight">✕</button>' +
    '</div>' +
    '<div class="feat-desc" style="margin-bottom:6px">'+esc(f.desc)+'</div>' +
    statsHtml + opSlider + relHtml;

  panelContent.appendChild(cardEl);

  // Wire up event listeners AFTER inserting (avoids inline handler quoting issues)
  document.getElementById('rm_'+safeKeyId).addEventListener('click', function(){ removeSearchCard(key); });
  document.getElementById('opslider_'+safeKeyId).addEventListener('input', function(){
    setHighlightOpacity(this, key, this.value/100);
  });
  // Wire related chip clicks
  if(f.related){
    f.related.forEach(function(rk){
      var chipEl = document.getElementById('chip_'+rk.replace(/[^a-z0-9]/g,'_'));
      if(chipEl){
        chipEl.addEventListener('click', function(){ toggleRelated(this, rk); });
      }
    });
  }

  cardEl.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function updateCardOpacitySlider(key){
  var hi = activeHighlights[key];
  if(!hi) return;
  var id = 'opv_' + key.replace(/[^a-z0-9]/g,'_');
  var el = document.getElementById(id);
  if(el) el.textContent = Math.round(hi.opacity*100)+'%';
}

function removeSearchCard(key){
  // Remove from stack
  searchCards = searchCards.filter(function(c){ return c.key !== key; });
  // Remove highlight from globe
  delete activeHighlights[key];
  delete activeChips[key];
  repaintTexture();
  // Remove card element
  var cardEl = document.getElementById('card_' + key.replace(/[^a-z0-9]/g,'_'));
  if(cardEl) cardEl.remove();
  // If no cards left, show empty state
  var panelContent = document.getElementById('panelContent');
  if(!panelContent.querySelector('.feat-card')){
    panelContent.innerHTML = getEmptyState();
    document.getElementById('toolbar').style.display = 'none';
    document.getElementById('exportBar').style.display = 'none';
    currentFeature = null;
  }
}

function showFeatureInfo(key, f){
  var statsHtml = '';
  if(f.stats && Object.keys(f.stats).length){
    statsHtml = '<div class="feat-stats">';
    Object.keys(f.stats).forEach(function(k){
      statsHtml += '<div class="stat-box"><div class="stat-label">'+esc(k)+'</div>'+
        '<div class="stat-val">'+esc(f.stats[k])+'</div></div>';
    });
    statsHtml += '</div>';
  }

  // Opacity slider for the main highlighted feature
  var hi = activeHighlights[key];
  var curOpacity = hi ? hi.opacity : 0.55;
  var safeKey = key.replace(/'/g,"\\'");
  var opSlider = '<div class="opacity-row">'+
    '<span class="opacity-label">Opacity</span>'+
    '<input type="range" class="opacity-slider" min="5" max="95" value="'+Math.round(curOpacity*100)+
    '" oninput="setHighlightOpacity(this,\''+safeKey+'\',this.value/100)" />'+
    '<span class="opacity-val" id="opv_main">'+Math.round(curOpacity*100)+'%</span>'+
    '</div>';

  var relHtml = '';
  if(f.related && f.related.length){
    relHtml = '<div class="related-label">Related features</div><div class="related-chips">';
    f.related.forEach(function(rk){
      var rf = GEO_FEATURES[rk];
      var rname = rf ? rf.name : rk.split(' ').map(function(w){return w.charAt(0).toUpperCase()+w.slice(1);}).join(' ');
      var isActive = !!activeChips[rk];
      var safeRk = rk.replace(/'/g,"\\'");
      relHtml += '<div class="chip'+(isActive?' active':'')+'" onclick="toggleRelated(this,\''+safeRk+'\')">';
      relHtml += '<div class="chip-dot" style="background:'+(isActive?activeChips[rk]:'var(--muted)')+'"></div>';
      relHtml += esc(rname);
      if(isActive){
        var rhi = activeHighlights[rk];
        var rop = rhi ? Math.round(rhi.opacity*100) : 42;
        relHtml += '<input type="range" class="chip-opacity" min="5" max="95" value="'+rop+
          '" onclick="event.stopPropagation()" '+
          'oninput="event.stopPropagation();setHighlightOpacity(this,\''+safeRk+'\',this.value/100)" />';
      }
      relHtml += '</div>';
    });

  var html = '<div class="feat-card">'+

    '<div class="feat-type-badge">'+typeIcon(f.type)+' '+esc(f.type)+'</div>'+
    '<div class="feat-desc">'+esc(f.desc)+'</div>'+
    statsHtml + opSlider + relHtml +
    '</div>';
  document.getElementById('panelContent').innerHTML = html;
}

function setHighlightOpacity(sliderEl, key, val){
  val = Math.max(0.05, Math.min(0.95, parseFloat(val)));
  if(activeHighlights[key]){
    activeHighlights[key].opacity = val;
    scheduleRepaint();
  }
  // Update display next to slider
  var pct = Math.round(val*100)+'%';
  if(sliderEl && sliderEl.nextElementSibling) sliderEl.nextElementSibling.textContent = pct;
  var mainEl = document.getElementById('opv_main');
  if(mainEl && key === (currentFeature && currentFeature.key)) mainEl.textContent = pct;
}
function typeIcon(type){
  var icons = {mountain:'⛰',river:'〰️',plain:'🌾',desert:'🏜',forest:'🌿',country:'🏳',
    plateau:'🗻',sea:'🌊',lake:'💧',volcano:'🌋',trench:'🔽',mountain_range:'⛰',
    'mountain range':'⛰','salt marsh':'🌊','lagoon/waterway':'🚤','union territory':'🏛',
    region:'📍','mangrove delta':'🌊','ocean trench':'🔽','rift valley':'🏔'};
  return icons[type] || '📌';
}

function toggleRelated(elOrKey, rk){
  if(typeof elOrKey === 'string'){ rk = elOrKey; }
  if(activeChips[rk]){
    delete activeChips[rk];
    delete activeHighlights[rk];
    repaintTexture();
    // Update all chip elements with this key across all cards
    document.querySelectorAll('#chip_'+rk.replace(/[^a-z0-9]/g,'_')).forEach(function(el){
      el.classList.remove('active');
      // Remove inline slider if present
      var sl = el.querySelector('.chip-opacity');
      if(sl) sl.remove();
      var dot = el.querySelector('.chip-dot');
      if(dot){
        // Restore dot color to parent card color
        var card = el.closest('.feat-card');
        var parentKey = card ? card.dataset.key : null;
        var card_color = parentKey && activeChips[parentKey] ? activeChips[parentKey] : 'var(--muted)';
        // Find card color from searchCards
        var sc = searchCards.find(function(c){ return c.key === parentKey; });
        dot.style.background = sc ? sc.color : 'var(--muted)';
      }
    });
  } else {
    // Assign next available color
    var colors = ['#4ade80','#60a5fa','#f87171','#c084fc','#fb923c','#34d399','#f472b6','#a78bfa'];
    var usedColors = Object.values(activeChips);
    var col = colors.find(function(c){ return usedColors.indexOf(c)<0; }) || colors[0];
    activeChips[rk] = col;
    drawFeatureHighlight(rk, col, 0.42);
    // Update all chip elements with this key
    document.querySelectorAll('#chip_'+rk.replace(/[^a-z0-9]/g,'_')).forEach(function(el){
      el.classList.add('active');
      var dot = el.querySelector('.chip-dot');
      if(dot) dot.style.background = col;
      // Add opacity slider if not already present
      if(!el.querySelector('.chip-opacity')){
        var safeRk = rk.replace(/'/g,"\'");
        var sl = document.createElement('input');
        sl.type='range'; sl.className='chip-opacity'; sl.min=5; sl.max=95; sl.value=42;
        sl.onclick = function(e){ e.stopPropagation(); };
        sl.oninput = function(e){ e.stopPropagation(); setHighlightOpacity(this,rk,this.value/100); };
        el.appendChild(sl);
      }
    });
  }
}

// EXPORT PDF
// ══════════════════════════════════════════════════════════════════════
function exportPDF(){
  // 1. Render current Three.js frame to offscreen at 2x
  renderer.render(scene, camera);
  var globeDataUrl = renderer.domElement.toDataURL('image/png');

  // 2. Compose with annotation canvas
  var W = renderer.domElement.width, H = renderer.domElement.height;
  var comp = document.createElement('canvas');
  comp.width = W; comp.height = H;
  var ctx = comp.getContext('2d');
  ctx.drawImage(renderer.domElement, 0, 0);
  if(annotC) ctx.drawImage(annotC, 0, 0, W, H);

  var imgUrl = comp.toDataURL('image/png');

  var pdf = new jspdf.jsPDF({orientation:'landscape', unit:'mm', format:'a4'});
  pdf.addImage(imgUrl, 'PNG', 0, 0, 297, 210);

  // Info text
  if(currentFeature){
    pdf.setFontSize(16);
    pdf.setTextColor(232,213,176);
    pdf.text(currentFeature.data.name, 10, 195);
  }
  pdf.setFontSize(7);
  pdf.setTextColor(120,120,140);
  pdf.text('CogniSwift 3D Earth Atlas — cogniswift.in  |  Educational use only', 297-10, 207, {align:'right'});

  pdf.save('cogniswift-earth-' + (currentFeature ? currentFeature.key.replace(/\s+/g,'-') : 'globe') + '.pdf');
}

var ANNOT_COLORS = ['#e8d5b0','#4ade80','#60a5fa','#f87171','#c084fc','#fb923c','#ffffff'];
function buildColorPicker(){
  var el = document.getElementById('annotColors');
  el.innerHTML = ANNOT_COLORS.map(function(c){
    return '<div class="color-dot'+(c===annotColor?' sel':'')+'" style="background:'+c+'" onclick="pickAnnotColor(\''+c+'\')"></div>';
  }).join('');
}
function pickAnnotColor(c){
  annotColor = c; buildColorPicker();
}

// ════════════════════════════════════════════════════════════════
// WIKIPEDIA + OSM WATERFALL SEARCH
// Strategy:
// 1. Wikipedia REST API → coordinates + description
// 2. Wikidata → OSM Relation ID → Overpass API → exact polygon
// 3. If no polygon → OSM Nominatim → polygon
// 4. Fallback → point marker
// Wikipedia results integrate into the panel ALONGSIDE other features
// ════════════════════════════════════════════════════════════════

function wikiSearch(){
  var inp = document.getElementById('wikiInput');
  if(!inp) return;
  var raw = inp.value.trim();
  if(!raw){ return; }

  // Extract article title from URL or use as search term
  var titleMatch = raw.match(/wikipedia\.org\/wiki\/([^#?]+)/);
  var title = titleMatch ? decodeURIComponent(titleMatch[1].replace(/_/g,' ')) : raw;

  inp.style.opacity = '0.5';
  inp.disabled = true;

  // Step 1: Wikipedia summary API
  fetch('https://en.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(title.replace(/ /g,'_')))
    .then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); })
    .then(function(data){
      var lat = data.coordinates ? data.coordinates.lat : null;
      var lng = data.coordinates ? data.coordinates.lon : null;
      var desc = data.extract || '';
      var pageTitle = data.title || title;
      var thumb = data.thumbnail ? data.thumbnail.source : null;
      var wikidataId = data.wikibase_item || null;

      // Get exactly 5 complete sentences
      var sentences = _extractSentences(desc, 5);

      // Step 2: Try to get a polygon shape via Wikidata → OSM
      if(wikidataId){
        _fetchOsmViaWikidata(wikidataId, function(osmGeom){
          if(osmGeom){
            _addWikiFeature(pageTitle, lat||0, lng||0, sentences, thumb, osmGeom);
          } else if(lat && lng){
            // Step 3: Try Nominatim
            _fetchNominatim(pageTitle, lat, lng, function(nomGeom){
              _addWikiFeature(pageTitle, lat, lng, sentences, thumb, nomGeom);
            });
          } else {
            _addWikiFeature(pageTitle, 0, 0, sentences, thumb, null);
          }
        });
      } else if(lat && lng){
        _fetchNominatim(pageTitle, lat, lng, function(nomGeom){
          _addWikiFeature(pageTitle, lat, lng, sentences, thumb, nomGeom);
        });
      } else {
        _addWikiFeature(pageTitle, 0, 0, sentences, thumb, null);
      }
    })
    .catch(function(){
      inp.style.opacity='1'; inp.disabled=false;
      inp.style.borderColor='var(--red)';
      setTimeout(function(){ inp.style.borderColor=''; },2000);
    });
}

// Extract exactly N complete sentences from text
function _extractSentences(text, n){
  if(!text) return '';
  // Split on sentence-ending punctuation followed by space or end
  var parts = text.match(/[^.!?]+[.!?]+/g) || [text];
  return parts.slice(0, n).join(' ').trim();
}

// Fetch OSM relation via Wikidata P402 (OSM relation ID)
function _fetchOsmViaWikidata(wikidataId, cb){
  var sparql = 'SELECT ?osm WHERE { wd:'+wikidataId+' wdt:P402 ?osm. }';
  var url = 'https://query.wikidata.org/sparql?format=json&query='+encodeURIComponent(sparql);
  fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(data){
      var bindings = data.results && data.results.bindings;
      if(!bindings || !bindings.length){ cb(null); return; }
      var osmId = bindings[0].osm.value;
      // Fetch polygon from Overpass API
      _fetchOverpassPolygon(osmId, cb);
    })
    .catch(function(){ cb(null); });
}

// Fetch polygon from Overpass API for an OSM relation ID
function _fetchOverpassPolygon(relationId, cb){
  var query = '[out:json];relation('+relationId+');out geom;';
  var url = 'https://overpass-api.de/api/interpreter?data='+encodeURIComponent(query);
  fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(!data.elements || !data.elements.length){ cb(null); return; }
      var el = data.elements[0];
      // Build a rough polygon from the outer members
      var geom = _osmRelationToGeom(el);
      cb(geom);
    })
    .catch(function(){ cb(null); });
}

// Convert OSM relation element to a GeoJSON-like geometry
function _osmRelationToGeom(el){
  if(!el.members) return null;
  var outerRings = [];
  el.members.forEach(function(m){
    if(m.type==='way' && m.role==='outer' && m.geometry){
      var ring = m.geometry.map(function(pt){ return [pt.lon, pt.lat]; });
      outerRings.push(ring);
    }
  });
  if(!outerRings.length) return null;
  if(outerRings.length===1) return {type:'Polygon', coordinates:[outerRings[0]]};
  return {type:'MultiPolygon', coordinates:outerRings.map(function(r){return [r];})};
}

// Fetch polygon from OSM Nominatim
function _fetchNominatim(name, lat, lng, cb){
  // Nominatim search with polygon output
  var url = 'https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(name)+
    '&format=json&polygon_geojson=1&limit=1&viewbox='+(lng-5)+','+(lat+5)+','+(lng+5)+','+(lat-5)+'&bounded=0';
  fetch(url, {headers:{'Accept-Language':'en'}})
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(!data || !data.length){ cb(null); return; }
      var gj = data[0].geojson;
      // Only use polygon results (not just a point)
      if(gj && (gj.type==='Polygon'||gj.type==='MultiPolygon')){
        cb(gj);
      } else {
        cb(null);
      }
    })
    .catch(function(){ cb(null); });
}

// Add a Wikipedia-sourced feature to the panel and globe
// Integrates alongside existing highlights — never wipes them
function _addWikiFeature(title, lat, lng, sentences, thumb, geom){
  var inp = document.getElementById('wikiInput');
  if(inp){ inp.style.opacity='1'; inp.disabled=false; inp.value=''; }

  // Unique key for this wiki feature
  var key = 'wiki_'+normName(title).replace(/\s+/g,'_').slice(0,40)+'_'+Date.now();

  // Register in GEO_FEATURES so the highlight system can paint it
  var ftype = geom ? (
    (geom.type==='Polygon'||geom.type==='MultiPolygon') ? 'region' : 'river'
  ) : 'mountain';

  GEO_FEATURES[key] = {
    name: title, type: ftype, region: 'Wikipedia',
    lat: lat, lng: lng, zoom: 5.5,
    desc: sentences,
    stats: {'Source':'Wikipedia', 'Coordinates': lat.toFixed(4)+'°, '+lng.toFixed(4)+'°'},
    related: [], highlights: [],
    shape: geom ? {type:'geojson', geom:geom} : {type:'point'},
    _wikiThumb: thumb
  };

  // Add to search index
  SEARCH_INDEX.push({
    key:key, name:title, type:ftype, region:'Wikipedia', country:'',
    searchStr:(title+' wikipedia').toLowerCase()
  });

  // Pick a distinct color for this feature
  var wikiColors = ['#f0c060','#60c0f0','#c060f0','#60f0a0','#f06060','#a0f060'];
  var usedCount = Object.keys(activeChips).length;
  var col = wikiColors[usedCount % wikiColors.length];

  // Store highlight
  activeHighlights[key] = {color:col, opacity:0.6};
  activeChips[key] = col;

  // Re-render the panel to include new feature (appended alongside others)
  _refreshWikiPanel();

  // Fly to location and repaint
  if(lat !== 0 || lng !== 0){
    autoRotate = false;
    updateAutoRotateBtn();
    document.getElementById('toolbar').style.display = 'block';
    document.getElementById('exportBar').style.display = 'flex';
    flyTo_(lat, lng, 5.5, function(){ scheduleRepaint(); });
  } else {
    scheduleRepaint();
  }
}

// Render all active wiki features in the panel (appended, not replacing)
function _refreshWikiPanel(){
  // Find all wiki features in activeHighlights
  var wikiEntries = Object.keys(activeHighlights).filter(function(k){ return k.indexOf('wiki_')===0; });
  if(!wikiEntries.length) return;

  // Build a section to append or replace in the panel
  var panelContent = document.getElementById('panelContent');
  var existing = panelContent.innerHTML;

  // Remove any existing wiki section
  var wikiSection = document.getElementById('wikiSection');
  if(wikiSection) wikiSection.remove();

  // Build new wiki section
  var html = '<div id="wikiSection" style="margin-top:10px;border-top:1px solid var(--border);padding-top:10px;">';
  html += '<div style="font-size:0.65rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:8px;">🌐 Wikipedia Features</div>';

  wikiEntries.forEach(function(key){
    var f = GEO_FEATURES[key];
    if(!f) return;
    var hi = activeHighlights[key];
    var col = hi ? hi.color : '#f0c060';
    var rop = hi ? Math.round(hi.opacity*100) : 60;
    var safeKey = key.replace(/'/g,"\'");

    html += '<div class="feat-card" style="margin-bottom:8px;padding:10px;background:var(--surface2);border-radius:var(--r-sm);border-left:3px solid '+col+';">';
    // Thumbnail
    if(f._wikiThumb){
      html += '<img src="'+f._wikiThumb+'" style="width:100%;border-radius:4px;margin-bottom:6px;max-height:90px;object-fit:cover;" />';
    }
    html += '<div style="font-size:0.82rem;font-weight:500;color:var(--text);margin-bottom:4px;">'+esc(f.name)+'</div>';
    html += '<div style="font-size:0.72rem;color:var(--muted);line-height:1.5;margin-bottom:6px;">'+esc(f.desc)+'</div>';
    // Opacity slider
    html += '<div class="opacity-row" style="margin:4px 0;">';
    html += '<span class="opacity-label">Opacity</span>';
    html += '<input type="range" class="opacity-slider" min="5" max="95" value="'+rop+'" ';
    html += 'oninput="setHighlightOpacity(this,\''+safeKey+'\',this.value/100)" />';
    html += '<span class="opacity-val">'+rop+'%</span>';
    html += '</div>';
    // Remove button
    html += '<button onclick="removeWikiFeature(\''+safeKey+'\');" style="font-size:0.62rem;padding:3px 8px;background:none;border:1px solid var(--border);border-radius:4px;color:var(--muted);cursor:pointer;margin-top:4px;">✕ Remove</button>';
    html += '</div>';
  });

  html += '</div>';

  // Append to existing panel content (preserves search results above)
  panelContent.insertAdjacentHTML('beforeend', html);
}

function removeWikiFeature(key){
  delete activeHighlights[key];
  delete activeChips[key];
  delete GEO_FEATURES[key];
  scheduleRepaint();
  _refreshWikiPanel();
}


function updateAutoRotateBtn(){
  var btn = document.getElementById('autoRotBtn');
  if(!btn) return;
  btn.style.background = autoRotate ? 'rgba(var(--accent-rgb,232,213,176),0.15)' : '';
  btn.style.borderColor = autoRotate ? 'rgba(232,213,176,0.4)' : '';
  btn.style.color = autoRotate ? 'var(--accent)' : '';
  btn.title = autoRotate ? 'Auto-rotate: ON — click to stop' : 'Auto-rotate: OFF — click to start';
}
function toggleAutoRotate(){
  autoRotate = !autoRotate;
  updateAutoRotateBtn();
}

// Close suggestions when clicking outside
document.addEventListener('click', function(e){
  if(!e.target.closest('.search-wrap')) document.getElementById('suggestions').style.display='none';
});

// ══════════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════════
window.addEventListener('load', function(){
  var fill = document.getElementById('loadFill');
  var progress = 0;
  var loadInterval = setInterval(function(){
    progress = Math.min(90, progress + Math.random() * 15);
    fill.style.width = progress + '%';
  }, 150);

  // Give Three.js time to set up
  setTimeout(function(){
    initGlobe();
    setupAnnotCanvas();
    setupAnnotInteractions();
    buildColorPicker();
    // Load Natural Earth data for precise coast-following highlights
    loadNaturalEarthData();

    clearInterval(loadInterval);
    fill.style.width = '100%';
    setTimeout(function(){
      document.getElementById('loading').style.opacity = '0';
      document.getElementById('loading').style.transition = 'opacity 0.5s';
      setTimeout(function(){ document.getElementById('loading').style.display = 'none'; }, 500);
    }, 300);
  }, 400);
});
</script>
