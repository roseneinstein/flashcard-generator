// ══════════════════════════════════════════════════════════════════════════════
// TOOL 8 — PAGE TOOLS (numbers/watermark + rotate + reorder)
// ══════════════════════════════════════════════════════════════════════════════
function ToolPageTools(){
  var fileS=useState(null),setFile=fileS[1];var file=fileS[0];
  var totalS=useState(0),setTotal=totalS[1];var total=totalS[0];
  var activeTabS=useState('numbers'),setActiveTab=activeTabS[1];var activeTab=activeTabS[0];

  // Page numbers / watermark
  var numPosS=useState('bottom-center'),setNumPos=numPosS[1];var numPos=numPosS[0];
  var numStartS=useState(1),setNumStart=numStartS[1];var numStart=numStartS[0];
  var wmTextS=useState(''),setWmText=wmTextS[1];var wmText=wmTextS[0];
  var wmOpacS=useState(30),setWmOpac=wmOpacS[1];var wmOpac=wmOpacS[0];
  var wmSizeS=useState(44),setWmSize=wmSizeS[1];var wmSize=wmSizeS[0];

  // Rotate
  var rotAngleS=useState(90),setRotAngle=rotAngleS[1];var rotAngle=rotAngleS[0];
  var rotTargetS=useState('all'),setRotTarget=rotTargetS[1];var rotTarget=rotTargetS[0];
  var rotPagesS=useState(''),setRotPages=rotPagesS[1];var rotPages=rotPagesS[0];

  // Reorder
  var thumbsS=useState([]),setThumbs=thumbsS[1];var thumbs=thumbsS[0];
  var orderS=useState([]),setOrder=orderS[1];var order=orderS[0];
  var shownS=useState(9),setShown=shownS[1];var shown=shownS[0];
  var dragIdxS=useState(null),setDragIdx=dragIdxS[1];var dragIdx=dragIdxS[0];

  var statusS=useState(''),setSt=statusS[1];var status=statusS[0];
  var stTypeS=useState(''),setStType=stTypeS[1];var stType=stTypeS[0];
  function setStatus(msg,type){setSt(msg);setStType(type||'');}

  async function onFile(f){
    if(!f)return;
    setFile(f);setThumbs([]);setStatus('Loading…');
    loadPdfJs(async function(pdfjs){
      if(!pdfjs){setStatus('Failed to load PDF viewer','err');return;}
      try{
        var buf=await readBuf(f);
        var pdf=await pdfjs.getDocument({data:new Uint8Array(buf)}).promise;
        var n=pdf.numPages;
        setTotal(n);
        setOrder(Array.from({length:n},function(_,i){return i;}));
        var results=[];
        for(var i=1;i<=n;i++){
          var page=await pdf.getPage(i);
          var vp=page.getViewport({scale:0.3});
          var cv=document.createElement('canvas');
          cv.width=Math.round(vp.width);cv.height=Math.round(vp.height);
          await page.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;
          results.push(cv.toDataURL('image/jpeg',0.6));
          if(i%9===0||i===n)setThumbs(results.slice());
        }
        setStatus('');
      }catch(err){setStatus('Cannot read PDF: '+err.message,'err');}
    });
  }

  function parsePages(str,tot){
    var out=[];
    str.split(',').forEach(function(part){
      part=part.trim();
      if(part.indexOf('-')>0){var p=part.split('-');var a=parseInt(p[0])-1,b=parseInt(p[1])-1;for(var i=a;i<=b&&i<tot;i++)if(i>=0)out.push(i);}
      else{var n=parseInt(part)-1;if(!isNaN(n)&&n>=0&&n<tot)out.push(n);}
    });
    return out.filter(function(v,i,arr){return arr.indexOf(v)===i;});
  }

  async function applyNumbers(){
    if(!file){setStatus('Upload a PDF first','err');return;}
    setStatus('Adding page numbers…');
    loadPdfLib(async function(PDFLib){
      if(!PDFLib){setStatus('Failed to load PDF engine','err');return;}
      try{
        var buf=await readBuf(file);
        var doc=await PDFLib.PDFDocument.load(buf,{ignoreEncryption:true});
        var font=await doc.embedFont(PDFLib.StandardFonts.Helvetica);
        var pages=doc.getPages();
        pages.forEach(function(pg,i){
          var sz=pg.getSize();var txt=''+(i+parseInt(numStart||1));
          var tw=font.widthOfTextAtSize(txt,11);
          var positions={
            'bottom-center':{x:(sz.width-tw)/2,y:18},
            'bottom-right':{x:sz.width-tw-20,y:18},
            'bottom-left':{x:20,y:18},
            'top-center':{x:(sz.width-tw)/2,y:sz.height-24},
            'top-right':{x:sz.width-tw-20,y:sz.height-24},
            'top-left':{x:20,y:sz.height-24},
          };
          var pos=positions[numPos]||positions['bottom-center'];
          pg.drawText(txt,{x:pos.x,y:pos.y,size:11,font:font,color:PDFLib.rgb(0.3,0.3,0.3)});
        });
        if(wmText.trim()){
          pages.forEach(function(pg){
            var sz=pg.getSize();
            var wmSizePt=wmSize; // user-controlled
            var wmW=font.widthOfTextAtSize(wmText,wmSizePt);
            var wmH=wmSizePt*0.7;
            pg.drawText(wmText,{
              x:(sz.width-wmW*Math.cos(35*Math.PI/180)+wmH*Math.sin(35*Math.PI/180))/2,
              y:(sz.height-wmW*Math.sin(35*Math.PI/180)-wmH*Math.cos(35*Math.PI/180))/2,
              size:wmSizePt,font:font,
              color:PDFLib.rgb(0.5,0.5,0.5),
              opacity:wmOpac/100,
              rotate:PDFLib.degrees(35),
            });
          });
        }
        var bytes=await doc.save();
        dlBlob(new Blob([bytes],{type:'application/pdf'}),basename(file.name)+'_numbered.pdf');
        setStatus('Done — page numbers added','ok');
      }catch(err){setStatus('Error: '+err.message,'err');}
    });
  }

  async function applyRotate(){
    if(!file){setStatus('Upload a PDF first','err');return;}
    setStatus('Rotating pages…');
    loadPdfLib(async function(PDFLib){
      if(!PDFLib){setStatus('Failed to load PDF engine','err');return;}
      try{
        var buf=await readBuf(file);
        var doc=await PDFLib.PDFDocument.load(buf,{ignoreEncryption:true});
        var pages=doc.getPages();
        var targets=rotTarget==='all'
          ?pages.map(function(_,i){return i;})
          :parsePages(rotPages,pages.length);
        targets.forEach(function(i){
          var pg=pages[i];
          var cur=pg.getRotation().angle;
          pg.setRotation(PDFLib.degrees((cur+parseInt(rotAngle))%360));
        });
        var bytes=await doc.save();
        dlBlob(new Blob([bytes],{type:'application/pdf'}),basename(file.name)+'_rotated.pdf');
        setStatus('Done — '+targets.length+' page'+(targets.length!==1?'s':'')+' rotated','ok');
      }catch(err){setStatus('Error: '+err.message,'err');}
    });
  }

  async function applyReorder(){
    if(!file){setStatus('Upload a PDF first','err');return;}
    setStatus('Reordering pages…');
    loadPdfLib(async function(PDFLib){
      if(!PDFLib){setStatus('Failed to load PDF engine','err');return;}
      try{
        var buf=await readBuf(file);
        var src=await PDFLib.PDFDocument.load(buf,{ignoreEncryption:true});
        var out=await PDFLib.PDFDocument.create();
        var copied=await out.copyPages(src,order);
        copied.forEach(function(p){out.addPage(p);});
        var bytes=await out.save();
        dlBlob(new Blob([bytes],{type:'application/pdf'}),basename(file.name)+'_reordered.pdf');
        setStatus('Done — pages reordered','ok');
      }catch(err){setStatus('Error: '+err.message,'err');}
    });
  }

  function onDragStart(idx){setDragIdx(idx);}
  function onDragOver(ev,idx){
    ev.preventDefault();
    if(dragIdx===null||dragIdx===idx)return;
    setOrder(function(prev){
      var a=prev.slice();
      var item=a.splice(dragIdx,1)[0];
      a.splice(idx,0,item);
      return a;
    });
    setThumbs(function(prev){
      var a=prev.slice();
      var item=a.splice(dragIdx,1)[0];
      a.splice(idx,0,item);
      return a;
    });
    setDragIdx(idx);
  }
  function onDragEnd(){setDragIdx(null);}

  var visibleOrder=order.slice(0,shown);

  return e('div',null,
    e(DropZone,{accept:'.pdf,application/pdf',icon:'📄',
      hasFile:!!file,fileLabel:file?(file.name+' · '+total+' pages'):'',
      label:'Drop PDF here or click to browse',
      onFiles:function(fs){onFile(fs[0]);}}),

    file&&total>0&&e('div',null,
      e('div',{className:'ptab-row'},
        e('button',{className:'ptab'+(activeTab==='numbers'?' sel':''),onClick:function(){setActiveTab('numbers');setStatus('');}
        },'📝 Numbers & Watermark'),
        e('button',{className:'ptab'+(activeTab==='rotate'?' sel':''),onClick:function(){setActiveTab('rotate');setStatus('');}
        },'🔄 Rotate Pages'),
        e('button',{className:'ptab'+(activeTab==='reorder'?' sel':''),onClick:function(){setActiveTab('reorder');setStatus('');}
        },'⇅ Reorder Pages')
      ),

      // ── Tab: Numbers & Watermark ──
      activeTab==='numbers'&&e('div',null,
        e('div',{className:'resize-grid',style:{marginBottom:8}},
          e('div',{className:'resize-field'},
            e('label',null,'Number position'),
            e('select',{value:numPos,onChange:function(ev){setNumPos(ev.target.value);}},
              e('option',{value:'bottom-center'},'Bottom centre'),
              e('option',{value:'bottom-right'},'Bottom right'),
              e('option',{value:'bottom-left'},'Bottom left'),
              e('option',{value:'top-center'},'Top centre'),
              e('option',{value:'top-right'},'Top right'),
              e('option',{value:'top-left'},'Top left')
            )
          ),
          e('div',{className:'resize-field'},
            e('label',null,'Start number'),
            e('input',{type:'number',min:0,value:numStart,onChange:function(ev){setNumStart(ev.target.value);}})
          )
        ),
        e('div',{className:'note',style:{marginBottom:8}},'Optionally add a watermark text on every page:'),
        e('div',{className:'resize-grid'},
          e('div',{className:'resize-field'},
            e('label',null,'Watermark text (optional)'),
            e('input',{type:'text',placeholder:'e.g. CONFIDENTIAL',value:wmText,style:{width:'100%'},
              onChange:function(ev){setWmText(ev.target.value);}})
          )
        ),
        wmText&&e('div',null,
          e('div',{className:'resize-grid',style:{marginBottom:8}},
            e('div',{className:'resize-field'},
              e('label',null,'Opacity: '+wmOpac+'%'),
              e('input',{type:'range',min:5,max:80,value:wmOpac,style:{width:'100%',marginTop:6},
                onChange:function(ev){setWmOpac(parseInt(ev.target.value));}})
            ),
            e('div',{className:'resize-field'},
              e('label',null,'Size: '+wmSize+'pt'),
              e('input',{type:'range',min:18,max:96,value:wmSize,style:{width:'100%',marginTop:6},
                onChange:function(ev){setWmSize(parseInt(ev.target.value));}})
            )
          ),
          // Live preview canvas
          e('div',{className:'note',style:{marginBottom:6,paddingBottom:6}},'Preview:'),
          e('canvas',{
            width:300,height:212,
            style:{width:'100%',maxWidth:300,height:'auto',border:'1px solid var(--border)',borderRadius:'var(--r-sm)',background:'#fff',display:'block',margin:'0 auto 8px'},
            ref:function(cv){
              if(!cv||!wmText)return;
              var ctx=cv.getContext('2d');
              ctx.clearRect(0,0,300,212);
              ctx.fillStyle='#fff';ctx.fillRect(0,0,300,212);
              ctx.save();
              ctx.font='bold '+Math.round(wmSize*300/595)+'px Geist,sans-serif';
              ctx.fillStyle='rgba(80,80,80,'+(wmOpac/100)+')';
              ctx.translate(150,106);ctx.rotate(-35*Math.PI/180);
              var tw=ctx.measureText(wmText).width;
              ctx.fillText(wmText,-tw/2,Math.round(wmSize*300/595)/3);
              ctx.restore();
            }
          })
        ),
        e('div',{className:'row'},
          e('button',{className:'btn pri',disabled:!file,onClick:applyNumbers},'Apply to PDF')
        )
      ),

      // ── Tab: Rotate ──
      activeTab==='rotate'&&e('div',null,
        e('div',{className:'resize-grid',style:{marginBottom:8}},
          e('div',{className:'resize-field'},
            e('label',null,'Rotation'),
            e('select',{value:rotAngle,onChange:function(ev){setRotAngle(ev.target.value);}},
              e('option',{value:90},'90° clockwise'),
              e('option',{value:270},'90° counter-clockwise'),
              e('option',{value:180},'180°')
            )
          ),
          e('div',{className:'resize-field'},
            e('label',null,'Apply to'),
            e('select',{value:rotTarget,onChange:function(ev){setRotTarget(ev.target.value);}},
              e('option',{value:'all'},'All pages'),
              e('option',{value:'custom'},'Custom pages')
            )
          )
        ),
        rotTarget==='custom'&&e('div',{style:{marginBottom:8}},
          e('span',{className:'label'},'Pages (e.g. 1-3, 5, 7-10): '),
          e('input',{className:'range-input',value:rotPages,placeholder:'1-'+total,
            onChange:function(ev){setRotPages(ev.target.value);}})
        ),
        e('div',{className:'row'},
          e('button',{className:'btn pri',disabled:!file,onClick:applyRotate},'Rotate & Download')
        )
      ),

      // ── Tab: Reorder ──
      activeTab==='reorder'&&e('div',null,
        e('div',{className:'note',style:{marginBottom:8}},'Drag pages to reorder. Changes are reflected immediately.'),
        e('div',{className:'reorder-grid'},
          visibleOrder.map(function(origIdx,dispIdx){
            return e('div',{key:origIdx,className:'reorder-thumb'+(dragIdx===dispIdx?' drag-over':''),
              draggable:true,
              onDragStart:function(){onDragStart(dispIdx);},
              onDragOver:function(ev){onDragOver(ev,dispIdx);},
              onDragEnd:onDragEnd,
            },
              thumbs[dispIdx]?e('img',{src:thumbs[dispIdx],alt:'p'+(origIdx+1)}):
                e('div',{style:{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'0.65rem',color:'var(--muted2)'}},'p'+(origIdx+1)),
              e('div',{className:'reorder-pg-num'},'p'+(origIdx+1))
            );
          })
        ),
        order.length>shown&&e('button',{className:'load-more-btn',
          onClick:function(){setShown(function(s){return Math.min(s+9,order.length);});}
        },'Load more ↓ ('+(order.length-shown)+' remaining)'),
        e('div',{className:'row'},
          e('button',{className:'btn pri',disabled:!file,onClick:applyReorder},'Save reordered PDF'),
          e('button',{className:'btn sec',onClick:function(){
            var orig=Array.from({length:total},function(_,i){return i;});
            setOrder(orig);
            loadPdfJs(async function(pdfjs){
              if(!pdfjs||!file)return;
              var buf=await readBuf(file);
              var pdf=await pdfjs.getDocument({data:new Uint8Array(buf)}).promise;
              var results=[];
              for(var i=1;i<=total;i++){
                var pg=await pdf.getPage(i);var vp=pg.getViewport({scale:0.3});
                var cv=document.createElement('canvas');cv.width=Math.round(vp.width);cv.height=Math.round(vp.height);
                await pg.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;
                results.push(cv.toDataURL('image/jpeg',0.6));
              }
              setThumbs(results);
            });
          }},'Reset order')
        )
      )
    ),
    e('div',{className:'status '+stType},status)
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════════════════════════════════════════
var TOOLS=[
  {id:'graph',    icon:'📈', title:'Graphing Calculator',desc:'Plot any function, find roots and inflection points, compute areas, mark points and measure distances — all offline in your browser.',external:'/graphing-calculator.html'},
  {id:'annotate', icon:'✏️', title:'Annotate PDF',      desc:'Draw, highlight, add text, arrows and images directly on any PDF page.',  Comp:ToolAnnotate},
  {id:'imgres',   icon:'⬛', title:'Image Resizer',     desc:'Resize any image by pixels or inches@DPI, with quality and size control.', Comp:ToolImgResize},
  {id:'merge',    icon:'📑', title:'Merge PDFs',        desc:'Combine multiple PDFs into one document in any order.',                    Comp:ToolMerge},
  {id:'split',    icon:'✂️', title:'Split PDF',         desc:'Extract specific pages visually or by entering a page range.',             Comp:ToolSplit},
  {id:'compress', icon:'📦', title:'Compress PDF',      desc:'Reduce PDF file size with mild, standard, or hard compression.',           Comp:ToolCompress},
  {id:'pagetools',icon:'📐', title:'Page Tools',        desc:'Add page numbers or watermark, rotate pages, or reorder pages.',           Comp:ToolPageTools},
  {id:'imgpdf',   icon:'📷', title:'Images to PDF',     desc:'Combine JPEG, PNG or WebP images into a single PDF document.',             Comp:ToolImgPdf},
  {id:'pdfimg',   icon:'🖼', title:'PDF to Images',     desc:'Convert each PDF page to JPEG or PNG — downloaded as a single ZIP.',      Comp:ToolPdfImg},
];

function App(){
  var openS=useState(null),setOpen=openS[1];var open=openS[0];
  return e('div',null,
    TOOLS.map(function(tool){
      var isOpen=open===tool.id;
      return e('div',{key:tool.id,className:'tool',
        onMouseMove:function(ev){
          var el=ev.currentTarget;
          var b=el.getBoundingClientRect();
          el.style.setProperty('--mx',((ev.clientX-b.left)/b.width*100)+'%');
          el.style.setProperty('--my',((ev.clientY-b.top)/b.height*100)+'%');
        }
      },
        e('button',{className:'tool-hdr',onClick:function(){
            if(tool.external){
              var theme=document.documentElement.classList.contains('light-theme')?'light':'dark';
              window.open(tool.external+'?theme='+theme,'_blank');
            }else{setOpen(isOpen?null:tool.id);}
          }},
          e('span',{className:'tool-ico'},tool.icon),
          e('div',{className:'tool-info'},
            e('div',{className:'tool-title'},tool.title),
            e('div',{className:'tool-desc'},tool.desc)
          ),
          e('span',{className:'tool-chev'+(isOpen?' open':'')},tool.external?'↗':'▼')
        ),
        isOpen&&e('div',{className:'tool-body'},e(tool.Comp))
      );
    }),
    e('div',{className:'privacy'},
      e('span',null,'\uD83D\uDD12'),
      e('span',null,'All processing happens entirely on your device — your files are never uploaded to any server.')
    )
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(e(App));
</script>
</body>
</html>
