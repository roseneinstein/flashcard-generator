<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CogniSwift Resources</title>
<style>
/* Theme driven by ?theme= URL param passed from parent site */
:root{
  --bg:#22203a;--surface:#2a2740;--surface2:#322e4a;
  --border:#ffffff1e;--text:#ededf0;--muted:#9898b8;--muted2:#4a4a60;
  --accent:#e8d5b0;--red:#ef4444;--r:14px;--r-sm:8px;
}
.light-theme{
  --bg:#f4f1eb;--surface:#fdfcf8;--surface2:#edeae2;
  --border:#00000011;--text:#1e1b14;--muted:#7a7060;--muted2:#c0b89e;--accent:#9a7c3f;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);}body{font-family:'Geist',system-ui,sans-serif;background:var(--bg);color:var(--text);
  font-size:14px;line-height:1.5;padding:14px 16px 24px;overflow-x:hidden;}
/* Tool cards */
.tool{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  margin-bottom:10px;overflow:hidden;
  transition:transform .45s cubic-bezier(.22,1,.36,1),box-shadow .45s cubic-bezier(.22,1,.36,1),background .2s,border-color .2s;
  position:relative;z-index:1;
}
.tool:hover{
  transform:translateY(-5px) scale(1.018);
  background:var(--surface2);
  border-color:rgba(232,213,176,0.18);
  box-shadow:0 16px 48px rgba(0,0,0,0.45),0 0 0 1px rgba(232,213,176,0.1);
  z-index:10;
}
.tool::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(circle at var(--mx,50%) var(--my,50%),rgba(232,213,176,0.08) 0%,transparent 60%);
  opacity:0;transition:opacity .3s;border-radius:var(--r);
}
.tool:hover::before{opacity:1;}
.tool-hdr{display:flex;align-items:center;gap:14px;padding:18px 20px;cursor:pointer;
  width:100%;background:none;border:none;text-align:left;color:var(--text);}
.tool-ico{font-size:1.2rem;opacity:0.55;flex-shrink:0;width:28px;text-align:center;margin-top:1px;}
.tool-info{flex:1;}
.tool-title{font-size:1.05rem;font-weight:400;color:var(--text);margin-bottom:4px;
  font-family:'Instrument Serif',Georgia,serif;letter-spacing:-0.01em;}
.tool-desc{font-size:0.78rem;color:var(--muted);font-weight:300;line-height:1.55;}
.tool-chev{font-size:0.6rem;color:var(--muted);transition:transform .22s;margin-left:auto;flex-shrink:0;}
.tool-chev.open{transform:rotate(180deg);}
.tool-body{padding:14px 16px 16px;border-top:1px solid var(--border);animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-3px);}to{opacity:1;transform:none;}}
/* Upload area */
.drop{border:1.5px dashed var(--border);border-radius:var(--r-sm);padding:20px;
  text-align:center;cursor:pointer;margin:12px 0 8px;transition:border-color .2s,background .2s;
  font-size:0.76rem;color:var(--muted);line-height:1.7;user-select:none;}
.drop:hover,.drop.over{border-color:var(--accent);background:rgba(232,213,176,0.04);}
.drop.has{border-color:rgba(74,222,128,0.45);background:rgba(74,222,128,0.04);color:var(--text);}
.drop-ico{font-size:1.3rem;margin-bottom:6px;}
.drop-hint{font-size:0.67rem;color:var(--muted2);margin-top:2px;}
/* Buttons */
.btn{padding:7px 18px;border-radius:50px;font-size:0.73rem;font-family:inherit;
  cursor:pointer;transition:all .14s;font-weight:500;border:1px solid;white-space:nowrap;}
.btn.pri{background:var(--accent);border-color:var(--accent);color:#1e1b14;}
.btn.pri:hover{opacity:0.88;}
.btn.pri:disabled{opacity:0.35;cursor:not-allowed;}
.btn.sec{background:transparent;border-color:var(--border);color:var(--muted);}
.btn.sec:hover{border-color:var(--accent);color:var(--accent);}
.btn.sec:disabled{opacity:0.35;cursor:not-allowed;}
/* Rows */
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:8px;}
.label{font-size:0.7rem;color:var(--muted);letter-spacing:0.02em;}
input[type=text],input[type=number],.inp{
  background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);
  color:var(--text);font-size:0.76rem;padding:5px 9px;font-family:inherit;
  width:80px;text-align:center;}
input[type=text]:focus,input[type=number]:focus,.inp:focus{outline:none;border-color:var(--accent);}
select,.sel{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);
  color:var(--text);font-size:0.74rem;padding:5px 8px;font-family:inherit;}
/* File list */
.flist{margin:8px 0;display:flex;flex-direction:column;gap:4px;}
.fitem{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;
  background:var(--surface2);border-radius:6px;font-size:0.73rem;color:var(--text);gap:8px;}
.fitem .fname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.fitem .fsize{color:var(--muted);font-size:0.67rem;flex-shrink:0;}
.frm{background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.82rem;
  padding:0 4px;flex-shrink:0;line-height:1;}
.frm:hover{color:var(--red);}
/* Status */
.status{font-size:0.72rem;color:var(--muted);margin-top:6px;min-height:16px;line-height:1.5;}
.status.ok{color:#4ade80;}
.status.err{color:var(--red);}
/* PDF page grid (split tool) */
.pg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0;}
.pg-thumb{position:relative;border-radius:6px;overflow:hidden;border:1.5px solid var(--border);
  aspect-ratio:0.707;background:var(--surface2);cursor:pointer;transition:border-color .15s;}
.pg-thumb:hover{border-color:var(--accent);}
.pg-thumb.sel{border-color:#4ade80;background:rgba(74,222,128,0.06);}
.pg-thumb canvas{width:100%;height:100%;display:block;object-fit:contain;}
.pg-thumb .pg-num{position:absolute;bottom:4px;left:0;right:0;text-align:center;
  font-size:0.6rem;color:var(--muted);pointer-events:none;}
.pg-thumb .pg-x{position:absolute;top:3px;right:3px;width:18px;height:18px;
  background:rgba(239,68,68,0.8);border:none;border-radius:50%;color:#fff;
  font-size:0.6rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
  line-height:1;padding:0;font-family:inherit;}
.pg-thumb .pg-x:hover{background:rgba(239,68,68,1);}
.pg-thumb.removed{opacity:0.25;pointer-events:none;}
.load-more-btn{width:100%;padding:8px;font-size:0.73rem;text-align:center;cursor:pointer;
  border-radius:var(--r-sm);border:1px dashed var(--border);background:none;
  color:var(--muted);transition:all .15s;margin-top:4px;font-family:inherit;}
.load-more-btn:hover{border-color:var(--accent);color:var(--accent);}
/* Range input (split) */
.range-row{display:flex;align-items:center;gap:8px;margin:6px 0;flex-wrap:wrap;}
.range-input{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);
  color:var(--text);font-size:0.74rem;padding:5px 10px;font-family:inherit;width:180px;}
.range-input:focus{outline:none;border-color:var(--accent);}
/* Compression level buttons */
.comp-opts{display:flex;gap:8px;margin:10px 0;}
.comp-opt{flex:1;padding:8px 4px;border:1px solid var(--border);border-radius:var(--r-sm);
  background:transparent;color:var(--muted);font-size:0.74rem;cursor:pointer;
  font-family:inherit;transition:all .15s;text-align:center;}
.comp-opt:hover{border-color:var(--accent);color:var(--accent);}
.comp-opt.sel{border-color:var(--accent);background:rgba(232,213,176,0.08);color:var(--accent);font-weight:500;}
/* Image resizer controls */
.resize-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0;}
.resize-field{display:flex;flex-direction:column;gap:4px;}
.resize-field label{font-size:0.68rem;color:var(--muted);letter-spacing:0.03em;}
.resize-field input,.resize-field select{background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r-sm);color:var(--text);font-size:0.76rem;padding:6px 10px;
  font-family:inherit;width:100%;}
.resize-field input:focus,.resize-field select:focus{outline:none;border-color:var(--accent);}
.resize-mode-tab{display:flex;gap:0;border:1px solid var(--border);border-radius:var(--r-sm);
  overflow:hidden;margin:10px 0;}
.resize-mode-opt{flex:1;padding:6px 10px;background:none;border:none;color:var(--muted);
  font-size:0.72rem;cursor:pointer;font-family:inherit;transition:all .15s;}
.resize-mode-opt.sel{background:var(--surface2);color:var(--text);font-weight:500;}
.lock-ratio{display:flex;align-items:center;gap:6px;font-size:0.72rem;color:var(--muted);cursor:pointer;margin-top:4px;}
/* Annotate tool */
.ann-toolbar{display:flex;flex-wrap:wrap;gap:6px;padding:8px 0;margin-bottom:8px;border-bottom:1px solid var(--border);}
.ann-tool-btn{padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:none;
  color:var(--muted);font-size:0.71rem;cursor:pointer;font-family:inherit;transition:all .14s;white-space:nowrap;}
.ann-tool-btn:hover,.ann-tool-btn.sel{border-color:var(--accent);color:var(--accent);background:rgba(232,213,176,0.06);}
.ann-colors{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin:6px 0;}
.ann-color-swatch{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .14s;flex-shrink:0;}
.ann-color-swatch.sel{border-color:var(--text);}
.ann-canvas-wrap{position:relative;overflow:hidden;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surface2);margin:8px 0;touch-action:none;}
.ann-canvas-wrap canvas{display:block;max-width:100%;cursor:crosshair;}
@keyframes spin{to{transform:rotate(360deg);}}
.ann-size-row{display:flex;align-items:center;gap:8px;margin:4px 0;}
.ann-pg-nav{display:flex;align-items:center;gap:8px;margin:6px 0;font-size:0.74rem;color:var(--muted);}
/* Page tools tabs */
.ptab-row{display:flex;gap:0;border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden;margin:10px 0;}
.ptab{flex:1;padding:7px 10px;background:none;border:none;color:var(--muted);font-size:0.73rem;
  cursor:pointer;font-family:inherit;transition:all .14s;text-align:center;}
.ptab.sel{background:var(--surface2);color:var(--text);font-weight:500;}
/* Reorder drag grid */
.reorder-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0;}
.reorder-thumb{position:relative;border-radius:6px;overflow:hidden;border:1.5px solid var(--border);
  aspect-ratio:0.707;background:var(--surface2);cursor:grab;user-select:none;transition:border-color .15s,opacity .15s;}
.reorder-thumb:active{cursor:grabbing;opacity:0.7;}
.reorder-thumb.drag-over{border-color:var(--accent);background:rgba(232,213,176,0.06);}
.reorder-thumb img{width:100%;height:100%;object-fit:contain;pointer-events:none;}
.reorder-pg-num{position:absolute;bottom:3px;left:0;right:0;text-align:center;
  font-size:0.6rem;color:var(--muted);pointer-events:none;}
/* Privacy footer */
.privacy{font-size:0.63rem;color:var(--muted2);display:flex;align-items:center;gap:5px;
  margin-top:16px;padding-top:12px;border-top:1px solid var(--border);opacity:0.75;}
/* Range slider */
input[type=range]{accent-color:var(--accent);cursor:pointer;}
/* Info note */
.note{font-size:0.69rem;color:var(--muted);line-height:1.55;margin:6px 0;
  padding:6px 10px;background:var(--surface2);border-radius:6px;border-left:2px solid var(--border);}
/* Progress bar */
.prog-bar{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;margin:6px 0;}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s;}
</style>

<script>
// Apply theme from URL param immediately — before React loads
(function(){
  var p=new URLSearchParams(window.location.search).get('theme');
  if(p==='light')document.documentElement.classList.add('light-theme');
  // Also listen for theme changes from parent via postMessage
  window.addEventListener('message',function(ev){
    if(ev.data&&ev.data.type==='cs-theme'){
      if(ev.data.theme==='light')document.documentElement.classList.add('light-theme');
      else document.documentElement.classList.remove('light-theme');
    }
  });
})();
</script>
<div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script>
var e=React.createElement,useState=React.useState,useRef=React.useRef,useEffect=React.useEffect,useCallback=React.useCallback;

// ── Utilities ────────────────────────────────────────────────────────────────
var _pdfLib=null;
function loadPdfLib(cb){
  if(_pdfLib){cb(_pdfLib);return;}
  if(window.PDFLib){_pdfLib=window.PDFLib;cb(_pdfLib);return;}
  var s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js';
  s.onload=function(){_pdfLib=window.PDFLib;cb(_pdfLib);};
  s.onerror=function(){cb(null);};
  document.head.appendChild(s);
}

var _pdfJs=null;
function loadPdfJs(cb){
  if(_pdfJs){cb(_pdfJs);return;}
  if(window.pdfjsLib){_pdfJs=window.pdfjsLib;cb(_pdfJs);return;}
  var s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
  s.onload=function(){
    window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    _pdfJs=window.pdfjsLib;cb(_pdfJs);
  };
  s.onerror=function(){cb(null);};
  document.head.appendChild(s);
}

var _jszip=null;
function loadJSZip(cb){
  if(_jszip){cb(_jszip);return;}
  if(window.JSZip){_jszip=window.JSZip;cb(_jszip);return;}
  var s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
  s.onload=function(){_jszip=window.JSZip;cb(_jszip);};
  s.onerror=function(){cb(null);};
  document.head.appendChild(s);
}

function dlBlob(blob,name){
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download=name;
  document.body.appendChild(a);a.click();
  setTimeout(function(){URL.revokeObjectURL(url);a.remove();},2000);
}
function readBuf(file){return new Promise(function(res,rej){var r=new FileReader();r.onload=function(ev){res(ev.target.result);};r.onerror=rej;r.readAsArrayBuffer(file);});}
function fmtBytes(b){if(!b)return '0B';if(b<1024)return b+'B';if(b<1048576)return (b/1024).toFixed(0)+'KB';return (b/1048576).toFixed(1)+'MB';}
function basename(name){return name.replace(/\.[^.]+$/,'');}

// ── Drop zone helper ─────────────────────────────────────────────────────────
function DropZone(props){
  var refI=useRef();
  function onDragOver(ev){ev.preventDefault();}
  function onDrop(ev){ev.preventDefault();if(props.onFiles)props.onFiles(ev.dataTransfer.files);}
  return e('div',{className:'drop'+(props.hasFile?' has':'')+(props.className?' '+props.className:''),
    onClick:function(){refI.current.click();},onDragOver:onDragOver,onDrop:onDrop},
    e('div',{className:'drop-ico'},props.icon||'📄'),
    props.hasFile?e('div',null,props.fileLabel||'File selected',e('div',{className:'drop-hint'},'Click to replace'))
      :e('div',null,props.label||'Drop file here or click to browse',e('div',{className:'drop-hint'},props.hint||'')),
    e('input',{ref:refI,type:'file',accept:props.accept,multiple:props.multiple,style:{display:'none'},
      onChange:function(ev){if(props.onFiles)props.onFiles(ev.target.files);ev.target.value='';}})
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// TOOL 1 — MERGE PDFs
// ══════════════════════════════════════════════════════════════════════════════
function ToolMerge(){
  var filesS=useState([]),setFiles=filesS[1];var files=filesS[0];
  var statusS=useState(''),setSt=statusS[1];var status=statusS[0];
  var stTypeS=useState(''),setStType=stTypeS[1];var stType=stTypeS[0];
  function setStatus(msg,type){setSt(msg);setStType(type||'');}

  function addFiles(newFiles){
    var pdfs=Array.from(newFiles).filter(function(f){return f.type==='application/pdf'||f.name.endsWith('.pdf');});
    setFiles(function(prev){return prev.concat(pdfs);});
  }
  function remove(i){setFiles(function(prev){return prev.filter(function(_,idx){return idx!==i;});});}

  async function merge(){
    if(files.length<2){setStatus('Upload at least 2 PDF files','err');return;}
    setStatus('Merging '+files.length+' files…');
    loadPdfLib(async function(PDFLib){
      if(!PDFLib){setStatus('Failed to load PDF engine','err');return;}
      try{
        var merged=await PDFLib.PDFDocument.create();
        for(var i=0;i<files.length;i++){
          var buf=await readBuf(files[i]);
          var doc=await PDFLib.PDFDocument.load(buf,{ignoreEncryption:true});
          var pages=await merged.copyPages(doc,doc.getPageIndices());
          pages.forEach(function(p){merged.addPage(p);});
        }
        var bytes=await merged.save({useObjectStreams:true});
        dlBlob(new Blob([bytes],{type:'application/pdf'}),'merged.pdf');
        setStatus('Done — merged.pdf downloaded ('+fmtBytes(bytes.length)+')','ok');
      }catch(err){setStatus('Error: '+err.message,'err');}
    });
  }

  return e('div',null,
    e(DropZone,{accept:'.pdf,application/pdf',multiple:true,icon:'📑',
      label:'Drop PDFs here or click to browse',hint:'Select multiple files',
      onFiles:addFiles}),
    files.length>0&&e('div',{className:'flist'},
      files.map(function(f,i){
        return e('div',{key:i,className:'fitem'},
          e('span',{className:'fname'},f.name),
          e('span',{className:'fsize'},fmtBytes(f.size)),
          e('button',{className:'frm',onClick:function(){remove(i);}},'\u00d7'));
      })
    ),
    e('div',{className:'row'},
      e('button',{className:'btn pri',disabled:files.length<2,onClick:merge},'Merge into one PDF'),
      files.length>0&&e('button',{className:'btn sec',onClick:function(){setFiles([]);setStatus('');}},'Clear all')
    ),
    e('div',{className:'status '+stType},status)
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// TOOL 2 — SPLIT PDF
// ══════════════════════════════════════════════════════════════════════════════
function ToolSplit(){
  var fileS=useState(null),setFile=fileS[1];var file=fileS[0];
  var totalS=useState(0),setTotal=totalS[1];var total=totalS[0];
  var thumbsS=useState([]),setThumbs=thumbsS[1];var thumbs=thumbsS[0];
  var removedS=useState(new Set()),setRemoved=removedS[1];var removed=removedS[0];
  var shownS=useState(9),setShown=shownS[1];var shown=shownS[0];
  var rangeS=useState(''),setRange=rangeS[1];var range=rangeS[0];
  var modeS=useState('range'),setMode=modeS[1];var mode=modeS[0]; // 'range' | 'visual'
  var statusS=useState(''),setSt=statusS[1];var status=statusS[0];
  var stTypeS=useState(''),setStType=stTypeS[1];var stType=stTypeS[0];
  function setStatus(msg,type){setSt(msg);setStType(type||'');}

  async function onFile(f){
    if(!f){return;}
    setFile(f);setThumbs([]);setRemoved(new Set());setShown(9);setStatus('Loading PDF pages…');
    loadPdfJs(async function(pdfjs){
      if(!pdfjs){setStatus('Failed to load PDF viewer','err');return;}
      try{
        var buf=await readBuf(f);
        var pdf=await pdfjs.getDocument({data:new Uint8Array(buf)}).promise;
        var n=pdf.numPages;
        setTotal(n);
        setStatus('PDF loaded — '+n+' pages. Select pages to extract.');
        // Render thumbnails lazily
        var results=[];
        for(var i=1;i<=n;i++){
          try{
            var page=await pdf.getPage(i);
            var vp=page.getViewport({scale:0.35});
            var canvas=document.createElement('canvas');
            canvas.width=vp.width;canvas.height=vp.height;
            await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
            results.push(canvas.toDataURL('image/jpeg',0.7));
          }catch(_){results.push(null);}
          if(i%9===0||i===n){setThumbs(results.slice());}
        }
        setStatus('PDF loaded — '+n+' pages. Use range or click thumbnails to select pages.');
      }catch(err){setStatus('Cannot read PDF: '+err.message,'err');}
    });
  }

  function toggleRemove(idx){
    setRemoved(function(prev){
      var n=new Set(prev);
      if(n.has(idx))n.delete(idx);else n.add(idx);
      return n;
    });
  }

  function parseRange(str,tot){
    var out=[];
    str.split(',').forEach(function(part){
      part=part.trim();
      if(part.indexOf('-')>0){
        var p=part.split('-');
        var a=parseInt(p[0])-1,b=parseInt(p[1])-1;
        if(!isNaN(a)&&!isNaN(b)&&a>=0&&b<tot)for(var i=a;i<=b;i++)out.push(i);
      }else{var n=parseInt(part)-1;if(!isNaN(n)&&n>=0&&n<tot)out.push(n);}
    });
    return out.filter(function(v,i,arr){return arr.indexOf(v)===i;}).sort(function(a,b){return a-b;});
  }

  async function extract(){
    if(!file){setStatus('Upload a PDF first','err');return;}
    // Build final page indices
    var indices=[];
    if(mode==='range'){
      if(!range.trim()){setStatus('Enter a page range (e.g. 1-5 or 1,3,7-10)','err');return;}
      indices=parseRange(range,total);
    }else{
      // Visual mode — all non-removed pages
      for(var i=0;i<total;i++){if(!removed.has(i))indices.push(i);}
    }
    if(!indices.length){setStatus('No pages selected','err');return;}
    setStatus('Extracting '+indices.length+' page'+(indices.length!==1?'s':'')+'…');
    loadPdfLib(async function(PDFLib){
      if(!PDFLib){setStatus('Failed to load PDF engine','err');return;}
      try{
        var buf=await readBuf(file);
        var src=await PDFLib.PDFDocument.load(buf,{ignoreEncryption:true});
        var out=await PDFLib.PDFDocument.create();
        var copied=await out.copyPages(src,indices);
        copied.forEach(function(p){out.addPage(p);});
        var bytes=await out.save({useObjectStreams:true});
        var fname=basename(file.name)+'_pages'+indices.map(function(i){return i+1;}).join('-')+'.pdf';
        dlBlob(new Blob([bytes],{type:'application/pdf'}),fname);
        setStatus('Done — '+indices.length+' page'+(indices.length!==1?'s':'')+' extracted','ok');
      }catch(err){setStatus('Error: '+err.message,'err');}
    });
  }

  var visibleThumbs=thumbs.slice(0,shown);

  return e('div',null,
    e(DropZone,{accept:'.pdf,application/pdf',icon:'✂️',
      hasFile:!!file,fileLabel:file?(file.name+' · '+total+' pages'):'',
      label:'Drop PDF here or click to browse',onFiles:function(fs){onFile(fs[0]);}}),

    file&&total>0&&e('div',null,
      // Mode tabs
      e('div',{style:{display:'flex',gap:0,border:'1px solid var(--border)',borderRadius:'var(--r-sm)',overflow:'hidden',marginBottom:10}},
        e('button',{style:{flex:1,padding:'6px 10px',background:mode==='range'?'var(--surface2)':'none',
          border:'none',color:mode==='range'?'var(--text)':'var(--muted)',fontSize:'0.72rem',cursor:'pointer',fontFamily:'inherit'},
          onClick:function(){setMode('range');}
        },'Enter page range'),
        e('button',{style:{flex:1,padding:'6px 10px',background:mode==='visual'?'var(--surface2)':'none',
          border:'none',color:mode==='visual'?'var(--text)':'var(--muted)',fontSize:'0.72rem',cursor:'pointer',fontFamily:'inherit'},
          onClick:function(){setMode('visual');}
        },'Visual page picker')
      ),

      mode==='range'?e('div',null,
        e('div',{className:'range-row'},
          e('span',{className:'label'},'Pages to extract:'),
          e('input',{className:'range-input',placeholder:'e.g. 1-5 or 1,3,7-10 or 2,4-8,12',
            value:range,onChange:function(ev){setRange(ev.target.value);}})
        ),
        e('div',{className:'note'},'Separate page numbers with commas and use hyphens for ranges. Pages are 1-indexed. Example: "1-3, 7, 10-15" extracts pages 1, 2, 3, 7, 10–15 into one PDF.')
      ):e('div',null,
        e('div',{style:{fontSize:'0.7rem',color:'var(--muted)',marginBottom:8}},
          'Click the ✕ on any page to remove it from the output. '+
          (total-removed.size)+' of '+total+' pages selected.'),
        e('div',{className:'pg-grid'},
          visibleThumbs.map(function(src,i){
            var isRm=removed.has(i);
            return e('div',{key:i,className:'pg-thumb'+(isRm?' removed':'')},
              src?e('img',{src:src,style:{width:'100%',height:'100%',objectFit:'contain',display:'block'}}):
                e('div',{style:{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'0.65rem',color:'var(--muted2)'}},'p'+(i+1)),
              e('div',{className:'pg-num'},'p'+(i+1)),
              e('button',{className:'pg-x',onClick:function(ev){ev.stopPropagation();toggleRemove(i);}},
                isRm?'+':'\u00d7')
            );
          })
        ),
        thumbs.length>shown&&e('button',{className:'load-more-btn',
          onClick:function(){setShown(function(s){return Math.min(s+9,thumbs.length);});}
        },'Load more pages ↓ ('+(thumbs.length-shown)+' remaining)'),
        thumbs.length<total&&thumbs.length>=shown&&e('div',{style:{fontSize:'0.68rem',color:'var(--muted)',textAlign:'center',marginTop:4}},'Rendering remaining pages…')
      )
    ),

    e('div',{className:'row'},
      e('button',{className:'btn pri',disabled:!file||!total,onClick:extract},'Extract selected pages')
    ),
    e('div',{className:'status '+stType},status)
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// TOOL 3 — COMPRESS PDF
// ══════════════════════════════════════════════════════════════════════════════
function ToolCompress(){
  var fileS=useState(null),setFile=fileS[1];var file=fileS[0];
  var levelS=useState('standard'),setLevel=levelS[1];var level=levelS[0];
  var statusS=useState(''),setSt=statusS[1];var status=statusS[0];
  var stTypeS=useState(''),setStType=stTypeS[1];var stType=stTypeS[0];
  function setStatus(msg,type){setSt(msg);setStType(type||'');}

  // Compression uses pdf.js to re-render pages at reduced resolution + jpeg,
  // then pdf-lib to assemble. This is real, effective compression.
  // Compression levels — lossless-first approach to preserve text quality
  // Mild: lossless object stream compression only (preserves text/selectable content 100%)
  // Standard: lossless + moderate JPEG for embedded images only
  // Hard: lossless + aggressive image downscale (scanned docs compress well, text PDFs less so)
  var LEVELS={
    mild:{label:'Mild — lossless compression, text fully preserved, selectable'},
    standard:{scale:1.0,quality:0.80,label:'Standard — good size reduction, text remains selectable'},
    hard:{scale:0.75,quality:0.62,label:'Hard — maximum reduction, best for scanned/image PDFs'},
  };

  async function compress(){
    if(!file){setStatus('Upload a PDF first','err');return;}
    setStatus('Compressing…');
    loadPdfLib(async function(PDFLib){
      if(!PDFLib){setStatus('Failed to load PDF engine','err');return;}
      if(level==='mild'){
        // Lossless only — just re-save with object stream compression
        // Preserves all text, fonts, vector graphics perfectly
        try{
          var buf=await readBuf(file);
          var doc=await PDFLib.PDFDocument.load(buf,{ignoreEncryption:true});
          var outBytes=await doc.save({useObjectStreams:true,addDefaultPage:false});
          var saving=Math.max(0,Math.round((1-outBytes.length/file.size)*100));
          var fname=basename(file.name)+'_compressed.pdf';
          dlBlob(new Blob([outBytes],{type:'application/pdf'}),fname);
          setStatus('Done — '+fmtBytes(outBytes.length)+' ('+saving+'% smaller). Text and quality fully preserved.','ok');
        }catch(err){setStatus('Error: '+err.message,'err');}
        return;
      }
      // Standard and Hard: re-render pages as images (effective for scanned PDFs)
      var cfg=LEVELS[level];
      loadPdfJs(async function(pdfjs){
        if(!pdfjs){setStatus('Failed to load PDF engine','err');return;}
        try{
          var buf=await readBuf(file);
          var pdfDoc=await pdfjs.getDocument({data:new Uint8Array(buf)}).promise;
          var outDoc=await PDFLib.PDFDocument.create();
          var n=pdfDoc.numPages;
          for(var i=1;i<=n;i++){
            setStatus('Compressing page '+i+' of '+n+'…');
            var page=await pdfDoc.getPage(i);
            var origVp=page.getViewport({scale:1});
            var renderVp=page.getViewport({scale:cfg.scale});
            var canvas=document.createElement('canvas');
            canvas.width=Math.round(renderVp.width);canvas.height=Math.round(renderVp.height);
            await page.render({canvasContext:canvas.getContext('2d'),viewport:renderVp}).promise;
            var dataUrl=canvas.toDataURL('image/jpeg',cfg.quality);
            var b64=dataUrl.split(',')[1];
            var imgBytes=Uint8Array.from(atob(b64),function(c){return c.charCodeAt(0);});
            var img=await outDoc.embedJpg(imgBytes);
            var outPage=outDoc.addPage([origVp.width,origVp.height]);
            outPage.drawImage(img,{x:0,y:0,width:origVp.width,height:origVp.height});
          }
          var outBytes=await outDoc.save({useObjectStreams:true});
          var saving=Math.max(0,Math.round((1-outBytes.length/file.size)*100));
          var fname=basename(file.name)+'_compressed.pdf';
          dlBlob(new Blob([outBytes],{type:'application/pdf'}),fname);
          var note=level==='hard'?' Text may not be selectable in this output.':'';
          setStatus('Done — '+fmtBytes(outBytes.length)+' ('+saving+'% smaller).'+note,'ok');
        }catch(err){setStatus('Error: '+err.message,'err');}
      });
    });
  }

  return e('div',null,
    e(DropZone,{accept:'.pdf,application/pdf',icon:'📦',
      hasFile:!!file,fileLabel:file?(file.name+' · '+fmtBytes(file.size)):'',
      label:'Drop PDF here or click to browse',
      onFiles:function(fs){setFile(fs[0]);setStatus('');}}),
    e('div',{style:{marginTop:10}},
      e('div',{className:'label',style:{marginBottom:6}},'Compression level:'),
      e('div',{className:'comp-opts'},
        ['mild','standard','hard'].map(function(lv){
          return e('button',{key:lv,className:'comp-opt'+(level===lv?' sel':''),
            onClick:function(){setLevel(lv);}},
            lv.charAt(0).toUpperCase()+lv.slice(1));
        })
      ),
      e('div',{className:'note'},LEVELS[level].label,
        e('br'),e('span',{style:{fontSize:'0.66rem',color:'var(--muted2)'}},'Note: compression works best on scanned/image-heavy PDFs. Text-only PDFs will see less reduction.'))
    ),
    e('div',{className:'row'},
      e('button',{className:'btn pri',disabled:!file,onClick:compress},'Compress PDF')
    ),
    e('div',{className:'status '+stType},status)
  );
}

// TOOL 4 — PDF TO IMAGES (ZIP download)
// ══════════════════════════════════════════════════════════════════════════════
function ToolPdfImg(){
  var fileS=useState(null),setFile=fileS[1];var file=fileS[0];
  var fmtS=useState('jpeg'),setFmt=fmtS[1];var fmt=fmtS[0];
  var scaleS=useState(2),setScale=scaleS[1];var scale=scaleS[0];
  var statusS=useState(''),setSt=statusS[1];var status=statusS[0];
  var stTypeS=useState(''),setStType=stTypeS[1];var stType=stTypeS[0];
  var progS=useState(0),setProg=progS[1];var prog=progS[0];
  function setStatus(msg,type){setSt(msg);setStType(type||'');}

  async function convert(){
    if(!file){setStatus('Upload a PDF first','err');return;}
    setStatus('Loading PDF…');setProg(0);
    loadPdfJs(async function(pdfjs){
      if(!pdfjs){setStatus('Failed to load PDF engine','err');return;}
      loadJSZip(async function(JSZip){
        if(!JSZip){setStatus('Failed to load ZIP engine','err');return;}
        try{
          var buf=await readBuf(file);
          var pdf=await pdfjs.getDocument({data:new Uint8Array(buf)}).promise;
          var n=pdf.numPages;
          var zip=new JSZip();
          var folder=zip.folder(basename(file.name)+'_images');
          var mimeType='image/'+(fmt==='jpg'?'jpeg':fmt);
          var ext=fmt==='jpeg'?'jpg':fmt;
          for(var i=1;i<=n;i++){
            setStatus('Converting page '+i+' of '+n+'…');
            setProg(Math.round(i/n*100));
            var page=await pdf.getPage(i);
            var vp=page.getViewport({scale:parseFloat(scale)});
            var canvas=document.createElement('canvas');
            canvas.width=Math.round(vp.width);canvas.height=Math.round(vp.height);
            await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
            var dataUrl=canvas.toDataURL(mimeType,0.92);
            var b64=dataUrl.split(',')[1];
            var fname='page_'+(i<10?'0':'')+i+'.'+ext;
            folder.file(fname,b64,{base64:true});
          }
          setStatus('Creating ZIP…');
          var zipBlob=await zip.generateAsync({type:'blob',compression:'DEFLATE',compressionOptions:{level:6}});
          dlBlob(zipBlob,basename(file.name)+'_images.zip');
          setStatus('Done — '+n+' image'+(n!==1?'s':'')+' in ZIP ('+fmtBytes(zipBlob.size)+')','ok');
          setProg(0);
        }catch(err){setStatus('Error: '+err.message,'err');setProg(0);}
      });
    });
  }

  return e('div',null,
    e(DropZone,{accept:'.pdf,application/pdf',icon:'🖼',
      hasFile:!!file,fileLabel:file?(file.name+' · '+fmtBytes(file.size)):'',
      label:'Drop PDF here or click to browse',
      onFiles:function(fs){setFile(fs[0]);setStatus('');setProg(0);}}),
    file&&e('div',{className:'row',style:{marginTop:10}},
      e('span',{className:'label'},'Format:'),
      e('select',{className:'sel',value:fmt,onChange:function(ev){setFmt(ev.target.value);}},
        e('option',{value:'jpeg'},'JPEG'),e('option',{value:'png'},'PNG')),
      e('span',{className:'label',style:{marginLeft:10}},'Resolution:'),
      e('select',{className:'sel',value:scale,onChange:function(ev){setScale(ev.target.value);}},
        e('option',{value:1},'Standard (96 dpi)'),
        e('option',{value:2},'High (192 dpi)'),
        e('option',{value:3},'Very high (288 dpi)'))
    ),
    prog>0&&e('div',{className:'prog-bar'},e('div',{className:'prog-fill',style:{width:prog+'%'}})),
    e('div',{className:'row'},
      e('button',{className:'btn pri',disabled:!file,onClick:convert},'Convert to images (download ZIP)')
    ),
    e('div',{className:'note'},'All pages are packaged into a single ZIP file — one click, all images.'),
    e('div',{className:'status '+stType},status)
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// TOOL 5 — IMAGES TO PDF
// ══════════════════════════════════════════════════════════════════════════════
function ToolImgPdf(){
  var filesS=useState([]),setFiles=filesS[1];var files=filesS[0];
  var statusS=useState(''),setSt=statusS[1];var status=statusS[0];
  var stTypeS=useState(''),setStType=stTypeS[1];var stType=stTypeS[0];
  function setStatus(msg,type){setSt(msg);setStType(type||'');}

  var ACCEPTED=['image/jpeg','image/png','image/webp','image/gif'];
  function addFiles(newFiles){
    var imgs=Array.from(newFiles).filter(function(f){return ACCEPTED.includes(f.type);});
    setFiles(function(prev){return prev.concat(imgs);});
  }
  function remove(i){setFiles(function(prev){return prev.filter(function(_,idx){return idx!==i;});});}

  async function convert(){
    if(!files.length){setStatus('Upload at least one image','err');return;}
    setStatus('Building PDF…');
    loadPdfLib(async function(PDFLib){
      if(!PDFLib){setStatus('Failed to load PDF engine','err');return;}
      try{
        var doc=await PDFLib.PDFDocument.create();
        for(var i=0;i<files.length;i++){
          var f=files[i];
          var buf=await readBuf(f);
          var img=f.type==='image/png'?await doc.embedPng(buf):await doc.embedJpg(buf);
          var dims=img.scaleToFit(595.28,841.89);
          var page=doc.addPage([dims.width,dims.height]);
          page.drawImage(img,{x:0,y:0,width:dims.width,height:dims.height});
        }
        var bytes=await doc.save();
        dlBlob(new Blob([bytes],{type:'application/pdf'}),'images.pdf');
        setStatus('Done — '+files.length+' image'+(files.length!==1?'s':'')+' → PDF ('+fmtBytes(bytes.length)+')','ok');
      }catch(err){setStatus('Error: '+err.message,'err');}
    });
  }

  return e('div',null,
    e(DropZone,{accept:'image/jpeg,image/png,image/webp',multiple:true,icon:'📷',
      label:'Drop images here or click to browse',hint:'JPEG, PNG, WebP — multiple files OK',
      onFiles:addFiles}),
    files.length>0&&e('div',{className:'flist'},
      files.map(function(f,i){
        return e('div',{key:i,className:'fitem'},
          e('span',{className:'fname'},f.name),
          e('span',{className:'fsize'},fmtBytes(f.size)),
          e('button',{className:'frm',onClick:function(){remove(i);}},'\u00d7'));
      })
    ),
    e('div',{className:'row'},
      e('button',{className:'btn pri',disabled:!files.length,onClick:convert},'Create PDF'),
      files.length>0&&e('button',{className:'btn sec',onClick:function(){setFiles([]);setStatus('');}},'Clear')
    ),
    e('div',{className:'status '+stType},status)
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// TOOL 6 — IMAGE RESIZER
// ══════════════════════════════════════════════════════════════════════════════
function ToolImgResize(){
  var fileS=useState(null),setFile=fileS[1];var file=fileS[0];
  var origS=useState(null),setOrig=origS[1];var orig=origS[0];
  var modeS=useState('px'),setMode=modeS[1];var mode=modeS[0]; // 'px' | 'inches'

  // Pixel mode
  var wS=useState(''),setW=wS[1];var w=wS[0];
  var hS=useState(''),setH=hS[1];var hv=hS[0];
  var lockS=useState(true),setLock=lockS[1];var lock=lockS[0];

  // Inches mode
  var wInS=useState(''),setWIn=wInS[1];var wIn=wInS[0];
  var hInS=useState(''),setHIn=hInS[1];var hIn=hInS[0];
  var dpiS=useState(300),setDpi=dpiS[1];var dpi=dpiS[0];

  // Max file size
  var maxKbS=useState(''),setMaxKb=maxKbS[1];var maxKb=maxKbS[0];

  var fmtS=useState('jpeg'),setFmt=fmtS[1];var fmt=fmtS[0];
  var qualS=useState(88),setQual=qualS[1];var qual=qualS[0];

  var statusS=useState(''),setSt=statusS[1];var status=statusS[0];
  var stTypeS=useState(''),setStType=stTypeS[1];var stType=stTypeS[0];
  function setStatus(msg,type){setSt(msg);setStType(type||'');}

  function onFile(f){
    if(!f)return;
    var ACCEPTED=['image/jpeg','image/png','image/webp'];
    if(!ACCEPTED.includes(f.type)){setStatus('Upload JPEG, PNG or WebP only','err');return;}
    setFile(f);setStatus('');
    var img=new Image();
    img.onload=function(){
      setOrig({w:img.naturalWidth,h:img.naturalHeight});
      setW(img.naturalWidth+'');setH(img.naturalHeight+'');
      var dpiV=parseInt(dpi)||300;
      setWIn((img.naturalWidth/dpiV).toFixed(2));
      setHIn((img.naturalHeight/dpiV).toFixed(2));
      URL.revokeObjectURL(img.src);
    };
    img.src=URL.createObjectURL(f);
  }

  function onWChange(val){
    setW(val);
    if(lock&&orig&&val){setH(Math.round(parseFloat(val)/(orig.w/orig.h))+'');}
  }
  function onHChange(val){
    setH(val);
    if(lock&&orig&&val){setW(Math.round(parseFloat(val)*(orig.w/orig.h))+'');}
  }
  function onWInChange(val){
    setWIn(val);
    if(lock&&orig&&val){setHIn((parseFloat(val)/(orig.w/orig.h)).toFixed(2));}
  }
  function onHInChange(val){
    setHIn(val);
    if(lock&&orig&&val){setWIn((parseFloat(val)*(orig.w/orig.h)).toFixed(2));}
  }

  async function doResize(targetW,targetH,mimeType,quality){
    return new Promise(function(res,rej){
      var img=new Image();
      img.onload=function(){
        var canvas=document.createElement('canvas');
        canvas.width=targetW;canvas.height=targetH;
        canvas.getContext('2d').drawImage(img,0,0,targetW,targetH);
        canvas.toBlob(function(blob){
          URL.revokeObjectURL(img.src);res(blob);
        },mimeType,quality);
      };
      img.onerror=rej;
      img.src=URL.createObjectURL(file);
    });
  }

  async function resize(){
    if(!file){setStatus('Upload an image first','err');return;}
    var mimeType='image/'+(fmt==='jpg'?'jpeg':fmt);
    var ext=fmt==='jpeg'?'jpg':fmt;
    var targetW,targetH;

    if(mode==='px'){
      targetW=parseInt(w);targetH=parseInt(hv);
      if(!targetW||!targetH||targetW<1||targetH<1){setStatus('Enter valid width and height (pixels)','err');return;}
    }else{
      var dpiV=parseInt(dpi)||300;
      targetW=Math.round(parseFloat(wIn)*dpiV);
      targetH=Math.round(parseFloat(hIn)*dpiV);
      if(!targetW||!targetH||targetW<1||targetH<1){setStatus('Enter valid dimensions','err');return;}
    }

    setStatus('Resizing…');
    try{
      var blob=await doResize(targetW,targetH,mimeType,qual/100);

      // If max file size specified, iteratively reduce quality
      if(maxKb&&parseFloat(maxKb)>0&&fmt!=='png'){
        var maxBytes=parseFloat(maxKb)*1024;
        var q=qual;
        while(blob.size>maxBytes&&q>20){
          q-=5;
          blob=await doResize(targetW,targetH,mimeType,q/100);
        }
        if(blob.size>maxBytes){setStatus('Could not reach target size — file is '+fmtBytes(blob.size),'err');return;}
      }

      var fname=basename(file.name)+'_'+targetW+'x'+targetH+'.'+ext;
      dlBlob(blob,fname);
      setStatus('Done — '+targetW+'\u00d7'+targetH+'px · '+fmtBytes(blob.size),'ok');
    }catch(err){setStatus('Error: '+err.message,'err');}
  }

  return e('div',null,
    e(DropZone,{accept:'image/jpeg,image/png,image/webp',icon:'\uD83D\uDDBC',
      hasFile:!!file,
      fileLabel:file&&orig?(file.name+' · '+orig.w+'\u00d7'+orig.h+'px · '+fmtBytes(file.size)):'',
      label:'Drop image here or click to browse',hint:'JPEG, PNG, WebP',
      onFiles:function(fs){onFile(fs[0]);}}),

    orig&&e('div',null,
      // Mode tabs
      e('div',{style:{display:'flex',gap:0,border:'1px solid var(--border)',borderRadius:'var(--r-sm)',overflow:'hidden',margin:'10px 0'}},
        e('button',{style:{flex:1,padding:'6px 10px',background:mode==='px'?'var(--surface2)':'none',
          border:'none',color:mode==='px'?'var(--text)':'var(--muted)',fontSize:'0.72rem',cursor:'pointer',fontFamily:'inherit'},
          onClick:function(){setMode('px');}
        },'Pixels (px)'),
        e('button',{style:{flex:1,padding:'6px 10px',background:mode==='inches'?'var(--surface2)':'none',
          border:'none',color:mode==='inches'?'var(--text)':'var(--muted)',fontSize:'0.72rem',cursor:'pointer',fontFamily:'inherit'},
          onClick:function(){setMode('inches');}
        },'Inches @ DPI')
      ),

      mode==='px'?e('div',null,
        e('div',{className:'resize-grid'},
          e('div',{className:'resize-field'},
            e('label',null,'Width (px)'),
            e('input',{type:'number',min:1,value:w,onChange:function(ev){onWChange(ev.target.value);}})
          ),
          e('div',{className:'resize-field'},
            e('label',null,'Height (px)'),
            e('input',{type:'number',min:1,value:hv,onChange:function(ev){onHChange(ev.target.value);}})
          )
        ),
        e('label',{className:'lock-ratio'},
          e('input',{type:'checkbox',checked:lock,onChange:function(ev){setLock(ev.target.checked);}}),
          'Lock aspect ratio')
      ):e('div',null,
        e('div',{className:'resize-grid'},
          e('div',{className:'resize-field'},
            e('label',null,'Width (inches)'),
            e('input',{type:'number',min:0.01,step:0.01,value:wIn,onChange:function(ev){onWInChange(ev.target.value);}})
          ),
          e('div',{className:'resize-field'},
            e('label',null,'Height (inches)'),
            e('input',{type:'number',min:0.01,step:0.01,value:hIn,onChange:function(ev){onHInChange(ev.target.value);}})
          ),
          e('div',{className:'resize-field'},
            e('label',null,'DPI (dots per inch)'),
            e('input',{type:'number',min:72,max:600,step:1,value:dpi,onChange:function(ev){setDpi(ev.target.value);}})
          )
        ),
        e('label',{className:'lock-ratio'},
          e('input',{type:'checkbox',checked:lock,onChange:function(ev){setLock(ev.target.checked);}}),
          'Lock aspect ratio'),
        dpi&&wIn&&e('div',{className:'note',style:{marginTop:6}},
          'Output: '+Math.round(parseFloat(wIn)*parseInt(dpi))+'×'+Math.round(parseFloat(hIn)*parseInt(dpi))+'px at '+dpi+' DPI')
      ),

      e('div',{className:'resize-grid',style:{marginTop:10}},
        e('div',{className:'resize-field'},
          e('label',null,'Output format'),
          e('select',{value:fmt,onChange:function(ev){setFmt(ev.target.value);}},
            e('option',{value:'jpeg'},'JPEG'),
            e('option',{value:'png'},'PNG'),
            e('option',{value:'webp'},'WebP'))
        ),
        fmt!=='png'&&e('div',{className:'resize-field'},
          e('label',null,'Quality: '+qual+'%'),
          e('input',{type:'range',min:20,max:100,value:qual,style:{width:'100%',marginTop:6},
            onChange:function(ev){setQual(parseInt(ev.target.value));}})
        ),
        e('div',{className:'resize-field'},
          e('label',null,'Max file size (KB, optional)'),
          e('input',{type:'number',min:1,placeholder:'e.g. 200',value:maxKb,
            onChange:function(ev){setMaxKb(ev.target.value);}})
        )
      )
    ),

    e('div',{className:'row',style:{marginTop:8}},
      e('button',{className:'btn pri',disabled:!file||!orig,onClick:resize},'Resize & Download')
    ),
    e('div',{className:'status '+stType},status)
  );
}


// ══════════════════════════════════════════════════════════════════════════════
// TOOL 7 — ANNOTATE PDF
// ══════════════════════════════════════════════════════════════════════════════
var ANN_COLORS=['#e8d5b0','#4ade80','#60a5fa','#f87171','#facc15','#c084fc','#34d399','#fb923c','#f472b6','#94a3b8'];

function ToolAnnotate(){
  // ── state ──────────────────────────────────────────────────────────────
  var fileS=useState(null),setFile=fileS[1];var file=fileS[0];
  var totalS=useState(0),setTotal=totalS[1];var total=totalS[0];
  var pageIdxS=useState(0),setPageIdx=pageIdxS[1];var pageIdx=pageIdxS[0];
  var toolS=useState('pen'),setTool=toolS[1];var tool=toolS[0];
  var colorS=useState('#f87171'),setColor=colorS[1];var color=colorS[0];
  var sizeS=useState(3),setSize=sizeS[1];var size=sizeS[0];
  var statusS=useState(''),setSt=statusS[1];var status=statusS[0];
  var stTypeS=useState(''),setStType=stTypeS[1];var stType=stTypeS[0];
  function setStatus(m,t){setSt(m);setStType(t||'');}

  var selectedObjIdS=useState(null),setSelectedObjId=selectedObjIdS[1];var selectedObjId=selectedObjIdS[0];
  var editingObjIdS=useState(null),setEditingObjId=editingObjIdS[1];var editingObjId=editingObjIdS[0];
  var editTextS=useState(''),setEditText=editTextS[1];var editText=editTextS[0];
  var objsS=useState({}),setObjs=objsS[1];var objs=objsS[0];
  var loadingPageS=useState(false),setLoadingPage=loadingPageS[1];var loadingPage=loadingPageS[0];

  // ── refs ────────────────────────────────────────────────────────────────
  var canvasRef=useRef();
  var overlayRef=useRef();
  var pdfDocRef=useRef(null);
  var objLayersRef=useRef({});
  var strokeLayersRef=useRef({});
  var undoStackRef=useRef({});
  var renderPendingRef=useRef(null);
  var selectedObjRef=useRef(null);
  var imgInputRef=useRef(null);
  // stroke drawing state
  var drawingRef=useRef(false);
  var lastPtRef=useRef(null);
  var arrowStartRef=useRef(null);
  var arrowBaseSnapRef=useRef(null);
  // drag/resize state
  var draggingRef=useRef(false);
  var dragOffRef=useRef({x:0,y:0});
  var resizingRef=useRef(false);
  var moveModeS=useState(false),setMoveMode=moveModeS[1];var moveMode=moveModeS[0];
  var moveModeRef=useRef(false); // kept in sync with state

  // ── helpers ─────────────────────────────────────────────────────────────
  function setPageObjs(idx,list){
    objLayersRef.current[idx]=list;
    setObjs(function(p){var n=Object.assign({},p);n[idx]=list;return n;});
  }
  function getObjs(idx){return objLayersRef.current[idx!=null?idx:pageIdx]||[];}

  // Bounding box — images use top-left (x,y), text uses baseline (x,y)
  function objBounds(o){
    if(o.type==='image') return {x1:o.x,y1:o.y,x2:o.x+o.w,y2:o.y+o.h};
    return {x1:o.x,y1:o.y-o.h,x2:o.x+o.w,y2:o.y+8};
  }
  function hitTest(pt,list){
    for(var i=(list||[]).length-1;i>=0;i--){
      var b=objBounds(list[i]);
      if(pt.x>=b.x1-6&&pt.x<=b.x2+6&&pt.y>=b.y1-6&&pt.y<=b.y2+6)return list[i];
    }
    return null;
  }
  function resizeHandleHit(pt,o){
    var b=objBounds(o);
    return pt.x>=b.x2-6&&pt.x<=b.x2+20&&pt.y>=b.y2-6&&pt.y<=b.y2+20;
  }

  function pushUndo(idx){
    var pg=idx!=null?idx:pageIdx;
    if(!undoStackRef.current[pg])undoStackRef.current[pg]=[];
    var ov=overlayRef.current;
    var snap=ov?ov.getContext('2d').getImageData(0,0,ov.width,ov.height):null;
    undoStackRef.current[pg].push({
      objs:JSON.parse(JSON.stringify(getObjs(pg).map(function(o){return Object.assign({},o,{imgEl:undefined});}))),
      imgEls:getObjs(pg).map(function(o){return o.imgEl||null;}),
      stroke:snap,
    });
    if(undoStackRef.current[pg].length>20)undoStackRef.current[pg].shift();
  }

  function doUndo(){
    var stack=undoStackRef.current[pageIdx];
    if(!stack||!stack.length){setStatus('Nothing to undo','err');return;}
    var snap=stack.pop();
    // restore imgEl references
    var restored=(snap.objs||[]).map(function(o,i){return Object.assign({},o,{imgEl:snap.imgEls[i]||null});});
    strokeLayersRef.current[pageIdx]=snap.stroke||null;
    setPageObjs(pageIdx,restored);
    setSelectedObjId(null);selectedObjRef.current=null;
    setEditingObjId(null);
    redraw(pageIdx,restored);
  }

  // ── rendering ────────────────────────────────────────────────────────────
  function saveStroke(){
    var ov=overlayRef.current;
    if(ov)strokeLayersRef.current[pageIdx]=ov.getContext('2d').getImageData(0,0,ov.width,ov.height);
  }

  function redraw(idx,list){
    var ov=overlayRef.current;
    if(!ov)return;
    var ctx=ov.getContext('2d');
    ctx.clearRect(0,0,ov.width,ov.height);
    var stroke=strokeLayersRef.current[idx];
    if(stroke)ctx.putImageData(stroke,0,0);
    (list||[]).forEach(function(obj){
      ctx.save();
      var cx=objBounds(obj).x1+obj.w/2, cy=objBounds(obj).y1+obj.h/2;
      if(obj.rotate){ctx.translate(cx,cy);ctx.rotate(obj.rotate*Math.PI/180);ctx.translate(-cx,-cy);}
      if(obj.type==='text'){
        if(obj.fill&&obj.fill!=='none'){
          ctx.fillStyle=obj.fill;ctx.globalAlpha=0.7;
          ctx.fillRect(obj.x-4,obj.y-obj.h,obj.w+8,obj.h+6);ctx.globalAlpha=1;
        }
        ctx.font='bold '+obj.fontSize+'px Geist,sans-serif';
        ctx.fillStyle=obj.color;ctx.fillText(obj.text,obj.x,obj.y);
      } else if(obj.type==='image'&&obj.imgEl){
        ctx.drawImage(obj.imgEl,obj.x,obj.y,obj.w,obj.h);
      }
      // selection outline + resize handle
      if(obj.id===selectedObjRef.current){
        var b=objBounds(obj);
        ctx.strokeStyle='rgba(232,213,176,0.9)';ctx.lineWidth=2;ctx.setLineDash([5,3]);
        ctx.strokeRect(b.x1-4,b.y1-4,b.x2-b.x1+8,b.y2-b.y1+8);ctx.setLineDash([]);
        // resize handle — bigger (18×18) for easy grabbing
        ctx.fillStyle='#e8d5b0';ctx.fillRect(b.x2-2,b.y2-2,18,18);
        ctx.strokeStyle='rgba(30,27,20,0.5)';ctx.lineWidth=1;ctx.strokeRect(b.x2-2,b.y2-2,18,18);
        ctx.fillStyle='rgba(30,27,20,0.7)';ctx.font='bold 11px sans-serif';
        ctx.textAlign='center';ctx.fillText('⇲',b.x2+7,b.y2+13);ctx.textAlign='left';
      }
      ctx.restore();
    });
  }

  async function renderPage(pdf,idx){
    if(!pdf)return;
    if(!canvasRef.current){renderPendingRef.current={pdf:pdf,idx:idx};return;}
    setLoadingPage(true);
    var page=await pdf.getPage(idx+1);
    var vp=page.getViewport({scale:2.2});
    var cv=canvasRef.current;
    cv.width=Math.round(vp.width);cv.height=Math.round(vp.height);
    await page.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;
    var ov=overlayRef.current;
    ov.width=cv.width;ov.height=cv.height;
    var saved=strokeLayersRef.current[idx];
    var ctx=ov.getContext('2d');ctx.clearRect(0,0,ov.width,ov.height);
    if(saved)ctx.putImageData(saved,0,0);
    redraw(idx,getObjs(idx));
    setLoadingPage(false);
  }

  async function onFile(f){
    if(!f)return;
    setFile(f);setStatus('Loading…');setLoadingPage(true);
    loadPdfJs(async function(pdfjs){
      if(!pdfjs){setStatus('Failed to load PDF engine','err');setLoadingPage(false);return;}
      try{
        var buf=await readBuf(f);
        var pdf=await pdfjs.getDocument({data:new Uint8Array(buf)}).promise;
        pdfDocRef.current=pdf;setTotal(pdf.numPages);setPageIdx(0);setStatus('');
        renderPendingRef.current={pdf:pdf,idx:0};
        if(canvasRef.current){await renderPage(pdf,0);renderPendingRef.current=null;}
        setLoadingPage(false);
      }catch(err){setStatus('Cannot read PDF: '+err.message,'err');setLoadingPage(false);}
    });
  }

  async function goPage(newIdx){
    saveStroke();
    // Full interaction state reset on page navigation
    drawingRef.current=false;draggingRef.current=false;resizingRef.current=false;
    arrowStartRef.current=null;arrowBaseSnapRef.current=null;mouseDownPtRef.current=null;
    moveModeRef.current=false;setMoveMode(false);
    selectedObjRef.current=null;setSelectedObjId(null);
    setEditingObjId(null);setEditText('');
    setPageIdx(newIdx);
    await renderPage(pdfDocRef.current,newIdx);
  }

  // ── pointer events ───────────────────────────────────────────────────────
  function getPos(ev){
    var ov=overlayRef.current;
    var b=ov.getBoundingClientRect();
    var sx=ov.width/b.width,sy=ov.height/b.height;
    var cx=ev.touches?ev.touches[0].clientX:ev.clientX;
    var cy=ev.touches?ev.touches[0].clientY:ev.clientY;
    return {x:(cx-b.left)*sx,y:(cy-b.top)*sy};
  }

  // Track mousedown position to detect drag vs click
  var mouseDownPtRef=useRef(null);

  function onMouseDown(ev){
    if(!pdfDocRef.current||editingObjId)return;
    ev.preventDefault();
    // Always clean up any stuck state before starting new interaction
    draggingRef.current=false;resizingRef.current=false;
    var pt=getPos(ev);
    var list=getObjs(pageIdx);
    mouseDownPtRef.current=pt;

    // ── Select tool OR move mode from control panel ──
    if(tool==='select'||moveModeRef.current){
      var hit=hitTest(pt,list);
      if(hit){
        if(!moveModeRef.current&&resizeHandleHit(pt,hit)){resizingRef.current=true;}
        else{resizingRef.current=false;dragOffRef.current={x:pt.x-hit.x,y:pt.y-hit.y};}
        draggingRef.current=true;
        selectedObjRef.current=hit.id;setSelectedObjId(hit.id);
        redraw(pageIdx,list);
      } else if(!moveModeRef.current){
        selectedObjRef.current=null;setSelectedObjId(null);redraw(pageIdx,list);
      }
      return;
    }

    // ── Text: clicking an existing text box selects it ──
    if(tool==='text'){
      var hitT=hitTest(pt,list);
      if(hitT){
        // clicking any existing obj in text mode — select and allow drag
        if(resizeHandleHit(pt,hitT)){resizingRef.current=true;}
        else{resizingRef.current=false;dragOffRef.current={x:pt.x-hitT.x,y:pt.y-hitT.y};}
        draggingRef.current=true;
        selectedObjRef.current=hitT.id;setSelectedObjId(hitT.id);
        redraw(pageIdx,list);return;
      }
      // empty area — will create text box on mouseup (not mousedown, to avoid drag-creates)
      return;
    }

    // ── Image: clicking existing image in image mode selects it ──
    if(tool==='image'){
      var hitI=hitTest(pt,list);
      if(hitI){
        if(resizeHandleHit(pt,hitI)){resizingRef.current=true;}
        else{resizingRef.current=false;dragOffRef.current={x:pt.x-hitI.x,y:pt.y-hitI.y};}
        draggingRef.current=true;
        selectedObjRef.current=hitI.id;setSelectedObjId(hitI.id);
        redraw(pageIdx,list);
      }
      return;
    }

    // ── Eraser ──
    if(tool==='eraser'){
      pushUndo(pageIdx);drawingRef.current=true;lastPtRef.current=pt;return;
    }
    // ── Arrow ──
    if(tool==='arrow'){
      pushUndo(pageIdx);arrowStartRef.current=pt;
      var ov2=overlayRef.current;
      arrowBaseSnapRef.current=ov2?ov2.getContext('2d').getImageData(0,0,ov2.width,ov2.height):null;
      drawingRef.current=true;return;
    }
    // ── Highlight ──
    if(tool==='highlight'){
      pushUndo(pageIdx);drawingRef.current=true;lastPtRef.current=pt;
      var ov3=overlayRef.current;
      arrowBaseSnapRef.current=ov3?ov3.getContext('2d').getImageData(0,0,ov3.width,ov3.height):null;
      return;
    }
    // ── Pen ──
    pushUndo(pageIdx);drawingRef.current=true;lastPtRef.current=pt;
    var ctx=overlayRef.current.getContext('2d');
    ctx.beginPath();ctx.moveTo(pt.x,pt.y);
  }

  function onMouseMove(ev){
    var pt=getPos(ev);

    // drag/resize selected object — works in select, text, and image tools
    if(draggingRef.current&&selectedObjRef.current&&(tool==='select'||tool==='text'||tool==='image'||moveModeRef.current)){
      ev.preventDefault();
      var list=getObjs(pageIdx);
      // Verify the selected object still exists on this page (prevents phantom drag after page nav)
      if(!list.some(function(o){return o.id===selectedObjRef.current;})){
        draggingRef.current=false;return;
      }
      var nl=list.map(function(o){
        if(o.id!==selectedObjRef.current)return o;
        if(resizingRef.current){
          var b=objBounds(o);
          var nw=Math.max(30,pt.x-b.x1);
          var nh=Math.max(20,nw*(o.h/Math.max(1,o.w)));
          var nfs=o.type==='text'?Math.max(8,Math.round(nw/8)):o.fontSize;
          return Object.assign({},o,{w:nw,h:nh,fontSize:nfs});
        }
        return Object.assign({},o,{x:pt.x-dragOffRef.current.x,y:pt.y-dragOffRef.current.y});
      });
      setPageObjs(pageIdx,nl);
      redraw(pageIdx,nl);
      return;
    }

    if(!drawingRef.current)return;
    ev.preventDefault();
    var ov=overlayRef.current;
    var ctx=ov.getContext('2d');

    if(tool==='arrow'&&arrowStartRef.current){
      if(arrowBaseSnapRef.current)ctx.putImageData(arrowBaseSnapRef.current,0,0);
      else ctx.clearRect(0,0,ov.width,ov.height);
      redraw(pageIdx,getObjs(pageIdx));
      ctx.strokeStyle=color;ctx.lineWidth=size+1;
      ctx.beginPath();ctx.moveTo(arrowStartRef.current.x,arrowStartRef.current.y);ctx.lineTo(pt.x,pt.y);ctx.stroke();
      var ang=Math.atan2(pt.y-arrowStartRef.current.y,pt.x-arrowStartRef.current.x);
      var hs=10+size*2; // arrowhead scales with size
      ctx.fillStyle=color;ctx.beginPath();
      ctx.moveTo(pt.x,pt.y);
      ctx.lineTo(pt.x-hs*Math.cos(ang-0.4),pt.y-hs*Math.sin(ang-0.4));
      ctx.lineTo(pt.x-hs*Math.cos(ang+0.4),pt.y-hs*Math.sin(ang+0.4));
      ctx.closePath();ctx.fill();return;
    }
    if(tool==='highlight'){
      if(arrowBaseSnapRef.current)ctx.putImageData(arrowBaseSnapRef.current,0,0);
      else ctx.clearRect(0,0,ov.width,ov.height);
      redraw(pageIdx,getObjs(pageIdx));
      var hlH=size*6+10;
      ctx.globalAlpha=0.38;ctx.fillStyle=color;
      ctx.fillRect(Math.min(lastPtRef.current.x,pt.x),lastPtRef.current.y-hlH*0.75,Math.abs(pt.x-lastPtRef.current.x),hlH);
      ctx.globalAlpha=1;return;
    }
    if(tool==='eraser'){
      ctx.globalCompositeOperation='destination-out';
      ctx.lineWidth=size*4;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(lastPtRef.current.x,lastPtRef.current.y);ctx.lineTo(pt.x,pt.y);ctx.stroke();
      ctx.globalCompositeOperation='source-over';
      lastPtRef.current=pt;return;
    }
    // pen
    ctx.strokeStyle=color;ctx.lineWidth=size;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.lineTo(pt.x,pt.y);ctx.stroke();
    lastPtRef.current=pt;
  }

  // Global mouseup anywhere (window) to prevent stuck drag when mouse leaves canvas
  useEffect(function(){
    function onWindowMouseUp(){
      if(drawingRef.current){saveStroke();arrowStartRef.current=null;arrowBaseSnapRef.current=null;}
      drawingRef.current=false;draggingRef.current=false;resizingRef.current=false;
    }
    window.addEventListener('mouseup',onWindowMouseUp);
    return function(){window.removeEventListener('mouseup',onWindowMouseUp);};
  },[]);

  function onMouseUp(ev){
    if(drawingRef.current){saveStroke();arrowStartRef.current=null;arrowBaseSnapRef.current=null;}
    var wasDragging=draggingRef.current;
    drawingRef.current=false;draggingRef.current=false;resizingRef.current=false;

    // Place new text box on mouseup only if no drag happened (true click on empty area)
    if(tool==='text'&&!wasDragging&&!editingObjId&&mouseDownPtRef.current){
      var pt=mouseDownPtRef.current;
      var list=getObjs(pageIdx);
      var hitT=hitTest(pt,list);
      if(!hitT){
        pushUndo(pageIdx);
        var fs=size*3+14;
        var id='t'+Date.now();
        var ov=overlayRef.current;
        var tx=ov?Math.min(pt.x,ov.width-160):pt.x;
        var ty=ov?Math.min(pt.y+fs,ov.height-20):pt.y+fs;
        var obj={type:'text',id:id,x:tx,y:ty,w:180,h:fs,text:'',color:color,fill:'none',fontSize:fs,rotate:0,isNew:true};
        var nl=list.concat([obj]);
        setPageObjs(pageIdx,nl);
        selectedObjRef.current=id;setSelectedObjId(id);
        // Auto-open edit mode immediately for new text boxes
        setEditingObjId(id);setEditText('');
        redraw(pageIdx,nl);
      }
    }
    mouseDownPtRef.current=null;
  }

  function onDblClick(ev){
    var pt=getPos(ev);
    var list=getObjs(pageIdx);
    var hit=hitTest(pt,list);
    if(hit&&hit.type==='text'){
      selectedObjRef.current=hit.id;setSelectedObjId(hit.id);
      setEditingObjId(hit.id);setEditText(hit.text);
      redraw(pageIdx,list);
    }
  }

  // ── object operations ────────────────────────────────────────────────────
  function commitText(){
    if(!editingObjId)return;
    var t=editText.trim()||'Text';
    var list=getObjs(pageIdx).map(function(o){
      if(o.id!==editingObjId)return o;
      var mw=Math.max(80,t.length*o.fontSize*0.55);
      return Object.assign({},o,{text:t,w:mw,isNew:false});
    });
    setPageObjs(pageIdx,list);
    redraw(pageIdx,list);
    setEditingObjId(null);setEditText('');
  }

  function deleteSelected(){
    if(!selectedObjRef.current)return;
    pushUndo(pageIdx);
    var list=getObjs(pageIdx).filter(function(o){return o.id!==selectedObjRef.current;});
    setPageObjs(pageIdx,list);
    selectedObjRef.current=null;setSelectedObjId(null);
    redraw(pageIdx,list);
  }

  function clearPage(){
    pushUndo(pageIdx);
    strokeLayersRef.current[pageIdx]=null;
    setPageObjs(pageIdx,[]);
    selectedObjRef.current=null;setSelectedObjId(null);setEditingObjId(null);
    var ov=overlayRef.current;if(ov)ov.getContext('2d').clearRect(0,0,ov.width,ov.height);
  }

  function rotateSelected(deg){
    if(!selectedObjRef.current)return;
    var list=getObjs(pageIdx).map(function(o){
      return o.id===selectedObjRef.current?Object.assign({},o,{rotate:(o.rotate||0)+deg}):o;
    });
    setPageObjs(pageIdx,list);redraw(pageIdx,list);
  }

  function setTextFill(fill){
    if(!selectedObjRef.current)return;
    var list=getObjs(pageIdx).map(function(o){
      return o.id===selectedObjRef.current?Object.assign({},o,{fill:fill}):o;
    });
    setPageObjs(pageIdx,list);redraw(pageIdx,list);
  }

  function insertImage(f){
    if(!f||!overlayRef.current)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      var img=new Image();
      img.onload=function(){
        var ov=overlayRef.current;
        var mw=ov.width*0.4,mh=ov.height*0.4;
        var sc=Math.min(mw/img.width,mh/img.height,1);
        var w=img.width*sc,h=img.height*sc;
        var id='i'+Date.now();
        // Place at top-center of page
        var x=ov.width/2-w/2, y=40;
        var obj={type:'image',id:id,x:x,y:y,w:w,h:h,imgEl:img,rotate:0};
        pushUndo(pageIdx);
        var list=getObjs(pageIdx).concat([obj]);
        setPageObjs(pageIdx,list);
        selectedObjRef.current=id;setSelectedObjId(id);
        setTool('select');
        redraw(pageIdx,list);
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(f);
  }

  async function exportPdf(){
    if(!file||!pdfDocRef.current){setStatus('Upload a PDF first','err');return;}
    saveStroke();
    setStatus('Exporting…');
    loadPdfLib(async function(PDFLib){
      if(!PDFLib){setStatus('Failed to load PDF engine','err');return;}
      try{
        var buf=await readBuf(file);
        var doc=await PDFLib.PDFDocument.load(buf,{ignoreEncryption:true});
        var pages=doc.getPages();
        for(var i=0;i<pages.length;i++){
          var hasStroke=strokeLayersRef.current[i];
          var hasObjs=(getObjs(i)).length>0;
          if(!hasStroke&&!hasObjs)continue;
          var cv=canvasRef.current;
          var tmp=document.createElement('canvas');
          tmp.width=cv.width;tmp.height=cv.height;
          var ctx=tmp.getContext('2d');
          var stroke=strokeLayersRef.current[i];
          if(stroke)ctx.putImageData(stroke,0,0);
          getObjs(i).forEach(function(obj){
            ctx.save();
            var cx2=objBounds(obj).x1+obj.w/2,cy2=objBounds(obj).y1+obj.h/2;
            if(obj.rotate){ctx.translate(cx2,cy2);ctx.rotate(obj.rotate*Math.PI/180);ctx.translate(-cx2,-cy2);}
            if(obj.type==='text'){
              if(obj.fill&&obj.fill!=='none'){ctx.fillStyle=obj.fill;ctx.globalAlpha=0.7;ctx.fillRect(obj.x-4,obj.y-obj.h,obj.w+8,obj.h+6);ctx.globalAlpha=1;}
              ctx.font='bold '+obj.fontSize+'px Geist,sans-serif';ctx.fillStyle=obj.color;ctx.fillText(obj.text,obj.x,obj.y);
            } else if(obj.type==='image'&&obj.imgEl){
              ctx.drawImage(obj.imgEl,obj.x,obj.y,obj.w,obj.h);
            }
            ctx.restore();
          });
          var dataUrl=tmp.toDataURL('image/png');
          var b64=dataUrl.split(',')[1];
          var ib=Uint8Array.from(atob(b64),function(c){return c.charCodeAt(0);});
          var emb=await doc.embedPng(ib);
          var pg=pages[i];var sz=pg.getSize();
          pg.drawImage(emb,{x:0,y:0,width:sz.width,height:sz.height,opacity:1});
        }
        var out=await doc.save();
        dlBlob(new Blob([out],{type:'application/pdf'}),basename(file.name)+'_annotated.pdf');
        setStatus('Done — annotated PDF downloaded','ok');
      }catch(err){setStatus('Error: '+err.message,'err');}
    });
