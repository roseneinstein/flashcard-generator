<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FlipWise</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#13131a;
  --surface:#1c1c26;
  --surface2:#23232f;
  --border:#ffffff14;
  --border-h:#ffffff26;
  --text:#ededf0;
  --muted:#8888a0;
  --muted2:#4a4a60;
  --accent:#e8d5b0;
  --green:#4ade80;
  --red:#f87171;
  --r:14px;
  --r-sm:8px;
}
html{scroll-behavior:smooth}
body{font-family:'Geist',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;cursor:none}

/* ── ATMOSPHERIC BACKGROUND ── */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(232,213,176,0.028) 1px,transparent 1px),
    linear-gradient(90deg,rgba(232,213,176,0.028) 1px,transparent 1px);
  background-size:72px 72px;
  pointer-events:none;
  z-index:0;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 30%,transparent 100%);
  -webkit-mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 30%,transparent 100%);
}
body::after{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 10%, rgba(140,120,200,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 80% 90%, rgba(232,213,176,0.055) 0%, transparent 55%),
    radial-gradient(ellipse 40% 30% at 60% 30%, rgba(100,160,255,0.04) 0%, transparent 50%);
  pointer-events:none;
  z-index:0;
}
#root{position:relative;z-index:1}

/* CURSOR */
#cur{width:8px;height:8px;background:var(--accent);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference;transition:width .12s,height .12s}
#cur-r{width:32px;height:32px;border:1px solid rgba(232,213,176,0.35);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .28s cubic-bezier(.22,1,.36,1),height .28s cubic-bezier(.22,1,.36,1),border-radius .2s}
body.hov #cur{width:5px;height:5px;opacity:0.5}
body.hov #cur-r{width:48px;height:48px;border-radius:6px;opacity:0.2}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;border-bottom:1px solid var(--border);background:rgba(19,19,26,0.88);backdrop-filter:blur(20px);z-index:100}
.logo{font-family:'Instrument Serif',serif;font-size:1.55rem;color:var(--accent);letter-spacing:-0.02em;font-weight:400}
.nav-r{display:flex;gap:24px;align-items:center}
.nl{font-size:0.75rem;font-weight:400;color:var(--muted);background:none;border:none;cursor:none;letter-spacing:0.06em;text-transform:uppercase;transition:color .2s;padding:0}
.nl:hover{color:var(--text)}
.np{font-size:0.78rem;font-weight:500;color:var(--bg);background:var(--accent);border:none;border-radius:50px;padding:7px 16px;cursor:none;transition:opacity .2s,transform .15s;letter-spacing:0.02em}
.np:hover{opacity:0.85;transform:scale(1.04)}

/* HERO */
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:100px 24px 80px;position:relative;overflow:clip}
.h-glow{position:absolute;width:800px;height:600px;background:radial-gradient(ellipse,rgba(232,213,176,0.07) 0%,transparent 65%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}

/* ── WATERMARK: full viewport width, dead centre, never clips ── */
.hero-wordmark{
  position:absolute;
  top:50%;
  left:0;
  right:0;
  transform:translateY(-50%);
  font-family:'Instrument Serif',serif;
  font-size:clamp(4rem, 18vw, 18vw);
  font-weight:400;
  letter-spacing:-0.03em;
  color:transparent;
  -webkit-text-stroke:1.5px rgba(232,213,176,0.1);
  white-space:nowrap;
  pointer-events:none;
  user-select:none;
  line-height:1;
  text-align:center;
  width:100%;
  padding:0;
  margin:0;
  animation:fu 1s ease both;
}

.h-line{font-size:0.68rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:28px;display:flex;align-items:center;gap:14px;animation:fu .55s ease both;position:relative;z-index:2}
.h-line::before,.h-line::after{content:'';width:36px;height:1px;background:var(--muted2)}

/* ── HEADLINE: biggest text users actually read on screen ── */
h1{
  font-family:'Instrument Serif',serif;
  font-size:clamp(4.5rem,11vw,9.5rem);
  font-weight:400;
  line-height:0.97;
  letter-spacing:-0.04em;
  max-width:960px;
  margin:0 auto 28px;
  animation:fu .55s .05s ease both;
  position:relative;
  z-index:2;
}
h1 em{font-style:italic;color:var(--accent)}
.h-sub{font-size:clamp(0.88rem,2vw,1rem);color:var(--muted);max-width:400px;margin:0 auto 44px;line-height:1.75;font-weight:300;animation:fu .55s .1s ease both}
.pill-row{display:flex;flex-wrap:wrap;justify-content:center;gap:7px;margin-bottom:44px;animation:fu .55s .15s ease both}
.pill{border:1px solid var(--border);border-radius:50px;padding:6px 15px;font-size:0.76rem;color:var(--muted);letter-spacing:0.03em;transition:border-color .2s,color .2s;cursor:none}
.pill:hover{border-color:var(--border-h);color:var(--text)}
.cta{font-family:'Geist',sans-serif;font-size:0.92rem;font-weight:500;color:var(--bg);background:var(--accent);border:none;border-radius:50px;padding:14px 34px;cursor:none;letter-spacing:0.02em;transition:opacity .2s,transform .15s,box-shadow .2s;animation:fu .55s .2s ease both}
.cta:hover{opacity:0.86;transform:translateY(-2px);box-shadow:0 10px 36px rgba(232,213,176,0.14)}
@keyframes fu{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}

/* FEATURES — single column rows, float on hover */
.feat-wrap{padding:80px 24px;max-width:760px;margin:0 auto}
.feat-eyebrow{font-size:0.68rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:10px}
.feat-heading{font-family:'Instrument Serif',serif;font-size:clamp(1.6rem,3.5vw,2.4rem);text-align:center;margin-bottom:48px;letter-spacing:-0.02em;line-height:1.1}
.feat-heading em{font-style:italic;color:var(--accent)}
.fg{display:flex;flex-direction:column;gap:3px}
.fc{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:24px 28px;
  position:relative;
  overflow:hidden;
  cursor:none;
  display:flex;
  align-items:flex-start;
  gap:20px;
  transition:
    transform .5s cubic-bezier(.22,1,.36,1),
    box-shadow .5s cubic-bezier(.22,1,.36,1),
    background .22s ease,
    border-color .22s ease;
  z-index:1;
}
.fc::before{
  content:'';
  position:absolute;inset:0;
  background:radial-gradient(circle at var(--mx,50%) var(--my,50%),rgba(232,213,176,0.1) 0%,transparent 60%);
  opacity:0;
  transition:opacity .35s;
  pointer-events:none;
}
.fc:hover{
  transform:translateY(-5px) scale(1.018);
  background:var(--surface2);
  border-color:rgba(232,213,176,0.18);
  box-shadow:0 16px 48px rgba(0,0,0,0.5), 0 0 0 1px rgba(232,213,176,0.1);
  z-index:10;
}
.fc:hover::before{opacity:1}
.fc-ico{
  font-size:1.1rem;
  opacity:0.55;
  flex-shrink:0;
  margin-top:2px;
  width:28px;
  text-align:center;
}
.fc-body{flex:1}
.fc-t{
  font-family:'Instrument Serif',serif;
  font-size:1.05rem;
  color:var(--text);
  margin-bottom:5px;
  letter-spacing:-0.01em;
}
.fc-d{
  font-size:0.8rem;
  color:var(--muted);
  line-height:1.72;
  font-weight:300;
  padding-left:2px;
}

/* APP */
.app-wrap{max-width:660px;margin:0 auto;padding:0 20px 110px}
.ey{font-size:0.68rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:9px}
.st{font-family:'Instrument Serif',serif;font-size:clamp(1.7rem,4vw,2.6rem);text-align:center;margin-bottom:48px;letter-spacing:-0.02em;line-height:1.1}
.st em{font-style:italic;color:var(--accent)}

/* Input */
/* Expandable input wrapper */
.icard{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  overflow:hidden;
  margin-bottom:14px;
  transition:
    border-color .35s,
    box-shadow .45s cubic-bezier(.22,1,.36,1),
    transform .45s cubic-bezier(.22,1,.36,1);
}
.icard:hover{
  transform:scale(1.012);
  border-color:var(--border-h);
  box-shadow:0 6px 32px rgba(0,0,0,0.3), 0 0 0 1px rgba(232,213,176,0.07);
}
.icard:focus-within{
  transform:scale(1.016);
  border-color:rgba(232,213,176,0.28);
  box-shadow:0 0 0 1px rgba(232,213,176,0.08),0 12px 48px rgba(0,0,0,0.35);
}
.tbar{display:flex;gap:3px;background:var(--surface2);padding:4px;border-bottom:1px solid var(--border)}
.tb{flex:1;padding:8px 10px;border:none;background:transparent;color:var(--muted);font-family:'Geist',sans-serif;font-size:0.75rem;font-weight:400;cursor:none;border-radius:5px;transition:all .15s;text-transform:uppercase;letter-spacing:0.07em}
.tb.act{background:var(--surface);color:var(--text)}

/* The textarea itself expands fluidly */
textarea{
  width:100%;
  min-height:140px;
  max-height:520px;
  background:transparent;
  border:none;
  padding:18px;
  font-family:'Geist',sans-serif;
  font-size:0.9rem;
  color:var(--text);
  line-height:1.72;
  font-weight:300;
  resize:none;
  outline:none;
  transition:min-height .55s cubic-bezier(.22,1,.36,1);
  display:block;
  overflow-y:auto;
}
textarea:focus,textarea:not(:placeholder-shown){
  min-height:260px;
}
/* Smooth overflow reveal as it expands */
.icard:has(textarea:focus){
  box-shadow:0 0 0 1px rgba(232,213,176,0.1),0 16px 56px rgba(0,0,0,0.35);
}
textarea::placeholder{color:var(--muted2);line-height:1.72}
.upz{padding:56px 24px;text-align:center;cursor:none;background:transparent;border:none;transition:background .2s;width:100%}
.upz:hover,.upz.dov{background:rgba(232,213,176,0.03)}
.upz-i{font-size:1.6rem;margin-bottom:12px;opacity:0.3;display:block}
.upz p{font-size:0.82rem;color:var(--muted);line-height:1.7;font-weight:300}
.upz strong{color:var(--accent);font-weight:400}
input[type=file]{display:none}
.ctrl{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-top:1px solid var(--border);gap:10px;flex-wrap:wrap}
.cbs{display:flex;gap:3px}
.cb{padding:5px 12px;border:1px solid var(--border);border-radius:50px;background:transparent;color:var(--muted);font-family:'Geist',sans-serif;font-size:0.75rem;cursor:none;transition:all .15s}
.cb.s{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.cb:hover:not(.s){border-color:var(--border-h);color:var(--text)}
.gb{padding:9px 22px;background:var(--accent);color:var(--bg);border:none;border-radius:50px;font-family:'Geist',sans-serif;font-size:0.82rem;font-weight:500;cursor:none;letter-spacing:0.03em;transition:opacity .2s,transform .15s}
.gb:hover:not(:disabled){opacity:0.83;transform:scale(1.03)}
.gb:disabled{opacity:0.28;cursor:not-allowed}
.urow{display:flex;align-items:center;gap:10px;padding:9px 18px;border-top:1px solid var(--border)}
.ut{flex:1;height:2px;background:var(--muted2);border-radius:2px;overflow:hidden}
.uf{height:100%;background:var(--accent);border-radius:2px;transition:width .5s ease}
.utx{font-size:0.7rem;color:var(--muted);white-space:nowrap}

/* Loading */
.ld{padding:56px 20px;text-align:center}
.dots{display:flex;justify-content:center;gap:5px;margin-bottom:14px}
.dots span{width:4px;height:4px;background:var(--accent);border-radius:50%;animation:dt 1.2s ease-in-out infinite;opacity:0.5}
.dots span:nth-child(2){animation-delay:.15s}
.dots span:nth-child(3){animation-delay:.3s}
@keyframes dt{0%,80%,100%{transform:scaleY(0.4)}40%{transform:scaleY(1.2);opacity:1}}
.ld p{font-size:0.78rem;color:var(--muted);letter-spacing:0.05em;font-weight:300}

/* Results */
.rtabs{display:flex;gap:1px;background:var(--border);border-radius:var(--r) var(--r) 0 0;overflow:hidden;border:1px solid var(--border);border-bottom:none}
.rt{flex:1;padding:13px;background:var(--surface2);border:none;color:var(--muted);font-family:'Geist',sans-serif;font-size:0.75rem;font-weight:400;text-transform:uppercase;letter-spacing:0.07em;cursor:none;transition:all .15s}
.rt.act{background:var(--surface);color:var(--text)}
.rt .bdg{display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:1px 6px;font-size:0.65rem;margin-left:6px;color:var(--muted)}
.rt.act .bdg{background:var(--accent);border-color:var(--accent);color:var(--bg)}
.rbody{background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);overflow:hidden}

/* Flashcard */
.fnr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
.nb{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:0.95rem;cursor:none;display:flex;align-items:center;justify-content:center;transition:all .15s}
.nb:hover:not(:disabled){border-color:var(--border-h);color:var(--text)}
.nb:disabled{opacity:0.18}
.fc-ctr{font-size:0.75rem;color:var(--muted);letter-spacing:0.06em}
.fw{perspective:1400px;padding:22px;cursor:none}
.fi{position:relative;width:100%;min-height:210px;transform-style:preserve-3d;transition:transform .58s cubic-bezier(.4,.2,.2,1)}
.fi.fl{transform:rotateY(180deg)}
.ff,.fb{position:absolute;inset:0;border-radius:var(--r);backface-visibility:hidden;-webkit-backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px;text-align:center;min-height:210px}
.ff{background:var(--surface2);border:1px solid var(--border)}
.fb{background:#0e1912;border:1px solid #1b3322;transform:rotateY(180deg)}
.fl-lbl{font-size:0.62rem;letter-spacing:0.15em;text-transform:uppercase;opacity:0.38;margin-bottom:16px}
.fl-q{font-family:'Instrument Serif',serif;font-size:clamp(1rem,2.8vw,1.3rem);line-height:1.5;color:var(--text);font-weight:400}
.fl-a{font-size:0.88rem;line-height:1.75;color:var(--green);font-weight:300}
.fl-hint{position:absolute;bottom:12px;right:16px;font-size:0.62rem;color:var(--muted2);letter-spacing:0.04em}
.fca{display:flex;gap:7px;padding:14px 18px;border-top:1px solid var(--border);flex-wrap:wrap}
.ab{flex:1;min-width:82px;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r-sm);background:transparent;color:var(--muted);font-family:'Geist',sans-serif;font-size:0.75rem;cursor:none;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s;letter-spacing:0.03em}
.ab:hover{border-color:var(--border-h);color:var(--text)}
.ab.pr{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.ab.pr:hover{opacity:0.83}
.ab:disabled{opacity:0.28}

/* Quiz */
.qw{padding:22px}
.qpr{display:flex;align-items:center;gap:10px;margin-bottom:22px}
.qtr{flex:1;height:2px;background:var(--muted2);border-radius:2px;overflow:hidden}
.qf{height:100%;background:var(--accent);border-radius:2px;transition:width .5s ease}
.qst{font-size:0.72rem;color:var(--muted);white-space:nowrap}
.qq{font-family:'Instrument Serif',serif;font-size:1.15rem;line-height:1.5;margin-bottom:22px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.og{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:18px}
@media(max-width:460px){.og{grid-template-columns:1fr}}
.ob{padding:13px 14px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surface2);color:var(--text);font-family:'Geist',sans-serif;font-size:0.8rem;font-weight:300;line-height:1.5;text-align:left;cursor:none;transition:all .15s}
.ob:hover:not(:disabled){border-color:var(--border-h);background:var(--surface)}
.ob.cor{border-color:#1b3322;background:#0e1912;color:var(--green)}
.ob.wrg{border-color:#2a1515;background:#1a0e0e;color:var(--red)}
.ob:disabled{cursor:not-allowed}
.qex{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px;font-size:0.8rem;color:var(--muted);line-height:1.7;font-weight:300;margin-bottom:14px}
.qex strong{color:var(--text);font-weight:400}
.nx{width:100%;padding:12px;background:var(--accent);color:var(--bg);border:none;border-radius:var(--r-sm);font-family:'Geist',sans-serif;font-size:0.83rem;font-weight:500;cursor:none;letter-spacing:0.03em;transition:opacity .2s}
.nx:hover{opacity:0.84}
.qres{text-align:center;padding:40px 24px}
.qsb{font-family:'Instrument Serif',serif;font-size:3.8rem;color:var(--accent);margin-bottom:6px}
.qrs{font-size:0.82rem;color:var(--muted);margin-bottom:26px;font-weight:300;line-height:1.7}
.rbtn{padding:11px 26px;border:1px solid var(--border);border-radius:50px;background:transparent;color:var(--text);font-family:'Geist',sans-serif;font-size:0.8rem;cursor:none;transition:all .15s}
.rbtn:hover{border-color:var(--border-h)}

/* Pricing */
.pr-wrap{padding:90px 24px;max-width:760px;margin:0 auto}
.plans{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:1px;
  border:1px solid var(--border);
  border-radius:var(--r);
  background:var(--border);
  overflow:visible;
  isolation:isolate;
}
@media(max-width:560px){.plans{grid-template-columns:1fr}}
.plan{
  background:var(--surface);
  padding:28px 22px;
  cursor:none;
  position:relative;
  overflow:hidden;
  z-index:1;
  transition:
    transform .45s cubic-bezier(.22,1,.36,1),
    background .2s ease,
    box-shadow .45s cubic-bezier(.22,1,.36,1);
}
.plans .plan:first-child{border-radius:var(--r) 0 0 var(--r)}
.plans .plan:last-child{border-radius:0 var(--r) var(--r) 0}
@media(max-width:560px){
  .plans .plan:first-child{border-radius:var(--r) var(--r) 0 0}
  .plans .plan:last-child{border-radius:0 0 var(--r) var(--r)}
}
.plan::before{
  content:'';
  position:absolute;inset:0;
  background:radial-gradient(circle at var(--mx,50%) var(--my,50%),rgba(232,213,176,0.09) 0%,transparent 58%);
  opacity:0;
  transition:opacity .3s;
  pointer-events:none;
}
.plan:hover{
  transform:scale(1.05);
  background:var(--surface2);
  box-shadow:0 10px 44px rgba(0,0,0,0.5), 0 0 0 1px rgba(232,213,176,0.14);
  z-index:10;
}
.plan:hover::before,.plan.pop::before{opacity:1}
.plan.pop{background:var(--surface2);transform:scale(1.02)}
.plan.pop:hover{transform:scale(1.06)}
.p-tag{font-size:0.62rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:18px;display:flex;align-items:center;gap:7px}
.p-bdg{background:var(--accent);color:var(--bg);border-radius:3px;padding:2px 7px;font-size:0.58rem;letter-spacing:0.1em}
.p-price{font-family:'Instrument Serif',serif;font-size:2.2rem;color:var(--text);margin-bottom:3px;letter-spacing:-0.02em}
.p-price sup{font-size:0.9rem;opacity:0.55}
.p-per{font-size:0.72rem;color:var(--muted);margin-bottom:22px}
.p-feats{list-style:none}
.p-feats li{font-size:0.78rem;color:var(--muted);padding:6px 0;display:flex;align-items:flex-start;gap:7px;line-height:1.5;font-weight:300;border-top:1px solid var(--border)}

<body>
<div id="cur"></div>
<div id="cur-r"></div>
<div id="root"></div>

<script type="text/babel">
const{useState,useRef,useEffect}=React;

const CFG={
  FREE_LIMIT:10,
  RZP_KEY:'YOUR_RAZORPAY_KEY_HERE',
};

function getUsage(){const t=new Date().toDateString();const s=JSON.parse(localStorage.getItem('fw_u')||'{}');return s.d===t?s.c||0:0}
function bumpUsage(){localStorage.setItem('fw_u',JSON.stringify({d:new Date().toDateString(),c:getUsage()+1}))}
function isPro(){return localStorage.getItem('fw_pro')==='true'}

async function callAI(text,count){
  // Calls OUR Vercel serverless function — API key stays safe on the server
  const r=await fetch('/api/generate',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({text,count}),
  });
  if(!r.ok){
    const e=await r.json().catch(()=>({}));
    throw new Error(e.error||'Server error');
  }
  return r.json();
}

function dlPDF(cards,title){
  const rows=cards.map((c,i)=>`<div style="border:1px solid #e4e4e7;border-radius:10px;padding:20px;margin-bottom:16px;page-break-inside:avoid"><div style="font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:#a1a1aa;margin-bottom:8px">Card ${i+1}</div><div style="font-size:15px;margin-bottom:10px;line-height:1.5">${c.question}</div><div style="font-size:13px;color:#52525b;line-height:1.6;border-top:1px dashed #e4e4e7;padding-top:10px">${c.answer}</div></div>`).join('');
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>${title}</title><style>body{font-family:Georgia,serif;padding:36px;max-width:680px;margin:auto}h1{font-size:20px;margin-bottom:4px}p{color:#a1a1aa;font-size:12px;margin-bottom:28px}</style></head><body><h1>${title}</h1><p>${new Date().toLocaleDateString('en-IN')} · ${cards.length} cards</p>${rows}</body></html>`);
  w.document.close();
  setTimeout(()=>w.print(),500);
}

// Cursor + textarea auto-resize
function useCursor(){
  useEffect(()=>{
    const dot=document.getElementById('cur'),ring=document.getElementById('cur-r');
    let rx=0,ry=0,mx=0,my=0;
    const mv=e=>{mx=e.clientX;my=e.clientY;dot.style.left=mx+'px';dot.style.top=my+'px'};
    const tick=()=>{rx+=(mx-rx)*.1;ry+=(my-ry)*.1;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(tick)};
    document.addEventListener('mousemove',mv);
    tick();
    const addHover=()=>{
      document.querySelectorAll('button,a').forEach(el=>{
        el.addEventListener('mouseenter',()=>document.body.classList.add('hov'));
        el.addEventListener('mouseleave',()=>document.body.classList.remove('hov'));
      });
    };
    addHover();
    // Auto-resize textareas as user types
    const autoResize=e=>{
      const el=e.target;
      if(el.tagName==='TEXTAREA'){
        el.style.height='auto';
        el.style.height=Math.min(el.scrollHeight,520)+'px';
      }
    };
    document.addEventListener('input',autoResize);
    const obs=new MutationObserver(addHover);
    obs.observe(document.body,{childList:true,subtree:true});
    return()=>{document.removeEventListener('mousemove',mv);document.removeEventListener('input',autoResize)};
  },[]);
}

// Scroll reveal
function useReveal(){
  useEffect(()=>{
    const obs=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('vis')}),{threshold:0.1});
    document.querySelectorAll('.rev').forEach(el=>obs.observe(el));
    return()=>obs.disconnect();
  });
}

function HFeat({icon,title,desc}){
  const r=useRef();
  return(
    <div className="fc" ref={r} onMouseMove={e=>{const b=r.current.getBoundingClientRect();r.current.style.setProperty('--mx',((e.clientX-b.left)/b.width*100)+'%');r.current.style.setProperty('--my',((e.clientY-b.top)/b.height*100)+'%')}}>
      <span className="fc-ico">{icon}</span>
      <div className="fc-body">
        <div className="fc-t">{title}</div>
        <p className="fc-d">{desc}</p>
      </div>
    </div>
  );
}

function Card({card,idx,total,onPrev,onNext}){
  const[fl,setFl]=useState(false);
  const[anim,setAnim]=useState('in');
  const txRef=useRef(null);
  const tyRef=useRef(null);
  const dragRef=useRef(false);
  useEffect(function(){setFl(false);setAnim('in');},[idx]);

  function go(dir){
    setAnim(dir==='next'?'out-left':'out-right');
    setTimeout(function(){
      dir==='next'?onNext():onPrev();
      setAnim('in');
    },260);
  }

  function tStart(e){
    txRef.current=e.touches[0].clientX;
    tyRef.current=e.touches[0].clientY;
    dragRef.current=false;
  }
  function tMove(e){
    if(txRef.current===null)return;
    var dx=e.touches[0].clientX-txRef.current;
    var dy=e.touches[0].clientY-tyRef.current;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>10){
      dragRef.current=true;
      e.preventDefault();
    }
  }
  function tEnd(e){
    if(txRef.current===null)return;
    var dx=e.changedTouches[0].clientX-txRef.current;
    var dy=e.changedTouches[0].clientY-tyRef.current;
    var wasDrag=dragRef.current;
    txRef.current=null; tyRef.current=null; dragRef.current=false;
    if(!wasDrag&&Math.abs(dx)<30&&Math.abs(dy)<30){
      setFl(function(f){return !f;}); return;
    }
    if(dx<-50&&idx<total-1) go('next');
    else if(dx>50&&idx>0) go('prev');
  }

  var pts=(card.points||card.answer||'').split('|').filter(function(l){return l.trim();});
  var animStyle={
    transition:'transform .28s cubic-bezier(.4,0,.2,1),opacity .28s ease',
    transform:anim==='in'?'scale(1)':anim==='out-left'?'scale(0.88) translateX(-40px)':'scale(0.88) translateX(40px)',
    opacity:anim==='in'?1:0,
  };

  return(
    <div style={{position:'relative',userSelect:'none',touchAction:'pan-y'}}>
      <div style={{position:'absolute',left:0,top:0,bottom:0,width:'18%',zIndex:5,cursor:'none'}}
        onClick={function(e){e.stopPropagation();if(idx>0)go('prev');}}/>
      <div style={{position:'absolute',right:0,top:0,bottom:0,width:'18%',zIndex:5,cursor:'none'}}
        onClick={function(e){e.stopPropagation();if(idx<total-1)go('next');}}/>
      <div className="fw" style={animStyle}
        onClick={function(){setFl(function(f){return !f;});}}
        onTouchStart={tStart} onTouchMove={tMove} onTouchEnd={tEnd}>
        <div className={fl?'fi fl':'fi'}>
          <div className="ff">
            <div className="fl-lbl">Topic</div>
            <div className="fl-q">{card.topic||card.question}</div>
            <div className="fl-hint">tap to study · swipe to navigate</div>
          </div>
          <div className="fb" style={{alignItems:'flex-start',textAlign:'left',overflowY:'auto',padding:'20px'}}>
            <div className="fl-lbl" style={{width:'100%',textAlign:'center',marginBottom:12}}>Key Points</div>
            <div style={{width:'100%'}}>
              {pts.map(function(line,i){
                var t=line.trim();
                if(!t)return null;
                return(
                  <div key={i} style={{display:'flex',gap:7,marginBottom:6,alignItems:'flex-start'}}>
                    <span style={{color:'var(--accent)',fontSize:'0.65rem',marginTop:4,flexShrink:0}}>→</span>
                    <span style={{fontSize:'0.82rem',lineHeight:1.65,color:'var(--text)',fontWeight:300}}>{t}</span>
                  </div>
                );
              })}
            </div>
            <div className="fl-hint">tap to flip back</div>
          </div>
        </div>
      </div>
      <div style={{display:'flex',justifyContent:'center',gap:6,marginTop:14}}>
        {Array.from({length:total}).map(function(_,i){
          return(
            <div key={i} style={{
              width:i===idx?18:6,height:6,borderRadius:3,
              background:i===idx?'var(--accent)':'var(--muted2)',
              transition:'width .35s cubic-bezier(.22,1,.36,1),background .2s',
            }}/>
          );
        })}
      </div>
    </div>
  );
}
function Quiz({qs}){
  const txRef=useRef(null);
  const[qi,setQi]=useState(0);
  const[ch,setCh]=useState(null);
  const[sc,setSc]=useState(0);
  const[done,setDone]=useState(false);
  const[anim,setAnim]=useState('in');

  function goQ(dir){
    setAnim(dir==='next'?'out-left':'out-right');
    setTimeout(function(){
      if(dir==='next'){
        if(qi===qs.length-1){setDone(true);}
        else{setQi(function(i){return i+1;});setCh(null);}
      } else {
        setQi(function(i){return i-1;});setCh(null);
      }
      setAnim('in');
    },260);
  }

  useEffect(function(){setAnim('in');},[qi,done]);

  if(done){
    const pct=Math.round(sc/qs.length*100);
    return(
      <div className="qres" style={{
        transition:'transform .35s cubic-bezier(.22,1,.36,1),opacity .35s',
        animation:'scaleIn .35s cubic-bezier(.22,1,.36,1) both',
      }}>
        <div className="qsb">{pct}%</div>
        <div className="qrs">{sc} of {qs.length} correct<br/>{pct>=80?'Excellent — concepts are clear.':pct>=50?'Good effort. Review a few areas.':'Go through the cards once more.'}</div>
        <button className="rbtn" onClick={function(){setQi(0);setCh(null);setSc(0);setDone(false);}}>Retry</button>
      </div>
    );
  }

  const q=qs[qi];
  const answered=ch!==null;

  const animStyle={
    transition:'transform .26s cubic-bezier(.4,0,.2,1), opacity .26s ease',
    transform: anim==='in'?'scale(1)':anim==='out-left'?'scale(0.9) translateX(-30px)':'scale(0.9) translateX(30px)',
    opacity: anim==='in'?1:0,
  };

  const qTouchStart=useRef(null);
  const qTouchDx=useRef(0);
  function onQTouchStart(e){qTouchStart.current=e.touches[0].clientX;qTouchDx.current=0;}
  function onQTouchMove(e){if(qTouchStart.current===null)return;qTouchDx.current=e.touches[0].clientX-qTouchStart.current;}
  function onQTouchEnd(){
    var dx=qTouchDx.current;
    qTouchStart.current=null;qTouchDx.current=0;
    if(!answered||Math.abs(dx)<40)return;
    if(dx<-40)goQ('next');
    else if(dx>40&&qi>0)goQ('prev');
  }

  return(
    <div className="qw" onTouchStart={onQTouchStart} onTouchMove={onQTouchMove} onTouchEnd={onQTouchEnd}>
      <div className="qpr">
        <div className="qtr"><div className="qf" style={{width:(qi/qs.length*100)+'%'}}/></div>
        <span className="qst">{qi+1}/{qs.length}</span>
      </div>

      <div style={animStyle}
        onTouchStart={function(e){txRef.current=e.touches[0].clientX;}}
        onTouchEnd={function(e){
          var dx=e.changedTouches[0].clientX-txRef.current;
          if(answered&&dx<-50&&qi<qs.length-1)goQ('next');
          else if(answered&&dx>50&&qi>0)goQ('prev');
        }}>
        <div className="qq">{q.question}</div>
        <div className="og">
          {q.options.map(function(o,i){
            var cls='ob';
            if(answered){
              if(i===q.correct)cls+=' cor';
              else if(i===ch&&ch!==q.correct)cls+=' wrg';
            }
            return(
              <button key={i} className={cls} onClick={function(){
                if(answered)return;
                setCh(i);
                if(i===q.correct)setSc(function(s){return s+1;});
              }} disabled={answered}>
                <span style={{opacity:.35,marginRight:7,fontSize:'0.65rem',letterSpacing:'0.06em'}}>{['A','B','C','D'][i]}</span>{o}
              </button>
            );
          })}
        </div>
        {answered&&(
          <>
            <div className="qex"><strong>{ch===q.correct?'Correct. ':'Incorrect. '}</strong>{q.explanation}</div>
            <button className="nx" onClick={function(){goQ('next');}}>
              {qi===qs.length-1?'See results':'Next →'}
            </button>
          </>
        )}
      </div>

      {/* Dot indicators */}
      <div style={{display:'flex',justifyContent:'center',gap:6,marginTop:18}}>
        {qs.map(function(_,i){
          return(
            <div key={i} style={{
              width: i===qi?18:6,
              height:6,
              borderRadius:3,
              background: i===qi?'var(--accent)':'var(--muted2)',
              transition:'width .35s cubic-bezier(.22,1,.36,1), background .2s',
            }}/>
          );
        })}
      </div>
    </div>
  );
}


function PCard({name,price,period,feats,pop,onSel}){
  const r=useRef();
  return(
    <div className={`plan${pop?' pop':''}`} ref={r} onMouseMove={e=>{const b=r.current.getBoundingClientRect();r.current.style.setProperty('--mx',((e.clientX-b.left)/b.width*100)+'%');r.current.style.setProperty('--my',((e.clientY-b.top)/b.height*100)+'%')}}>
      <div className="p-tag">{name}{pop&&<span className="p-bdg">Popular</span>}</div>
      <div className="p-price"><sup>₹</sup>{price}</div>
      <div className="p-per">{period}</div>
      <ul className="p-feats">{feats.map(f=><li key={f}>{f}</li>)}</ul>
      <button className={`p-btn${pop?' pr':''}`} onClick={onSel}>{price==='0'?'Start free':'Get access'}</button>
    </div>
  );
}

function App(){
  useCursor();
  useReveal();
  const[itab,setItab]=useState('text');
  const[notes,setNotes]=useState('');
  const[fn,setFn]=useState('');
  const[pdfTxt,setPdfTxt]=useState('');
  const[cnt,setCnt]=useState(10);
  const[loading,setLoading]=useState(false);
  const[cards,setCards]=useState([]);
  const[quiz,setQuiz]=useState([]);
  const[ci,setCi]=useState(0);
  const[rtab,setRtab]=useState('cards');
  const[pw,setPw]=useState(false);
  const[sp,setSp]=useState('pro');
  const[toast,setToast]=useState('');
  const[drag,setDrag]=useState(false);
  const fref=useRef();
  const tt=useRef();

  const usage=getUsage(),pro=isPro();
  function st(m){setToast(m);clearTimeout(tt.current);tt.current=setTimeout(()=>setToast(''),2700)}

  async function gen(){
    const txt=itab==='text'?notes:pdfTxt;
    if(!txt.trim())return st('Paste some notes first');
    if(!pro&&usage>=CFG.FREE_LIMIT){setPw(true);return}
    setLoading(true);setCards([]);setQuiz([]);
    try{
      const res=await callAI(txt,cnt);
      setCards(res.flashcards||[]);setQuiz(res.quiz||[]);
      setCi(0);setRtab('cards');bumpUsage();
      st(`${(res.flashcards||[]).length} cards ready`);
      setTimeout(()=>document.getElementById('ra')?.scrollIntoView({behavior:'smooth',block:'start'}),100);
    }catch(e){st('Error: '+(e.message||'Check config'))}
    finally{setLoading(false)}
  }

  async async function hFile(file){
    if(!file) return;
    if(!file.type.includes('pdf')) return st('PDF files only');
    if(file.size > 20*1024*1024) return st('PDF too large — keep under 20MB');
    setFn(file.name);
    setPdfTxt('');
    st('Reading PDF…');
    var loadLib = new Promise(function(resolve, reject){
      if(window.pdfjsLib){ resolve(); return; }
      var s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
      s.onload = function(){
        window.pdfjsLib.GlobalWorkerOptions.workerSrc =
          'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        resolve();
      };
      s.onerror = reject;
      document.head.appendChild(s);
    });
    var reader = new FileReader();
    reader.onload = function(e){
      loadLib.then(function(){
        var typedArray = new Uint8Array(e.target.result);
        window.pdfjsLib.getDocument({data: typedArray}).promise.then(function(pdf){
          var maxPages = Math.min(pdf.numPages, 20);
          var allText = '';
          var pagesDone = 0;
          for(var p = 1; p <= maxPages; p++){
            (function(pageNum){
              pdf.getPage(pageNum).then(function(page){
                page.getTextContent().then(function(tc){
                  allText += tc.items.map(function(item){ return item.str; }).join(' ') + ' ';
                  pagesDone++;
                  if(pagesDone === maxPages){
                    var txt = allText.trim();
                    if(!txt){ st('No text found — try a text-based PDF'); return; }
                    setPdfTxt(txt);
                    st('Extracted ' + maxPages + ' of ' + pdf.numPages + ' pages — ready to generate');
                  }
                });
              });
            })(p);
          }
        }).catch(function(err){ st('Could not read PDF: ' + err.message); });
      }).catch(function(){ st('PDF library failed to load — check connection'); });
    };
    reader.readAsArrayBuffer(file);
  }
  function pay(plan){
    if(CFG.RZP_KEY==='YOUR_RAZORPAY_KEY_HERE')return st('Add Razorpay key to enable payments');
    new window.Razorpay({key:CFG.RZP_KEY,amount:plan==='pro'?9900:19900,currency:'INR',name:'FlipWise',description:plan==='pro'?'Pro · ₹99/mo':'Elite · ₹199/mo',theme:{color:'#e8d5b0'},
      handler:()=>{localStorage.setItem('fw_pro','true');setPw(false);st('Access unlocked')}
    }).open();
  }

  const itxt=itab==='text'?notes:pdfTxt;
  const scrollApp=()=>document.getElementById('app')?.scrollIntoView({behavior:'smooth'});

  return(
    <>
      <nav>
        <div className="logo">FlipWise</div>
        <div className="nav-r">
          <button className="nl" onClick={()=>document.getElementById('ft')?.scrollIntoView({behavior:'smooth'})}>Features</button>
          <button className="nl" onClick={()=>document.getElementById('pr')?.scrollIntoView({behavior:'smooth'})}>Pricing</button>
          <button className="np" onClick={scrollApp}>Try free</button>
        </div>
      </nav>

      {/* HERO */}
      <section className="hero">
        <div className="h-glow"/>
        <div className="hero-wordmark" aria-hidden="true">FlipWise</div>
        <div className="h-line">UPSC · JEE · NEET · CA</div>
        <h1>Notes become<br/><em>flashcards</em></h1>
        <p className="h-sub">Paste any text. Get precise revision cards and a self-test quiz — in seconds.</p>
        <div className="pill-row">
          {['UPSC Prelims','JEE Physics','NEET Bio','CA Law','History','Economics','Current Affairs'].map(t=><span key={t} className="pill">{t}</span>)}
        </div>
        <button className="cta" onClick={scrollApp}>Start for free →</button>
      </section>

      {/* FEATURES */}
      <section id="ft" className="feat-wrap rev">
        <div className="feat-eyebrow">What you get</div>
        <h2 className="feat-heading">Built for how<br/><em>Indian students</em> actually study</h2>
        <div className="fg">
          <HFeat icon="⚡" title="Instant study cards" desc="Paste any notes — UPSC, JEE, NEET, CA. Get precise topic cards with pointers, tables and flows in seconds."/>
          <HFeat icon="🧠" title="Memory-first flashcards" desc="Cards show topic → key pointers → flowcharts. Built for memorisation, not just reading."/>
          <HFeat icon="📝" title="Self-test quiz" desc="After your cards, test yourself with MCQs from the same content. Know exactly what sticks."/>
          <HFeat icon="📄" title="PDF upload & export" desc="Upload your study material as PDF. Download all flashcards as a clean printable PDF too."/>
          <HFeat icon="📱" title="Mobile first" desc="Designed for phone screens. Study on the bus, in the hostel, between lectures — anywhere."/>
          <HFeat icon="🔒" title="No signup needed" desc="Start immediately, no account required for free tier. Your notes stay private in your browser."/>
        </div>
      </section>

      {/* APP */}
      <section id="app" className="app-wrap">
        <div className="ey rev">Generate</div>
        <h2 className="st rev">Paste. <em>Generate.</em> Revise.</h2>
        <div className="icard rev">
          <div className="tbar">
            <button className={`tb${itab==='text'?' act':''}`} onClick={()=>setItab('text')}>Text</button>
            <button className={`tb${itab==='pdf'?' act':''}`} onClick={()=>setItab('pdf')}>PDF</button>
          </div>
          {itab==='text'?
            <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder={"Paste your study notes here…\n\nWorks with anything — UPSC answer keys, JEE chapters, NEET diagrams text, CA act excerpts, your own handwritten notes typed out…"}/>
          :(
            <>
              <button className={`upz${drag?' dov':''}`} onClick={()=>fref.current.click()} onDragOver={e=>{e.preventDefault();setDrag(true)}} onDragLeave={()=>setDrag(false)} onDrop={e=>{e.preventDefault();setDrag(false);hFile(e.dataTransfer.files[0])}}>
                <span className="upz-i">↑</span>
                {fn?<p><strong>{fn}</strong><br/>Click to replace</p>:<p>Drop PDF here or <strong>click to browse</strong><br/>Max ~20 pages for best results</p>}
              </button>
              <input type="file" accept=".pdf" ref={fref} onChange={e=>hFile(e.target.files[0])}/>
              {fn&&<textarea value={pdfTxt} onChange={e=>setPdfTxt(e.target.value)} placeholder="Edit extracted text if needed…" style={{borderTop:'1px solid var(--border)'}}/>}
            </>
          )}
          <div className="ctrl">
            <div className="cbs">{[5,10,15,20].map(n=><button key={n} className={`cb${cnt===n?' s':''}`} onClick={()=>setCnt(n)}>{n}</button>)}</div>
            <button className="gb" onClick={gen} disabled={loading||!itxt.trim()}>{loading?'Generating…':'Generate →'}</button>
          </div>
          {!pro&&<div className="urow"><div className="ut"><div className="uf" style={{width:`${Math.min(100,usage/CFG.FREE_LIMIT*100)}%`}}/></div><span className="utx">{usage}/{CFG.FREE_LIMIT} today</span></div>}
        </div>

        <div id="ra"/>
        {loading&&<div className="ld"><div className="dots"><span/><span/><span/></div><p>Generating your cards…</p></div>}

        {!loading&&cards.length>0&&(
          <div className="rev" style={{marginTop:4}}>
            <div className="rtabs">
              <button className={`rt${rtab==='cards'?' act':''}`} onClick={()=>setRtab('cards')}>Flashcards<span className="bdg">{cards.length}</span></button>
              <button className={`rt${rtab==='quiz'?' act':''}`} onClick={()=>setRtab('quiz')}>Quiz<span className="bdg">{quiz.length}</span></button>
            </div>
            <div className="rbody">
              {rtab==='cards'&&<>
                <Card
                  card={cards[ci]}
                  idx={ci}
                  total={cards.length}
                  onNext={()=>setCi(i=>Math.min(i+1,cards.length-1))}
                  onPrev={()=>setCi(i=>Math.max(i-1,0))}
                />
                <div className="fca" style={{marginTop:8}}>
                  <button className="ab" onClick={()=>setCi(0)}>↩ Reset</button>
                  <button className="ab" onClick={()=>setCi(Math.floor(Math.random()*cards.length))}>⇄ Shuffle</button>
                  <button className="ab" onClick={()=>setRtab('quiz')} disabled={!quiz.length}>📝 Quiz</button>
                  <button className="ab pr" onClick={()=>dlPDF(cards,'FlipWise Study Cards')}>↓ PDF</button>
                </div>
              </>}
              {rtab==='quiz'&&(quiz.length>0?<Quiz qs={quiz}/>:<div className="emp"><div className="emp-i">?</div><p>No quiz available</p></div>)}
            </div>
          </div>
        )}
        {!loading&&cards.length===0&&<div className="emp rev" style={{marginTop:14}}><div className="emp-i">◻</div><p>Your flashcards will appear here</p></div>}
      </section>

      {/* PRICING */}
      <section id="pr" className="pr-wrap">
        <div className="ey rev">Pricing</div>
        <h2 className="st rev">Start free.<br/><em>Upgrade anytime.</em></h2>
        <div className="plans rev">
          <PCard name="Free" price="0" period="forever" feats={['10 generations/day','Text paste','Flashcard flip','PDF export']} onSel={scrollApp}/>
          <PCard name="Pro" price="99" period="per month" pop feats={['Unlimited generations','PDF upload','All Free features','Priority access']} onSel={()=>setPw(true)}/>
          <PCard name="Elite" price="199" period="per month" feats={['Everything in Pro','Anki export','Saved card sets','Batch generation']} onSel={()=>setPw(true)}/>
        </div>
      </section>

      <footer>
        <div className="fl">FlipWise</div>
        <div className="ft">Built for Indian students · 2025</div>
      </footer>

      {pw&&(
        <div className="ov" onClick={e=>e.target===e.currentTarget&&setPw(false)}>
          <div className="mo">
            <div className="mo-ey">Upgrade</div>
            <h2>Unlock full access</h2>
            <p className="mo-s">You've used your free generations for today. Pick a plan — no interruptions, no limits.</p>
            <div className="mo-plans">
              {[{id:'pro',n:'Pro',p:'99',s:'per month',pk:'Unlimited · PDF upload'},{id:'elite',n:'Elite',p:'199',s:'per month',pk:'Pro + Anki + saved sets'}].map(x=>(
                <div key={x.id} className={`mp${sp===x.id?' sel':''}`} onClick={()=>setSp(x.id)}>
                  <div className="mp-n">{x.n}</div>
                  <div className="mp-p"><sup>₹</sup>{x.p}</div>
                  <div className="mp-s">{x.s}</div>
                  <div className="mp-pk">{x.pk}</div>
                </div>
              ))}
            </div>
            <button className="pb" onClick={()=>pay(sp)}>Pay ₹{sp==='pro'?'99':'199'} via Razorpay →</button>
            <button className="md" onClick={()=>setPw(false)}>Continue tomorrow</button>
          </div>
        </div>
      )}
      {toast&&<div className="toast">{toast}</div>}
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>(function(){var s=document.createElement('script');s.src='https://checkout.razorpay.com/v1/checkout.js';document.head.appendChild(s)})()</script>
</body>
</html>
