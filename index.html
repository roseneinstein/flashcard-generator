<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#22203a;
  --surface:#2a2740;
  --surface2:#322e4a;
  --border:#ffffff1e;
  --border-h:#ffffff33;
  --text:#ededf0;
  --muted:#9898b8;
  --muted2:#4a4a60;
  --accent:#e8d5b0;
  --accent-rgb:232,213,176;
  --green:#4ade80;
  --red:#f87171;
  --r:14px;
  --r-sm:8px;
  --card-back-bg:#0e1912;
  --card-back-border:#1b3322;
}
html.light{
  --bg:#f4f1eb;
  --surface:#fdfcf8;
  --surface2:#edeae2;
  --border:#00000011;
  --border-h:#00000022;
  --text:#1e1b14;
  --muted:#7a7060;
  --muted2:#c0b89e;
  --accent:#9a7c3f;
  --accent-rgb:154,124,63;
  --green:#15803d;
  --red:#b91c1c;
  --card-back-bg:#e8f5ee;
  --card-back-border:#a3d9b8;
}
html{scroll-behavior:smooth}
body{font-family:'Geist',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;cursor:none;transition:background .3s,color .3s}

/* ── ATMOSPHERIC BACKGROUND ── */
body::before{content:'';display:none}
body::after{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 85% 60% at 5%   2%,   rgba(110,70,210,0.22)  0%, transparent 56%),
    radial-gradient(ellipse 60% 50% at 95%  92%,  rgba(210,175,120,0.13) 0%, transparent 54%),
    radial-gradient(ellipse 50% 42% at 78%  12%,  rgba(70,100,230,0.12)  0%, transparent 50%),
    radial-gradient(ellipse 42% 38% at 12%  72%,  rgba(160,90,240,0.11)  0%, transparent 46%),
    radial-gradient(ellipse 35% 30% at 48%  50%,  rgba(120,60,180,0.07)  0%, transparent 40%);
  pointer-events:none;
  z-index:0;
}
html.light body::after{
  background:
    radial-gradient(ellipse 80% 60% at 10% 0%,   rgba(210,175,100,0.22) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 90% 90%,  rgba(154,124,63,0.16)  0%, transparent 55%),
    radial-gradient(ellipse 50% 40% at 70% 15%,  rgba(130,170,100,0.11) 0%, transparent 50%),
    radial-gradient(ellipse 40% 35% at 15% 65%,  rgba(190,145,75,0.13)  0%, transparent 45%),
    radial-gradient(ellipse 30% 25% at 55% 50%,  rgba(160,130,80,0.08)  0%, transparent 40%);
}
#root{position:relative;z-index:1}

/* THEME & LANG TOGGLES */
.thm-tog{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:0.85rem;cursor:none;display:flex;align-items:center;justify-content:center;transition:border-color .2s,color .2s,background .2s;flex-shrink:0}
.thm-tog:hover{border-color:var(--border-h);color:var(--text);background:var(--surface)}
/* CURSOR */
#cur{width:8px;height:8px;background:var(--accent);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference;transition:width .12s,height .12s}
#cur-r{width:32px;height:32px;border:1px solid rgba(232,213,176,0.35);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .28s cubic-bezier(.22,1,.36,1),height .28s cubic-bezier(.22,1,.36,1),border-radius .2s}
body.hov #cur{width:5px;height:5px;opacity:0.5}
body.hov #cur-r{width:48px;height:48px;border-radius:6px;opacity:0.2}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;border-bottom:1px solid var(--border);background:rgba(34,32,58,0.92);backdrop-filter:blur(20px);z-index:100;transition:background .3s,border-color .3s}
html.light nav{background:rgba(244,241,235,0.92)}
.logo{font-family:'Instrument Serif',serif;font-size:1.9rem;color:var(--accent);letter-spacing:-0.02em;font-weight:400}
.nav-logo{display:flex;align-items:center;gap:6px;user-select:none}
.nav-logo img{width:30px;height:30px;object-fit:contain;display:block;border-radius:0;background:none}
.nav-logo-txt{font-family:'Instrument Serif',serif;font-size:1.9rem;color:var(--accent);letter-spacing:-0.02em;font-weight:400}
.hero-logo{display:flex;flex-direction:row;align-items:center;justify-content:center;gap:2px;margin-bottom:16px;animation:fu .55s ease both;position:relative;z-index:2}
.hero-logo img{width:clamp(3.1rem,7vw,5.2rem);height:clamp(3.1rem,7vw,5.2rem);object-fit:contain;display:block;border-radius:0;background:none;flex-shrink:0}
.hero-logo-name{font-family:'Instrument Serif',serif;font-size:clamp(2.4rem,5.5vw,4rem);color:var(--accent);letter-spacing:-0.03em;font-weight:400;line-height:1.18}
.share-sheet-ov{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:700;display:flex;align-items:flex-end;justify-content:center}
.share-sheet-box{background:var(--surface);border-radius:18px 18px 0 0;padding:24px 20px 36px;width:100%;max-width:500px;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.share-sheet-title{font-size:0.7rem;color:var(--muted);text-align:center;margin-bottom:20px;text-transform:uppercase;letter-spacing:0.08em}
.share-sheet-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.share-btn-item{display:flex;flex-direction:column;align-items:center;gap:7px;cursor:none;background:none;border:none;color:var(--text);padding:0}
.share-btn-item:hover{opacity:0.75}
.share-btn-icon{width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;border:1px solid var(--border)}
.share-btn-label{font-size:0.64rem;color:var(--muted);text-align:center}
.share-url-row{display:flex;gap:8px;margin-top:4px}
.share-url-row input{flex:1;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surface2);color:var(--text);font-size:0.76rem;font-family:'Geist',sans-serif}
.ios-install-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9999;display:flex;align-items:flex-end;justify-content:center;padding:0 16px 28px;animation:fu .2s ease}
.ios-install-box{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:26px 22px 22px;width:100%;max-width:400px}
.ios-install-box img{width:52px;height:52px;border-radius:12px;display:block;margin:0 auto 12px}
.ios-install-box h3{text-align:center;font-size:1rem;font-weight:600;color:var(--text);margin-bottom:6px}
.ios-install-box p{text-align:center;font-size:0.8rem;color:var(--muted);margin-bottom:18px;line-height:1.55}
.ios-step{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;font-size:0.82rem;color:var(--text);line-height:1.5}
.ios-step-num{background:var(--accent);color:var(--bg);border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;flex-shrink:0;margin-top:1px}
.ios-step strong{color:var(--accent)}
.nav-r{display:flex;gap:24px;align-items:center}
.nl{font-size:0.75rem;font-weight:400;color:var(--muted);background:none;border:none;cursor:none;letter-spacing:0.06em;text-transform:uppercase;transition:color .2s;padding:0}
.nl:hover{color:var(--text)}
@media(max-width:600px){.nl{display:none}.nav-logo-txt{font-size:1.4rem}.nav-logo img{width:24px;height:24px}.nav-r{gap:14px}}
.np{font-size:0.78rem;font-weight:500;color:var(--bg);background:var(--accent);border:none;border-radius:50px;padding:7px 16px;cursor:none;transition:opacity .2s,transform .15s;letter-spacing:0.02em}
.np:hover{opacity:0.85;transform:scale(1.04)}

/* HERO */
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:100px 24px 80px;position:relative;overflow:clip}
.h-glow{position:absolute;width:800px;height:600px;background:radial-gradient(ellipse,rgba(232,213,176,0.07) 0%,transparent 65%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}

.h-line{font-size:clamp(2.4rem,5.5vw,4rem);letter-spacing:-0.03em;font-family:'Instrument Serif',serif;color:var(--accent);margin-bottom:16px;animation:fu .55s ease both;position:relative;z-index:2;font-weight:400;line-height:1.18}
html.light .h-line{color:var(--accent)}
html.light html.light html.light html.light html.light @keyframes crown-glow{
  0%,100%{filter:drop-shadow(0 1px 4px rgba(255,200,40,0.5)) drop-shadow(0 0 2px rgba(255,215,0,0.25));}
  50%{filter:drop-shadow(0 1px 8px rgba(255,220,60,0.95)) drop-shadow(0 0 6px rgba(255,200,0,0.55));}
}
html.light html.light html.light html.light html.light html.light @keyframes crown-glow-red{
  0%,100%{filter:drop-shadow(0 1px 4px rgba(180,0,0,0.45)) drop-shadow(0 0 2px rgba(200,20,20,0.25));}
  50%{filter:drop-shadow(0 1px 8px rgba(220,0,0,0.9)) drop-shadow(0 0 6px rgba(180,0,0,0.5));}
}

/* ── HEADLINE: biggest text users actually read on screen ── */
h1{
  font-family:'Instrument Serif',serif;
  font-size:clamp(4.5rem,11vw,9.5rem);
  font-weight:400;
  line-height:0.97;
  letter-spacing:-0.04em;
  max-width:960px;
  margin:0 auto 28px;
  animation:fu .55s .05s ease both;
  position:relative;
  z-index:2;
}
h1 em{font-style:italic;color:var(--accent)}
.h-sub{font-size:clamp(0.88rem,2vw,1rem);color:var(--muted);max-width:400px;margin:0 auto 44px;line-height:1.75;font-weight:300;animation:fu .55s .1s ease both}
.pill-row{display:flex;flex-wrap:wrap;justify-content:center;gap:7px;margin-bottom:44px;animation:fu .55s .15s ease both}
.pill{border:1px solid var(--border);border-radius:50px;padding:6px 15px;font-size:0.76rem;color:var(--muted);letter-spacing:0.03em;transition:border-color .2s,color .2s;cursor:none}
.pill:hover{border-color:var(--border-h);color:var(--text)}
.cta{font-family:'Geist',sans-serif;font-size:0.92rem;font-weight:500;color:var(--bg);background:var(--accent);border:none;border-radius:50px;padding:14px 34px;cursor:none;letter-spacing:0.02em;transition:opacity .2s,transform .15s,box-shadow .2s;animation:fu .55s .2s ease both}
.cta:hover{opacity:0.86;transform:translateY(-2px);box-shadow:0 10px 36px rgba(232,213,176,0.14)}
@keyframes fu{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}

/* FEATURES — single column rows, float on hover */
.feat-wrap{padding:80px 24px;max-width:760px;margin:0 auto}
.feat-eyebrow{font-size:0.68rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:10px}
.feat-heading{font-family:'Instrument Serif',serif;font-size:clamp(1.6rem,3.5vw,2.4rem);text-align:center;margin-bottom:48px;letter-spacing:-0.02em;line-height:1.1}
.feat-heading em{font-style:italic;color:var(--accent)}
.fg{display:flex;flex-direction:column;gap:3px}
.fc{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:24px 28px;
  position:relative;
  overflow:hidden;
  cursor:none;
  display:flex;
  align-items:flex-start;
  gap:20px;
  transition:
    transform .5s cubic-bezier(.22,1,.36,1),
    box-shadow .5s cubic-bezier(.22,1,.36,1),
    background .22s ease,
    border-color .22s ease;
  z-index:1;
}
.fc::before{
  content:'';
  position:absolute;inset:0;
  background:radial-gradient(circle at var(--mx,50%) var(--my,50%),rgba(232,213,176,0.1) 0%,transparent 60%);
  opacity:0;
  transition:opacity .35s;
  pointer-events:none;
}
.fc:hover{
  transform:translateY(-5px) scale(1.018);
  background:var(--surface2);
  border-color:rgba(232,213,176,0.18);
  box-shadow:0 16px 48px rgba(0,0,0,0.5), 0 0 0 1px rgba(232,213,176,0.1);
  z-index:10;
}
.fc:hover::before{opacity:1}
.fc-ico{
  font-size:1.1rem;
  opacity:0.55;
  flex-shrink:0;
  margin-top:2px;
  width:28px;
  text-align:center;
}
.fc-body{flex:1}
.fc-t{
  font-family:'Instrument Serif',serif;
  font-size:1.05rem;
  color:var(--text);
  margin-bottom:5px;
  letter-spacing:-0.01em;
}
.fc-d{
  font-size:0.8rem;
  color:var(--muted);
  line-height:1.72;
  font-weight:300;
  padding-left:2px;
}

/* APP */

/* Billing toggle */
.bill-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:36px}
.bill-tog{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:50px;padding:3px;gap:2px}
.bill-opt{font-size:0.75rem;font-weight:500;font-family:'Geist',sans-serif;border:none;border-radius:50px;padding:7px 20px;cursor:pointer;transition:background .2s,color .2s;color:var(--muted);background:transparent;letter-spacing:0.01em}
.bill-opt.act{background:var(--accent);color:var(--bg)}
.bill-save{font-size:0.68rem;font-weight:600;color:#4ade80;background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.25);border-radius:50px;padding:3px 10px;letter-spacing:0.04em;font-family:'Geist',sans-serif}
.p-mo-note{font-size:0.62rem;color:var(--muted2);margin-top:2px;font-weight:300;min-height:14px}
.p-strike{text-decoration:line-through;opacity:0.45;margin-left:4px;font-size:0.75em}
.p-found{font-size:0.6rem;color:var(--muted2);margin-top:6px;font-style:italic;line-height:1.5;font-weight:300;font-family:'Geist',sans-serif}
.app-wrap{max-width:660px;margin:0 auto;padding:0 20px 110px}
.ey{font-size:0.68rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:9px}
.st{font-family:'Instrument Serif',serif;font-size:clamp(1.7rem,4vw,2.6rem);text-align:center;margin-bottom:48px;letter-spacing:-0.02em;line-height:1.1}
.st em{font-style:italic;color:var(--accent)}

/* Input */
/* Expandable input wrapper */
.icard{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  overflow:hidden;
  margin-bottom:14px;
  transition:
    border-color .35s,
    box-shadow .45s cubic-bezier(.22,1,.36,1),
    transform .45s cubic-bezier(.22,1,.36,1);
}
.icard:hover{
  transform:scale(1.012);
  border-color:var(--border-h);
  box-shadow:0 6px 32px rgba(0,0,0,0.3), 0 0 0 1px rgba(232,213,176,0.07);
}
.icard:focus-within{
  transform:scale(1.016);
  border-color:rgba(232,213,176,0.28);
  box-shadow:0 0 0 1px rgba(232,213,176,0.08),0 12px 48px rgba(0,0,0,0.35);
}
.tbar{display:flex;gap:3px;background:var(--surface2);padding:4px;border-bottom:1px solid var(--border)}
.tb{flex:1;padding:8px 10px;border:none;background:transparent;color:var(--muted);font-family:'Geist',sans-serif;font-size:0.75rem;font-weight:400;cursor:none;border-radius:5px;transition:all .15s;text-transform:uppercase;letter-spacing:0.07em}
.tb.act{background:var(--surface);color:var(--text)}

/* The textarea itself expands fluidly */
textarea{
  width:100%;
  min-height:140px;
  max-height:520px;
  background:transparent;
  border:none;
  padding:18px;
  font-family:'Geist',sans-serif;
  font-size:0.9rem;
  color:var(--text);
  line-height:1.72;
  font-weight:300;
  resize:none;
  outline:none;
  transition:min-height .55s cubic-bezier(.22,1,.36,1);
  display:block;
  overflow-y:auto;
}
textarea:focus,textarea:not(:placeholder-shown){
  min-height:260px;
}
/* Smooth overflow reveal as it expands */
.icard:has(textarea:focus){
  box-shadow:0 0 0 1px rgba(232,213,176,0.1),0 16px 56px rgba(0,0,0,0.35);
}
textarea::placeholder{color:var(--muted2);line-height:1.72}
.upz{padding:56px 24px;text-align:center;cursor:none;background:transparent;border:none;transition:background .2s;width:100%}
.upz:hover,.upz.dov{background:rgba(232,213,176,0.03)}
.upz-i{font-size:1.6rem;margin-bottom:12px;opacity:0.3;display:block}
.upz p{font-size:0.82rem;color:var(--muted);line-height:1.7;font-weight:300}
.upz strong{color:var(--accent);font-weight:400}
input[type=file]{display:none}
.ctrl{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-top:1px solid var(--border);gap:10px;flex-wrap:wrap}
.cbs{display:flex;gap:3px}
.cb{padding:5px 12px;border:1px solid var(--border);border-radius:50px;background:transparent;color:var(--muted);font-family:'Geist',sans-serif;font-size:0.75rem;cursor:none;transition:all .15s}
.cb.s{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.cb:hover:not(.s){border-color:var(--border-h);color:var(--text)}
.gb{padding:9px 22px;background:var(--accent);color:var(--bg);border:none;border-radius:50px;font-family:'Geist',sans-serif;font-size:0.82rem;font-weight:500;cursor:none;letter-spacing:0.03em;transition:opacity .2s,transform .15s}
.gb:hover:not(:disabled){opacity:0.83;transform:scale(1.03)}
.gb:disabled{opacity:0.28;cursor:not-allowed}

/* Loading */

/* Results */

/* Flashcard */

.nb:hover:not(:disabled){border-color:var(--border-h);color:var(--text)}

.fc-ctr{font-size:0.75rem;color:var(--muted);letter-spacing:0.06em}
.fw{perspective:1400px;padding:22px;cursor:none}
.fi{position:relative;width:100%;height:360px;transform-style:preserve-3d;transition:transform .58s cubic-bezier(.4,.2,.2,1)}
.fi.fl{transform:rotateY(180deg)}
.ff,.fb{position:absolute;inset:0;border-radius:var(--r);backface-visibility:hidden;-webkit-backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px;text-align:center}
.ff{background:var(--th-ff-bg,var(--surface2));border:1px solid var(--th-ff-brd,var(--border));color:var(--th-topic,var(--text))}
.fb{background:var(--th-fb-bg,var(--card-back-bg));border:1px solid var(--th-fb-brd,var(--card-back-border));transform:rotateY(180deg);color:var(--th-pts,var(--text));align-items:flex-start;text-align:left;overflow:hidden;padding:0}
.fb-scroll{width:100%;height:100%;overflow-y:auto;overflow-x:hidden;padding:20px 24px;box-sizing:border-box;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}

.fl-a{font-size:0.88rem;line-height:1.75;color:var(--green);font-weight:300}

.ab{flex:1;min-width:82px;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r-sm);background:transparent;color:var(--muted);font-family:'Geist',sans-serif;font-size:0.75rem;cursor:none;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s;letter-spacing:0.03em}
.ab:hover{border-color:var(--border-h);color:var(--text)}

/* Quiz */
.qw{padding:22px}

.ob{padding:13px 14px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surface2);color:var(--text);font-family:'Geist',sans-serif;font-size:0.8rem;font-weight:300;line-height:1.5;text-align:left;cursor:none;transition:all .15s}

/* Pricing */

.p-btn{margin-top:22px;width:100%;padding:10px;border:1px solid var(--border);border-radius:var(--r-sm);background:transparent;color:var(--text);font-family:'Geist',sans-serif;font-size:0.78rem;cursor:none;letter-spacing:0.05em;text-transform:uppercase;transition:all .15s}

/* Paywall */

.pb{width:100%;padding:13px;background:var(--accent);color:var(--bg);border:none;border-radius:var(--r-sm);font-family:'Geist',sans-serif;font-size:0.85rem;font-weight:500;cursor:none;letter-spacing:0.02em;transition:opacity .2s;margin-bottom:9px}

/* ── Spotlight Tour ─────────────────────────────── */
.tour-backdrop{position:fixed;inset:0;z-index:9001;cursor:pointer}
.tour-spot{
  position:fixed;z-index:9002;border-radius:14px;pointer-events:none;
  box-shadow:0 0 0 4000px rgba(0,0,0,0.74),0 0 0 3px rgba(232,213,176,0.6),0 0 44px 8px rgba(232,213,176,0.2);
  transition:top .52s cubic-bezier(.4,0,.2,1),left .52s cubic-bezier(.4,0,.2,1),width .52s cubic-bezier(.4,0,.2,1),height .52s cubic-bezier(.4,0,.2,1);
  animation:tpulse 2s ease-in-out infinite;
}
@keyframes tpulse{
  0%,100%{box-shadow:0 0 0 4000px rgba(0,0,0,0.74),0 0 0 3px rgba(232,213,176,0.55),0 0 30px 4px rgba(232,213,176,0.12);}
  50%{box-shadow:0 0 0 4000px rgba(0,0,0,0.74),0 0 0 4px rgba(232,213,176,0.95),0 0 56px 16px rgba(232,213,176,0.35);}
}
.tour-tip{
  position:fixed;z-index:9003;pointer-events:all;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:14px 18px 12px;width:272px;
  box-shadow:0 12px 48px rgba(0,0,0,0.5);
  transition:top .52s cubic-bezier(.4,0,.2,1),left .52s cubic-bezier(.4,0,.2,1),opacity .3s,transform .3s;
}
.tour-tip.tin{opacity:0;transform:translateY(6px) scale(0.97);}
.tour-tip.tshow{opacity:1;transform:translateY(0) scale(1);}
.tour-tip-step{font-size:0.57rem;letter-spacing:0.13em;text-transform:uppercase;color:var(--muted2);font-weight:600;margin-bottom:6px;font-family:'Geist',sans-serif;}
.tour-tip-txt{font-size:0.8rem;line-height:1.7;color:var(--text);font-weight:300;font-family:'Geist',sans-serif;}
.tour-tip-nav{display:flex;align-items:center;justify-content:space-between;margin-top:11px;}
.tour-next{font-size:0.7rem;font-weight:500;color:var(--accent);background:none;border:1px solid rgba(232,213,176,0.35);border-radius:50px;padding:4px 14px;cursor:pointer;transition:background .15s;font-family:'Geist',sans-serif;}
.tour-next:hover{background:rgba(232,213,176,0.1);}
.tour-skip{font-size:0.67rem;color:var(--muted2);background:none;border:none;cursor:pointer;padding:4px;font-family:'Geist',sans-serif;}
.tour-skip:hover{color:var(--muted);}
.tour-wel{position:fixed;inset:0;z-index:9010;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(0,0,0,0.75);backdrop-filter:blur(20px);animation:fi2 .3s ease;}
.tour-wel-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:36px 30px;max-width:380px;width:100%;text-align:center;box-shadow:0 32px 80px rgba(0,0,0,0.55);animation:su .38s cubic-bezier(.34,1.56,.64,1);}
.tour-wel-ico{font-size:2rem;margin-bottom:10px;display:block;}
.tour-wel-name{font-family:'Instrument Serif',serif;font-size:1.3rem;font-weight:400;color:var(--accent);margin-bottom:6px;letter-spacing:-0.01em;}
.tour-wel-sub{font-size:0.79rem;color:var(--muted);line-height:1.75;font-weight:300;margin-bottom:22px;}
.tour-wel-btn{font-family:'Geist',sans-serif;font-size:0.82rem;font-weight:500;color:var(--bg);background:var(--accent);border:none;border-radius:50px;padding:10px 0;cursor:pointer;width:100%;letter-spacing:0.02em;margin-bottom:10px;transition:opacity .15s;}
.tour-wel-btn:hover{opacity:0.87;}
.tour-wel-no{font-size:0.7rem;color:var(--muted2);background:none;border:none;cursor:pointer;font-family:'Geist',sans-serif;}
.tour-lnk{font-size:0.92rem;color:var(--text);background:none;border:none;cursor:pointer;font-family:'Geist',sans-serif;font-weight:500;display:inline-flex;align-items:center;gap:6px;margin-top:20px;transition:color .15s;padding:6px 0;letter-spacing:0.02em;opacity:0.85;}
.tour-lnk:hover{color:var(--text);}
/* ─────────────────────────────────────────────────────────── */
/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:50px;font-size:0.78rem;z-index:600;animation:ti .28s ease,to2 .28s 2.4s ease forwards;white-space:nowrap;font-weight:300;letter-spacing:0.03em}
@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes to2{from{opacity:1}to{opacity:0}}

/* Share modal */
.sh-ov{position:fixed;inset:0;background:rgba(0,0,0,0.72);backdrop-filter:blur(14px);z-index:500;display:flex;align-items:center;justify-content:center;animation:fi2 .2s ease;padding:20px}
.sh-mo{background:var(--surface);border:1px solid var(--border-h);border-radius:var(--r);padding:28px 24px;max-width:480px;width:100%;animation:su .32s cubic-bezier(.34,1.56,.64,1)}
.sh-mo h3{font-family:'Instrument Serif',serif;font-size:1.4rem;margin-bottom:4px;letter-spacing:-0.02em}
.sh-mo p{font-size:0.76rem;color:var(--muted);margin-bottom:18px;font-weight:300;line-height:1.6}
.sh-list{max-height:260px;overflow-y:auto;display:flex;flex-direction:column;gap:5px;margin-bottom:18px}
.sh-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r-sm);cursor:none;transition:border-color .15s,background .15s;text-align:left;background:transparent}
.sh-item.sel{border-color:var(--accent);background:rgba(232,213,176,0.05)}
.sh-item:hover:not(.sel){border-color:var(--border-h)}
.sh-cb{width:14px;height:14px;border:1px solid var(--border-h);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.6rem;transition:all .15s}
.sh-item.sel .sh-cb{background:var(--accent);border-color:var(--accent);color:var(--bg)}
.sh-label{font-size:0.78rem;color:var(--text);font-weight:300;line-height:1.4;text-align:left}
.sh-url{display:flex;gap:7px;margin-bottom:10px}
.sh-url input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:9px 12px;font-family:'Geist',sans-serif;font-size:0.75rem;color:var(--muted);outline:none}
.sh-copy{padding:9px 16px;background:var(--accent);color:var(--bg);border:none;border-radius:var(--r-sm);font-family:'Geist',sans-serif;font-size:0.78rem;font-weight:500;cursor:none;white-space:nowrap;transition:opacity .2s}
.sh-copy:hover{opacity:0.84}
.sh-sel-row{display:flex;gap:8px;margin-bottom:12px}
.sh-sel-btn{font-size:0.7rem;color:var(--muted);background:none;border:none;cursor:none;padding:0;text-decoration:underline;text-underline-offset:2px;transition:color .15s}
.sh-sel-btn:hover{color:var(--text)}
/* Testimonials */
.test-wrap{padding:80px 24px;max-width:760px;margin:0 auto}
.tg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:640px){.tg{grid-template-columns:1fr}}
.tc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px 20px;transition:border-color .2s}
.tc:hover{border-color:var(--border-h)}
.tc-q{font-size:0.82rem;color:var(--text);line-height:1.72;font-weight:300;margin-bottom:16px;font-style:italic}
.tc-q::before{content:'“';font-family:'Instrument Serif',serif;font-size:1.2rem;color:var(--accent);line-height:0;vertical-align:-4px;margin-right:2px}
.tc-name{font-size:0.72rem;color:var(--accent);font-weight:500;letter-spacing:0.03em}
.tc-sub{font-size:0.68rem;color:var(--muted);margin-top:2px;font-weight:300}
.disc{display:flex;align-items:flex-start;gap:8px;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);margin-top:10px}
.disc-i{font-size:0.75rem;opacity:0.45;flex-shrink:0;margin-top:1px}
.disc p{font-size:0.7rem;color:var(--muted);line-height:1.65;font-weight:300;margin:0}
.pdf-disc{padding:8px 14px;border-top:1px solid var(--border);background:var(--surface2)}
.char-warn{padding:7px 14px;border-top:1px solid var(--border);background:var(--surface2)}
.char-warn p{font-size:0.68rem;color:var(--accent);line-height:1.6;font-weight:300;margin:0;display:flex;align-items:flex-start;gap:6px;opacity:0.85}
.char-warn p::before{content:'⚠';font-size:0.65rem;flex-shrink:0;margin-top:1px}
.pdf-disc p{font-size:0.68rem;color:var(--muted2);line-height:1.6;font-weight:300;margin:0;display:flex;align-items:flex-start;gap:6px}
.pdf-disc p::before{content:'ℹ';font-size:0.65rem;opacity:0.5;flex-shrink:0;margin-top:1px}
/* Disclaimer */
.disc{font-size:0.68rem;color:var(--muted2);line-height:1.7;font-weight:300;text-align:center;padding:0 8px;margin-top:10px}
.disc span{display:inline-flex;align-items:baseline;gap:4px}
.disc-icon{opacity:0.45;font-size:0.65rem}

/* ── AUTH MODAL ── */
.auth-modal{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(4px)}
.auth-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:32px 28px;max-width:360px;width:90%;text-align:center}
.auth-box h3{font-family:'Instrument Serif',serif;font-size:1.4rem;color:var(--accent);margin-bottom:8px;font-weight:400}
.auth-box p{font-size:0.8rem;color:var(--muted);margin-bottom:24px;line-height:1.6}
.auth-google{width:100%;padding:12px 20px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-family:'Geist',sans-serif;font-size:0.84rem;font-weight:500;cursor:none;display:flex;align-items:center;justify-content:center;gap:10px;transition:border-color .2s,background .2s;margin-bottom:10px}
.auth-google:hover{border-color:var(--border-h);background:var(--surface)}
.auth-google:disabled{opacity:0.5}
.auth-close{background:none;border:none;color:var(--muted);font-size:0.75rem;cursor:none;margin-top:4px;text-decoration:underline;text-underline-offset:2px}
/* ── USER MENU ── */
.user-menu{position:relative}
.auth-btn{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:50px;padding:5px 12px 5px 6px;cursor:none;color:var(--text);font-size:0.78rem;font-family:'Geist',sans-serif;transition:border-color .2s}
.auth-btn:hover{border-color:var(--border-h)}
.auth-btn img{width:22px;height:22px;border-radius:50%;object-fit:cover}
.tier-badge{font-size:0.6rem;text-transform:uppercase;letter-spacing:0.07em;padding:2px 7px;border-radius:50px;font-weight:600}
.tier-badge.free{background:var(--surface);color:var(--muted);border:1px solid var(--border)}
.tier-badge.pro{background:#7c3aed22;color:#a78bfa;border:1px solid #7c3aed44}
.tier-badge.elite{background:#b4520022;color:#fb923c;border:1px solid #b4520044}
.user-drop{position:absolute;top:calc(100% + 0px);right:0;min-width:200px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:6px 0;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,0.3);margin-top:0}
.user-drop-item{width:100%;text-align:left;background:none;border:none;padding:9px 14px;font-size:0.78rem;color:var(--text);font-family:'Geist',sans-serif;cursor:none;transition:background .15s}
.user-drop-item:hover{background:var(--surface2)}
.user-drop-item.danger{color:var(--red)}

/* Reveal */
.rev{opacity:0;transform:translateY(20px);transition:opacity .65s ease,transform .65s ease}
.rev.vis{opacity:1;transform:translateY(0)}

/* ── Pro workspace ── */
.ws-ov{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px)}
.ws-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);width:100%;max-width:780px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden}
.ws-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border);flex-shrink:0}
.ws-title{font-family:'Instrument Serif',serif;font-size:1.25rem;font-weight:400;color:var(--text)}
.ws-close{background:none;border:none;color:var(--muted);font-size:1.1rem;cursor:none;padding:4px 8px;border-radius:6px;transition:color .2s}
@media(max-width:520px){.ws-head{padding:12px 14px}}
.ws-close:hover{color:var(--text)}
.ws-body{overflow-y:auto;padding:20px 22px;flex:1}
.ws-empty{text-align:center;padding:48px 20px;color:var(--muted);font-size:0.82rem;line-height:1.8}
.ws-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.ws-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:16px;cursor:none;transition:border-color .2s,box-shadow .2s;position:relative}
.ws-card:hover{border-color:var(--accent);box-shadow:0 4px 16px rgba(0,0,0,0.15)}
.ws-card-name{font-size:0.85rem;font-weight:500;color:var(--text);margin-bottom:6px;line-height:1.3}
.ws-card-meta{font-size:0.68rem;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap}
.ws-card-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);opacity:0.6;flex-shrink:0;margin-top:5px}
.ws-card-actions{display:flex;gap:6px;margin-top:12px}
.ws-btn{flex:1;padding:7px 6px;border:1px solid var(--border);border-radius:6px;background:none;color:var(--text);font-family:'Geist',sans-serif;font-size:0.68rem;cursor:none;transition:background .15s,border-color .15s}
.ws-btn:hover{background:var(--surface);border-color:var(--border-h)}
.ws-btn.del{color:var(--red)}
.ws-btn.del:hover{background:#f8717111;border-color:#f87171}
/* Save set modal */
.save-ov{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:700;display:flex;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(4px)}
.save-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:28px 26px;max-width:380px;width:100%}
.save-title{font-family:'Instrument Serif',serif;font-size:1.2rem;font-weight:400;margin-bottom:6px;color:var(--text)}
.save-sub{font-size:0.75rem;color:var(--muted);margin-bottom:18px;line-height:1.6}
.save-input{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surface2);color:var(--text);font-family:'Geist',sans-serif;font-size:0.85rem;outline:none;transition:border-color .2s;margin-bottom:14px}
.save-input:focus{border-color:var(--accent)}
.save-row{display:flex;gap:10px}
.save-ok{flex:1;padding:11px;background:var(--accent);color:var(--bg);border:none;border-radius:var(--r-sm);font-family:'Geist',sans-serif;font-size:0.82rem;font-weight:500;cursor:none;transition:opacity .2s}
.save-ok:hover{opacity:0.88}
.save-cancel{padding:11px 18px;border:1px solid var(--border);border-radius:var(--r-sm);background:none;color:var(--muted);font-family:'Geist',sans-serif;font-size:0.82rem;cursor:none}
/* Pro gate banner */
.pro-gate{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);margin-top:10px}
.pro-gate p{font-size:0.75rem;color:var(--muted);margin:0;line-height:1.5}
.pro-gate button{flex-shrink:0;padding:7px 14px;background:var(--accent);color:var(--bg);border:none;border-radius:6px;font-family:'Geist',sans-serif;font-size:0.72rem;font-weight:500;cursor:none;white-space:nowrap}
/* Voice btn */
.voice-btn{padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:none;color:var(--muted);font-size:0.78rem;cursor:none;transition:color .2s,border-color .2s}
.voice-btn:hover,.voice-btn.active{color:var(--accent);border-color:var(--accent)}
/* Regen btn */
.regen-btn{padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:none;color:var(--muted);font-size:0.75rem;cursor:none;transition:color .2s,border-color .2s}
.regen-btn:hover{color:var(--text);border-color:var(--border-h)}
/* Mistake tracker */
.mist-section{margin-top:18px}
.mist-head{font-size:0.72rem;color:var(--accent);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px;font-weight:500}
.mist-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:6px;font-size:0.75rem;color:var(--text);line-height:1.5}
.mist-set{font-size:0.65rem;color:var(--muted);margin-top:2px}
/* Quiz history */
.qh-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:6px}
.qh-left{font-size:0.78rem;color:var(--text)}
.qh-score{font-size:0.72rem;color:var(--accent);font-weight:500}
.qh-date{font-size:0.65rem;color:var(--muted);margin-top:2px}
.qh-replay{padding:5px 12px;border:1px solid var(--border);border-radius:6px;background:none;color:var(--text);font-size:0.7rem;cursor:none;transition:border-color .2s}
.qh-replay:hover{border-color:var(--accent)}
/* cb-custom */
.cb-custom{appearance:none;-moz-appearance:textfield}
.cb-custom::-webkit-outer-spin-button,.cb-custom::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}

/* ELITE: Deck Themes */
:root,[data-theme="default"]{--th-ff-bg:var(--surface2);--th-ff-brd:var(--border);--th-fb-bg:var(--card-back-bg);--th-fb-brd:var(--card-back-border);--th-topic:var(--text);--th-pts:var(--text)}
[data-theme="slate"]{--th-ff-bg:#1a2030;--th-ff-brd:#2d3f5e;--th-fb-bg:#111827;--th-fb-brd:#1e3a5f;--th-topic:#c8d8f0;--th-pts:#9ab4d4}
[data-theme="newspaper"]{--th-ff-bg:#f8f4ed;--th-ff-brd:#d4c9b0;--th-fb-bg:#faf7f2;--th-fb-brd:#c8b89a;--th-topic:#1a1208;--th-pts:#2d2416}
[data-theme="neon"]{--th-ff-bg:#0a0a14;--th-ff-brd:#7c3aed44;--th-fb-bg:#070710;--th-fb-brd:#7c3aed66;--th-topic:#e879f9;--th-pts:#a5b4fc}
.theme-bar{display:flex;gap:8px;align-items:center;padding:8px 22px;border-bottom:1px solid var(--border)}
.theme-dot{width:22px;height:22px;border-radius:50%;cursor:none;border:2px solid transparent;transition:transform .15s,border-color .15s;flex-shrink:0}
.theme-dot:hover{transform:scale(1.15)}
.theme-dot.act{border-color:var(--accent);transform:scale(1.2)}
.theme-dot[data-t="default"]{background:conic-gradient(#322e4a 0%,#0e1912 50%)}
.theme-dot[data-t="slate"]{background:conic-gradient(#1a2030 0%,#111827 50%)}
.theme-dot[data-t="newspaper"]{background:conic-gradient(#f8f4ed 0%,#faf7f2 50%)}
.theme-dot[data-t="neon"]{background:conic-gradient(#0a0a14 0%,#7c3aed 50%)}
.theme-lbl{font-size:0.62rem;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase}
.fs-ctrl{display:flex;align-items:center;gap:6px;margin-left:auto}
.fs-btn{width:24px;height:24px;border:1px solid var(--border);border-radius:5px;background:none;color:var(--muted);font-size:0.75rem;cursor:none;display:flex;align-items:center;justify-content:center;transition:color .15s,border-color .15s}
.fs-btn:hover{color:var(--text);border-color:var(--border-h)}
.sr-banner{background:rgba(124,58,237,0.12);border:1px solid rgba(124,58,237,0.3);border-radius:var(--r-sm);padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.sr-banner-txt{font-size:0.78rem;color:var(--muted)}
.sr-banner-txt strong{color:var(--text)}
.sr-rate-btns{display:flex;gap:6px}
.sr-btn{padding:5px 12px;border-radius:6px;border:1px solid;background:none;font-size:0.72rem;cursor:none;font-family:Geist,sans-serif;transition:all .15s}
.sr-btn.ok{color:var(--green);border-color:var(--green)}
.sr-btn.ok:hover{background:rgba(74,222,128,0.1)}
.sr-btn.again{color:var(--red);border-color:var(--red)}
.sr-btn.again:hover{background:rgba(248,113,113,0.1)}
.streak-wrap{padding:4px 0 16px}
.streak-head{font-size:0.72rem;color:var(--accent);text-transform:uppercase;letter-spacing:0.07em;font-weight:500;margin-bottom:14px}
.heatmap{display:flex;gap:3px;flex-wrap:wrap}
.hm-cell{width:11px;height:11px;border-radius:2px;transition:background .2s}
.streak-stats{display:flex;gap:24px;margin-top:14px}
.streak-stat{font-size:0.72rem;color:var(--muted)}
.streak-stat strong{color:var(--text);font-size:0.88rem;display:block;margin-bottom:1px}
.weak-wrap{padding:4px 0 16px}
.weak-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.weak-topic{font-size:0.75rem;color:var(--text);width:140px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

// Token saved to localStorage so user stays logged in after page refresh
function saveToken(t){try{localStorage.setItem('cs_tok',t);}catch(e){}}
function loadToken(){try{return localStorage.getItem('cs_tok');}catch(e){return null;}}
function clearToken(){try{localStorage.removeItem('cs_tok');}catch(e){}}

// Google OAuth: redirect to Supabase, it sends the token back in the URL hash
function googleLoginUrl(){
  return CFG.SUPABASE_URL+'/auth/v1/authorize?provider=google'
    +'&redirect_to='+encodeURIComponent(window.location.origin);
}

// Fetches user profile from our /api/auth endpoint using stored token
async function fetchUserProfile(){
  var token=loadToken();
  if(!token)return null;
  try{
    var r=await fetch('/api/auth',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({access_token:token})
    });
    if(!r.ok){clearToken();return null;}
    var data=await r.json();
    if(data.id){
      // Compute days_left from sub_expiry so UI can show "12 days left"
      if(data.sub_expiry){
        var msLeft=new Date(data.sub_expiry).getTime()-Date.now();
        data.days_left=Math.max(0,Math.ceil(msLeft/(1000*60*60*24)));
      } else {
        data.days_left=null;
      }
      return data;
    }
    clearToken();return null;
  }catch(e){return null;}
}

// Generation counter — localStorage for guests, server for logged-in users
function getUsage(){var t=new Date().toDateString();var s=JSON.parse(localStorage.getItem('fw_u')||'{}');return s.d===t?s.c||0:0;}
function setLocalUsage(n){localStorage.setItem('fw_u',JSON.stringify({d:new Date().toDateString(),c:n}));}
function bumpUsage(){setLocalUsage(getUsage()+1);}
function getDayLimit(){var t=getTier();return t==='elite'?CFG.ELITE_LIMIT:t==='pro'?CFG.PRO_LIMIT:CFG.FREE_LIMIT;}
function getMonthLimit(){var t=getTier();return t==='elite'?CFG.ELITE_MONTH_LIMIT:t==='pro'?CFG.PRO_MONTH_LIMIT:null;}
function getMonthKey(){return 'cs_mu_'+new Date().getFullYear()+'_'+(new Date().getMonth()+1);}
function getMonthUsage(){try{var s=JSON.parse(localStorage.getItem(getMonthKey())||'{}');return s.c||0;}catch(e){return 0;}}
function bumpMonthUsage(){try{var k=getMonthKey();var s=JSON.parse(localStorage.getItem(k)||'{}');localStorage.setItem(k,JSON.stringify({c:(s.c||0)+1}));}catch(e){}}
function getCharLimit(){var t=getTier();return t==='elite'?CFG.ELITE_CHARS:t==='pro'?CFG.PRO_CHARS:CFG.FREE_CHARS;}
// API helpers — all authenticated calls share this
function authHeader(){return {Authorization:'Bearer '+loadToken(),'Content-Type':'application/json'};}
// Parse any date field — handles ISO strings, Postgres timestamps, local 'date' fallback
function safeDate(obj){
  var raw=obj.saved_at||obj.savedAt||obj.completed_at||obj.created_at||obj.date||null;
  if(!raw)return null;
  var d=new Date(raw);
  return isNaN(d.getTime())?null:d;
}
function fmtDate(obj,opts){
  var d=safeDate(obj);
  if(!d)return '—';
  return d.toLocaleDateString('en-IN',opts||{day:'numeric',month:'short',year:'2-digit'});
}

function isPro(){return _userCache&&(_userCache.tier==='pro'||_userCache.tier==='elite');}
function isElite(){return _userCache&&_userCache.tier==='elite';}

async function callSummary(text,depth,tier){
  // Summary only needs 8000 chars max — beyond that model hits context limits
  var r=await fetch('/api/summary',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({text:text.substring(0,8000),depth:depth||'standard',tier:tier||'free'}),
  });
  if(!r.ok){var err=await r.json().catch(function(){return{};});throw new Error(err.error||'Server error');}
  return r.json();
}

async function callAI(text,count,quizCount,opts){
  opts=opts||{};
  var charLimit=getCharLimit();
  var tier=getTier();
  // useWorker flag is set by gen() based on tier + selectability threshold
  var body={text:text.substring(0,charLimit),count:count,quizCount:quizCount||20,isFileUpload:opts.isFileUpload||false,summaryDepth:opts.summaryDepth||'standard',access_token:loadToken()||undefined};
  if(opts.images&&opts.images.length)body.images=opts.images;

  // ── Routing — clean and simple ──────────────────────────────────────────
  // Elite file upload → Cloudflare Worker → Grok 4.1 (full vision, all visuals)
  // Everything else  → Vercel → Groq free tier (text paste any tier, free/pro PDF)
  var isEliteFileUpload=opts.isFileUpload&&tier==='elite';
  var needsWorker=isEliteFileUpload&&CFG.WORKER_URL&&CFG.WORKER_URL!=='WORKER_URL_HERE';

  if(needsWorker){
    // Elite PDF → Worker only. Never fall back to Groq (no images = hallucination)
    console.log('[CogniSwift] Elite PDF → Cloudflare Worker → Grok 4.1 | images:',body.images?body.images.length:0);
    var wr=await fetch(CFG.WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    var wrData=await wr.json().catch(function(){return{error:'Worker response unreadable'};});
    if(!wr.ok){
      console.error('[CogniSwift] Worker error:',wrData.error);
      throw new Error(wrData.error||'Processing failed. Please try again.');
    }
    return wrData;
  }

  // Vercel → Groq/Llama (free users, Pro, text paste — never for Elite file uploads)
  var r=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok){var err=await r.json().catch(function(){return{};});throw new Error(err.error||'Server error');}
  return r.json();
}

function dlPDF(cards,title){
  var rows=cards.map(function(c,i){
    var pts=(c.points||'').split('|').map(function(p){return p.trim();}).filter(Boolean);
    var ptHtml=pts.map(function(p){return '<li style="margin-bottom:5px;line-height:1.6">'+p+'</li>';}).join('');
    return '<div style="border:1px solid #e4e4e7;border-radius:10px;padding:20px;margin-bottom:16px;page-break-inside:avoid"><div style="font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:#a1a1aa;margin-bottom:8px">Card '+(i+1)+'</div><div style="font-size:15px;font-weight:600;margin-bottom:10px;line-height:1.5;color:#1e1b14">'+(c.topic||'')+'</div><ul style="margin:0;padding-left:18px;font-size:13px;color:#3a3a3a">'+ptHtml+'</ul></div>';
  }).join('');
  var w=window.open('','_blank');
  w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>'+title+'</title><style>body{font-family:Georgia,serif;padding:36px;max-width:680px;margin:auto}h1{font-size:20px;margin-bottom:4px}p{color:#a1a1aa;font-size:12px;margin-bottom:28px}</style></head><body><h1>'+title+'</h1><p>'+new Date().toLocaleDateString('en-IN')+' · '+cards.length+' cards</p>'+rows+'</body></html>');
  w.document.close();
  setTimeout(function(){w.print();},500);
}

function dlPPT(cards,title){
  if(typeof PptxGenJS==='undefined'){alert('PPT library not loaded. Check your connection and try again.');return;}
  var pptx=new PptxGenJS();
  pptx.layout='LAYOUT_16x9';
  pptx.title=title||'CogniSwift Study Cards';
  var ts=pptx.addSlide();
  ts.background={color:'1e1b14'};
  ts.addText(title||'Study Cards',{x:1,y:1.5,w:8,h:1.5,fontSize:36,bold:true,color:'e8d5b0',fontFace:'Arial',align:'center'});
  ts.addText('Made with CogniSwift',{x:1,y:3.2,w:8,h:0.5,fontSize:14,color:'888880',fontFace:'Arial',align:'center'});
  cards.forEach(function(c,i){
    var slide=pptx.addSlide();
    slide.background={color:'1e1b14'};
    slide.addText('Card '+(i+1)+' / '+cards.length,{x:0.3,y:0.15,w:3,h:0.3,fontSize:9,color:'666660',fontFace:'Arial'});
    var topic=c.topic||c.question||'Card '+(i+1);
    slide.addText(topic,{x:0.4,y:0.55,w:9.2,h:1.1,fontSize:20,bold:true,color:'e8d5b0',fontFace:'Arial',wrap:true});
    var pts=(c.points||c.answer||'').split('|').map(function(p){return p.trim();}).filter(Boolean);
    if(pts.length){
      var rows=pts.map(function(p){return {text:p,options:{bullet:{type:'bullet'},fontSize:13,color:'cccccc',fontFace:'Arial',paraSpaceAfter:4}};});
      slide.addText(rows,{x:0.4,y:1.75,w:9.2,h:3.8,valign:'top',wrap:true});
    }
    slide.addShape(pptx.ShapeType.line,{x:0.4,y:1.6,w:9.2,h:0,line:{color:'333330',width:1}});
  });
  pptx.writeFile({fileName:(title||'CogniSwift-Cards').replace(/[^a-z0-9]/gi,'-')+'.pptx'})
    .catch(function(e){alert('PPT export failed: '+e.message);});
}

function useCursor(){
  useEffect(function(){
    var dot=document.getElementById('cur'),ring=document.getElementById('cur-r');
    var rx=0,ry=0,mx=0,my=0;
    var mv=function(ev){mx=ev.clientX;my=ev.clientY;dot.style.left=mx+'px';dot.style.top=my+'px';};
    var tick=function(){rx+=(mx-rx)*.1;ry+=(my-ry)*.1;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(tick);};
    document.addEventListener('mousemove',mv);
    tick();
    var addHover=function(){
      document.querySelectorAll('button,a').forEach(function(el){
        el.addEventListener('mouseenter',function(){document.body.classList.add('hov');});
        el.addEventListener('mouseleave',function(){document.body.classList.remove('hov');});
      });
    };
    addHover();
    var autoResize=function(ev){
      var el=ev.target;
      if(el.tagName==='TEXTAREA'){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,520)+'px';}
    };
    document.addEventListener('input',autoResize);
    var obs=new MutationObserver(addHover);
    obs.observe(document.body,{childList:true,subtree:true});
    return function(){document.removeEventListener('mousemove',mv);document.removeEventListener('input',autoResize);};
  },[]);
}

function useReveal(){
  useEffect(function(){
    var obs=new IntersectionObserver(function(es){es.forEach(function(ev){if(ev.isIntersecting)ev.target.classList.add('vis');});},{threshold:0.1});
    document.querySelectorAll('.rev').forEach(function(el){obs.observe(el);});
    return function(){obs.disconnect();};
  });
}

      props.onReset&&e('button',{className:'rbtn',onClick:props.onReset},'Change count'),

    );
  }

  var q=qs[qi],answered=ch!==null;
  var animStyle={transition:'transform .26s cubic-bezier(.4,0,.2,1),opacity .26s ease',transform:anim==='in'?'scale(1)':anim==='out-left'?'scale(0.9) translateX(-30px)':'scale(0.9) translateX(30px)',opacity:anim==='in'?1:0};

  return e('div',{className:'qw',onTouchStart:qTouchStart,onTouchMove:qTouchMove,onTouchEnd:qTouchEnd},
    e('div',{className:'qpr'},
      e('div',{className:'qtr'},e('div',{className:'qf',style:{width:(qi/qs.length*100)+'%'}})),
      e('span',{className:'qst'},(qi+1)+'/'+qs.length)
    ),

      e('div',{className:'qq'},q.question),
      e('div',{className:'og'},
        q.options.map(function(o,i){

          return e('button',{key:i,className:cls,disabled:answered,onClick:function(){
            if(answered)return;setCh(i);if(i===q.correct){setSc(function(s){return s+1;});}else{if(onMistake)onMistake(q);if(wrongRef.current.indexOf(q)<0)wrongRef.current.push(q);}
          }},

            o
          );

        e('button',{className:'nx',onClick:function(){goQ('next');}},qi===qs.length-1?'See results':'Next →')

  function encodeCards(arr){
    // Use ASCII control chars as separators (smaller than multi-char delimiters)
    // Topic: max 40 chars, Points: max 3 segments of 65 chars each
    var compact=arr.slice(0,5).map(function(c){
      var t=(c.topic||'').substring(0,40).trimEnd();
      var pts=(c.points||'').split('|').slice(0,3).map(function(p){return p.trim().substring(0,65);}).join('\x1F');
      return t+'\x1E'+pts;
    }).join('\x1D');
    var b64=btoa(unescape(encodeURIComponent(compact)));
    return b64.replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  }
  function decodeCards(str){
    var b64=str.replace(/-/g,'+').replace(/_/g,'/');
    while(b64.length%4)b64+='=';
    var compact=decodeURIComponent(escape(atob(b64)));
    return compact.split('\x1D').map(function(s){
      var i=s.indexOf('\x1E');
      var topic=i>=0?s.substring(0,i):s;
      var pts=i>=0?s.substring(i+1).split('\x1F').join(' | '):'';
      return {topic:topic,points:pts};
    });
  }

  async function gen(){
    var txt=itab==='text'?notes:pdfTxt;
    if(!txt.trim())return st('Paste some notes first');
    var dayLimit=getDayLimit();
    if(usage>=dayLimit){setPw(true);return;}
    // Monthly limit check for Pro and Elite
    var monthLimit=getMonthLimit();
    if(monthLimit&&getMonthUsage()>=monthLimit){
      st('Monthly generation limit ('+monthLimit+') reached. Resets on the 1st of next month.');
      return;
    }
    setLoading(true);setCards([]);setQuiz([]);setSummary(null);setSumLoad(true);
    var isFile=itab==='pdf'; // true only when coming from PDF upload tab
    var tier=getTier();
    // Images only sent for Elite file uploads (Pro and Free use text-only Groq)
    var imgPayload=(isFile&&tier==='elite'&&window._pdfImages&&window._pdfImages.length)?window._pdfImages:[];
    var useWorker=false; // routing decision now made inside callAI based on tier
    // Cloudflare Worker accepts large payloads (up to 100MB) — no need to compress for it
    // Only log the size for monitoring purposes
    if(imgPayload.length){
      var totalSize=imgPayload.reduce(function(sum,b64){return sum+(b64?b64.length:0);},0);
      console.log('[CogniSwift] Image payload: '+Math.round(totalSize/1024)+'KB across '+imgPayload.length+' pages → sending to Worker');
    }
    try{
      var res=await callAI(txt,cnt,20,{isFileUpload:isFile,images:imgPayload,summaryDepth:isElite()?summaryDepth:'standard',useWorker:useWorker});
      // Redistribute quiz correct answers to specified positions for realistic feel
      // Patterns match real exam answer key distributions (not sequential A,B,C,D)
      var QUIZ_PATTERNS={
        5: [1,2,2,3,0],
        10:[3,1,1,0,2,3,2,0,0,2],
        15:[0,2,2,3,1,0,2,3,0,1,1,2,1,3,0],
        20:[2,0,3,3,1,0,2,2,1,3,1,3,3,0,2,0,1,3,2,1]
      };
      var rawQuiz=res.quiz||[];
      var shuffledQuiz=rawQuiz.map(function(q,qi){
        if(!q.options||q.options.length!==4)return q;
        var pattern=QUIZ_PATTERNS[rawQuiz.length]||QUIZ_PATTERNS[20];
        var targetPos=pattern[qi%pattern.length];
        var currentPos=q.correct;
        if(targetPos===currentPos)return q;
        var newOptions=q.options.slice();
        var tmp=newOptions[targetPos];
        newOptions[targetPos]=newOptions[currentPos];
        newOptions[currentPos]=tmp;
        return {question:q.question,options:newOptions,correct:targetPos,explanation:q.explanation};
      });
      setCards(res.flashcards||[]);setQuiz(shuffledQuiz);setTimeout(function(){pickDailyCard(res.flashcards||[]);},0);
      var totalQ=(res.quiz||[]).length;
      var counts=totalQ>=20?[5,10,15,20]:totalQ>=15?[5,10,15]:totalQ>=10?[5,10]:[5];
      setQuizCounts(counts);
      // If only one option, auto-select it
      setActiveQuiz(counts.length===1?res.quiz.slice(0,counts[0]):null);
      setPickAnim(null);
      setCi(0);setRtab('cards');
      // Bump usage — server for logged-in, localStorage for guests
      if(loadToken()){
        fetch('/api/data?resource=usage',{method:'POST',headers:authHeader()})
          .then(function(r){return r.json();})
          .then(function(d){if(d.count!==undefined){setUsage(d.count);setLocalUsage(d.count);}})
          .catch(function(){bumpUsage();setUsage(getUsage());});
      }else{
        bumpUsage();setUsage(getUsage());
      }
      setActiveSetName(''); // clear set name on fresh generation
      if(isElite())bumpStreak();
      bumpMonthUsage(); // track monthly usage for Pro and Elite limits
      st((res.flashcards||[]).length+' cards ready');
      setTimeout(function(){var ra=document.getElementById('ra');if(ra)ra.scrollIntoView({behavior:'smooth',block:'start'});},100);
      // Show save-before-quiz reminder for signed-in Pro/Elite users
      if((isPro()||isElite())&&loadToken()){
        setTimeout(function(){
          var el=document.getElementById('cs-save-hint');
          if(el){el.style.opacity='1';setTimeout(function(){if(el)el.style.opacity='0';},8000);}
        },1200);
      }
      // Summary routing:
      // Elite: always bundled from Worker (Grok). Pro: always bundled from generate.js (llama).
      // Free: separate callSummary (Groq free tier).
      // NEVER fire callSummary for Pro/Elite — that would double-charge the paid key.
      var hasBundledSummary=res.summary&&res.summary.title&&Array.isArray(res.summary.sections)&&res.summary.sections.length>0;
      if(hasBundledSummary){
        setSummary(res.summary);setSumLoad(false);
      }else if(isPro()||isElite()){
        // Paid tier but no bundled summary — set null, do NOT fire a second API call
        setSummary(null);setSumLoad(false);
      }else{
        // Free tier — fire separate summary call (Groq free, no cost issue)
        callSummary(txt,'standard','free').then(function(s){setSummary(s);}).catch(function(e){setSummary({_error:e.message||'Summary failed'});}).finally(function(){setSumLoad(false);});
      }
    }catch(err){st('Error: '+(err.message||'Check config'));setSumLoad(false);}
    finally{setLoading(false);}
  }

  function hFile(file){
    if(!file)return;

    setFn(file.name);setPdfTxt('');window._pdfImages=[];window._pdfUseWorker=false;st('Reading PDF…');
    var loadLib=new Promise(function(resolve,reject){
      if(window.pdfjsLib){resolve();return;}
      var s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
      s.onload=function(){window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';resolve();};
      s.onerror=reject;
      document.head.appendChild(s);
    });
    var reader=new FileReader();
    reader.onload=function(ev){
      loadLib.then(function(){
        var typedArray=new Uint8Array(ev.target.result);
        window.pdfjsLib.getDocument({data:typedArray}).promise.then(function(pdf){
          // Read tier FIRST before anything else
          var tier=getTier();
          // Page limits by tier: Elite=50, Pro=20, Free=10
          var pageLimit=(tier==='elite')?50:(tier==='pro')?20:10;
          var maxPages=Math.min(pdf.numPages,pageLimit);
          if(pdf.numPages>pageLimit){
            if(tier==='elite'){
              st('PDF has '+pdf.numPages+' pages — processing first 50 (Elite limit)');
            } else if(tier==='pro'){
              st('PDF has '+pdf.numPages+' pages — processing first 20. Upgrade to Elite for up to 50 pages.');
            } else {
              st('PDF has '+pdf.numPages+' pages — processing first 10. Upgrade to Pro for 20 pages or Elite for 50 pages.');
            }
          }
          var allText='',pagesDone=0;
          // We render pages as images only for Pro/Elite — to detect scanned PDFs
          // and for Elite to send visuals to Grok
          var needsRender=(tier==='elite'); // only Elite renders page images — Pro uses text only
          var pageTexts=new Array(maxPages).fill('');
          var pageImages=[];
          // Compress canvas to TARGET_W wide JPEG — no preprocessing, send raw render to Grok
          // Grok is a vision LLM and reads raw JPEG fine. Any pixel manipulation (threshold,
          // binarisation, CLAHE) risks destroying tonal information Grok needs to read handwriting.
          var TARGET_W=1200; // wider than before for better handwriting legibility
          function compressCanvas(canvas){
            var w=canvas.width,h=canvas.height;
            var scale=TARGET_W/w;
            var c2=document.createElement('canvas');
            c2.width=TARGET_W;
            c2.height=Math.round(h*scale);
            c2.getContext('2d').drawImage(canvas,0,0,c2.width,c2.height);
            return c2.toDataURL('image/jpeg',0.92); // high quality JPEG — preserve detail
          }
          function checkDone(){
            if(pagesDone!==maxPages)return;
            var allText2=pageTexts.join(' ').trim();
            var goodPages=pageImages.filter(Boolean).length;

            // ── Garbage OCR text detection (Elite) ────────────────────────
            // Phone scanner apps embed their own OCR inside PDFs as invisible text.
            // pdf.js extracts this faithfully — but scanner OCR on handwriting produces
            // garbage: symbols, dots, random chars. Real text is >40% alphanumeric.
            // If garbage detected, ignore text entirely and rely on images only.
            function isUsableText(txt){
              if(!txt||txt.length<20)return false;
              var noSpace=txt.replace(/\s+/g,'');
              if(noSpace.length<10)return false;
              var alnum=(noSpace.match(/[a-zA-Z0-9ऀ-ॿ]/g)||[]).length;
              return (alnum/noSpace.length)>0.40;
            }
            var useableText=(tier==='elite')?(isUsableText(allText2)?allText2:''):allText2;
            if(tier==='elite'&&allText2.length>20&&!useableText){
              console.log('[CogniSwift] Ignoring garbage scanner OCR text — image-only mode');
            }

            console.log('[CogniSwift] PDF done — tier:',tier,'| usable text:',!!useableText,'| good pages:',goodPages,'of',maxPages);

            if(tier==='elite'){
              // ── Quality gate ──────────────────────────────────────────────
              if(maxPages>2&&goodPages===0){
                setFn('');setPdfTxt('');window._pdfImages=[];window._pdfUseWorker=false;
                st('All pages appear blank or too blurry. Please upload a clearer scan or better-lit photo.');
                return;
              }
              if(maxPages>3&&goodPages<maxPages*0.5){
                st('Note: '+goodPages+' of '+maxPages+' pages passed quality check. Upload a clearer scan for best results.');
              }
              window._pdfImages=pageImages.filter(Boolean);
              window._pdfUseWorker=true;
              setPdfTxt(useableText||'[document — use images as primary source]');
              if(goodPages===maxPages){
                st('PDF ready — '+goodPages+' pages preprocessed (Elite): handwriting, diagrams, tables & charts.');
              } else if(goodPages>0){
                st('PDF ready — '+goodPages+' of '+maxPages+' pages processed. Low quality pages skipped.');
              }

            } else {
              // Free & Pro → Vercel → Groq — text only from PDF.js extraction
              // Pro: selectable text, tables, chart labels already extracted by PDF.js as strings
              // Groq processes this well — fast, free, no Grok cost
              window._pdfImages=[];
              window._pdfUseWorker=false;
              if(!allText2){
                if(tier==='pro'){
                  st('No selectable text found. Pro processes text-based PDFs only. Elite supports all visual content.');
                } else {
                  st('No selectable text found. Upgrade to Elite to process scanned or handwritten documents.');
                }
                return;
              }
              setPdfTxt(allText2);
              st('Extracted '+maxPages+' of '+pdf.numPages+' pages — ready to generate');
            }
          }
          for(var p=1;p<=maxPages;p++){
            (function(pageNum,pageIdx){
              pdf.getPage(pageNum).then(function(page){
                // Always extract text
                page.getTextContent().then(function(tc){
                  pageTexts[pageIdx]=tc.items.map(function(item){return item.str;}).join(' ');
                  if(!needsRender){pagesDone++;checkDone();}
                });
                // Render to canvas for paid users — all pages
                // scale:1.2 gives good resolution for AI reading without oversizing
                if(needsRender){
                  var vp=page.getViewport({scale:1.5}); // 1.5 scale = sharper image for Grok
                  var canvas=document.createElement('canvas');
                  canvas.width=vp.width;canvas.height=vp.height;
                  var ctx=canvas.getContext('2d');
                  page.render({canvasContext:ctx,viewport:vp}).promise.then(function(){
                    // Skip truly blank/black pages only (avg center brightness < 8/255)
                    // This prevents Grok from receiving completely empty black rectangles
                    try{
                      var cx=Math.floor(canvas.width/2)-50,cy=Math.floor(canvas.height/2)-50;
                      var smp=ctx.getImageData(Math.max(0,cx),Math.max(0,cy),100,100);
                      var bsum=0;
                      for(var bi=0;bi<smp.data.length;bi+=4)bsum+=smp.data[bi]+smp.data[bi+1]+smp.data[bi+2];
                      var bavg=bsum/(smp.data.length/4*3);
                      if(bavg<8){
                        console.warn('[CogniSwift] p'+(pageIdx+1)+' blank/black — skipped (center avg='+bavg.toFixed(1)+')');
                        pagesDone++;checkDone();return;
                      }
                    }catch(e){}
                    // Send raw render directly — no pixel manipulation
                    // Grok reads colour/greyscale JPEG well; any thresholding destroys handwriting
                    pageImages[pageIdx]=compressCanvas(canvas);
                    console.log('[CogniSwift] p'+(pageIdx+1)+' ready');
                    pagesDone++;checkDone();
                  }).catch(function(err){
                    console.warn('[CogniSwift] render failed p'+(pageIdx+1)+':',err.message);
                    pagesDone++;checkDone();
                  });
                }
              });
            })(p,p-1);
          }
        }).catch(function(err){st('Could not read PDF: '+err.message);});
      }).catch(function(){st('PDF library failed to load — check connection');});
    };
    reader.readAsArrayBuffer(file);
  }

  async function pay(plan,billing){
    if(!user){setShowAuth(true);setPw(false);return;}
    if(plan==='pro'&&(user.tier==='pro'||user.tier==='elite')&&user.sub_status==='active'){st('You already have an active '+user.tier+' subscription');setPw(false);return;}
    if(plan==='elite'&&user.tier==='elite'&&user.sub_status==='active'){st('You are already on Elite');setPw(false);return;}
    try{
      st('Setting up subscription…');
      var token=loadToken();
      if(!token){setShowAuth(true);setPw(false);return;}
      var billingCycle=billing||'monthly';
      var r=await fetch('/api/subscribe',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({plan,billing:billingCycle,access_token:token})
      });
      var sub=await r.json();
      if(sub.error)return st('Error: '+sub.error);
      var rzp=new window.Razorpay({
        key:             sub.key_id,
        subscription_id: sub.subscription_id,
        name:            'CogniSwift',
        description:     plan==='pro'?(billingCycle==='annual'?'Pro · ₹899/year':'Pro · ₹99/month'):(billingCycle==='annual'?'Elite · ₹1,799/year':'Elite · ₹199/month'),
        theme:           {color:'#e8d5b0'},
        prefill:         {email:user.email,name:sub.name||''},
        handler:async function(response){
          st('Activating subscription…');
          try{
            var freshToken=loadToken();
            // Step 1: call verify-payment directly — this writes tier to DB immediately
            // so the upgrade works even if the Razorpay webhook is delayed
            var vr=await fetch('/api/verify-payment',{
              method:'POST',
              headers:{'Content-Type':'application/json'},
              body:JSON.stringify({
                razorpay_payment_id:      response.razorpay_payment_id,
                razorpay_subscription_id: response.razorpay_subscription_id,
                razorpay_signature:       response.razorpay_signature,
                plan:                     plan,
                billing:                  billingCycle,
                access_token:             freshToken,
              })
            });
            var vd=await vr.json();
            if(vd.success){
              // Step 2: fetch fresh profile so UI reflects real DB state
              var freshUser=await fetchUserProfile();
              if(freshUser&&freshUser.id){setUser(freshUser);setSession(freshUser);}
              else{var up=Object.assign({},user,{tier:plan,sub_status:'active'});setUser(up);setSession(up);}
              setPw(false);
              st('🎉 Welcome to '+(plan==='pro'?'Pro':'Elite')+'! Subscription active.');
            } else {
              // verify-payment failed (e.g. signature mismatch) — still show success
              // webhook will fix DB in background; set optimistic state
              var up2=Object.assign({},user,{tier:plan,sub_status:'active'});
              setUser(up2);setSession(up2);
              setPw(false);
              st('Subscribed! Features now active. If issues persist, refresh the page.');
            }
          }catch(err){
            // Network error — optimistically upgrade, webhook will sync DB
            var up3=Object.assign({},user,{tier:plan,sub_status:'active'});
            setUser(up3);setSession(up3);
            setPw(false);
            st('Subscribed! Please refresh the page to confirm your plan.');
          }
        },
        modal:{ondismiss:function(){st('Subscription setup cancelled');}}
      });
      rzp.open();
    }catch(err){st('Subscription error: '+err.message);}
  }

  // ── Pro: voice readout ──
  function toggleVoice(){
    if(!isPro()&&!isElite()){setPw(true);return;}
    if(speaking){window.speechSynthesis.cancel();setSpeaking(false);return;}
    var card=cards[ci];
    if(!card)return;
    var text=card.topic+'. '+card.points.split('|').join('. ');
    // Detect Hindi — check points, full card text, AND source notes/pdf text
    // llama (Pro) often writes topics in English even for Hindi input, so check all sources
    var pointsText=card.points||'';
    var devaInPoints=(pointsText.match(/[\u0900-\u097F]/g)||[]).length;
    var lettersInPoints=(pointsText.match(/[a-zA-Z\u0900-\u097F]/g)||[]).length;
    var devaInAll=(text.match(/[\u0900-\u097F]/g)||[]).length;
    var lettersInAll=(text.match(/[a-zA-Z\u0900-\u097F]/g)||[]).length;
    // Also check the source input (notes or pdfTxt) — if source is Hindi, read in Hindi
    var srcText=(itab==='text'?notes:pdfTxt)||'';
    var devaInSrc=(srcText.match(/[\u0900-\u097F]/g)||[]).length;
    var lettersInSrc=(srcText.match(/[a-zA-Z\u0900-\u097F]/g)||[]).length;
    var srcIsHindi=lettersInSrc>0&&(devaInSrc/lettersInSrc)>0.4;
    // Hindi if: points >40% Deva OR full card >25% Deva OR source was Hindi OR any points have Deva chars
    var hasAnyDeva=devaInPoints>0||devaInAll>0;
    var isHindi=(lettersInPoints>0&&(devaInPoints/lettersInPoints)>0.4)||(lettersInAll>0&&(devaInAll/lettersInAll)>0.25)||srcIsHindi||(hasAnyDeva&&srcIsHindi);
    function speak(voices){
      var utt=new SpeechSynthesisUtterance(text);
      utt.rate=0.92;utt.pitch=1;
      if(isHindi){
        utt.lang='hi-IN';
        utt.rate=0.85; // slightly slower for Hindi — improves clarity
        // Find best Hindi voice — prefer hi-IN, fall back to any hi variant
        var hv=voices.find(function(v){return v.lang==='hi-IN';})
              ||voices.find(function(v){return v.lang&&v.lang.startsWith('hi');})
              ||voices.find(function(v){return v.lang&&v.lang.indexOf('IN')>=0;}); // any Indian English voice as last resort
        if(hv)utt.voice=hv;
        // lang is set regardless — browser will use default voice for hi-IN
      } else {
        utt.lang='en-IN';
      }
      utt.onend=function(){setSpeaking(false);};
      utt.onerror=function(){setSpeaking(false);};
      window.speechSynthesis.speak(utt);
      setSpeaking(true);
    }
    // getVoices() is async on Chrome/Android — must wait for voices to load
    var v=window.speechSynthesis.getVoices();
    if(v&&v.length){speak(v);}
    else{
      window.speechSynthesis.onvoiceschanged=function(){
        speak(window.speechSynthesis.getVoices());
        window.speechSynthesis.onvoiceschanged=null;
      };
      // Fallback: if onvoiceschanged never fires, speak after short delay
      setTimeout(function(){if(!speaking){speak(window.speechSynthesis.getVoices());}},500);
    }
  }

  async function regenCard(idx){
    if(!isPro()&&!isElite()){setPw(true);return;}
    if(regenCount>=3){st('Redo limit reached — max 3 per day');return;}
    var card=cards[idx];
    if(!card){return;}
    var txt=itab==='text'?notes:pdfTxt;
    if(!txt.trim()){st('Notes not available — paste your notes first, then redo');return;}
    setRegenIdx(idx);
    try{
      // Send a targeted prompt: same topic, different points, from the same source text
      var r=await fetch('/api/regen-card',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          text:txt.substring(0,getCharLimit()),
          topic:card.topic,
          existing_points:card.points,
          access_token:loadToken()||undefined,
        }),
      });
      if(!r.ok){var ed=await r.json().catch(function(){return{};});throw new Error(ed.error||'Server error');}
      var data=await r.json();
      if(data.topic&&data.points){
        var updated=cards.slice();
        updated[idx]={topic:data.topic,points:data.points};
        setCards(updated);
        var newCount=regenCount+1;
        setRegenCount(newCount);
        try{localStorage.setItem('cs_regen',JSON.stringify({d:new Date().toDateString(),c:newCount}));}catch(e){}
        st('Card refreshed — '+(3-newCount)+' redos left today');
      }
    }catch(err){st('Redo failed: '+err.message);}
    finally{setRegenIdx(null);}
  }

    privacy:{title:'Privacy Policy',body:'<h4>Last Updated: March 2026</h4><p>This Privacy Policy describes how CogniSwift collects, uses, and protects your information when you use cogniswift.in.</p><h4>Information We Collect</h4><p><strong>Account information:</strong> When you sign in with Google, we receive your name, email address, and profile picture. We store this to identify your account.</p><p><strong>Study content:</strong> Notes or PDF text you upload are sent to our Lightning-fast AI generation engine to generate flashcards. We do not permanently store this text — it is processed and discarded.</p><p><strong>Generated content:</strong> Flashcard sets, quiz history, and mistakes you choose to save are stored in our database linked to your account.</p><p><strong>Usage data:</strong> We track daily generation counts to enforce free-tier limits. We do not use advertising trackers.</p><h4>How We Use Your Information</h4><p>We use your information solely to provide CogniSwift — to authenticate you, save your study sets, process payments, and show your progress. We do not sell, rent, or share your data with any third party for marketing purposes.</p><h4>Third-Party Services</h4><p>We use <strong>Authentication and database services</strong> to manage user accounts and securely store application data, <strong>AI processing services</strong> to generate flashcards, summaries, and quizzes from the text or documents you submit and <strong>Razorpay</strong> (payments — we never see your card details).</p><h4>Data Retention</h4><p>Your data is retained as long as your account exists. Request deletion at <a href="mailto:cogniswiftai@gmail.com">cogniswiftai@gmail.com</a>.</p><h4>Cookies</h4><p>We use browser localStorage for your session token and preferences (dark mode, language). No advertising or tracking cookies are used.</p><h4>Contact</h4><p><a href="mailto:cogniswiftai@gmail.com">cogniswiftai@gmail.com</a></p>'},
    data:{title:'Data Policy',body:'<h4>Last Updated: March 2026</h4><p>This Data Policy explains what CogniSwift stores, where, how long, and your rights over it.</p><h4>What We Store</h4><p><strong>Account:</strong> Email, name, profile picture URL, tier, subscription status, and daily usage count.</p><p><strong>Saved sets:</strong> Flashcard sets you explicitly save — cards, quiz questions, and summary.</p><p><strong>Quiz history:</strong> Your scores and completion dates.</p><p><strong>Mistakes:</strong> Quiz questions you answered incorrectly, stored for review.</p><p><strong>Payment records:</strong> Razorpay order IDs and payment status only. We never store card numbers, UPI IDs, or bank details.</p><h4>What We Do NOT Store</h4><p>Raw notes or PDF text you paste or upload are not saved on our servers. They are sent to our AI engine for processing and discarded. We do not store IP addresses or browsing behaviour.</p><h4>Data Location</h4><p>All user data is in our secured database. AI processing is by our Lightning-fast AI generation engine. All providers follow industry-standard security practices.</p><h4>Data Deletion</h4><p>Email <a href="mailto:cogniswiftai@gmail.com">cogniswiftai@gmail.com</a> to request complete deletion of your account and all data. We process requests within 7 business days.</p><h4>Security</h4><p>All data is transmitted over HTTPS. Our database enforces row-level security so users can only access their own data.</p>'},
    terms:{title:'Terms of Service',body:'<h4>Last Updated: March 2026</h4><p>By using CogniSwift at cogniswift.in you agree to these Terms of Service.</p><h4>1. The Service</h4><p>CogniSwift provides an AI-powered flashcard and quiz tool for educational use. We offer a free tier and paid plans (Pro and Elite). Features may change with reasonable notice.</p><h4>2. Your Account</h4><p>You must sign in with a valid Google account to access saved features and must be at least 13 years of age. You are responsible for all activity under your account.</p><h4>3. Acceptable Use</h4><p>You must not: reverse-engineer or scrape our systems; submit illegal or harmful content; use automated scripts to generate content at scale; or share your credentials with others.</p><h4>4. Subscriptions and Payments</h4><p>Paid plans are billed monthly/annually via Razorpay and auto-renew until cancelled. You may cancel anytime and retain access until the end of your billing period. No refunds are issued for partial months. Access is suspended if payment fails after retries.</p><h4>5. AI-Generated Content</h4><p>Flashcards and quizzes are generated by AI and may occasionally contain inaccuracies. CogniSwift is a study aid — it does not replace verified textbooks or professional academic guidance. You are responsible for verifying AI-generated content before relying on it.</p><h4>6. Intellectual Property</h4><p>The CogniSwift platform and design are owned by CogniSwift. Your submitted notes remain your own. Generated flashcard content is for your personal study use only. You may not redistribute it commercially without permission.</p><h4>7. Limitation of Liability</h4><p>CogniSwift is provided as-is. We are not liable for inaccuracies in AI content, data loss, service interruptions, or exam outcomes. Our total liability shall not exceed the amount paid in the 3 months preceding any claim.</p><h4>8. Governing Law</h4><p>These Terms are governed by the laws of India. Disputes are subject to the exclusive jurisdiction of the courts in Delhi, India.</p><h4>9. Contact</h4><p><a href="mailto:cogniswiftai@gmail.com">cogniswiftai@gmail.com</a></p>'},

  function tBox(sel){

    return{top:r.top-p,left:r.left-p,w:r.width+p*2,h:r.height+p*2};
  }

  function tTipPos(box){

    var tw2=276,th2=150,vw=window.innerWidth,vh=window.innerHeight;
    var lft=box.left+box.w/2-tw2/2;
    lft=Math.max(12,Math.min(lft,vw-tw2-12));
    var top=box.top+box.h+14;
    if(top+th2>vh-16)top=box.top-th2-14;
    if(top<72)top=72;
    return{top:Math.round(top)+'px',left:Math.round(lft)+'px'};
  }

    /* WORKSPACE MODAL */

      e('div',{className:'ws-box'},

              e('button',{className:'ws-close',onClick:function(){setShowWs(false);}},'✕')

            e('div',{style:{display:'flex',gap:6,flexWrap:'wrap',rowGap:6}},

                  onClick:function(){setWsTab(tab);},

                    padding:'5px 12px',border:'1px solid',borderRadius:'50px',
                    fontSize:'0.72rem',cursor:'none',fontFamily:'Geist,sans-serif',
                    background:wsTab===tab?'var(--accent)':'transparent',
                    color:wsTab===tab?'var(--bg)':'var(--muted)',
                    borderColor:wsTab===tab?'var(--accent)':'var(--border)',

                },labels[tab]+(counts[tab]?' ('+counts[tab]+')':''));

            )

        ),
        e('div',{className:'ws-body'},

          /* ── SETS TAB ── */

                        e('span',null,'·'),
                        e('span',null,(s.quiz&&s.quiz.length||0)+' quiz Qs'),

                        e('span',null,fmtDate(s,{day:'numeric',month:'short',year:'2-digit'}))

          /* ── HISTORY TAB ── */

                  e('div',{style:{fontSize:'2.2rem',marginBottom:12}},'📊'),
                  t('No quiz history yet.'),e('br'),
                  e('span',{style:{color:'var(--muted)'}},'Complete a quiz and your scores will appear here.')

              : e('div',null,
                  quizHist.map(function(q){
                    var pct=Math.round(q.score/q.total*100);

                    return e('div',{key:q.id,className:'qh-item'},
                      e('div',{className:'qh-left'},
                        e('div',{style:{fontWeight:500,fontSize:'0.82rem'}},q.set_name||q.setName),

                        e('div',{style:{fontSize:'0.68rem',color:'var(--muted)'}},q.score+' / '+q.total+' correct')
