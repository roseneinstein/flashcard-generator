<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#22203a;
  --surface:#2a2740;
  --surface2:#322e4a;
  --border:#ffffff1e;
  --border-h:#ffffff33;
  --text:#ededf0;
  --muted:#9898b8;
  --muted2:#4a4a60;
  --accent:#e8d5b0;
  --accent-rgb:232,213,176;
  --green:#4ade80;
  --red:#f87171;
  --r:14px;
  --r-sm:8px;
  --card-back-bg:#0e1912;
  --card-back-border:#1b3322;
}
html.light{
  --bg:#f4f1eb;
  --surface:#fdfcf8;
  --surface2:#edeae2;
  --border:#00000011;
  --border-h:#00000022;
  --text:#1e1b14;
  --muted:#7a7060;
  --muted2:#c0b89e;
  --accent:#9a7c3f;
  --accent-rgb:154,124,63;
  --green:#15803d;
  --red:#b91c1c;
  --card-back-bg:#e8f5ee;
  --card-back-border:#a3d9b8;
}
html{scroll-behavior:smooth}
body{font-family:'Geist',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;cursor:none;transition:background .3s,color .3s}

/* ── ATMOSPHERIC BACKGROUND ── */
body::before{content:'';display:none}
body::after{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 85% 60% at 5%   2%,   rgba(110,70,210,0.22)  0%, transparent 56%),
    radial-gradient(ellipse 60% 50% at 95%  92%,  rgba(210,175,120,0.13) 0%, transparent 54%),
    radial-gradient(ellipse 50% 42% at 78%  12%,  rgba(70,100,230,0.12)  0%, transparent 50%),
    radial-gradient(ellipse 42% 38% at 12%  72%,  rgba(160,90,240,0.11)  0%, transparent 46%),
    radial-gradient(ellipse 35% 30% at 48%  50%,  rgba(120,60,180,0.07)  0%, transparent 40%);
  pointer-events:none;
  z-index:0;
}
html.light body::after{
  background:
    radial-gradient(ellipse 80% 60% at 10% 0%,   rgba(210,175,100,0.22) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 90% 90%,  rgba(154,124,63,0.16)  0%, transparent 55%),
    radial-gradient(ellipse 50% 40% at 70% 15%,  rgba(130,170,100,0.11) 0%, transparent 50%),
    radial-gradient(ellipse 40% 35% at 15% 65%,  rgba(190,145,75,0.13)  0%, transparent 45%),
    radial-gradient(ellipse 30% 25% at 55% 50%,  rgba(160,130,80,0.08)  0%, transparent 40%);
}
#root{position:relative;z-index:1}

/* THEME & LANG TOGGLES */
.thm-tog{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:0.85rem;cursor:none;display:flex;align-items:center;justify-content:center;transition:border-color .2s,color .2s,background .2s;flex-shrink:0}
.thm-tog:hover{border-color:var(--border-h);color:var(--text);background:var(--surface)}
/* CURSOR */
#cur{width:8px;height:8px;background:var(--accent);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference;transition:width .12s,height .12s}
#cur-r{width:32px;height:32px;border:1px solid rgba(232,213,176,0.35);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .28s cubic-bezier(.22,1,.36,1),height .28s cubic-bezier(.22,1,.36,1),border-radius .2s}
body.hov #cur{width:5px;height:5px;opacity:0.5}
body.hov #cur-r{width:48px;height:48px;border-radius:6px;opacity:0.2}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;border-bottom:1px solid var(--border);background:rgba(34,32,58,0.92);backdrop-filter:blur(20px);z-index:100;transition:background .3s,border-color .3s}
html.light nav{background:rgba(244,241,235,0.92)}
.logo{font-family:'Instrument Serif',serif;font-size:1.9rem;color:var(--accent);letter-spacing:-0.02em;font-weight:400}
.nav-logo{display:flex;align-items:center;gap:6px;user-select:none}
.nav-logo img{width:30px;height:30px;object-fit:contain;display:block;border-radius:0;background:none}
.nav-logo-txt{font-family:'Instrument Serif',serif;font-size:1.9rem;color:var(--accent);letter-spacing:-0.02em;font-weight:400}
.hero-logo{display:flex;flex-direction:row;align-items:center;justify-content:center;gap:2px;margin-bottom:16px;animation:fu .55s ease both;position:relative;z-index:2}
.hero-logo img{width:clamp(3.1rem,7vw,5.2rem);height:clamp(3.1rem,7vw,5.2rem);object-fit:contain;display:block;border-radius:0;background:none;flex-shrink:0}
.hero-logo-name{font-family:'Instrument Serif',serif;font-size:clamp(2.4rem,5.5vw,4rem);color:var(--accent);letter-spacing:-0.03em;font-weight:400;line-height:1.18}
.share-sheet-ov{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:700;display:flex;align-items:flex-end;justify-content:center}
.share-sheet-box{background:var(--surface);border-radius:18px 18px 0 0;padding:24px 20px 36px;width:100%;max-width:500px;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.share-sheet-title{font-size:0.7rem;color:var(--muted);text-align:center;margin-bottom:20px;text-transform:uppercase;letter-spacing:0.08em}
.share-sheet-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.share-btn-item{display:flex;flex-direction:column;align-items:center;gap:7px;cursor:none;background:none;border:none;color:var(--text);padding:0}
.share-btn-item:hover{opacity:0.75}
.share-btn-icon{width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;border:1px solid var(--border)}
.share-btn-label{font-size:0.64rem;color:var(--muted);text-align:center}
.share-url-row{display:flex;gap:8px;margin-top:4px}
.share-url-row input{flex:1;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surface2);color:var(--text);font-size:0.76rem;font-family:'Geist',sans-serif}
.ios-install-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9999;display:flex;align-items:flex-end;justify-content:center;padding:0 16px 28px;animation:fu .2s ease}
.ios-install-box{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:26px 22px 22px;width:100%;max-width:400px}
.ios-install-box img{width:52px;height:52px;border-radius:12px;display:block;margin:0 auto 12px}
.ios-install-box h3{text-align:center;font-size:1rem;font-weight:600;color:var(--text);margin-bottom:6px}
.ios-install-box p{text-align:center;font-size:0.8rem;color:var(--muted);margin-bottom:18px;line-height:1.55}
.ios-step{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;font-size:0.82rem;color:var(--text);line-height:1.5}
.ios-step-num{background:var(--accent);color:var(--bg);border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;flex-shrink:0;margin-top:1px}
.ios-step strong{color:var(--accent)}
.nav-r{display:flex;gap:24px;align-items:center}
.nl{font-size:0.75rem;font-weight:400;color:var(--muted);background:none;border:none;cursor:none;letter-spacing:0.06em;text-transform:uppercase;transition:color .2s;padding:0}
.nl:hover{color:var(--text)}
@media(max-width:600px){.nl{display:none}.nav-logo-txt{font-size:1.4rem}.nav-logo img{width:24px;height:24px}.nav-r{gap:14px}}
.np{font-size:0.78rem;font-weight:500;color:var(--bg);background:var(--accent);border:none;border-radius:50px;padding:7px 16px;cursor:none;transition:opacity .2s,transform .15s;letter-spacing:0.02em}
.np:hover{opacity:0.85;transform:scale(1.04)}

/* HERO */
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:100px 24px 80px;position:relative;overflow:clip}
.h-glow{position:absolute;width:800px;height:600px;background:radial-gradient(ellipse,rgba(232,213,176,0.07) 0%,transparent 65%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}

.h-line{font-size:clamp(2.4rem,5.5vw,4rem);letter-spacing:-0.03em;font-family:'Instrument Serif',serif;color:var(--accent);margin-bottom:16px;animation:fu .55s ease both;position:relative;z-index:2;font-weight:400;line-height:1.18}
html.light .h-line{color:var(--accent)}
html.light html.light html.light html.light html.light @keyframes crown-glow{
  0%,100%{filter:drop-shadow(0 1px 4px rgba(255,200,40,0.5)) drop-shadow(0 0 2px rgba(255,215,0,0.25));}
  50%{filter:drop-shadow(0 1px 8px rgba(255,220,60,0.95)) drop-shadow(0 0 6px rgba(255,200,0,0.55));}
}
html.light html.light html.light html.light html.light html.light @keyframes crown-glow-red{
  0%,100%{filter:drop-shadow(0 1px 4px rgba(180,0,0,0.45)) drop-shadow(0 0 2px rgba(200,20,20,0.25));}
  50%{filter:drop-shadow(0 1px 8px rgba(220,0,0,0.9)) drop-shadow(0 0 6px rgba(180,0,0,0.5));}
}

/* ── HEADLINE: biggest text users actually read on screen ── */
h1{
  font-family:'Instrument Serif',serif;
  font-size:clamp(4.5rem,11vw,9.5rem);
  font-weight:400;
  line-height:0.97;
  letter-spacing:-0.04em;
  max-width:960px;
  margin:0 auto 28px;
  animation:fu .55s .05s ease both;
  position:relative;
  z-index:2;
}
h1 em{font-style:italic;color:var(--accent)}
.h-sub{font-size:clamp(0.88rem,2vw,1rem);color:var(--muted);max-width:400px;margin:0 auto 44px;line-height:1.75;font-weight:300;animation:fu .55s .1s ease both}
.pill-row{display:flex;flex-wrap:wrap;justify-content:center;gap:7px;margin-bottom:44px;animation:fu .55s .15s ease both}
.pill{border:1px solid var(--border);border-radius:50px;padding:6px 15px;font-size:0.76rem;color:var(--muted);letter-spacing:0.03em;transition:border-color .2s,color .2s;cursor:none}
.pill:hover{border-color:var(--border-h);color:var(--text)}
.cta{font-family:'Geist',sans-serif;font-size:0.92rem;font-weight:500;color:var(--bg);background:var(--accent);border:none;border-radius:50px;padding:14px 34px;cursor:none;letter-spacing:0.02em;transition:opacity .2s,transform .15s,box-shadow .2s;animation:fu .55s .2s ease both}
.cta:hover{opacity:0.86;transform:translateY(-2px);box-shadow:0 10px 36px rgba(232,213,176,0.14)}
@keyframes fu{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}

/* FEATURES — single column rows, float on hover */
.feat-wrap{padding:80px 24px;max-width:760px;margin:0 auto}
.feat-eyebrow{font-size:0.68rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:10px}
.feat-heading{font-family:'Instrument Serif',serif;font-size:clamp(1.6rem,3.5vw,2.4rem);text-align:center;margin-bottom:48px;letter-spacing:-0.02em;line-height:1.1}
.feat-heading em{font-style:italic;color:var(--accent)}
.fg{display:flex;flex-direction:column;gap:3px}
.fc{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:24px 28px;
  position:relative;
  overflow:hidden;
  cursor:none;
  display:flex;
  align-items:flex-start;
  gap:20px;
  transition:
    transform .5s cubic-bezier(.22,1,.36,1),
    box-shadow .5s cubic-bezier(.22,1,.36,1),
    background .22s ease,
    border-color .22s ease;
  z-index:1;
}
.fc::before{
  content:'';
  position:absolute;inset:0;
  background:radial-gradient(circle at var(--mx,50%) var(--my,50%),rgba(232,213,176,0.1) 0%,transparent 60%);
  opacity:0;
  transition:opacity .35s;
  pointer-events:none;
}
.fc:hover{
  transform:translateY(-5px) scale(1.018);
  background:var(--surface2);
  border-color:rgba(232,213,176,0.18);
  box-shadow:0 16px 48px rgba(0,0,0,0.5), 0 0 0 1px rgba(232,213,176,0.1);
  z-index:10;
}
.fc:hover::before{opacity:1}
.fc-ico{
  font-size:1.1rem;
  opacity:0.55;
  flex-shrink:0;
  margin-top:2px;
  width:28px;
  text-align:center;
}
.fc-body{flex:1}
.fc-t{
  font-family:'Instrument Serif',serif;
  font-size:1.05rem;
  color:var(--text);
  margin-bottom:5px;
  letter-spacing:-0.01em;
}
.fc-d{
  font-size:0.8rem;
  color:var(--muted);
  line-height:1.72;
  font-weight:300;
  padding-left:2px;
}

/* APP */
.app-wrap{max-width:660px;margin:0 auto;padding:0 20px 110px}
.ey{font-size:0.68rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:9px}
.st{font-family:'Instrument Serif',serif;font-size:clamp(1.7rem,4vw,2.6rem);text-align:center;margin-bottom:48px;letter-spacing:-0.02em;line-height:1.1}
.st em{font-style:italic;color:var(--accent)}

/* Input */
/* Expandable input wrapper */
.icard{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  overflow:hidden;
  margin-bottom:14px;
  transition:
    border-color .35s,
    box-shadow .45s cubic-bezier(.22,1,.36,1),
    transform .45s cubic-bezier(.22,1,.36,1);
}
.icard:hover{
  transform:scale(1.012);
  border-color:var(--border-h);
  box-shadow:0 6px 32px rgba(0,0,0,0.3), 0 0 0 1px rgba(232,213,176,0.07);
}
.icard:focus-within{
  transform:scale(1.016);
  border-color:rgba(232,213,176,0.28);
  box-shadow:0 0 0 1px rgba(232,213,176,0.08),0 12px 48px rgba(0,0,0,0.35);
}
.tbar{display:flex;gap:3px;background:var(--surface2);padding:4px;border-bottom:1px solid var(--border)}
.tb{flex:1;padding:8px 10px;border:none;background:transparent;color:var(--muted);font-family:'Geist',sans-serif;font-size:0.75rem;font-weight:400;cursor:none;border-radius:5px;transition:all .15s;text-transform:uppercase;letter-spacing:0.07em}
.tb.act{background:var(--surface);color:var(--text)}

/* The textarea itself expands fluidly */
textarea{
  width:100%;
  min-height:140px;
  max-height:520px;
  background:transparent;
  border:none;
  padding:18px;
  font-family:'Geist',sans-serif;
  font-size:0.9rem;
  color:var(--text);
  line-height:1.72;
  font-weight:300;
  resize:none;
  outline:none;
  transition:min-height .55s cubic-bezier(.22,1,.36,1);
  display:block;
  overflow-y:auto;
}
textarea:focus,textarea:not(:placeholder-shown){
  min-height:260px;
}
/* Smooth overflow reveal as it expands */
.icard:has(textarea:focus){
  box-shadow:0 0 0 1px rgba(232,213,176,0.1),0 16px 56px rgba(0,0,0,0.35);
}
textarea::placeholder{color:var(--muted2);line-height:1.72}
.upz{padding:56px 24px;text-align:center;cursor:none;background:transparent;border:none;transition:background .2s;width:100%}
.upz:hover,.upz.dov{background:rgba(232,213,176,0.03)}
.upz-i{font-size:1.6rem;margin-bottom:12px;opacity:0.3;display:block}
.upz p{font-size:0.82rem;color:var(--muted);line-height:1.7;font-weight:300}
.upz strong{color:var(--accent);font-weight:400}
input[type=file]{display:none}
.ctrl{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-top:1px solid var(--border);gap:10px;flex-wrap:wrap}
.cbs{display:flex;gap:3px}
.cb{padding:5px 12px;border:1px solid var(--border);border-radius:50px;background:transparent;color:var(--muted);font-family:'Geist',sans-serif;font-size:0.75rem;cursor:none;transition:all .15s}
.cb.s{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.cb:hover:not(.s){border-color:var(--border-h);color:var(--text)}
.gb{padding:9px 22px;background:var(--accent);color:var(--bg);border:none;border-radius:50px;font-family:'Geist',sans-serif;font-size:0.82rem;font-weight:500;cursor:none;letter-spacing:0.03em;transition:opacity .2s,transform .15s}
.gb:hover:not(:disabled){opacity:0.83;transform:scale(1.03)}
.gb:disabled{opacity:0.28;cursor:not-allowed}
.urow{display:flex;align-items:center;gap:10px;padding:9px 18px;border-top:1px solid var(--border)}
.ut{flex:1;height:2px;background:var(--muted2);border-radius:2px;overflow:hidden}
.uf{height:100%;background:var(--accent);border-radius:2px;transition:width .5s ease}
.utx{font-size:0.7rem;color:var(--muted);white-space:nowrap}

/* Loading */
.ld{padding:56px 20px;text-align:center}
.dots{display:flex;justify-content:center;gap:5px;margin-bottom:14px}
.dots span{width:4px;height:4px;background:var(--accent);border-radius:50%;animation:dt 1.2s ease-in-out infinite;opacity:0.5}
.dots span:nth-child(2){animation-delay:.15s}
.dots span:nth-child(3){animation-delay:.3s}
@keyframes dt{0%,80%,100%{transform:scaleY(0.4)}40%{transform:scaleY(1.2);opacity:1}}
.ld p{font-size:0.78rem;color:var(--muted);letter-spacing:0.05em;font-weight:300}

/* Results */
.rtabs{display:flex;gap:1px;background:var(--border);border-radius:var(--r) var(--r) 0 0;overflow:hidden;border:1px solid var(--border);border-bottom:none}
.rt{flex:1;padding:13px;background:var(--surface2);border:none;color:var(--muted);font-family:'Geist',sans-serif;font-size:0.75rem;font-weight:400;text-transform:uppercase;letter-spacing:0.07em;cursor:none;transition:all .15s}
.rt.act{background:var(--surface);color:var(--text)}
.rt .bdg{display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:1px 6px;font-size:0.65rem;margin-left:6px;color:var(--muted)}
.rt.act .bdg{background:var(--accent);border-color:var(--accent);color:var(--bg)}
.rbody{background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);overflow:hidden}

/* Flashcard */
.fnr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
.nb{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:0.95rem;cursor:none;display:flex;align-items:center;justify-content:center;transition:all .15s}
.nb:hover:not(:disabled){border-color:var(--border-h);color:var(--text)}
.nb:disabled{opacity:0.18}
.fc-ctr{font-size:0.75rem;color:var(--muted);letter-spacing:0.06em}
.fw{perspective:1400px;padding:22px;cursor:none}
.fi{position:relative;width:100%;height:360px;transform-style:preserve-3d;transition:transform .58s cubic-bezier(.4,.2,.2,1)}
.fi.fl{transform:rotateY(180deg)}
.ff,.fb{position:absolute;inset:0;border-radius:var(--r);backface-visibility:hidden;-webkit-backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px;text-align:center}
.ff{background:var(--th-ff-bg,var(--surface2));border:1px solid var(--th-ff-brd,var(--border));color:var(--th-topic,var(--text))}
.fb{background:var(--th-fb-bg,var(--card-back-bg));border:1px solid var(--th-fb-brd,var(--card-back-border));transform:rotateY(180deg);color:var(--th-pts,var(--text));align-items:flex-start;text-align:left;overflow:hidden;padding:0}
.fb-scroll{width:100%;height:100%;overflow-y:auto;overflow-x:hidden;padding:20px 24px;box-sizing:border-box;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.fl-lbl{font-size:0.62rem;letter-spacing:0.15em;text-transform:uppercase;opacity:0.45;margin-bottom:16px;color:inherit}
.fl-q{font-family:'Instrument Serif',serif;font-size:clamp(1.1rem,3vw,1.45rem);line-height:1.5;color:inherit;font-weight:400}
.fl-a{font-size:0.88rem;line-height:1.75;color:var(--green);font-weight:300}
.fl-hint{position:absolute;bottom:12px;right:16px;font-size:0.62rem;color:var(--muted2);letter-spacing:0.04em}
.fca{display:flex;gap:7px;padding:14px 18px;border-top:1px solid var(--border);flex-wrap:wrap}
.ab{flex:1;min-width:82px;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r-sm);background:transparent;color:var(--muted);font-family:'Geist',sans-serif;font-size:0.75rem;cursor:none;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s;letter-spacing:0.03em}
.ab:hover{border-color:var(--border-h);color:var(--text)}
.ab.pr{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.ab.pr:hover{opacity:0.83}
.ab:disabled{opacity:0.28}

/* Quiz */
.qw{padding:22px}
.qpr{display:flex;align-items:center;gap:10px;margin-bottom:22px}
.qtr{flex:1;height:2px;background:var(--muted2);border-radius:2px;overflow:hidden}
.qf{height:100%;background:var(--accent);border-radius:2px;transition:width .5s ease}
.qst{font-size:0.72rem;color:var(--muted);white-space:nowrap}
.qq{font-family:'Instrument Serif',serif;font-size:1.15rem;line-height:1.5;margin-bottom:22px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.og{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:18px}
@media(max-width:460px){.og{grid-template-columns:1fr}}
.ob{padding:13px 14px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surface2);color:var(--text);font-family:'Geist',sans-serif;font-size:0.8rem;font-weight:300;line-height:1.5;text-align:left;cursor:none;transition:all .15s}
.ob:hover:not(:disabled){border-color:var(--border-h);background:var(--surface)}
.ob.cor{border-color:var(--card-back-border);background:var(--card-back-bg);color:var(--green)}
.ob.wrg{border-color:#2a1515;background:#1a0e0e;color:var(--red)}
.ob:disabled{cursor:not-allowed}
.qex{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px;font-size:0.8rem;color:var(--muted);line-height:1.7;font-weight:300;margin-bottom:14px}
.qex strong{color:var(--text);font-weight:400}
.nx{width:100%;padding:12px;background:var(--accent);color:var(--bg);border:none;border-radius:var(--r-sm);font-family:'Geist',sans-serif;font-size:0.83rem;font-weight:500;cursor:none;letter-spacing:0.03em;transition:opacity .2s}
.nx:hover{opacity:0.84}
.qres{text-align:center;padding:40px 24px}
.qsb{font-family:'Instrument Serif',serif;font-size:3.8rem;color:var(--accent);margin-bottom:6px}
.qrs{font-size:0.82rem;color:var(--muted);margin-bottom:26px;font-weight:300;line-height:1.7}
.rbtn{padding:11px 26px;border:1px solid var(--border);border-radius:50px;background:transparent;color:var(--text);font-family:'Geist',sans-serif;font-size:0.8rem;cursor:none;transition:all .15s}
.rbtn:hover{border-color:var(--border-h)}

/* Pricing */
.pr-wrap{padding:90px 24px;max-width:760px;margin:0 auto}
.plans{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:1px;
  border:1px solid var(--border);
  border-radius:var(--r);
  background:var(--border);
  overflow:visible;
  isolation:isolate;
}
@media(max-width:560px){.plans{grid-template-columns:1fr}}
.plan{
  background:var(--surface);
  padding:28px 22px;
  cursor:none;
  position:relative;
  overflow:hidden;
  z-index:1;
  transition:
    transform .45s cubic-bezier(.22,1,.36,1),
    background .2s ease,
    box-shadow .45s cubic-bezier(.22,1,.36,1);
}
.plans .plan:first-child{border-radius:var(--r) 0 0 var(--r)}
.plans .plan:last-child{border-radius:0 var(--r) var(--r) 0}
@media(max-width:560px){
  .plans .plan:first-child{border-radius:var(--r) var(--r) 0 0}
  .plans .plan:last-child{border-radius:0 0 var(--r) var(--r)}
}
.plan::before{
  content:'';
  position:absolute;inset:0;
  background:radial-gradient(circle at var(--mx,50%) var(--my,50%),rgba(232,213,176,0.09) 0%,transparent 58%);
  opacity:0;
  transition:opacity .3s;
  pointer-events:none;
}
.plan:hover{
  transform:scale(1.05);
  background:var(--surface2);
  box-shadow:0 10px 44px rgba(0,0,0,0.5), 0 0 0 1px rgba(232,213,176,0.14);
  z-index:10;
}
.plan:hover::before,.plan.pop::before{opacity:1}
.plan.pop{background:var(--surface2);transform:scale(1.02)}
.plan.pop:hover{transform:scale(1.06)}
.p-tag{font-size:0.62rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:18px;display:flex;align-items:center;gap:7px}
.p-bdg{background:var(--accent);color:var(--bg);border-radius:3px;padding:2px 7px;font-size:0.58rem;letter-spacing:0.1em}
.p-price{font-family:'Instrument Serif',serif;font-size:2.2rem;color:var(--text);margin-bottom:3px;letter-spacing:-0.02em}
.p-price sup{font-size:0.9rem;opacity:0.55}
.p-per{font-size:0.72rem;color:var(--muted);margin-bottom:22px}
.p-feats{list-style:none}
.p-feats li{font-size:0.78rem;color:var(--muted);padding:6px 0;display:flex;align-items:flex-start;gap:7px;line-height:1.5;font-weight:300;border-top:1px solid var(--border)}
.p-feats li::before{content:'→';color:var(--accent);font-size:0.72rem;margin-top:1px;flex-shrink:0}
.p-btn{margin-top:22px;width:100%;padding:10px;border:1px solid var(--border);border-radius:var(--r-sm);background:transparent;color:var(--text);font-family:'Geist',sans-serif;font-size:0.78rem;cursor:none;letter-spacing:0.05em;text-transform:uppercase;transition:all .15s}
.p-btn:hover{border-color:var(--border-h)}
.p-btn.pr{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.p-btn.pr:hover{opacity:0.84}

/* Paywall */
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.72);backdrop-filter:blur(14px);z-index:500;display:flex;align-items:flex-end;justify-content:center;animation:fi2 .2s ease}
@media(min-width:580px){.ov{align-items:center}}
@keyframes fi2{from{opacity:0}to{opacity:1}}
.mo{background:var(--surface);border:1px solid var(--border-h);border-radius:var(--r) var(--r) 0 0;padding:32px 26px 38px;max-width:440px;width:100%;animation:su .32s cubic-bezier(.34,1.56,.64,1)}
@media(min-width:580px){.mo{border-radius:var(--r)}}
@keyframes su{from{transform:translateY(28px);opacity:0}to{transform:translateY(0);opacity:1}}
.mo-ey{font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.mo h2{font-family:'Instrument Serif',serif;font-size:1.7rem;margin-bottom:9px;letter-spacing:-0.02em}
.mo-s{font-size:0.8rem;color:var(--muted);margin-bottom:24px;line-height:1.72;font-weight:300}
.mo-plans{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:18px}
.mp{border:1px solid var(--border);border-radius:var(--r-sm);padding:16px 14px;cursor:none;transition:all .15s}

.mp-n{font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.mp-p{font-family:'Instrument Serif',serif;font-size:1.6rem;color:var(--accent);margin-bottom:3px;letter-spacing:-0.02em}
.mp-p sup{font-size:0.8rem}
.mp-s{font-size:0.7rem;color:var(--muted);margin-bottom:8px}
.mo-wide{max-width:520px}
.mp-feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px 8px;margin-top:10px;text-align:left}
.mp-feat-row{font-size:0.69rem;color:var(--muted);padding:3px 0;display:flex;align-items:baseline;gap:5px;line-height:1.4}
.mp-feat-head{grid-column:1/-1;font-size:0.72rem;color:var(--text);font-weight:500;padding-bottom:4px;border-bottom:1px solid var(--border);margin-bottom:2px}
.mp-feat-check{color:var(--accent);font-size:0.6rem;flex-shrink:0;margin-top:1px}
.mp-pk{font-size:0.72rem;color:var(--muted);line-height:1.65;font-weight:300}
.pb{width:100%;padding:13px;background:var(--accent);color:var(--bg);border:none;border-radius:var(--r-sm);font-family:'Geist',sans-serif;font-size:0.85rem;font-weight:500;cursor:none;letter-spacing:0.02em;transition:opacity .2s;margin-bottom:9px}
.pb:hover{opacity:0.84}
.md{width:100%;padding:12px;background:transparent;border:1px solid var(--border);border-radius:var(--r-sm);color:var(--muted);font-family:'Geist',sans-serif;font-size:0.8rem;cursor:none;transition:all .15s}
.md:hover{border-color:var(--border-h);color:var(--text)}

/* Auth */
.auth-btn{display:flex;align-items:center;gap:8px;padding:7px 14px;border:1px solid var(--border);border-radius:50px;background:transparent;color:var(--text);font-family:'Geist',sans-serif;font-size:0.75rem;cursor:none;transition:all .2s;letter-spacing:0.02em}
.auth-btn:hover{border-color:var(--border-h);background:var(--surface)}
.auth-btn img{width:18px;height:18px;border-radius:50%}
.auth-modal{position:fixed;inset:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(8px);z-index:500;display:flex;align-items:center;justify-content:center;padding:24px}
.auth-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:36px 32px;max-width:360px;width:100%;text-align:center}
.auth-box h3{font-family:'Instrument Serif',serif;font-size:1.4rem;font-weight:400;margin-bottom:8px;color:var(--text)}
.auth-box p{font-size:0.78rem;color:var(--muted);margin-bottom:28px;line-height:1.6}
.auth-google{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surface2);color:var(--text);font-family:'Geist',sans-serif;font-size:0.85rem;cursor:none;transition:all .2s;margin-bottom:12px}
.auth-google:hover{border-color:var(--accent);background:var(--surface)}
.auth-close{font-size:0.72rem;color:var(--muted);background:none;border:none;cursor:none;text-decoration:underline;text-underline-offset:2px}
.user-menu{position:relative}
.user-drop{position:absolute;top:calc(100% + 8px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:6px;min-width:180px;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,0.18)}
.user-drop-item{display:block;width:100%;padding:9px 12px;text-align:left;background:none;border:none;color:var(--text);font-family:'Geist',sans-serif;font-size:0.78rem;cursor:none;border-radius:6px;transition:background .15s}
.user-drop-item:hover{background:var(--surface2)}
.user-drop-item.danger{color:var(--red)}
.tier-badge{display:inline-block;padding:2px 8px;border-radius:50px;font-size:0.62rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;margin-left:6px}
.tier-badge.pro{background:var(--accent);color:var(--bg)}
.tier-badge.elite{background:linear-gradient(135deg,#ffd700,#e8a800);color:#1e1b14}
.tier-badge.free{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
/* Quiz picker */
.qpick{padding:38px 24px;text-align:center}
.qpick-lbl{font-size:0.68rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);margin-bottom:18px;font-weight:400}
.qpick-opts{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
.qpick-btn{
  font-family:'Geist',sans-serif;font-size:1rem;font-weight:500;
  width:64px;height:64px;border-radius:50%;
  border:1.5px solid var(--border-h);
  background:var(--surface2);color:var(--text);
  cursor:none;
  transition:border-color .2s,background .2s,color .2s,transform .32s cubic-bezier(.34,1.56,.64,1),opacity .28s ease;
}
.qpick-btn:hover{border-color:var(--accent);background:var(--surface);color:var(--accent)}
.qpick-btn.chosen{
  background:var(--accent);color:var(--bg);border-color:var(--accent);
  transform:scale(1.22);opacity:0;
}
.qpick-btn.fading{opacity:0;transform:scale(0.88);}
/* Summary */
.sw{padding:22px 24px}
.sw-title{font-family:'Instrument Serif',serif;font-size:1.15rem;color:var(--accent);margin-bottom:18px;letter-spacing:-0.01em;line-height:1.3;font-weight:400;padding-bottom:14px;border-bottom:1px solid var(--border)}
.ss{margin-bottom:18px}
.ss-h{font-size:0.72rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--accent);margin-bottom:9px;opacity:0.8}
.ss-pts{display:flex;flex-direction:column;gap:6px}
.ss-pt{display:flex;align-items:flex-start;gap:8px;font-size:0.82rem;color:var(--text);line-height:1.68;font-weight:300}
.ss-pt::before{content:'→';color:var(--accent);font-size:0.65rem;flex-shrink:0;margin-top:4px;opacity:0.7}
.ss-ld{padding:48px 24px;text-align:center}
.ss-ld p{font-size:0.78rem;color:var(--muted);font-weight:300;margin-top:12px}
/* Empty */
.emp{padding:52px 24px;text-align:center}
.emp-i{font-size:1.6rem;opacity:0.1;margin-bottom:10px}
.emp p{font-size:0.78rem;color:var(--muted2);font-weight:300}

/* Footer */
footer{border-top:1px solid var(--border);padding:24px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.fl{font-family:'Instrument Serif',serif;font-size:1.4rem;color:var(--accent);letter-spacing:-0.02em}
.ft{font-size:0.72rem;color:var(--muted);font-weight:300}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:50px;font-size:0.78rem;z-index:600;animation:ti .28s ease,to2 .28s 2.4s ease forwards;white-space:nowrap;font-weight:300;letter-spacing:0.03em}
@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes to2{from{opacity:1}to{opacity:0}}

/* Share modal */
.sh-ov{position:fixed;inset:0;background:rgba(0,0,0,0.72);backdrop-filter:blur(14px);z-index:500;display:flex;align-items:center;justify-content:center;animation:fi2 .2s ease;padding:20px}
.sh-mo{background:var(--surface);border:1px solid var(--border-h);border-radius:var(--r);padding:28px 24px;max-width:480px;width:100%;animation:su .32s cubic-bezier(.34,1.56,.64,1)}
.sh-mo h3{font-family:'Instrument Serif',serif;font-size:1.4rem;margin-bottom:4px;letter-spacing:-0.02em}
.sh-mo p{font-size:0.76rem;color:var(--muted);margin-bottom:18px;font-weight:300;line-height:1.6}
.sh-list{max-height:260px;overflow-y:auto;display:flex;flex-direction:column;gap:5px;margin-bottom:18px}
.sh-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r-sm);cursor:none;transition:border-color .15s,background .15s;text-align:left;background:transparent}
.sh-item.sel{border-color:var(--accent);background:rgba(232,213,176,0.05)}

.sh-cb{width:14px;height:14px;border:1px solid var(--border-h);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.6rem;transition:all .15s}
.sh-item.sel .sh-cb{background:var(--accent);border-color:var(--accent);color:var(--bg)}
.sh-label{font-size:0.78rem;color:var(--text);font-weight:300;line-height:1.4;text-align:left}
.sh-url{display:flex;gap:7px;margin-bottom:10px}
.sh-url input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:9px 12px;font-family:'Geist',sans-serif;font-size:0.75rem;color:var(--muted);outline:none}
.sh-copy{padding:9px 16px;background:var(--accent);color:var(--bg);border:none;border-radius:var(--r-sm);font-family:'Geist',sans-serif;font-size:0.78rem;font-weight:500;cursor:none;white-space:nowrap;transition:opacity .2s}

.sh-sel-row{display:flex;gap:8px;margin-bottom:12px}

.sh-sel-btn:hover{color:var(--text)}
/* Testimonials */
.test-wrap{padding:80px 24px;max-width:760px;margin:0 auto}
.tg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:640px){.tg{grid-template-columns:1fr}}
.tc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px 20px;transition:border-color .2s}
.tc:hover{border-color:var(--border-h)}
.tc-q{font-size:0.82rem;color:var(--text);line-height:1.72;font-weight:300;margin-bottom:16px;font-style:italic}
.tc-q::before{content:'“';font-family:'Instrument Serif',serif;font-size:1.2rem;color:var(--accent);line-height:0;vertical-align:-4px;margin-right:2px}
.tc-name{font-size:0.72rem;color:var(--accent);font-weight:500;letter-spacing:0.03em}
.tc-sub{font-size:0.68rem;color:var(--muted);margin-top:2px;font-weight:300}
.disc{display:flex;align-items:flex-start;gap:8px;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);margin-top:10px}
.disc-i{font-size:0.75rem;opacity:0.45;flex-shrink:0;margin-top:1px}
.disc p{font-size:0.7rem;color:var(--muted);line-height:1.65;font-weight:300;margin:0}
.pdf-disc{padding:8px 14px;border-top:1px solid var(--border);background:var(--surface2)}
.char-warn{padding:7px 14px;border-top:1px solid var(--border);background:var(--surface2)}

.pdf-disc p::before{content:'ℹ';font-size:0.65rem;opacity:0.5;flex-shrink:0;margin-top:1px}
/* Disclaimer */
.disc{font-size:0.68rem;color:var(--muted2);line-height:1.7;font-weight:300;text-align:center;padding:0 8px;margin-top:10px}
.disc span{display:inline-flex;align-items:baseline;gap:4px}
.disc-icon{opacity:0.45;font-size:0.65rem}

/* ── AUTH MODAL ── */
.auth-modal{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(4px)}
.auth-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:32px 28px;max-width:360px;width:90%;text-align:center}
.auth-box h3{font-family:'Instrument Serif',serif;font-size:1.4rem;color:var(--accent);margin-bottom:8px;font-weight:400}
.auth-box p{font-size:0.8rem;color:var(--muted);margin-bottom:24px;line-height:1.6}
.auth-google{width:100%;padding:12px 20px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-family:'Geist',sans-serif;font-size:0.84rem;font-weight:500;cursor:none;display:flex;align-items:center;justify-content:center;gap:10px;transition:border-color .2s,background .2s;margin-bottom:10px}
.auth-google:hover{border-color:var(--border-h);background:var(--surface)}
.auth-google:disabled{opacity:0.5}
.auth-close{background:none;border:none;color:var(--muted);font-size:0.75rem;cursor:none;margin-top:4px;text-decoration:underline;text-underline-offset:2px}

.user-menu{position:relative}
.auth-btn{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:50px;padding:5px 12px 5px 6px;cursor:none;color:var(--text);font-size:0.78rem;font-family:'Geist',sans-serif;transition:border-color .2s}

.auth-btn img{width:22px;height:22px;border-radius:50%;object-fit:cover}
.tier-badge{font-size:0.6rem;text-transform:uppercase;letter-spacing:0.07em;padding:2px 7px;border-radius:50px;font-weight:600}
.tier-badge.free{background:var(--surface);color:var(--muted);border:1px solid var(--border)}
.tier-badge.pro{background:#7c3aed22;color:#a78bfa;border:1px solid #7c3aed44}
.tier-badge.elite{background:#b4520022;color:#fb923c;border:1px solid #b4520044}
.user-drop{position:absolute;top:calc(100% + 0px);right:0;min-width:200px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:6px 0;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,0.3);margin-top:0}
.user-drop-item{width:100%;text-align:left;background:none;border:none;padding:9px 14px;font-size:0.78rem;color:var(--text);font-family:'Geist',sans-serif;cursor:none;transition:background .15s}
.user-drop-item:hover{background:var(--surface2)}
.user-drop-item.danger{color:var(--red)}

/* Reveal */
.rev{opacity:0;transform:translateY(20px);transition:opacity .65s ease,transform .65s ease}
.rev.vis{opacity:1;transform:translateY(0)}

/* ── Pro workspace ── */
.ws-ov{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px)}
.ws-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);width:100%;max-width:780px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden}
.ws-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border);flex-shrink:0}
.ws-title{font-family:'Instrument Serif',serif;font-size:1.25rem;font-weight:400;color:var(--text)}
.ws-close{background:none;border:none;color:var(--muted);font-size:1.1rem;cursor:none;padding:4px 8px;border-radius:6px;transition:color .2s}

.ws-close:hover{color:var(--text)}
.ws-body{overflow-y:auto;padding:20px 22px;flex:1}
.ws-empty{text-align:center;padding:48px 20px;color:var(--muted);font-size:0.82rem;line-height:1.8}
.ws-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.ws-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:16px;cursor:none;transition:border-color .2s,box-shadow .2s;position:relative}
.ws-card:hover{border-color:var(--accent);box-shadow:0 4px 16px rgba(0,0,0,0.15)}
.ws-card-name{font-size:0.85rem;font-weight:500;color:var(--text);margin-bottom:6px;line-height:1.3}
.ws-card-meta{font-size:0.68rem;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap}
.ws-card-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);opacity:0.6;flex-shrink:0;margin-top:5px}
.ws-card-actions{display:flex;gap:6px;margin-top:12px}
.ws-btn{flex:1;padding:7px 6px;border:1px solid var(--border);border-radius:6px;background:none;color:var(--text);font-family:'Geist',sans-serif;font-size:0.68rem;cursor:none;transition:background .15s,border-color .15s}
.ws-btn:hover{background:var(--surface);border-color:var(--border-h)}
.ws-btn.del{color:var(--red)}
.ws-btn.del:hover{background:#f8717111;border-color:#f87171}

.save-ov{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:700;display:flex;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(4px)}
.save-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:28px 26px;max-width:380px;width:100%}
.save-title{font-family:'Instrument Serif',serif;font-size:1.2rem;font-weight:400;margin-bottom:6px;color:var(--text)}
.save-sub{font-size:0.75rem;color:var(--muted);margin-bottom:18px;line-height:1.6}
.save-input{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surface2);color:var(--text);font-family:'Geist',sans-serif;font-size:0.85rem;outline:none;transition:border-color .2s;margin-bottom:14px}
.save-input:focus{border-color:var(--accent)}
.save-row{display:flex;gap:10px}
.save-ok{flex:1;padding:11px;background:var(--accent);color:var(--bg);border:none;border-radius:var(--r-sm);font-family:'Geist',sans-serif;font-size:0.82rem;font-weight:500;cursor:none;transition:opacity .2s}
.save-ok:hover{opacity:0.88}
.save-cancel{padding:11px 18px;border:1px solid var(--border);border-radius:var(--r-sm);background:none;color:var(--muted);font-family:'Geist',sans-serif;font-size:0.82rem;cursor:none}
/* Pro gate banner */
.pro-gate{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);margin-top:10px}
.pro-gate p{font-size:0.75rem;color:var(--muted);margin:0;line-height:1.5}
.pro-gate button{flex-shrink:0;padding:7px 14px;background:var(--accent);color:var(--bg);border:none;border-radius:6px;font-family:'Geist',sans-serif;font-size:0.72rem;font-weight:500;cursor:none;white-space:nowrap}
/* Voice btn */
.voice-btn{padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:none;color:var(--muted);font-size:0.78rem;cursor:none;transition:color .2s,border-color .2s}
.voice-btn:hover,.voice-btn.active{color:var(--accent);border-color:var(--accent)}
/* Regen btn */
.regen-btn{padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:none;color:var(--muted);font-size:0.75rem;cursor:none;transition:color .2s,border-color .2s}
.regen-btn:hover{color:var(--text);border-color:var(--border-h)}
/* Mistake tracker */
.mist-section{margin-top:18px}
.mist-head{font-size:0.72rem;color:var(--accent);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px;font-weight:500}
.mist-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:6px;font-size:0.75rem;color:var(--text);line-height:1.5}
.mist-set{font-size:0.65rem;color:var(--muted);margin-top:2px}
/* Quiz history */
.qh-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:6px}
.qh-left{font-size:0.78rem;color:var(--text)}
.qh-score{font-size:0.72rem;color:var(--accent);font-weight:500}
.qh-date{font-size:0.65rem;color:var(--muted);margin-top:2px}
.qh-replay{padding:5px 12px;border:1px solid var(--border);border-radius:6px;background:none;color:var(--text);font-size:0.7rem;cursor:none;transition:border-color .2s}

/* cb-custom */
.cb-custom{appearance:none;-moz-appearance:textfield}
.cb-custom::-webkit-outer-spin-button,.cb-custom::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}

// Fetches user profile from our /api/auth endpoint using stored token
async function fetchUserProfile(){
  var token=loadToken();
  if(!token)return null;
  try{
    var r=await fetch('/api/auth',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({access_token:token})
    });
    if(!r.ok){clearToken();return null;}
    var data=await r.json();
    if(data.id)return data;
    clearToken();return null;
  }catch(e){return null;}
}

// Parse any date field — handles ISO strings, Postgres timestamps, local 'date' fallback
function safeDate(obj){
  var raw=obj.saved_at||obj.savedAt||obj.completed_at||obj.created_at||obj.date||null;
  if(!raw)return null;

function useCursor(){
  useEffect(function(){
    var dot=document.getElementById('cur'),ring=document.getElementById('cur-r');
    var rx=0,ry=0,mx=0,my=0;
    var mv=function(ev){mx=ev.clientX;my=ev.clientY;dot.style.left=mx+'px';dot.style.top=my+'px';};
    var tick=function(){rx+=(mx-rx)*.1;ry+=(my-ry)*.1;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(tick);};
    document.addEventListener('mousemove',mv);
    tick();
    var addHover=function(){
      document.querySelectorAll('button,a').forEach(function(el){
        el.addEventListener('mouseenter',function(){document.body.classList.add('hov');});
        el.addEventListener('mouseleave',function(){document.body.classList.remove('hov');});
      });
    };
    addHover();
    var autoResize=function(ev){
      var el=ev.target;
      if(el.tagName==='TEXTAREA'){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,520)+'px';}
    };
    document.addEventListener('input',autoResize);
    var obs=new MutationObserver(addHover);
    obs.observe(document.body,{childList:true,subtree:true});
    return function(){document.removeEventListener('mousemove',mv);document.removeEventListener('input',autoResize);};
  },[]);
}

function useReveal(){
  useEffect(function(){
    var obs=new IntersectionObserver(function(es){es.forEach(function(ev){if(ev.isIntersecting)ev.target.classList.add('vis');});},{threshold:0.1});
    document.querySelectorAll('.rev').forEach(function(el){obs.observe(el);});
    return function(){obs.disconnect();};
  });
}

    // Use ASCII control chars as separators (smaller than multi-char delimiters)
    // Topic: max 40 chars, Points: max 3 segments of 65 chars each
    var compact=arr.slice(0,5).map(function(c){
      var t=(c.topic||'').substring(0,40).trimEnd();
      var pts=(c.points||'').split('|').slice(0,3).map(function(p){return p.trim().substring(0,65);}).join('\x1F');
      return t+'\x1E'+pts;
    }).join('\x1D');
    var b64=btoa(unescape(encodeURIComponent(compact)));

    return compact.split('\x1D').map(function(s){

      var topic=i>=0?s.substring(0,i):s;

  function hFile(file){
    if(!file)return;
    if(!file.type.includes('pdf'))return st('PDF files only');
    if(file.size>20*1024*1024)return st('PDF too large — keep under 20MB');
    setFn(file.name);setPdfTxt('');st('Reading PDF…');
    var loadLib=new Promise(function(resolve,reject){
      if(window.pdfjsLib){resolve();return;}
      var s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
      s.onload=function(){window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';resolve();};
      s.onerror=reject;
      document.head.appendChild(s);
    });
    var reader=new FileReader();
    reader.onload=function(ev){
      loadLib.then(function(){
        var typedArray=new Uint8Array(ev.target.result);
        window.pdfjsLib.getDocument({data:typedArray}).promise.then(function(pdf){
          var maxPages=Math.min(pdf.numPages,20),allText='',pagesDone=0;
          for(var p=1;p<=maxPages;p++){
            (function(pageNum){
              pdf.getPage(pageNum).then(function(page){
                page.getTextContent().then(function(tc){
                  allText+=tc.items.map(function(item){return item.str;}).join(' ')+' ';
                  pagesDone++;
                  if(pagesDone===maxPages){
                    var t=allText.trim();
                    if(!t){st('No text found — try a text-based PDF');return;}
                    setPdfTxt(t);
                    st('Extracted '+maxPages+' of '+pdf.numPages+' pages — ready to generate');
                  }
                });
              });
            })(p);
          }
        }).catch(function(err){st('Could not read PDF: '+err.message);});
      }).catch(function(){st('PDF library failed to load — check connection');});
    };
    reader.readAsArrayBuffer(file);
  }

      setMistakes(function(prev){return prev.filter(function(m){return (m.set_name||m.setName)!==target.name;});});

      var topics={};
      (target.cards||[]).forEach(function(c){if(c.topic||c.question)topics[(c.topic||c.question)]=true;});

  // ── Pro: regenerate single card (5/day limit, topic-targeted) ──
  async function regenCard(idx){
    if(!isPro()&&!isElite()){setPw(true);return;}
    if(regenCount>=5){st('Redo limit reached — max 5 per day');return;}
    var card=cards[idx];
    if(!card){return;}
    var txt=itab==='text'?notes:pdfTxt;
    if(!txt.trim()){st('Notes not available — paste your notes first, then redo');return;}
    setRegenIdx(idx);
    try{
      // Send a targeted prompt: same topic, different points, from the same source text
      var r=await fetch('/api/regen-card',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          text:txt.substring(0,getCharLimit()),
          topic:card.topic,
          existing_points:card.points,
        }),
      });
      if(!r.ok){var ed=await r.json().catch(function(){return{};});throw new Error(ed.error||'Server error');}
      var data=await r.json();
      if(data.topic&&data.points){
        var updated=cards.slice();
        updated[idx]={topic:data.topic,points:data.points};
        setCards(updated);
        var newCount=regenCount+1;
        setRegenCount(newCount);
        try{localStorage.setItem('cs_regen',JSON.stringify({d:new Date().toDateString(),c:newCount}));}catch(e){}
        st('Card refreshed — '+(5-newCount)+' redos left today');
      }
    }catch(err){st('Redo failed: '+err.message);}
    finally{setRegenIdx(null);}
  }

              (isElite()?['today','sets','favs','history','mistakes','streak','weak']:['today','sets','history','mistakes']).map(function(tab){
                var labels={today:'⭐ Today',sets:'📚 Saved Sets',favs:'♥ Favourites',history:'📊 Quiz History',mistakes:'✗ Mistakes',streak:'🔥 Streak',weak:'📉 Weak Areas'};
                var counts={today:'',sets:savedSets.length,favs:Object.keys(favs).filter(function(k){return favs[k]&&favs[k].topic;}).length,history:quizHist.length,mistakes:mistakes.length,streak:'',weak:''};
                return e('button',{key:tab,
                  onClick:function(){setWsTab(tab);},
                  style:{
                    padding:'5px 12px',border:'1px solid',borderRadius:'50px',
                    fontSize:'0.72rem',cursor:'none',fontFamily:'Geist,sans-serif',
                    background:wsTab===tab?'var(--accent)':'transparent',
                    color:wsTab===tab?'var(--bg)':'var(--muted)',
                    borderColor:wsTab===tab?'var(--accent)':'var(--border)',
                    transition:'all .2s',
                  }
                },labels[tab]+(counts[tab]?' ('+counts[tab]+')':''));
              })
            )
          )
        ),
        e('div',{className:'ws-body'},

          /* ── SETS TAB ── */
          wsTab==='sets'&&(
            savedSets.length===0
              ? e('div',{className:'ws-empty'},
                  e('div',{style:{fontSize:'2.2rem',marginBottom:12}},'📚'),
                  t('No saved sets yet.'),e('br'),
                  e('span',{style:{color:'var(--muted)'}},'Generate cards then click '),
                  e('strong',{style:{color:'var(--accent)'}},'💾 Save set'),
                  e('span',{style:{color:'var(--muted)'}},' to store your work here.')
                )
              : e('div',{className:'ws-grid'},
                  savedSets.map(function(s){
                    return e('div',{key:s.id,className:'ws-card'},
                      e('div',{className:'ws-card-name'},s.name),
                      e('div',{className:'ws-card-meta'},
                        e('span',null,(s.cards&&s.cards.length||0)+' cards'),
                        e('span',null,'·'),
                        e('span',null,(s.quiz&&s.quiz.length||0)+' quiz Qs'),
                        e('span',null,'·'),
                        e('span',null,fmtDate(s,{day:'numeric',month:'short',year:'2-digit'}))
                      ),
                      e('div',{className:'ws-card-actions'},
                        e('button',{className:'ws-btn',onClick:function(){loadSet(s);}},'Load →'),
                        e('button',{className:'ws-btn del',onClick:function(){if(window.confirm('Delete "'+s.name+'"? This cannot be undone.'))deleteSet(s.id);}},'Delete')
                      )
                    );
                  })
                )
          ),

          /* ── HISTORY TAB ── */
          wsTab==='history'&&(
            quizHist.length===0
              ? e('div',{className:'ws-empty'},
                  e('div',{style:{fontSize:'2.2rem',marginBottom:12}},'📊'),
                  t('No quiz history yet.'),e('br'),
                  e('span',{style:{color:'var(--muted)'}},'Complete a quiz and your scores will appear here.')
                )
              : e('div',null,
                  quizHist.map(function(q){
                    var pct=Math.round(q.score/q.total*100);
                    var col=pct>=80?'var(--green)':pct>=50?'var(--accent)':'var(--red)';
                    return e('div',{key:q.id,className:'qh-item'},
                      e('div',{className:'qh-left'},
                        e('div',{style:{fontWeight:500,fontSize:'0.82rem'}},q.set_name||q.setName),
                        e('div',{className:'qh-date'},fmtDate(q,{day:'numeric',month:'short',year:'numeric'}))
                      ),
                      e('div',{style:{textAlign:'right',display:'flex',flexDirection:'column',alignItems:'flex-end',gap:3}},
                        e('div',{style:{fontSize:'1rem',fontWeight:600,color:col}},pct+'%'),
                        e('div',{style:{fontSize:'0.68rem',color:'var(--muted)'}},q.score+' / '+q.total+' correct')
                      )
                    );
                  })
                )
          ),

          /* ── MISTAKES TAB ── */
          wsTab==='today'&&(function(){
            var uid=(user&&user.id)||'g';
            var todayKey=getISTDateKey();
            var stored=dailyCard;
            if(!stored){try{stored=JSON.parse(localStorage.getItem('cs_daily_'+uid)||'null');}catch(e){}}
            if((!stored||stored.date!==todayKey)&&cards.length){
              pickDailyCard(cards);
              return e('div',{className:'ws-empty'},e('div',{style:{fontSize:'2rem',marginBottom:12}},'⭐'),t("Picking today's card..."));
            }
            if(!stored||!stored.card)return e('div',{className:'ws-empty'},
              e('div',{style:{fontSize:'2rem',marginBottom:12}},'⭐'),
              t('No card yet.'),e('br'),
              e('span',{style:{color:'var(--muted)'}},t('Generate or load a set — your daily card appears here.'))
            );
            var dc=stored.card;
            var pts=(dc.points||dc.answer||'').split('|').filter(function(l){return l.trim();});
            var cardIdx=cards.findIndex(function(c){return (c.topic||c.question)===(dc.topic||dc.question);});
            return e('div',null,
              e('div',{className:'streak-head',style:{marginBottom:14}},'⭐ Today\'s Card — '+todayKey),
              e('div',{style:{background:'var(--surface2)',border:'2px solid var(--accent)',
                borderRadius:'var(--r-sm)',padding:'16px 18px',marginBottom:14}},
                e('div',{style:{fontFamily:"'Instrument Serif',serif",fontSize:'1.05rem',
                  color:'var(--text)',lineHeight:1.5,marginBottom:pts.length?12:0}},dc.topic||dc.question),
                pts.length>0&&e('div',{style:{borderTop:'1px solid var(--border)',paddingTop:10}},
                  pts.map(function(pt,pi){
                    return e('div',{key:pi,style:{display:'flex',gap:6,marginBottom:5,fontSize:'0.78rem',color:'var(--muted)',lineHeight:1.6}},
                      e('span',{style:{color:'var(--accent)',flexShrink:0}},'→'),
                      e('span',null,pt));
                  })
                )
              ),
              cardIdx>=0&&e('div',{style:{marginTop:4}},
                e('button',{className:'np',style:{width:'100%'},
                  onClick:function(){setCi(cardIdx);setRtab('cards');setShowWs(false);}},
                  'Go to card')
              ),
              e('div',{style:{marginTop:10,fontSize:'0.68rem',color:'var(--muted)',textAlign:'center'}},t('Auto-refreshes every day at midnight'))
            );
          })(),

          wsTab==='favs'&&isElite()&&(function(){
            var favCards=Object.entries(favs).filter(function(kv){return kv[1]&&kv[1].topic;}).map(function(kv){return kv[1];});
            if(!favCards.length)return e('div',{className:'ws-empty'},
              e('div',{style:{fontSize:'2rem',marginBottom:12}},'♡'),
              t('No favourites yet.'),e('br'),
              e('span',{style:{color:'var(--muted)'}},t('Tap the ♥ on any card front to save it here.'))
            );
            return e('div',null,
              e('div',{className:'streak-head'},favCards.length+' favourite card'+(favCards.length!==1?'s':'')),
              favCards.map(function(card,i){
                var cardKey=card.topic||card.question;
                var pts=(card.points||card.answer||'').split('|').filter(function(l){return l.trim();});
                return e('div',{key:cardKey||i,style:{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--r-sm)',padding:'12px 14px',marginBottom:10}},
                  e('div',{style:{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:8}},
                    e('div',{style:{fontFamily:"'Instrument Serif',serif",fontSize:'0.95rem',color:'var(--text)',lineHeight:1.5,flex:1}},card.topic||card.question),
                    e('button',{style:{background:'none',border:'none',color:'var(--muted)',cursor:'none',fontSize:'0.85rem',flexShrink:0},
                      onClick:function(){
                        setFavs(function(f){
                          var n=Object.assign({},f);
                          delete n[cardKey];
                          try{localStorage.setItem('cs_favs_'+((user&&user.id)||'g'),JSON.stringify(n));}catch(ex){}
                          return n;
                        });
                      }},'✖')
                  ),
                  pts.length>0&&e('div',{style:{marginTop:8,paddingTop:8,borderTop:'1px solid var(--border)'}},
                    pts.map(function(pt,pi){
                      return e('div',{key:pi,style:{display:'flex',gap:6,marginBottom:4,fontSize:'0.75rem',color:'var(--muted)',lineHeight:1.6}},
                        e('span',{style:{color:'var(--accent)',flexShrink:0}},'→'),
                        e('span',null,pt)
                      );
                    })
                  )
                );
              })
            );
          })(),

          wsTab==='streak'&&isElite()&&(function(){
            var days=90,cells=[];
            var today=new Date();
            for(var d=days-1;d>=0;d--){
              var dt=new Date(today);dt.setDate(dt.getDate()-d);
              var key=dt.toISOString().slice(0,10);
              var cnt=streakData[key]||0;
              var col=cnt===0?'var(--surface2)':cnt===1?'rgba(232,213,176,0.3)':cnt<=3?'rgba(232,213,176,0.6)':'var(--accent)';
              cells.push(e('div',{key:key,className:'hm-cell',style:{background:col},title:key+': '+cnt}));
            }
            var streak=0,check=new Date(today);
            for(var i=0;i<365;i++){var k=check.toISOString().slice(0,10);if(!streakData[k])break;streak++;check.setDate(check.getDate()-1);}
            var totalDays=Object.keys(streakData).length;
            var totalGens=Object.values(streakData).reduce(function(a,b){return a+b;},0);
            return e('div',{className:'streak-wrap'},
              e('div',{className:'streak-head'},t('Generation activity — last 90 days')),
              e('div',{className:'heatmap'},cells),
              e('div',{className:'streak-stats'},
                e('div',{className:'streak-stat'},e('strong',null,streak),' day streak'),
                e('div',{className:'streak-stat'},e('strong',null,totalDays),' active days'),
                e('div',{className:'streak-stat'},e('strong',null,totalGens),' total generations')
              )
            );
          })(),

          wsTab==='weak'&&isElite()&&(function(){
            var topicCounts={};
            mistakes.forEach(function(m){var t=m.set_name||m.setName||'Unknown';topicCounts[t]=(topicCounts[t]||0)+1;});
            var sorted=Object.keys(topicCounts).sort(function(a,b){return topicCounts[b]-topicCounts[a];}).slice(0,12);
            if(!sorted.length)return e('div',{className:'ws-empty'},
              e('div',{style:{fontSize:'2rem',marginBottom:12}},'📉'),
              'No mistake data yet.',e('br'),
              e('span',{style:{color:'var(--muted)'}},t('Complete quizzes from saved sets to see your weak areas.'))
            );
            var max=topicCounts[sorted[0]]||1;
            return e('div',{className:'weak-wrap'},
              e('div',{className:'streak-head'},t('Sets with most mistakes')),
              sorted.map(function(t){
                return e('div',{key:t,className:'weak-bar-row'},
                  e('div',{className:'weak-topic',title:t},t),
                  e('div',{className:'weak-bar-bg'},e('div',{className:'weak-bar-fill',style:{width:(topicCounts[t]/max*100)+'%'}})),
                  e('div',{className:'weak-count'},topicCounts[t])
                );
              })
            );
          })(),

          wsTab==='mistakes'&&(
            mistakes.length===0
              ? e('div',{className:'ws-empty'},
                  e('div',{style:{fontSize:'2.2rem',marginBottom:12}},'✓'),
                  t('No mistakes recorded.'),e('br'),
                  e('span',{style:{color:'var(--muted)'}},t('Wrong quiz answers will appear here so you can review them.'))
                )
              : e('div',null,
                  e(MistakeList,{mistakes:mistakes,onClear:clearMistakes})
                )
          )

        )
      )
    ),

    /* SAVE SET MODAL */
    showSave&&e('div',{className:'save-ov',onClick:function(ev){if(ev.target===ev.currentTarget)setShowSave(false);}},
      e('div',{className:'save-box'},
        e('div',{className:'save-title'},t('Save this set')),
        e('div',{className:'save-sub'},'Give it a name you’ll recognise — like “UPSC Polity Ch.3” or “JEE Thermodynamics”.'),
        e('input',{
          className:'save-input',
          type:'text',
          placeholder:'e.g. UPSC Polity — Fundamental Rights',
          value:saveName,
          onChange:function(ev){setSaveName(ev.target.value);},
          onKeyDown:function(ev){if(ev.key==='Enter')confirmSave();},
          autoFocus:true
        }),
        e('div',{className:'save-row'},
          e('button',{className:'save-ok',onClick:confirmSave},'Save'),
          e('button',{className:'save-cancel',onClick:function(){setShowSave(false);}},'Cancel')
        )
      )
    ),

    showShare&&e('div',{className:'sh-ov',onClick:function(ev){if(ev.target===ev.currentTarget)setShowShare(false);}},
      e('div',{className:'sh-mo'},
        e('h3',null,'Share flashcards'),
        e('p',null,'Pick the cards to include in your shareable link. Anyone with the link can view them instantly.'),
        e('div',{className:'sh-sel-row'},
          e('button',{className:'sh-sel-btn',onClick:selectAllShare},t('Select all')),
          e('button',{className:'sh-sel-btn',onClick:selectNoneShare},'Clear all'),
          e('span',{style:{fontSize:'0.68rem',color:'var(--muted)',marginLeft:'auto'}},
            Object.values(shareSel).filter(Boolean).length+' / '+cards.length+' selected'
          )
        ),
        e('div',{className:'sh-list'},
          cards.map(function(c,i){
            var sel=!!shareSel[i];
            return e('button',{key:i,className:'sh-item'+(sel?' sel':''),onClick:function(){toggleShareCard(i);}},
              e('div',{className:'sh-cb'},sel?'✓':''),
              e('div',{className:'sh-label'},
                e('strong',{style:{fontWeight:500,fontSize:'0.78rem'}},c.topic||'Card '+(i+1)),
                (c.points||'').split('|')[0]&&e('div',{style:{fontSize:'0.7rem',color:'var(--muted)',marginTop:2}},(c.points||'').split('|')[0].trim().substring(0,60)+'…')
              )
            );
          })
        ),
        shareUrl
          ? e('div',{className:'sh-url'},
              e('input',{type:'text',readOnly:true,value:shareUrl,onClick:function(ev){ev.target.select();}}),
              e('button',{className:'sh-copy',onClick:copyShareUrl},t('Copy'))
            )
          : e('button',{className:'sh-copy',style:{width:'100%',padding:'11px',borderRadius:'var(--r-sm)',marginBottom:'10px'},onClick:buildShareUrl},t('Create short link →')),
        e('button',{className:'md',style:{marginTop:4},onClick:function(){setShowShare(false);}}, 'Close')
      )
    ),

    pw&&(function(){
      var isProUser=user&&user.tier==='pro';
      // Pro users see Elite-only. Free/guest see both.
      var eliteFeats=[
        'Everything in Pro, plus:',
        '40 generations per day',
        '30,000 characters per input',
        'Spaced repetition for weak cards',
        'Weak area report & analytics',
        'Study streak calendar & heatmap',
        'Custom deck themes',
        'Summary depth control (4 levels)',
        'Custom card count up to 50',
      ];
      var proFeats=[
        '20 generations per day',
        '20,000 characters per input',
        'Save sets to your account',
        'Mistake tracker with solutions',
        'Voice readout of cards',
        'Regenerate any single card',
        'Quiz history across saved sets',
        'Custom card count up to 30',
      ];
      var plans=isProUser
        ? [{id:'elite',n:'Elite',p:'199',s:'per month',feats:eliteFeats}]
        : [
            {id:'pro',n:'Pro',p:'99',s:'per month',feats:proFeats},
            {id:'elite',n:'Elite',p:'199',s:'per month',feats:eliteFeats},
          ];
      // Auto-correct sp: if only elite is shown, sp must be 'elite'
      var activeSp=(isProUser&&sp!=='elite')?'elite':sp;
      var activePrice=activeSp==='elite'?'199':'99';
      return e('div',{className:'ov',onClick:function(ev){if(ev.target===ev.currentTarget)setPw(false);}},
        e('div',{className:'mo mo-wide'},
          e('div',{className:'mo-ey'},isProUser?'Upgrade to Elite':'Upgrade'),
          e('h2',null,isProUser?'Unlock Elite':'Unlock full access'),
          e('p',{className:'mo-s'},isProUser
            ? 'You’re on Pro. Upgrade to Elite for spaced repetition, analytics, themes and more.'
            : 'You’ve used your free generations for today. Pick a plan — no interruptions, no limits.'),
          e('div',{className:'mo-plans'},
            plans.map(function(x){
              var isSel=(isProUser?activeSp:sp)===x.id;
              return e('div',{key:x.id,className:'mp'+(isSel?' sel':''),onClick:function(){setSp(x.id);}},
                e('div',{className:'mp-n'},x.n),
                e('div',{className:'mp-p'},e('sup',null,'₹'),x.p),
                e('div',{className:'mp-s'},x.s),
                e('div',{className:'mp-feat-grid'},
                  x.feats.map(function(f,i){
                    return e('div',{key:i,className:'mp-feat-row'+(i===0?' mp-feat-head':'')},
                      i>0&&e('span',{className:'mp-feat-check'},'✓'),
                      f
                    );
                  })
                )
              );
            })
          ),
          e('button',{className:'pb',onClick:function(){pay(isProUser?'elite':activeSp);}},
            'Pay ₹'+activePrice+' via Razorpay →'
          ),
          e('button',{className:'md',onClick:function(){setPw(false);}},isProUser?'Maybe later':'Continue tomorrow')
        )
      );
    })(),
    toast&&e('div',{className:'toast'},toast)
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App,null));
</script>
<script>(function(){var s=document.createElement('script');s.src='https://checkout.razorpay.com/v1/checkout.js';document.head.appendChild(s);})()</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('/sw.js').catch(function(e){console.warn('SW:',e);});
  });
}
</script>
</body>
</html>
