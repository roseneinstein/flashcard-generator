<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CogniSwift</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>


<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#22203a;
  --surface:#2a2740;
  --surface2:#322e4a;
  --border:#ffffff1e;
  --border-h:#ffffff33;
  --text:#ededf0;
  --muted:#9898b8;
  --muted2:#4a4a60;
  --accent:#e8d5b0;
  --accent-rgb:232,213,176;
  --green:#4ade80;
  --red:#f87171;
  --r:14px;
  --r-sm:8px;
  --card-back-bg:#0e1912;
  --card-back-border:#1b3322;
}
html.light{
  --bg:#f4f1eb;
  --surface:#fdfcf8;
  --surface2:#edeae2;
  --border:#00000011;
  --border-h:#00000022;
  --text:#1e1b14;
  --muted:#7a7060;
  --muted2:#c0b89e;
  --accent:#9a7c3f;
  --accent-rgb:154,124,63;
  --green:#15803d;
  --red:#b91c1c;
  --card-back-bg:#e8f5ee;
  --card-back-border:#a3d9b8;
}
html{scroll-behavior:smooth}
body{font-family:'Geist',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;cursor:none;transition:background .3s,color .3s}

/* ── ATMOSPHERIC BACKGROUND ── */
body::before{content:'';display:none}
body::after{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 85% 60% at 5%   2%,   rgba(110,70,210,0.22)  0%, transparent 56%),
    radial-gradient(ellipse 60% 50% at 95%  92%,  rgba(210,175,120,0.13) 0%, transparent 54%),
    radial-gradient(ellipse 50% 42% at 78%  12%,  rgba(70,100,230,0.12)  0%, transparent 50%),
    radial-gradient(ellipse 42% 38% at 12%  72%,  rgba(160,90,240,0.11)  0%, transparent 46%),
    radial-gradient(ellipse 35% 30% at 48%  50%,  rgba(120,60,180,0.07)  0%, transparent 40%);
  pointer-events:none;
  z-index:0;
}
html.light body::after{
  background:
    radial-gradient(ellipse 80% 60% at 10% 0%,   rgba(210,175,100,0.22) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 90% 90%,  rgba(154,124,63,0.16)  0%, transparent 55%),
    radial-gradient(ellipse 50% 40% at 70% 15%,  rgba(130,170,100,0.11) 0%, transparent 50%),
    radial-gradient(ellipse 40% 35% at 15% 65%,  rgba(190,145,75,0.13)  0%, transparent 45%),
    radial-gradient(ellipse 30% 25% at 55% 50%,  rgba(160,130,80,0.08)  0%, transparent 40%);
}
#root{position:relative;z-index:1}

/* THEME & LANG TOGGLES */
.thm-tog{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:0.85rem;cursor:none;display:flex;align-items:center;justify-content:center;transition:border-color .2s,color .2s,background .2s;flex-shrink:0}
.thm-tog:hover{border-color:var(--border-h);color:var(--text);background:var(--surface)}
/* CURSOR */
#cur{width:8px;height:8px;background:var(--accent);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference;transition:width .12s,height .12s}
#cur-r{width:32px;height:32px;border:1px solid rgba(232,213,176,0.35);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .28s cubic-bezier(.22,1,.36,1),height .28s cubic-bezier(.22,1,.36,1),border-radius .2s}
body.hov #cur{width:5px;height:5px;opacity:0.5}
body.hov #cur-r{width:48px;height:48px;border-radius:6px;opacity:0.2}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;height:62px;display:flex;align-items:center;justify-content:flex-end;padding:0 28px;border-bottom:1px solid var(--border);background:rgba(34,32,58,0.92);backdrop-filter:blur(20px);z-index:100;transition:background .3s,border-color .3s}
html.light nav{background:rgba(244,241,235,0.92)}
.logo{font-family:'Instrument Serif',serif;font-size:1.9rem;color:var(--accent);letter-spacing:-0.02em;font-weight:400}
.nav-r{display:flex;gap:24px;align-items:center}
.nl{font-size:0.75rem;font-weight:400;color:var(--muted);background:none;border:none;cursor:none;letter-spacing:0.06em;text-transform:uppercase;transition:color .2s;padding:0}
.nl:hover{color:var(--text)}
.np{font-size:0.78rem;font-weight:500;color:var(--bg);background:var(--accent);border:none;border-radius:50px;padding:7px 16px;cursor:none;transition:opacity .2s,transform .15s;letter-spacing:0.02em}
.np:hover{opacity:0.85;transform:scale(1.04)}

/* HERO */
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:100px 24px 80px;position:relative;overflow:clip}
.h-glow{position:absolute;width:800px;height:600px;background:radial-gradient(ellipse,rgba(232,213,176,0.07) 0%,transparent 65%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}

.h-line{font-size:clamp(2.4rem,5.5vw,4rem);letter-spacing:-0.03em;font-family:'Instrument Serif',serif;color:var(--accent);margin-bottom:16px;animation:fu .55s ease both;position:relative;z-index:2;font-weight:400;line-height:1.18}
html.light .h-line{color:var(--accent)}
html.light html.light html.light html.light html.light @keyframes crown-glow{
  0%,100%{filter:drop-shadow(0 1px 4px rgba(255,200,40,0.5)) drop-shadow(0 0 2px rgba(255,215,0,0.25));}
  50%{filter:drop-shadow(0 1px 8px rgba(255,220,60,0.95)) drop-shadow(0 0 6px rgba(255,200,0,0.55));}
}
html.light html.light html.light html.light html.light html.light @keyframes crown-glow-red{
  0%,100%{filter:drop-shadow(0 1px 4px rgba(180,0,0,0.45)) drop-shadow(0 0 2px rgba(200,20,20,0.25));}
  50%{filter:drop-shadow(0 1px 8px rgba(220,0,0,0.9)) drop-shadow(0 0 6px rgba(180,0,0,0.5));}
}

/* ── HEADLINE: biggest text users actually read on screen ── */
h1{
  font-family:'Instrument Serif',serif;
  font-size:clamp(4.5rem,11vw,9.5rem);
  font-weight:400;
  line-height:0.97;
  letter-spacing:-0.04em;
  max-width:960px;
  margin:0 auto 28px;
  animation:fu .55s .05s ease both;
  position:relative;
  z-index:2;
}
h1 em{font-style:italic;color:var(--accent)}
.h-sub{font-size:clamp(0.88rem,2vw,1rem);color:var(--muted);max-width:400px;margin:0 auto 44px;line-height:1.75;font-weight:300;animation:fu .55s .1s ease both}
.pill-row{display:flex;flex-wrap:wrap;justify-content:center;gap:7px;margin-bottom:44px;animation:fu .55s .15s ease both}
.pill{border:1px solid var(--border);border-radius:50px;padding:6px 15px;font-size:0.76rem;color:var(--muted);letter-spacing:0.03em;transition:border-color .2s,color .2s;cursor:none}
.pill:hover{border-color:var(--border-h);color:var(--text)}
.cta{font-family:'Geist',sans-serif;font-size:0.92rem;font-weight:500;color:var(--bg);background:var(--accent);border:none;border-radius:50px;padding:14px 34px;cursor:none;letter-spacing:0.02em;transition:opacity .2s,transform .15s,box-shadow .2s;animation:fu .55s .2s ease both}
.cta:hover{opacity:0.86;transform:translateY(-2px);box-shadow:0 10px 36px rgba(232,213,176,0.14)}
@keyframes fu{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}

/* FEATURES — single column rows, float on hover */
.feat-wrap{padding:80px 24px;max-width:760px;margin:0 auto}
.feat-eyebrow{font-size:0.68rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:10px}
.feat-heading{font-family:'Instrument Serif',serif;font-size:clamp(1.6rem,3.5vw,2.4rem);text-align:center;margin-bottom:48px;letter-spacing:-0.02em;line-height:1.1}
.feat-heading em{font-style:italic;color:var(--accent)}
.fg{display:flex;flex-direction:column;gap:3px}
.fc{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:24px 28px;
  position:relative;
  overflow:hidden;
  cursor:none;
  display:flex;
  align-items:flex-start;
  gap:20px;
  transition:
    transform .5s cubic-bezier(.22,1,.36,1),
    box-shadow .5s cubic-bezier(.22,1,.36,1),
    background .22s ease,
    border-color .22s ease;
  z-index:1;
}
.fc::before{
  content:'';
  position:absolute;inset:0;
  background:radial-gradient(circle at var(--mx,50%) var(--my,50%),rgba(232,213,176,0.1) 0%,transparent 60%);
  opacity:0;
  transition:opacity .35s;
  pointer-events:none;
}
.fc:hover{
  transform:translateY(-5px) scale(1.018);
  background:var(--surface2);
  border-color:rgba(232,213,176,0.18);
  box-shadow:0 16px 48px rgba(0,0,0,0.5), 0 0 0 1px rgba(232,213,176,0.1);
  z-index:10;
}
.fc:hover::before{opacity:1}
.fc-ico{
  font-size:1.1rem;
  opacity:0.55;
  flex-shrink:0;
  margin-top:2px;
  width:28px;
  text-align:center;
}
.fc-body{flex:1}
.fc-t{
  font-family:'Instrument Serif',serif;
  font-size:1.05rem;
  color:var(--text);
  margin-bottom:5px;
  letter-spacing:-0.01em;
}
.fc-d{
  font-size:0.8rem;
  color:var(--muted);
  line-height:1.72;
  font-weight:300;
  padding-left:2px;
}

/* APP */
.app-wrap{max-width:660px;margin:0 auto;padding:0 20px 110px}
.ey{font-size:0.68rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:9px}
.st{font-family:'Instrument Serif',serif;font-size:clamp(1.7rem,4vw,2.6rem);text-align:center;margin-bottom:48px;letter-spacing:-0.02em;line-height:1.1}
.st em{font-style:italic;color:var(--accent)}

/* Input */
/* Expandable input wrapper */
.icard{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  overflow:hidden;
  margin-bottom:14px;
  transition:
    border-color .35s,
    box-shadow .45s cubic-bezier(.22,1,.36,1),
    transform .45s cubic-bezier(.22,1,.36,1);
}
.icard:hover{
  transform:scale(1.012);
  border-color:var(--border-h);
  box-shadow:0 6px 32px rgba(0,0,0,0.3), 0 0 0 1px rgba(232,213,176,0.07);
}
.icard:focus-within{
  transform:scale(1.016);
  border-color:rgba(232,213,176,0.28);
  box-shadow:0 0 0 1px rgba(232,213,176,0.08),0 12px 48px rgba(0,0,0,0.35);
}
.tbar{display:flex;gap:3px;background:var(--surface2);padding:4px;border-bottom:1px solid var(--border)}
.tb{flex:1;padding:8px 10px;border:none;background:transparent;color:var(--muted);font-family:'Geist',sans-serif;font-size:0.75rem;font-weight:400;cursor:none;border-radius:5px;transition:all .15s;text-transform:uppercase;letter-spacing:0.07em}
.tb.act{background:var(--surface);color:var(--text)}

/* The textarea itself expands fluidly */
textarea{
  width:100%;
  min-height:140px;
  max-height:520px;
  background:transparent;
  border:none;
  padding:18px;
  font-family:'Geist',sans-serif;
  font-size:0.9rem;
  color:var(--text);
  line-height:1.72;
  font-weight:300;
  resize:none;
  outline:none;
  transition:min-height .55s cubic-bezier(.22,1,.36,1);
  display:block;
  overflow-y:auto;
}
textarea:focus,textarea:not(:placeholder-shown){
  min-height:260px;
}
/* Smooth overflow reveal as it expands */
.icard:has(textarea:focus){
  box-shadow:0 0 0 1px rgba(232,213,176,0.1),0 16px 56px rgba(0,0,0,0.35);
}
textarea::placeholder{color:var(--muted2);line-height:1.72}
.upz{padding:56px 24px;text-align:center;cursor:none;background:transparent;border:none;transition:background .2s;width:100%}
.upz:hover,.upz.dov{background:rgba(232,213,176,0.03)}
.upz-i{font-size:1.6rem;margin-bottom:12px;opacity:0.3;display:block}
.upz p{font-size:0.82rem;color:var(--muted);line-height:1.7;font-weight:300}
.upz strong{color:var(--accent);font-weight:400}
input[type=file]{display:none}
.ctrl{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-top:1px solid var(--border);gap:10px;flex-wrap:wrap}
.cbs{display:flex;gap:3px}
.cb{padding:5px 12px;border:1px solid var(--border);border-radius:50px;background:transparent;color:var(--muted);font-family:'Geist',sans-serif;font-size:0.75rem;cursor:none;transition:all .15s}
.cb.s{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.cb:hover:not(.s){border-color:var(--border-h);color:var(--text)}
.gb{padding:9px 22px;background:var(--accent);color:var(--bg);border:none;border-radius:50px;font-family:'Geist',sans-serif;font-size:0.82rem;font-weight:500;cursor:none;letter-spacing:0.03em;transition:opacity .2s,transform .15s}
.gb:hover:not(:disabled){opacity:0.83;transform:scale(1.03)}
.gb:disabled{opacity:0.28;cursor:not-allowed}
.urow{display:flex;align-items:center;gap:10px;padding:9px 18px;border-top:1px solid var(--border)}
.ut{flex:1;height:2px;background:var(--muted2);border-radius:2px;overflow:hidden}
.uf{height:100%;background:var(--accent);border-radius:2px;transition:width .5s ease}
.utx{font-size:0.7rem;color:var(--muted);white-space:nowrap}

/* Loading */
.ld{padding:56px 20px;text-align:center}
.dots{display:flex;justify-content:center;gap:5px;margin-bottom:14px}
.dots span{width:4px;height:4px;background:var(--accent);border-radius:50%;animation:dt 1.2s ease-in-out infinite;opacity:0.5}
.dots span:nth-child(2){animation-delay:.15s}
.dots span:nth-child(3){animation-delay:.3s}
@keyframes dt{0%,80%,100%{transform:scaleY(0.4)}40%{transform:scaleY(1.2);opacity:1}}
.ld p{font-size:0.78rem;color:var(--muted);letter-spacing:0.05em;font-weight:300}

/* Results */
.rtabs{display:flex;gap:1px;background:var(--border);border-radius:var(--r) var(--r) 0 0;overflow:hidden;border:1px solid var(--border);border-bottom:none}
.rt{flex:1;padding:13px;background:var(--surface2);border:none;color:var(--muted);font-family:'Geist',sans-serif;font-size:0.75rem;font-weight:400;text-transform:uppercase;letter-spacing:0.07em;cursor:none;transition:all .15s}
.rt.act{background:var(--surface);color:var(--text)}
.rt .bdg{display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:1px 6px;font-size:0.65rem;margin-left:6px;color:var(--muted)}
.rt.act .bdg{background:var(--accent);border-color:var(--accent);color:var(--bg)}
.rbody{background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);overflow:hidden}

/* Flashcard */
.fnr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
.nb{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:0.95rem;cursor:none;display:flex;align-items:center;justify-content:center;transition:all .15s}
.nb:hover:not(:disabled){border-color:var(--border-h);color:var(--text)}
.nb:disabled{opacity:0.18}
.fc-ctr{font-size:0.75rem;color:var(--muted);letter-spacing:0.06em}
.fw{perspective:1400px;padding:22px;cursor:none}
.fi{position:relative;width:100%;min-height:280px;transform-style:preserve-3d;transition:transform .58s cubic-bezier(.4,.2,.2,1)}
.fi.fl{transform:rotateY(180deg)}
.ff,.fb{position:absolute;inset:0;border-radius:var(--r);backface-visibility:hidden;-webkit-backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 28px;text-align:center;min-height:280px}
.ff{background:var(--surface2);border:1px solid var(--border)}
.fb{background:var(--card-back-bg);border:1px solid var(--card-back-border);transform:rotateY(180deg)}
.fl-lbl{font-size:0.62rem;letter-spacing:0.15em;text-transform:uppercase;opacity:0.38;margin-bottom:16px}
.fl-q{font-family:'Instrument Serif',serif;font-size:clamp(1.1rem,3vw,1.45rem);line-height:1.5;color:var(--text);font-weight:400}
.fl-a{font-size:0.88rem;line-height:1.75;color:var(--green);font-weight:300}
.fl-hint{position:absolute;bottom:12px;right:16px;font-size:0.62rem;color:var(--muted2);letter-spacing:0.04em}
.fca{display:flex;gap:7px;padding:14px 18px;border-top:1px solid var(--border);flex-wrap:wrap}
.ab{flex:1;min-width:82px;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r-sm);background:transparent;color:var(--muted);font-family:'Geist',sans-serif;font-size:0.75rem;cursor:none;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s;letter-spacing:0.03em}
.ab:hover{border-color:var(--border-h);color:var(--text)}
.ab.pr{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.ab.pr:hover{opacity:0.83}
.ab:disabled{opacity:0.28}

/* Quiz */
.qw{padding:22px}
.qpr{display:flex;align-items:center;gap:10px;margin-bottom:22px}
.qtr{flex:1;height:2px;background:var(--muted2);border-radius:2px;overflow:hidden}
.qf{height:100%;background:var(--accent);border-radius:2px;transition:width .5s ease}
.qst{font-size:0.72rem;color:var(--muted);white-space:nowrap}
.qq{font-family:'Instrument Serif',serif;font-size:1.15rem;line-height:1.5;margin-bottom:22px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.og{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:18px}
@media(max-width:460px){.og{grid-template-columns:1fr}}
.ob{padding:13px 14px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surface2);color:var(--text);font-family:'Geist',sans-serif;font-size:0.8rem;font-weight:300;line-height:1.5;text-align:left;cursor:none;transition:all .15s}
.ob:hover:not(:disabled){border-color:var(--border-h);background:var(--surface)}
.ob.cor{border-color:var(--card-back-border);background:var(--card-back-bg);color:var(--green)}
.ob.wrg{border-color:#2a1515;background:#1a0e0e;color:var(--red)}
.ob:disabled{cursor:not-allowed}
.qex{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px;font-size:0.8rem;color:var(--muted);line-height:1.7;font-weight:300;margin-bottom:14px}
.qex strong{color:var(--text);font-weight:400}
.nx{width:100%;padding:12px;background:var(--accent);color:var(--bg);border:none;border-radius:var(--r-sm);font-family:'Geist',sans-serif;font-size:0.83rem;font-weight:500;cursor:none;letter-spacing:0.03em;transition:opacity .2s}
.nx:hover{opacity:0.84}
.qres{text-align:center;padding:40px 24px}
.qsb{font-family:'Instrument Serif',serif;font-size:3.8rem;color:var(--accent);margin-bottom:6px}
.qrs{font-size:0.82rem;color:var(--muted);margin-bottom:26px;font-weight:300;line-height:1.7}
.rbtn{padding:11px 26px;border:1px solid var(--border);border-radius:50px;background:transparent;color:var(--text);font-family:'Geist',sans-serif;font-size:0.8rem;cursor:none;transition:all .15s}
.rbtn:hover{border-color:var(--border-h)}

/* Pricing */
.pr-wrap{padding:90px 24px;max-width:760px;margin:0 auto}
.plans{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:1px;
  border:1px solid var(--border);
  border-radius:var(--r);
  background:var(--border);
  overflow:visible;
  isolation:isolate;
}
@media(max-width:560px){.plans{grid-template-columns:1fr}}
.plan{
  background:var(--surface);
  padding:28px 22px;
  cursor:none;
  position:relative;
  overflow:hidden;
  z-index:1;
  transition:
    transform .45s cubic-bezier(.22,1,.36,1),
    background .2s ease,
    box-shadow .45s cubic-bezier(.22,1,.36,1);
}
.plans .plan:first-child{border-radius:var(--r) 0 0 var(--r)}
.plans .plan:last-child{border-radius:0 var(--r) var(--r) 0}
@media(max-width:560px){
  .plans .plan:first-child{border-radius:var(--r) var(--r) 0 0}

footer{border-top:1px solid var(--border);padding:24px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:50px;font-size:0.78rem;z-index:600;animation:ti .28s ease,to2 .28s 2.4s ease forwards;white-space:nowrap;font-weight:300;letter-spacing:0.03em}

/* Share modal */
.sh-ov{position:fixed;inset:0;background:rgba(0,0,0,0.72);backdrop-filter:blur(14px);z-index:500;display:flex;align-items:center;justify-content:center;animation:fi2 .2s ease;padding:20px}

.disc{font-size:0.68rem;color:var(--muted2);line-height:1.7;font-weight:300;text-align:center;padding:0 8px;margin-top:10px}

<script>
const{useState,useRef,useEffect}=React;
const e=React.createElement;

const CFG={
  FREE_LIMIT:10,
  PRO_LIMIT:20,
  ELITE_LIMIT:40,
  FREE_CHARS:8000,
  PRO_CHARS:20000,
  ELITE_CHARS:30000,
  SUPABASE_URL:'https://vnbseesmppljppranukb.supabase.co',
};

// ── Auth helpers (no Supabase JS SDK needed) ──
// Token saved to localStorage so user stays logged in after page refresh
function saveToken(t){try{localStorage.setItem('cs_tok',t);}catch(e){}}
function loadToken(){try{return localStorage.getItem('cs_tok');}catch(e){return null;}}
function clearToken(){try{localStorage.removeItem('cs_tok');}catch(e){}}

// Google OAuth: redirect to Supabase, it sends the token back in the URL hash
function googleLoginUrl(){
  return CFG.SUPABASE_URL+'/auth/v1/authorize?provider=google'
    +'&redirect_to='+encodeURIComponent(window.location.origin);
}

// Fetches user profile from our /api/auth endpoint using stored token
async function fetchUserProfile(){
  var token=loadToken();
  if(!token)return null;
  try{
    var r=await fetch('/api/auth',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({access_token:token})
    });
    if(!r.ok){clearToken();return null;}
    var data=await r.json();
    if(data.id)return data;
    clearToken();return null;
  }catch(e){return null;}
}

function getUsage(){var t=new Date().toDateString();var s=JSON.parse(localStorage.getItem('fw_u')||'{}');return s.d===t?s.c||0:0;}
function bumpUsage(){localStorage.setItem('fw_u',JSON.stringify({d:new Date().toDateString(),c:getUsage()+1}));}
function getDayLimit(){var t=getTier();return t==='elite'?CFG.ELITE_LIMIT:t==='pro'?CFG.PRO_LIMIT:CFG.FREE_LIMIT;}
function getCharLimit(){var t=getTier();return t==='elite'?CFG.ELITE_CHARS:t==='pro'?CFG.PRO_CHARS:CFG.FREE_CHARS;}
var _userCache=null;
function getSession(){return _userCache;}
function setSession(u){_userCache=u;}
function isPro(){return _userCache&&(_userCache.tier==='pro'||_userCache.tier==='elite');}
function isElite(){return _userCache&&_userCache.tier==='elite';}
function getTier(){return _userCache?_userCache.tier:'free';}

async function callSummary(text){
  var r=await fetch('/api/summary',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({text:text.substring(0,getCharLimit())}),
  });
  if(!r.ok){var err=await r.json().catch(function(){return{};});throw new Error(err.error||'Server error');}
  return r.json();
}

async function callAI(text,count){
  var r=await fetch('/api/generate',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({text:text.substring(0,getCharLimit()),count}),
  });
  if(!r.ok){var err=await r.json().catch(function(){return{};});throw new Error(err.error||'Server error');}
  return r.json();
}

function dlPDF(cards,title){
  var rows=cards.map(function(c,i){
    var pts=(c.points||'').split('|').map(function(p){return p.trim();}).filter(Boolean);
    var ptHtml=pts.map(function(p){return '<li style="margin-bottom:5px;line-height:1.6">'+p+'</li>';}).join('');
    return '<div style="border:1px solid #e4e4e7;border-radius:10px;padding:20px;margin-bottom:16px;page-break-inside:avoid"><div style="font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:#a1a1aa;margin-bottom:8px">Card '+(i+1)+'</div><div style="font-size:15px;font-weight:600;margin-bottom:10px;line-height:1.5;color:#1e1b14">'+(c.topic||'')+'</div><ul style="margin:0;padding-left:18px;font-size:13px;color:#3a3a3a">'+ptHtml+'</ul></div>';
  }).join('');
  var w=window.open('','_blank');
  w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>'+title+'</title><style>body{font-family:Georgia,serif;padding:36px;max-width:680px;margin:auto}h1{font-size:20px;margin-bottom:4px}p{color:#a1a1aa;font-size:12px;margin-bottom:28px}</style></head><body><h1>'+title+'</h1><p>'+new Date().toLocaleDateString('en-IN')+' · '+cards.length+' cards</p>'+rows+'</body></html>');
  w.document.close();
  setTimeout(function(){w.print();},500);
}

function dlSummaryPDF(data){
  if(!data)return;
  var rows=data.sections.map(function(sec){
    var pts=sec.points.map(function(p){
      return '<li style="margin-bottom:6px;line-height:1.6;font-size:13px;color:#3a3a3a">'+p+'</li>';
    }).join('');
    return '<div style="margin-bottom:22px;page-break-inside:avoid"><div style="font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:#9a7c3f;font-weight:600;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid #e8e0d0">'+sec.heading+'</div><ul style="margin:0;padding-left:18px">'+pts+'</ul></div>';
  }).join('');
  var w=window.open('','_blank');
  w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>'+data.title+'</title><style>body{font-family:Georgia,serif;padding:40px;max-width:700px;margin:auto;color:#1e1b14}h1{font-size:22px;margin-bottom:4px;font-weight:400;letter-spacing:-0.02em}p.meta{color:#9a9a9a;font-size:12px;margin-bottom:32px}@media print{body{padding:20px}}</style></head><body><h1>'+data.title+'</h1><p class="meta">CogniSwift Summary · '+new Date().toLocaleDateString('en-IN')+'</p>'+rows+'</body></html>');
  w.document.close();
  setTimeout(function(){w.print();},500);
}

function useCursor(){
  useEffect(function(){
    var dot=document.getElementById('cur'),ring=document.getElementById('cur-r');
    var rx=0,ry=0,mx=0,my=0;
    var mv=function(ev){mx=ev.clientX;my=ev.clientY;dot.style.left=mx+'px';dot.style.top=my+'px';};
    var tick=function(){rx+=(mx-rx)*.1;ry+=(my-ry)*.1;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(tick);};
    document.addEventListener('mousemove',mv);
    tick();
    var addHover=function(){
      document.querySelectorAll('button,a').forEach(function(el){
        el.addEventListener('mouseenter',function(){document.body.classList.add('hov');});
        el.addEventListener('mouseleave',function(){document.body.classList.remove('hov');});
      });
    };
    addHover();
    var autoResize=function(ev){
      var el=ev.target;
      if(el.tagName==='TEXTAREA'){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,520)+'px';}
    };
    document.addEventListener('input',autoResize);
    var obs=new MutationObserver(addHover);
    obs.observe(document.body,{childList:true,subtree:true});
    return function(){document.removeEventListener('mousemove',mv);document.removeEventListener('input',autoResize);};
  },[]);
}

function useReveal(){
  useEffect(function(){
    var obs=new IntersectionObserver(function(es){es.forEach(function(ev){if(ev.isIntersecting)ev.target.classList.add('vis');});},{threshold:0.1});
    document.querySelectorAll('.rev').forEach(function(el){obs.observe(el);});
    return function(){obs.disconnect();};
  });
}

function HFeat(props){
  var r=useRef();
  return e('div',{className:'fc',ref:r,onMouseMove:function(ev){var b=r.current.getBoundingClientRect();r.current.style.setProperty('--mx',((ev.clientX-b.left)/b.width*100)+'%');r.current.style.setProperty('--my',((ev.clientY-b.top)/b.height*100)+'%');}},
    e('span',{className:'fc-ico'},props.icon),
    e('div',{className:'fc-body'},
      e('div',{className:'fc-t'},props.title),
      e('p',{className:'fc-d'},props.desc)
    )
  );
}

function Card(props){
  var card=props.card,idx=props.idx,total=props.total,onPrev=props.onPrev,onNext=props.onNext;
  var fl=useState(false),setFl=fl[1];fl=fl[0];
  var animS=useState('in'),setAnim=animS[1];var anim=animS[0];
  var tx=useRef(null),ty=useRef(null),didSwipe=useRef(false),didFlip=useRef(false);

  useEffect(function(){setFl(false);setAnim('in');},[idx]);

  function go(dir){
    setAnim(dir==='next'?'out-left':'out-right');
    setTimeout(function(){dir==='next'?onNext():onPrev();setAnim('in');},270);
  }
  function tStart(ev){tx.current=ev.touches[0].clientX;ty.current=ev.touches[0].clientY;didSwipe.current=false;didFlip.current=false;}
  function tMove(ev){
    if(tx.current===null)return;
    var dx=Math.abs(ev.touches[0].clientX-tx.current),dy=Math.abs(ev.touches[0].clientY-ty.current);
    if(dx>16&&dx>dy*1.8)didSwipe.current=true;
  }
  function tEnd(ev){
    if(tx.current===null)return;
    var endX=ev.changedTouches[0].clientX,dx=endX-tx.current,swipe=didSwipe.current;
    tx.current=null;ty.current=null;
    if(swipe){
      didSwipe.current=false;didFlip.current=true;
      if(dx<-50&&idx<total-1)go('next');
      else if(dx>50&&idx>0)go('prev');
    } else {
      didSwipe.current=false;didFlip.current=true;
      setFl(function(f){return !f;});
    }
    setTimeout(function(){didFlip.current=false;},400);
  }
  function handleClick(){if(didFlip.current)return;setFl(function(f){return !f;});}

  var pts=(card.points||card.answer||'').split('|').filter(function(l){return l.trim();});
  var animStyle={transition:'transform .27s cubic-bezier(.4,0,.2,1),opacity .27s ease',transform:anim==='in'?'scale(1)':anim==='out-left'?'scale(0.88) translateX(-44px)':'scale(0.88) translateX(44px)',opacity:anim==='in'?1:0};

  return e('div',{style:{position:'relative',userSelect:'none',touchAction:'pan-y'},onTouchStart:tStart,onTouchMove:tMove,onTouchEnd:tEnd},
    e('div',{style:{position:'absolute',left:0,top:0,bottom:0,width:'18%',zIndex:5,cursor:'none'},onClick:function(ev){ev.stopPropagation();if(idx>0)go('prev');}}),
    e('div',{style:{position:'absolute',right:0,top:0,bottom:0,width:'18%',zIndex:5,cursor:'none'},onClick:function(ev){ev.stopPropagation();if(idx<total-1)go('next');}}),
    e('div',{className:'fw',style:animStyle,onClick:handleClick},
      e('div',{className:fl?'fi fl':'fi'},
        e('div',{className:'ff'},
          e('div',{className:'fl-lbl'},'Topic'),
          e('div',{className:'fl-q'},card.topic||card.question),
          e('div',{className:'fl-hint'},'tap to study')
        ),
        e('div',{className:'fb',style:{alignItems:'flex-start',textAlign:'left',overflowY:'auto',padding:'20px'}},
          e('div',{className:'fl-lbl',style:{width:'100%',textAlign:'center',marginBottom:12}},'Key Points'),
          e('div',{style:{width:'100%'}},
            pts.map(function(line,i){
              var t=line.trim();if(!t)return null;
              return e('div',{key:i,style:{display:'flex',gap:7,marginBottom:6,alignItems:'flex-start'}},
                e('span',{style:{color:'var(--accent)',fontSize:'0.65rem',marginTop:4,flexShrink:0}},'→'),
                e('span',{style:{fontSize:'0.88rem',lineHeight:1.7,color:'var(--text)',fontWeight:300}},t)
              );
            })
          ),
          e('div',{className:'fl-hint'},'tap to flip back')
        )
      )
    ),
    e('div',{style:{display:'flex',justifyContent:'center',gap:6,marginTop:14}},
      Array.from({length:total}).map(function(_,i){
        return e('div',{key:i,style:{width:i===idx?18:6,height:6,borderRadius:3,background:i===idx?'var(--accent)':'var(--muted2)',transition:'width .35s cubic-bezier(.22,1,.36,1),background .2s'}});
      })
    )
  );
}

function Quiz(props){
  var qs=props.qs;
  var onMistake=props.onMistake||null;
  var onFinish=props.onFinish||null;
  var qiS=useState(0),setQi=qiS[1];var qi=qiS[0];
  var chS=useState(null),setCh=chS[1];var ch=chS[0];
  var scS=useState(0),setSc=scS[1];var sc=scS[0];
  var doneS=useState(false),setDone=doneS[1];var done=doneS[0];
  var animS=useState('in'),setAnim=animS[1];var anim=animS[0];
  var txRef=useRef(null),isSwipeRef=useRef(false);

  useEffect(function(){setAnim('in');},[qi,done]);

  function goQ(dir){
    setAnim(dir==='next'?'out-left':'out-right');
    setTimeout(function(){
      if(dir==='next'){if(qi===qs.length-1){setDone(true);}else{setQi(function(i){return i+1;});setCh(null);}}
      else{setQi(function(i){return Math.max(0,i-1);});setCh(null);}
      setAnim('in');
    },260);
  }
  function qTouchStart(ev){txRef.current=ev.touches[0].clientX;isSwipeRef.current=false;}
  function qTouchMove(ev){if(txRef.current===null)return;if(Math.abs(ev.touches[0].clientX-txRef.current)>20)isSwipeRef.current=true;}
  function qTouchEnd(ev){
    if(txRef.current===null)return;
    var dx=ev.changedTouches[0].clientX-txRef.current;txRef.current=null;
    var answered=ch!==null;
    if(!isSwipeRef.current||!answered)return;
    if(dx<-40)goQ('next');else if(dx>40&&qi>0)goQ('prev');
  }

  // Fire onFinish once when quiz completes — must be unconditional hook
  useEffect(function(){
    if(done&&onFinish)onFinish(sc,qs.length);
  },[done]);

  if(done){
    var pct=Math.round(sc/qs.length*100);
    var msg=pct>=80?'Excellent — concepts are clear.':pct>=50?'Good effort. Review a few areas.':'Go through the cards once more.';
    return e('div',{className:'qres'},
      e('div',{className:'qsb'},pct+'%'),
      e('div',{className:'qrs'},sc+' out of '+qs.length+' correct — '+msg),
      e('button',{className:'rbtn',style:{marginRight:8},onClick:function(){setQi(0);setCh(null);setSc(0);setDone(false);}},'Retry'),
      props.onReset&&e('button',{className:'rbtn',onClick:props.onReset},'Change count')
    );
  }

  var q=qs[qi],answered=ch!==null;
  var animStyle={transition:'transform .26s cubic-bezier(.4,0,.2,1),opacity .26s ease',transform:anim==='in'?'scale(1)':anim==='out-left'?'scale(0.9) translateX(-30px)':'scale(0.9) translateX(30px)',opacity:anim==='in'?1:0};

  return e('div',{className:'qw',onTouchStart:qTouchStart,onTouchMove:qTouchMove,onTouchEnd:qTouchEnd},
    e('div',{className:'qpr'},
      e('div',{className:'qtr'},e('div',{className:'qf',style:{width:(qi/qs.length*100)+'%'}})),
      e('span',{className:'qst'},(qi+1)+'/'+qs.length)
    ),
    e('div',{style:animStyle},
      e('div',{className:'qq'},q.question),
      e('div',{className:'og'},
        q.options.map(function(o,i){
          var cls='ob';
          if(answered){if(i===q.correct)cls+=' cor';else if(i===ch&&ch!==q.correct)cls+=' wrg';}
          return e('button',{key:i,className:cls,disabled:answered,onClick:function(){
            if(answered)return;setCh(i);if(i===q.correct){setSc(function(s){return s+1;});}else if(onMistake){onMistake(q);}
          }},
            e('span',{style:{opacity:.35,marginRight:7,fontSize:'0.65rem',letterSpacing:'0.06em'}},['A','B','C','D'][i]),
            o
          );
        })
      ),
      answered&&e('div',null,
        e('div',{className:'qex'},e('strong',null,ch===q.correct?'Correct. ':'Incorrect. '),q.explanation),
        e('button',{className:'nx',onClick:function(){goQ('next');}},qi===qs.length-1?'See results':'Next →')
      )
    ),
    e('div',{style:{display:'flex',justifyContent:'center',gap:6,marginTop:18}},
      qs.map(function(_,i){return e('div',{key:i,style:{width:i===qi?18:6,height:6,borderRadius:3,background:i===qi?'var(--accent)':'var(--muted2)',transition:'width .35s cubic-bezier(.22,1,.36,1),background .2s'}});})
    )
  );
}

function MistakeList(props){
  var mistakes=props.mistakes||[];
  var openS=useState({}),setOpen=openS[1];var open=openS[0];

  function encodeCards(arr){
    // Use ASCII control chars as separators (smaller than multi-char delimiters)
    // Topic: max 40 chars, Points: max 3 segments of 65 chars each
    var compact=arr.slice(0,5).map(function(c){
      var t=(c.topic||'').substring(0,40).trimEnd();
      var pts=(c.points||'').split('|').slice(0,3).map(function(p){return p.trim().substring(0,65);}).join('\x1F');
      return t+'\x1E'+pts;
    }).join('\x1D');
    var b64=btoa(unescape(encodeURIComponent(compact)));
    return b64.replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  }
  function decodeCards(str){
    var b64=str.replace(/-/g,'+').replace(/_/g,'/');
    while(b64.length%4)b64+='=';
    var compact=decodeURIComponent(escape(atob(b64)));
    return compact.split('\x1D').map(function(s){
      var i=s.indexOf('\x1E');
      var topic=i>=0?s.substring(0,i):s;
      var pts=i>=0?s.substring(i+1).split('\x1F').join(' | '):'';
      return {topic:topic,points:pts};
    });
  }

  function hFile(file){
    if(!file)return;
    if(!file.type.includes('pdf'))return st('PDF files only');
    if(file.size>20*1024*1024)return st('PDF too large — keep under 20MB');
    setFn(file.name);setPdfTxt('');st('Reading PDF…');
    var loadLib=new Promise(function(resolve,reject){
      if(window.pdfjsLib){resolve();return;}
      var s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
      s.onload=function(){window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';resolve();};
      s.onerror=reject;
      document.head.appendChild(s);
    });
    var reader=new FileReader();
    reader.onload=function(ev){
      loadLib.then(function(){
        var typedArray=new Uint8Array(ev.target.result);
        window.pdfjsLib.getDocument({data:typedArray}).promise.then(function(pdf){
          var maxPages=Math.min(pdf.numPages,20),allText='',pagesDone=0;
          for(var p=1;p<=maxPages;p++){
            (function(pageNum){
              pdf.getPage(pageNum).then(function(page){
                page.getTextContent().then(function(tc){
                  allText+=tc.items.map(function(item){return item.str;}).join(' ')+' ';
                  pagesDone++;
                  if(pagesDone===maxPages){
                    var t=allText.trim();
                    if(!t){st('No text found — try a text-based PDF');return;}
                    setPdfTxt(t);
                    st('Extracted '+maxPages+' of '+pdf.numPages+' pages — ready to generate');
                  }
                });
              });
            })(p);
          }
        }).catch(function(err){st('Could not read PDF: '+err.message);});
      }).catch(function(){st('PDF library failed to load — check connection');});
    };
    reader.readAsArrayBuffer(file);
  }

                (user.tier==='pro'||user.tier==='elite')&&e('button',{className:'user-drop-item',onClick:function(){setShowUserMenu(false);setWsTab('history');setShowWs(true);}},

                e('button',{className:'user-drop-item danger',onClick:logout},'Sign out')

        e('span',{style:{fontWeight:600}},'C'),'ogniSwift'

      e('h1',null,'Notes become',e('br'),' ',e('em',null,'flashcards')),
      e('p',{className:'h-sub'},'Paste any text. Get flashcards, a structured summary, and a self-test quiz — in seconds.'),
      e('div',{className:'pill-row'},
        ['UPSC Prelims','JEE Physics','NEET Bio','CA Law','History','Economics','Current Affairs'].map(function(t){return e('span',{key:t,className:'pill'},t);})
      ),
      e('button',{className:'cta',onClick:scrollApp},'Start for free →')
    ),

    /* FEATURES */
    e('section',{id:'ft',className:'feat-wrap rev'},
      e('div',{className:'feat-eyebrow'},'What you get'),
      e('h2',{className:'feat-heading'},'Built for how',e('br'),e('em',null,'Indian students'),' actually study'),
      e('div',{className:'fg'},
        e(HFeat,{icon:'⚡',title:'Instant study cards',desc:'Paste any notes — UPSC, JEE, NEET, CA. Get precise topic cards with pointers, tables and flows in seconds.'}),
        e(HFeat,{icon:'🧠',title:'Memory-first flashcards',desc:'Cards show topic → key pointers → flowcharts. Built for memorisation, not just reading.'}),
        e(HFeat,{icon:'📝',title:'Self-test quiz',desc:'After your cards, test yourself with MCQs from the same content. Know exactly what sticks.'}),
        e(HFeat,{icon:'📄',title:'PDF upload & export',desc:'Upload your study material as PDF. Download all flashcards as a clean printable PDF too.'}),
        e(HFeat,{icon:'📱',title:'Mobile first',desc:'Designed for phone screens. Study on the bus, in the hostel, between lectures — anywhere.'}),
        e(HFeat,{icon:'🔒',title:'No signup needed',desc:'Start immediately, no account required for free tier. Your notes stay private in your browser.'})
      )
    ),

    /* APP */
    e('section',{id:'app',className:'app-wrap'},
      e('div',{className:'ey rev'},'Generate'),
      e('h2',{className:'st rev'},'Paste. ',e('em',null,'Generate.'),' Revise.'),
      e('div',{className:'icard rev'},
        e('div',{className:'tbar'},
          e('button',{className:'tb'+(itab==='text'?' act':''),onClick:function(){setItab('text');}},'Text'),
          e('button',{className:'tb'+(itab==='pdf'?' act':''),onClick:function(){setItab('pdf');}},'PDF')
        ),
        itab==='text'
          ? e('textarea',{value:notes,onChange:function(ev){setNotes(ev.target.value);},placeholder:' Paste your study notes here…\n\nWorks with anything — UPSC answer keys, JEE chapters, NEET diagrams text, CA act excerpts, your own handwritten notes typed out…'})
          : e(React.Fragment,null,
              e('button',{className:'upz'+(drag?' dov':''),onClick:function(){fref.current.click();},
                onDragOver:function(ev){ev.preventDefault();setDrag(true);},
                onDragLeave:function(){setDrag(false);},
                onDrop:function(ev){ev.preventDefault();setDrag(false);hFile(ev.dataTransfer.files[0]);}
              },
                e('span',{className:'upz-i'},'↑'),
                fn ? e('p',null,e('strong',null,fn),e('br'),'Click to replace')
                   : e('p',null,'Drop PDF here or ',e('strong',null,'click to browse'),e('br'),'Max ~20 pages for best results')
              ),
              e('input',{type:'file',accept:'.pdf',ref:fref,onChange:function(ev){hFile(ev.target.files[0]);}}),
              fn&&e('textarea',{value:pdfTxt,onChange:function(ev){setPdfTxt(ev.target.value);},placeholder:'Edit extracted text if needed…',style:{borderTop:'1px solid var(--border)'}})
            ),
        e('div',{className:'ctrl'},
          e('div',{className:'cbs'},
            [5,10,15,20].map(function(n){return e('button',{key:n,className:'cb'+(cnt===n?' s':''),onClick:function(){setCnt(n);}},n);}),
            (isPro()||isElite())&&e('input',{
              type:'number',
              className:'cb cb-custom',
              min:1,
              max:isElite()?50:30,
              placeholder:isElite()?'1-50':'1-30',
              title:isElite()?'Custom count: 1–50':'Custom count: 1–30',
              style:{width:64,textAlign:'center'},
              onKeyDown:function(ev){
                // block e, +, - keys
                if(['e','E','+','-'].indexOf(ev.key)>=0)ev.preventDefault();
              },
              onBlur:function(ev){
                var v=parseInt(ev.target.value,10);
                var mx=isElite()?50:30;
                if(isNaN(v)||v<1){ev.target.value='';return;}
                if(v>mx){ev.target.value=mx;setCnt(mx);st('Max '+mx+' cards for your plan');return;}
                setCnt(v);
              },
              onChange:function(ev){
                var v=parseInt(ev.target.value,10);
                var mx=isElite()?50:30;
                if(!isNaN(v)&&v>=1&&v<=mx)setCnt(v);
              }
            })
          ),
          e('button',{className:'gb',onClick:gen,disabled:loading||!itxt.trim()},loading?'Generating…':'Generate →')
        ),
        e('div',{className:'disc'},
          e('span',{className:'disc-i'},'ⓘ'),
          e('p',null,'Cards are generated directly from the text you provide — the AI works only with your input, not from its own knowledge. Better notes = better cards.')
        ),
        itxt.length>getCharLimit()&&e('div',{className:'char-warn'},
          e('p',null,'Your text is '+itxt.length.toLocaleString('en-IN')+' characters — only the first '+getCharLimit().toLocaleString('en-IN')+' will be used. For best results across all topics, trim your input or paste one topic at a time.')
        ),
        itab==='pdf'&&e('div',{className:'pdf-disc'},
          e('p',null,'Scanned or handwritten PDFs won’t work — only text-based PDFs can be read. If your PDF is a photo or scan, copy-paste the text instead.')
        ),
        e('div',{className:'urow'},
          e('div',{className:'ut'},e('div',{className:'uf',style:{width:Math.min(100,usage/getDayLimit()*100)+'%'}})),
          e('span',{className:'utx'},usage+'/'+getDayLimit()+' today')
        )
      ),

      e('div',{id:'ra'}),
      loading&&e('div',{className:'ld'},e('div',{className:'dots'},e('span'),e('span'),e('span')),e('p',null,'Generating your cards…')),

      !loading&&cards.length>0&&e('div',{className:'rev',style:{marginTop:4}},
        e('div',{className:'rtabs'},
          e('button',{className:'rt'+(rtab==='cards'?' act':''),onClick:function(){setRtab('cards');}},'Flashcards',e('span',{className:'bdg'},cards.length+' / '+cnt)),
          e('button',{className:'rt'+(rtab==='summary'?' act':''),onClick:function(){setRtab('summary');}},'Summary'),
          e('button',{className:'rt'+(rtab==='quiz'?' act':''),onClick:function(){setRtab('quiz');}},'Quiz',e('span',{className:'bdg'},quizCounts[quizCounts.length-1]+'Q max'))
        ),
        e('div',{className:'rbody'},
          rtab==='cards'&&e(React.Fragment,null,
            e(Card,{card:cards[ci],idx:ci,total:cards.length,
              onNext:function(){setCi(function(i){return Math.min(i+1,cards.length-1);});},
              onPrev:function(){setCi(function(i){return Math.max(i-1,0);});}
            }),
            e('div',{className:'fca',style:{marginTop:8}},
              e('button',{className:'ab',onClick:function(){setCi(0);}},'↩ Reset'),
              e('button',{className:'ab',onClick:function(){setCi(Math.floor(Math.random()*cards.length));}},'⇄ Shuffle'),
              e('button',{className:'ab',onClick:function(){setRtab('quiz');},disabled:!quiz.length},'📝 Quiz'),
              e('button',{className:'ab pr',onClick:function(){dlPDF(cards,activeSetName||'CogniSwift Study Cards');}},'↓ PDF'),
              e('button',{className:'ab',onClick:openShare},'⇪ Share'),
              (isPro()||isElite())
                ? e('button',{className:'ab',style:{color:'var(--accent)',borderColor:'var(--accent)'},onClick:openSaveModal},'💾 Save set')
                : null,
              (isPro()||isElite())
                ? e('button',{className:'voice-btn'+(speaking?' active':''),onClick:toggleVoice},speaking?'⏹ Stop':'🔊 Read aloud')
                : null,
              (isPro()||isElite())
                ? e('button',{className:'regen-btn',onClick:function(){regenCard(ci);},disabled:regenIdx!==null},regenIdx===ci?'regenerating…':'↻ Redo this card')
                : null
            )
          ),
          rtab==='summary'&&e(React.Fragment,null,
            e(Summary,{data:summary,loading:sumLoad}),
            summary&&!sumLoad&&e('div',{className:'fca'},
              e('button',{className:'ab pr',onClick:function(){dlSummaryPDF(summary);}},'↓ PDF')
            )
          ),
          rtab==='quiz'&&(quiz.length>0
            ? (activeQuiz
                ? e(Quiz,{qs:activeQuiz,onReset:quizCounts.length>1?function(){setActiveQuiz(null);setPickAnim(null);}:null,onMistake:(isPro()||isElite())?function(q){recordMistake(q.question,q.options,q.correct,q.explanation);}:null,onFinish:(isPro()||isElite())?function(sc,tot){saveQuizResult(sc,tot);}:null})
                : e('div',{className:'qpick'},
                    e('div',{className:'qpick-lbl'},'How many questions?'),
                    e('div',{className:'qpick-opts'},
                      quizCounts.map(function(n){
                        var cls='qpick-btn'+(pickAnim===n?' chosen':pickAnim!==null?' fading':'');
                        return e('button',{key:n,className:cls,onClick:function(){
                          setPickAnim(n);
                          setTimeout(function(){setActiveQuiz(quiz.slice(0,n));setPickAnim(null);},380);
                        }},n);
                      })
                    )
                  )
              )
            : e('div',{className:'emp'},e('div',{className:'emp-i'},'?'),e('p',null,'No quiz available')))
        )
      ),
      !loading&&cards.length===0&&e('div',{className:'emp rev',style:{marginTop:14}},e('div',{className:'emp-i'},'◻'),e('p',null,'Your flashcards will appear here'))
    ),

    /* PRICING */
    e('section',{id:'pr',className:'pr-wrap'},
      e('div',{className:'ey rev'},'Pricing'),
      e('h2',{className:'st rev'},'Start free.',e('br'),e('em',null,'Upgrade anytime.')),
      e('div',{className:'plans rev'},
        e(PCard,{name:'Free',price:'0',period:'forever',feats:['10 generations/day','Text paste','Flashcard flip','PDF export'],onSel:scrollApp}),
        e(PCard,{name:'Pro',price:'99',period:'per month',pop:true,feats:['Unlimited generations','PDF upload','All Free features','Priority access'],onSel:function(){setPw(true);}}),
        e(PCard,{name:'Elite',price:'199',period:'per month',feats:['Everything in Pro','Anki export','Saved card sets','Batch generation'],onSel:function(){setPw(true);}})
      )
    ),

    e('section',{className:'test-wrap'},
      e('div',{className:'feat-eyebrow rev'},'From students'),
      e('h2',{className:'feat-heading rev'},'What people ',e('em',null,'actually'),' say'),
      e('div',{className:'tg rev'},
        e('div',{className:'tc'},
          e('p',{className:'tc-q'},'I paste my notes before sleeping and go through the cards on the metro next morning. Simple habit but it actually helps things stick.'),
          e('div',{className:'tc-name'},'Priya S.'),
          e('div',{className:'tc-sub'},'UPSC Aspirant, Delhi')
        ),
        e('div',{className:'tc'},
          e('p',{className:'tc-q'},'The quiz at the end is the part I use the most. It forces you to recall instead of just reading through. Good for last-minute chapter revision.'),
          e('div',{className:'tc-name'},'Arjun M.'),
          e('div',{className:'tc-sub'},'JEE Aspirant, Kota')
        ),
        e('div',{className:'tc'},
          e('p',{className:'tc-q'},'CA chapters are long and dense. Pasting a section and getting a card set in seconds is genuinely useful when you are pressed for time before a test.'),
          e('div',{className:'tc-name'},'Sneha R.'),
          e('div',{className:'tc-sub'},'CA Intermediate, Pune')
        )
      )
    ),

    e('footer',null,
      e('div',{className:'fl'},'CogniSwift'),
      e('div',{className:'ft'},'Built for Indian students · 2025')
    ),

    /* AUTH MODAL */
    showAuth&&e(AuthModal,{onClose:function(){setShowAuth(false);}}),


    /* WORKSPACE MODAL */
    showWs&&e('div',{className:'ws-ov',onClick:function(ev){if(ev.target===ev.currentTarget)setShowWs(false);}},
      e('div',{className:'ws-box'},
        e('div',{className:'ws-head'},
          e('div',{style:{display:'flex',flexDirection:'column',gap:10}},
            e('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between'}},
              e('div',{className:'ws-title'},'My Workspace'),
              e('button',{className:'ws-close',onClick:function(){setShowWs(false);}},'✕')
            ),
            e('div',{style:{display:'flex',gap:6}},
              ['sets','history','mistakes'].map(function(tab){
                var labels={sets:'📚 Saved Sets',history:'📊 Quiz History',mistakes:'✗ Mistakes'};
                var counts={sets:savedSets.length,history:quizHist.length,mistakes:mistakes.length};
                return e('button',{key:tab,
                  onClick:function(){setWsTab(tab);},
                  style:{
                    padding:'5px 12px',border:'1px solid',borderRadius:'50px',
                    fontSize:'0.72rem',cursor:'none',fontFamily:'Geist,sans-serif',
                    background:wsTab===tab?'var(--accent)':'transparent',
                    color:wsTab===tab?'var(--bg)':'var(--muted)',
                    borderColor:wsTab===tab?'var(--accent)':'var(--border)',
                    transition:'all .2s',
                  }
                },labels[tab]+(counts[tab]?' ('+counts[tab]+')':''));
              })
            )
          )
        ),
        e('div',{className:'ws-body'},

          /* ── SETS TAB ── */
          wsTab==='sets'&&(
            savedSets.length===0
              ? e('div',{className:'ws-empty'},
                  e('div',{style:{fontSize:'2.2rem',marginBottom:12}},'📚'),
                  'No saved sets yet.',e('br'),
                  e('span',{style:{color:'var(--muted)'}},'Generate cards then click '),
                  e('strong',{style:{color:'var(--accent)'}},'💾 Save set'),
                  e('span',{style:{color:'var(--muted)'}},' to store your work here.')
                )
              : e('div',{className:'ws-grid'},
                  savedSets.map(function(s){
                    return e('div',{key:s.id,className:'ws-card'},
                      e('div',{className:'ws-card-name'},s.name),
                      e('div',{className:'ws-card-meta'},
                        e('span',null,(s.cards&&s.cards.length||0)+' cards'),
                        e('span',null,'·'),
                        e('span',null,(s.quiz&&s.quiz.length||0)+' quiz Qs'),
                        e('span',null,'·'),
                        e('span',null,new Date(s.savedAt).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'2-digit'}))
                      ),
                      e('div',{className:'ws-card-actions'},
                        e('button',{className:'ws-btn',onClick:function(){loadSet(s);}},'Load →'),
                        e('button',{className:'ws-btn del',onClick:function(){deleteSet(s.id);}},'Delete')
                      )
                    );
                  })
                )
          ),

          /* ── HISTORY TAB ── */
          wsTab==='history'&&(
            quizHist.length===0
              ? e('div',{className:'ws-empty'},
                  e('div',{style:{fontSize:'2.2rem',marginBottom:12}},'📊'),
                  'No quiz history yet.',e('br'),
                  e('span',{style:{color:'var(--muted)'}},'Complete a quiz and your scores will appear here.')
                )
              : e('div',null,
                  quizHist.map(function(q){
                    var pct=Math.round(q.score/q.total*100);
                    var col=pct>=80?'var(--green)':pct>=50?'var(--accent)':'var(--red)';
                    return e('div',{key:q.id,className:'qh-item'},
                      e('div',{className:'qh-left'},
                        e('div',{style:{fontWeight:500,fontSize:'0.82rem'}},q.setName),
                        e('div',{className:'qh-date'},new Date(q.date).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}))
                      ),
                      e('div',{style:{textAlign:'right',display:'flex',flexDirection:'column',alignItems:'flex-end',gap:3}},
                        e('div',{style:{fontSize:'1rem',fontWeight:600,color:col}},pct+'%'),
                        e('div',{style:{fontSize:'0.68rem',color:'var(--muted)'}},q.score+' / '+q.total+' correct')
                      )
                    );
                  })
                )
          ),

          /* ── MISTAKES TAB ── */
          wsTab==='mistakes'&&(
            mistakes.length===0
              ? e('div',{className:'ws-empty'},
                  e('div',{style:{fontSize:'2.2rem',marginBottom:12}},'✓'),
                  'No mistakes recorded.',e('br'),
                  e('span',{style:{color:'var(--muted)'}},'Wrong quiz answers will appear here so you can review them.')
                )
              : e('div',null,
                  e('div',{style:{display:'flex',justifyContent:'flex-end',marginBottom:12}},
                    e('button',{
                      onClick:clearMistakes,
                      style:{fontSize:'0.7rem',color:'var(--muted)',background:'none',border:'1px solid var(--border)',borderRadius:'6px',padding:'5px 10px',cursor:'none',fontFamily:'Geist,sans-serif'}
                    },'Clear all')
                  ),
                  e(MistakeList,{mistakes:mistakes,onClear:clearMistakes})
                )
          )

        )
      )
    ),

    /* SAVE SET MODAL */
    showSave&&e('div',{className:'save-ov',onClick:function(ev){if(ev.target===ev.currentTarget)setShowSave(false);}},
      e('div',{className:'save-box'},
        e('div',{className:'save-title'},'Save this set'),
        e('div',{className:'save-sub'},'Give it a name you’ll recognise — like “UPSC Polity Ch.3” or “JEE Thermodynamics”.'),
        e('input',{
          className:'save-input',
          type:'text',
          placeholder:'e.g. UPSC Polity — Fundamental Rights',
          value:saveName,
          onChange:function(ev){setSaveName(ev.target.value);},
          onKeyDown:function(ev){if(ev.key==='Enter')confirmSave();},
          autoFocus:true
        }),
        e('div',{className:'save-row'},
          e('button',{className:'save-ok',onClick:confirmSave},'Save'),
          e('button',{className:'save-cancel',onClick:function(){setShowSave(false);}},'Cancel')
        )
      )
    ),

    showShare&&e('div',{className:'sh-ov',onClick:function(ev){if(ev.target===ev.currentTarget)setShowShare(false);}},
      e('div',{className:'sh-mo'},
        e('h3',null,'Share flashcards'),
        e('p',null,'Pick the cards to include in your shareable link. Anyone with the link can view them instantly.'),
        e('div',{className:'sh-sel-row'},
          e('button',{className:'sh-sel-btn',onClick:selectAllShare},'Select all'),
          e('button',{className:'sh-sel-btn',onClick:selectNoneShare},'Clear all'),
          e('span',{style:{fontSize:'0.68rem',color:'var(--muted)',marginLeft:'auto'}},
            Object.values(shareSel).filter(Boolean).length+' / '+cards.length+' selected'
          )
        ),
        e('div',{className:'sh-list'},
          cards.map(function(c,i){
            var sel=!!shareSel[i];
            return e('button',{key:i,className:'sh-item'+(sel?' sel':''),onClick:function(){toggleShareCard(i);}},
              e('div',{className:'sh-cb'},sel?'✓':''),
              e('div',{className:'sh-label'},
                e('strong',{style:{fontWeight:500,fontSize:'0.78rem'}},c.topic||'Card '+(i+1)),
                (c.points||'').split('|')[0]&&e('div',{style:{fontSize:'0.7rem',color:'var(--muted)',marginTop:2}},(c.points||'').split('|')[0].trim().substring(0,60)+'…')
              )
            );
          })
        ),
        shareUrl
          ? e('div',{className:'sh-url'},
              e('input',{type:'text',readOnly:true,value:shareUrl,onClick:function(ev){ev.target.select();}}),
              e('button',{className:'sh-copy',onClick:copyShareUrl},'Copy')
            )
          : e('button',{className:'sh-copy',style:{width:'100%',padding:'11px',borderRadius:'var(--r-sm)',marginBottom:'10px'},onClick:buildShareUrl},'Create short link →'),
        e('button',{className:'md',style:{marginTop:4},onClick:function(){setShowShare(false);}}, 'Close')
      )
    ),

    pw&&e('div',{className:'ov',onClick:function(ev){if(ev.target===ev.currentTarget)setPw(false);}},
      e('div',{className:'mo'},
        e('div',{className:'mo-ey'},'Upgrade'),
        e('h2',null,'Unlock full access'),
        e('p',{className:'mo-s'},"You've used your free generations for today. Pick a plan — no interruptions, no limits."),
        e('div',{className:'mo-plans'},
          [{id:'pro',n:'Pro',p:'99',s:'per month',pk:'Save sets · Mistake tracker · Voice readout · 20/day'},{id:'elite',n:'Elite',p:'199',s:'per month',pk:'Everything in Pro · Spaced repetition · Themes · 40/day'}].map(function(x){
            return e('div',{key:x.id,className:'mp'+(sp===x.id?' sel':''),onClick:function(){setSp(x.id);}},
              e('div',{className:'mp-n'},x.n),
              e('div',{className:'mp-p'},e('sup',null,'₹'),x.p),
              e('div',{className:'mp-s'},x.s),
              e('div',{className:'mp-pk'},x.pk)
            );
          })
        ),
        e('button',{className:'pb',onClick:function(){pay(sp);}},'Pay ₹'+(sp==='pro'?'99':'199')+' via Razorpay →'),
        e('button',{className:'md',onClick:function(){setPw(false);}},'Continue tomorrow')
      )
    ),
    toast&&e('div',{className:'toast'},toast)
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App,null));
</script>
<script>(function(){var s=document.createElement('script');s.src='https://checkout.razorpay.com/v1/checkout.js';document.head.appendChild(s);})()</script>
